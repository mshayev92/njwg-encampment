<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    // Applied synchronously, before first paint — resolves njwg_theme
    // (light/dark/system) and sets data-theme on <html> BEFORE
    // tokens.css is even requested, so a dark-mode device never flashes
    // the light palette for a frame first. See the same script in every
    // pages/*.html and the :root[data-theme="dark"] block in
    // css/tokens.css.
    try {
      var njwgThemePref = localStorage.getItem("njwg_theme") || "system";
      var njwgThemeResolved = njwgThemePref === "system"
        ? (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
        : njwgThemePref;
      document.documentElement.setAttribute("data-theme", njwgThemeResolved);
    } catch (e) { document.documentElement.setAttribute("data-theme", "light"); }
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NJWG Encampment</title>
  <meta name="theme-color" content="#0d1250">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="NJWG Encampment">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/favicon.ico" sizes="any">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/app.css">

  <style>
    /* Login-page-specific styles (not needed elsewhere, kept local) */
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-5);
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(ellipse 800px 500px at 50% -10%, rgba(240, 180, 41, 0.14) 0%, transparent 60%),
        var(--indigo-950);
    }

    .login-card {
      width: 100%;
      max-width: 680px;
      display: grid;
      grid-template-columns: 220px 1fr;
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      position: relative;
      z-index: 1;
      border: 3px solid var(--gold-500);
    }

    .login-card__left {
      background: var(--indigo-950);
      color: var(--steel-300);
      padding: var(--space-7) var(--space-5);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      justify-content: center;
      gap: var(--space-2);
    }

    .login-card__mark {
      width: 72px; height: 72px;
      margin-bottom: var(--space-3);
      display: flex; align-items: center; justify-content: center;
    }

    .login-card__mark img {
      width: 100%; height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 4px 10px rgba(13, 18, 80, 0.35));
    }

    .login-card__eyebrow {
      font-family: var(--font-display);
      font-size: var(--fs-2xs);
      letter-spacing: var(--tracking-wider);
      text-transform: uppercase;
      color: var(--gold-500);
    }

    .login-card__left h1 {
      font-size: var(--fs-lg);
      color: var(--on-brand);
      margin: var(--space-2) 0 0;
    }

    .login-card__hint {
      font-size: var(--fs-xs);
      color: var(--steel-300);
      margin-top: var(--space-2);
      line-height: var(--lh-normal);
    }

    .login-card__right {
      padding: var(--space-6) var(--space-5);
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .login-error {
      display: none;
      background: var(--red-100);
      color: var(--red-600);
      border-radius: var(--radius-md);
      padding: var(--space-3);
      font-size: var(--fs-sm);
      margin-bottom: var(--space-4);
      text-align: left;
    }
    .login-error.is-visible { display: block; }

    /* ---- Position list (replaces the plain <select>) ---- */
    .position-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      max-height: 320px;
      overflow-y: auto;
      padding-right: var(--space-1);
    }

    .position-chip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: var(--surface-sunken);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: var(--fs-sm);
      font-weight: 600;
      color: var(--ink-900);
      cursor: pointer;
      text-align: left;
      transition: border-color var(--duration-fast) var(--ease-standard),
                  transform var(--duration-fast) var(--ease-standard);
    }

    .position-chip:hover {
      border-color: var(--gold-500);
      transform: translateX(2px);
    }

    .position-chip:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .position-chip__lock {
      font-size: var(--fs-2xs);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      color: var(--ink-600);
    }

    /* ---- Flights / Squadrons collapsible groups ---- */
    .position-group__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      width: 100%;
      padding: var(--space-3) var(--space-4);
      background: var(--indigo-900);
      border: none;
      border-radius: var(--radius-md);
      font-family: var(--font-display);
      font-size: var(--fs-sm);
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      color: var(--on-brand);
      cursor: pointer;
    }

    .position-group__count {
      font-family: var(--font-body);
      text-transform: none;
      letter-spacing: normal;
      font-size: var(--fs-2xs);
      color: var(--steel-300);
    }

    .position-group__chevron {
      transition: transform var(--duration-fast) var(--ease-standard);
    }

    .position-group.is-open .position-group__chevron {
      transform: rotate(180deg);
    }

    .position-group__items {
      display: none;
      flex-direction: column;
      gap: var(--space-2);
      margin-top: var(--space-2);
      padding-left: var(--space-3);
    }

    .position-group.is-open .position-group__items {
      display: flex;
    }

    /* ---- Password step (replaces the position list in place) ---- */
    .password-step { display: none; }
    .password-step.is-visible { display: flex; flex-direction: column; gap: var(--space-4); }

    .password-step__back {
      align-self: flex-start;
    }

    .password-step__selected {
      font-family: var(--font-display);
      font-size: var(--fs-md);
      color: var(--heading);
    }

    .password-step .field { text-align: left; margin-bottom: 0; }
    .password-step .btn { width: 100%; }
  </style>
</head>
<body>

  <div class="login-screen">
    <div class="login-card">
      <div class="login-card__left">
        <div class="login-card__mark"><img src="icons/icon-192.png" alt="NJ Wing"></div>
        <span class="login-card__eyebrow">NJWG Encampment</span>
        <h1>Staff Sign In</h1>
        <p class="login-card__hint">Select your position to continue.</p>
      </div>

      <div class="login-card__right">
        <div class="login-error" id="login-error"></div>

        <div class="position-list" id="position-list">
          <div class="state-message"><div class="spinner"></div></div>
        </div>

        <form class="password-step" id="password-step">
          <button type="button" class="btn btn--ghost password-step__back" id="back-btn">← Back</button>
          <div class="password-step__selected" id="selected-position-label"></div>
          <div class="field">
            <label for="password-input">Password</label>
            <input type="password" id="password-input" name="password" autocomplete="off">
          </div>
          <button type="submit" class="btn btn--primary" id="login-submit">Sign In</button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/shell.js"></script>
  <script>
    const errorBox = document.getElementById("login-error");
    const positionListEl = document.getElementById("position-list");
    const passwordStep = document.getElementById("password-step");
    const backBtn = document.getElementById("back-btn");
    const selectedPositionLabel = document.getElementById("selected-position-label");
    const passwordInput = document.getElementById("password-input");
    const submitBtn = document.getElementById("login-submit");

    // Which positions require a password — filled in from the backend
    // (Auth.listPositions()) once loaded, data-driven from whether each
    // position's own StaffAccess Password cell is non-empty, not a
    // hardcoded name list. See isPasswordProtected() below.
    let passwordProtectedSet = new Set();

    function isPasswordProtected(position) {
      return passwordProtectedSet.has(String(position || "").trim().toLowerCase());
    }

    // Flight names are fixed callsigns; anything matching "Squadron <n>"
    // is a squadron; everything else (CCT, Administrator, or any other
    // custom position) is shown ungrouped.
    const FLIGHT_NAMES = new Set(["alpha", "bravo", "charlie", "delta", "echo", "foxtrot", "golf", "hotel"]);
    const SQUADRON_PATTERN = /^squadron\s*\d+$/i;

    function classifyPosition(position) {
      const lower = String(position || "").trim().toLowerCase();
      if (FLIGHT_NAMES.has(lower)) return "flight";
      if (SQUADRON_PATTERN.test(lower)) return "squadron";
      return "other";
    }

    // Must have already unlocked this device with the passphrase.
    Auth.requireDeviceGate();

    /**
     * Validates a ?returnTo= value before using it as a redirect target.
     * The app only ever sets returnTo to its own same-origin path, but the
     * URL is attacker-controllable, so an absolute or protocol-relative
     * value ("https://evil.com", "//evil.com") must never be followed —
     * that's an open-redirect / phishing vector. Returns a safe same-origin
     * path, or null to fall back to the default landing page.
     */
    function safeReturnTo(raw) {
      if (!raw) return null;
      try {
        const u = new URL(raw, window.location.origin);
        if (u.origin !== window.location.origin) return null;
        return u.pathname + u.search + u.hash;
      } catch (e) {
        return null;
      }
    }

    // Where to send a signed-in user by default: the FIRST page their
    // position is actually allowed to see, not a hardcoded page they
    // might not have access to (which would load, toast "no access", and
    // bounce them elsewhere — a visible flash on every login).
    function defaultLandingHref() {
      const allowed = Shell.getAllowedNavItems();
      return allowed.length
        ? `${window.APP_BASE_PATH}${allowed[0].href}`
        : `${window.APP_BASE_PATH}pages/schedule.html`;
    }

    // If already logged in, skip straight past this page.
    if (Auth.getSession()) {
      const params = new URLSearchParams(window.location.search);
      window.location.href = safeReturnTo(params.get("returnTo")) || defaultLandingHref();
    }

    /** Shared success/redirect + failure handling for both login paths (direct click and password step). */
    async function doLogin(position, password, { onError } = {}) {
      errorBox.classList.remove("is-visible");
      try {
        await Auth.login(position, password || "");
        const params = new URLSearchParams(window.location.search);
        window.location.href = safeReturnTo(params.get("returnTo")) || defaultLandingHref();
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.add("is-visible");
        if (onError) onError(err);
      }
    }

    function showPositionList() {
      passwordStep.classList.remove("is-visible");
      positionListEl.style.display = "";
      passwordInput.value = "";
      errorBox.classList.remove("is-visible");
    }

    function showPasswordStep(position) {
      positionListEl.style.display = "none";
      passwordStep.classList.add("is-visible");
      selectedPositionLabel.textContent = position;
      passwordInput.value = "";
      errorBox.classList.remove("is-visible");
      passwordInput.focus();
    }

    let currentPasswordPosition = null;

    async function onPositionClick(position, btn) {
      if (isPasswordProtected(position)) {
        currentPasswordPosition = position;
        showPasswordStep(position);
        return;
      }

      // Non-password positions are a single click — no separate submit
      // step needed, since there's nothing else to enter.
      const originalLabel = btn.textContent;
      positionListEl.querySelectorAll(".position-chip").forEach(c => c.disabled = true);
      btn.textContent = "Signing in…";
      await doLogin(position, "", {
        onError: () => {
          positionListEl.querySelectorAll(".position-chip").forEach(c => c.disabled = false);
          btn.textContent = originalLabel;
        }
      });
    }

    function chipHtml(p) {
      return `
        <button type="button" class="position-chip" data-position="${Shell.escapeHtml(p)}">
          <span>${Shell.escapeHtml(p)}</span>
          ${isPasswordProtected(p) ? `<span class="position-chip__lock">🔒 Password</span>` : ""}
        </button>
      `;
    }

    function groupHtml(key, label, items) {
      return `
        <div class="position-group" data-group="${key}">
          <button type="button" class="position-group__header">
            <span>${label} <span class="position-group__count">(${items.length})</span></span>
            <span class="position-group__chevron">▾</span>
          </button>
          <div class="position-group__items">
            ${items.map(chipHtml).join("")}
          </div>
        </div>
      `;
    }

    async function loadPositions() {
      try {
        const { positions, passwordProtected } = await Auth.listPositions();
        passwordProtectedSet = new Set(passwordProtected.map(p => String(p).trim().toLowerCase()));

        if (!positions.length) {
          positionListEl.innerHTML = `<div class="state-message"><p>No positions configured.</p></div>`;
          return;
        }

        const flights = positions.filter(p => classifyPosition(p) === "flight");
        const squadrons = positions.filter(p => classifyPosition(p) === "squadron");
        const others = positions.filter(p => classifyPosition(p) === "other");

        positionListEl.innerHTML = [
          flights.length ? groupHtml("flights", "Flights", flights) : "",
          squadrons.length ? groupHtml("squadrons", "Squadrons", squadrons) : "",
          others.map(chipHtml).join("")
        ].join("");

        positionListEl.querySelectorAll(".position-group__header").forEach(header => {
          header.addEventListener("click", () => {
            header.closest(".position-group").classList.toggle("is-open");
          });
        });

        positionListEl.querySelectorAll(".position-chip").forEach(btn => {
          btn.addEventListener("click", () => onPositionClick(btn.dataset.position, btn));
        });
      } catch (err) {
        positionListEl.innerHTML = `<div class="state-message"><p>Couldn't load positions.</p></div>`;
        errorBox.textContent = err.message;
        errorBox.classList.add("is-visible");
      }
    }

    backBtn.addEventListener("click", showPositionList);

    passwordStep.addEventListener("submit", async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = "Checking…";

      await doLogin(currentPasswordPosition, passwordInput.value, {
        onError: () => { passwordInput.value = ""; passwordInput.focus(); }
      });

      submitBtn.disabled = false;
      submitBtn.textContent = "Sign In";
    });

    loadPositions();
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register(`${window.APP_BASE_PATH}service-worker.js`);
    }
  </script>
</body>
</html>
