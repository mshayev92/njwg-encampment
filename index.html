<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NJWG Encampment</title>
  <meta name="theme-color" content="#0d1250">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/favicon.ico" sizes="any">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/app.css">

  <style>
    /* Login-page-specific styles (not needed elsewhere, kept local) */
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-5);
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(ellipse 800px 500px at 50% -10%, rgba(240, 180, 41, 0.14) 0%, transparent 60%),
        var(--indigo-950);
    }

    /* Faint diverging wing-lines behind the card, echoing the patch —
       the one signature flourish on this screen, used once. */
    .login-screen::before {
      content: "";
      position: absolute;
      top: 50%; left: 50%;
      width: 900px; height: 900px;
      transform: translate(-50%, -50%);
      background:
        linear-gradient(100deg, transparent 49.3%, rgba(240,180,41,0.06) 49.6%, rgba(240,180,41,0.06) 50.4%, transparent 50.7%),
        linear-gradient(80deg, transparent 49.3%, rgba(240,180,41,0.06) 49.6%, rgba(240,180,41,0.06) 50.4%, transparent 50.7%);
      pointer-events: none;
    }

    .login-card {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: var(--space-7) var(--space-6);
      box-shadow: var(--shadow-lg);
      text-align: center;
      position: relative;
      z-index: 1;
      border-top: 3px solid var(--gold-500);
    }

    .login-card__mark {
      width: 84px; height: 84px;
      margin: 0 auto var(--space-4);
      display: flex; align-items: center; justify-content: center;
    }

    .login-card__mark img {
      width: 100%; height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 4px 10px rgba(13, 18, 80, 0.25));
    }

    .login-card__eyebrow {
      font-family: var(--font-display);
      font-size: var(--fs-2xs);
      letter-spacing: var(--tracking-wider);
      text-transform: uppercase;
      color: var(--ink-600);
    }

    .login-card h1 {
      font-size: var(--fs-xl);
      color: var(--indigo-900);
      margin-bottom: var(--space-5);
    }

    .login-card .field { text-align: left; }

    .login-error {
      display: none;
      background: var(--red-100);
      color: var(--red-600);
      border-radius: var(--radius-md);
      padding: var(--space-3);
      font-size: var(--fs-sm);
      margin-bottom: var(--space-4);
      text-align: left;
    }
    .login-error.is-visible { display: block; }

    .login-card .btn { width: 100%; }

    /* Password field is hidden until a password-protected position
       (CCT, Administrator) is selected from the dropdown. */
    .field--password { display: none; }
    .field--password.is-visible { display: flex; }
  </style>
</head>
<body>

  <div class="login-screen">
    <div class="login-card">
      <div class="login-card__mark"><img src="icons/icon-192.png" alt="NJ Wing"></div>
      <span class="login-card__eyebrow">NJWG Encampment</span>
      <h1>Staff Sign In</h1>

      <div class="login-error" id="login-error"></div>

      <form id="login-form" novalidate>
        <div class="field field--position">
          <label for="position-select">Position</label>
          <select id="position-select" name="position" required>
            <option value="" disabled selected>Loading positions…</option>
          </select>
        </div>

        <div class="field field--password" id="password-field">
          <label for="password-input">Password</label>
          <input type="password" id="password-input" name="password" autocomplete="off">
        </div>

        <button type="submit" class="btn btn--primary" id="login-submit">Sign In</button>
      </form>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const form = document.getElementById("login-form");
    const errorBox = document.getElementById("login-error");
    const submitBtn = document.getElementById("login-submit");
    const positionSelect = document.getElementById("position-select");
    const passwordField = document.getElementById("password-field");
    const passwordInput = document.getElementById("password-input");

    // Positions that require a password in addition to picking them from
    // the dropdown. Kept in sync with PASSWORD_PROTECTED_POSITIONS in
    // apps-script/Code.gs — the backend is the real enforcement point;
    // this only controls whether the password field is shown client-side.
    const PASSWORD_PROTECTED_POSITIONS = ["cct", "administrator"];

    function isPasswordProtected(position) {
      return PASSWORD_PROTECTED_POSITIONS.includes(String(position || "").trim().toLowerCase());
    }

    function updatePasswordFieldVisibility() {
      const protectedPosition = isPasswordProtected(positionSelect.value);
      passwordField.classList.toggle("is-visible", protectedPosition);
      passwordInput.required = protectedPosition;
      if (!protectedPosition) passwordInput.value = "";
    }

    // Must have already unlocked this device with the passphrase.
    Auth.requireDeviceGate();

    // If already logged in, skip straight past this page.
    if (Auth.getSession()) {
      const params = new URLSearchParams(window.location.search);
      window.location.href = params.get("returnTo") || `${window.APP_BASE_PATH}pages/schedule.html`;
    }

    async function loadPositions() {
      try {
        const positions = await Auth.listPositions();
        if (!positions.length) {
          positionSelect.innerHTML = `<option value="" disabled selected>No positions configured</option>`;
          return;
        }
        positionSelect.innerHTML = `
          <option value="" disabled selected>Select your position…</option>
          ${positions.map(p => `<option value="${p}">${p}</option>`).join("")}
        `;
      } catch (err) {
        positionSelect.innerHTML = `<option value="" disabled selected>Couldn't load positions</option>`;
        errorBox.textContent = err.message;
        errorBox.classList.add("is-visible");
      }
    }

    positionSelect.addEventListener("change", updatePasswordFieldVisibility);

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBox.classList.remove("is-visible");
      submitBtn.disabled = true;
      submitBtn.textContent = "Checking…";

      try {
        await Auth.login(positionSelect.value, passwordInput.value);
        const params = new URLSearchParams(window.location.search);
        window.location.href = params.get("returnTo") || `${window.APP_BASE_PATH}pages/schedule.html`;
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.add("is-visible");
        submitBtn.disabled = false;
        submitBtn.textContent = "Sign In";
        passwordInput.value = "";
      }
    });

    loadPositions();
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register(`${window.APP_BASE_PATH}service-worker.js`);
    }
  </script>
</body>
</html>
