<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    // Applied synchronously, before first paint, so a collapsed sidebar
    // renders at its collapsed width immediately instead of flashing
    // open at the default width for a frame and visibly animating shut
    // once js/shell.js runs (see .nav-rail-collapsed in css/app.css).
    try {
      if (localStorage.getItem("njwg_nav_collapsed") === "true") {
        document.documentElement.classList.add("nav-rail-collapsed");
      }
    } catch (e) { /* storage unavailable — falls back to expanded */ }
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedule — NJWG Encampment</title>
  <meta name="theme-color" content="#0d1250">
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../icons/favicon.ico" sizes="any">
  <link rel="icon" href="../icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/app.css">

  <style>
    .schedule-item-row {
      display: flex;
      justify-content: flex-end;
    }

    .schedule-form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: var(--space-3);
      margin-bottom: var(--space-4);
    }

    .schedule-form .field { margin-bottom: 0; }

    .schedule-form-actions {
      grid-column: 1 / -1;
      display: flex;
      gap: var(--space-3);
    }

    .schedule-pending {
      margin-top: var(--space-4);
      padding-top: var(--space-4);
      border-top: 1px solid var(--line);
    }

    .schedule-tabs {
      margin-bottom: var(--space-5);
      overflow-x: auto;
    }

    /* Highlights the schedule row matching this position's current
       activity (see Shell.currentAndNextScheduleItems). */
    .schedule-row--current {
      background: var(--gold-100);
      box-shadow: inset 3px 0 0 var(--gold-500);
    }
  </style>
</head>
<body>

  <div class="app-shell">
    <nav class="nav-rail" id="nav-rail">
      <button type="button" class="nav-rail__crest" id="nav-rail-crest" aria-label="Toggle navigation width">
        <span class="nav-rail__crest-mark"><img src="../icons/icon-192.png" alt="NJWG"></span>
        <span class="nav-rail__crest-text">NJWG<span>Encampment</span></span>
      </button>
      <div id="nav-rail-links"></div>
    </nav>
    <header class="app-header" id="app-header"></header>

    <main class="app-main">
      <div class="page-header" style="justify-content: flex-end;">
        <button class="btn btn--ghost" id="add-item-btn" style="display:none;">+ Add Item</button>
        <button class="btn btn--ghost" id="add-schedule-btn" style="display:none;">+ New Schedule</button>
      </div>

      <div id="schedule-form-container"></div>

      <div id="schedule-content">
        <div class="state-message">
          <div class="spinner"></div>
          <p>Loading schedule…</p>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/shell.js"></script>
  <script>
    // "schedule" must match this page's NAV_ITEMS id in js/config.js and
    // a value in a staff member's StaffAccess Pages column, or
    // Shell.init redirects them elsewhere instead.
    Shell.init({ activePage: "schedule" });

    const contentEl = document.getElementById("schedule-content");
    const addItemBtn = document.getElementById("add-item-btn");
    const addScheduleBtn = document.getElementById("add-schedule-btn");
    const formContainer = document.getElementById("schedule-form-container");
    const esc = Shell.escapeHtml;

    // Viewing this page only requires "schedule" in Pages. Editing
    // additionally requires "edit-schedule" — a separate, explicit
    // grant — so seeing Schedule no longer implies being able to
    // change it. This is a client-side convenience to hide controls
    // the backend would reject anyway; assertPageWriteAccess_ in
    // Code.gs is the real check on every write.
    const session = Auth.getSession();
    const sessionPages = (session?.Pages || []).map(p => String(p).toLowerCase());
    const canEditSchedule = sessionPages.includes("edit-schedule");
    const sessionFlights = Array.isArray(session?.Flights) ? session.Flights : [];
    addItemBtn.style.display = canEditSchedule ? "inline-flex" : "none";
    addScheduleBtn.style.display = canEditSchedule ? "inline-flex" : "none";

    let scheduleRows = [];
    let editingRow = null; // the original row object being edited, or null for "adding new"
    let pendingRows = []; // staged rows in "add" mode, written all together on Save All
    let currentAudience = ""; // selected audience chip value; "" = All
    let formDate = ""; // carried across staged rows in "add" mode for convenience

    // Different "schedules" are really just distinct Date values — an
    // encampment can have several (e.g. a normal training schedule plus
    // a special one for an away trip), shown here as tabs. Editors can
    // switch between any of them; everyone else only ever sees the one
    // whose Date matches their own device's current date (see
    // Shell.isScheduleRowToday), never a picker of other days'
    // schedules. Only meaningful for canEditSchedule — null otherwise.
    let activeGroupKey = null;

    /**
     * A weekday name ("Monday") derived from a YYYY-MM-DD value, for the
     * legacy Day column Shell's schedule-matching helpers still read.
     * Forced to English (not the device locale) since that's what
     * Shell.isScheduleDayToday_'s comparison list is hardcoded to.
     */
    function weekdayFromDate(iso) {
      const d = new Date(iso + "T00:00:00");
      return isNaN(d.getTime()) ? "" : d.toLocaleDateString("en-US", { weekday: "long" });
    }

    /** Short display label for a schedule group's tab ("Mon, Jul 13"), falling back to the raw legacy Day text if the group has no Date. */
    function groupLabel(dateKey, sampleRow) {
      if (dateKey) {
        const d = new Date(dateKey + "T00:00:00");
        if (!isNaN(d.getTime())) return d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
      }
      return sampleRow.Day || "Unscheduled";
    }

    /**
     * Groups rows into one "schedule" per distinct Date value (falling
     * back to the legacy Day text for rows saved before Date existed),
     * sorted chronologically with any legacy undated groups trailing at
     * the end.
     */
    function groupSchedule(rows) {
      const groups = new Map();
      rows.forEach(row => {
        const key = row.Date || row.Day || "Unscheduled";
        if (!groups.has(key)) groups.set(key, { key, date: row.Date || "", label: groupLabel(row.Date, row), items: [] });
        groups.get(key).items.push(row);
      });
      return Array.from(groups.values()).sort((a, b) => {
        if (a.date && b.date) return a.date < b.date ? -1 : a.date > b.date ? 1 : 0;
        if (a.date && !b.date) return -1;
        if (!a.date && b.date) return 1;
        return a.label.localeCompare(b.label);
      });
    }

    /** Which matchColumns identify a given row for update/delete — Date once a row has one (the precise, unambiguous key), the legacy Day-based key otherwise. */
    function matchColumnsFor(row) {
      return row.Date ? ["Date", "Time", "Activity"] : ["Day", "Time", "Activity"];
    }

    // Audience options (Flights + Squadrons) come from the same
    // StaffAccess Position list the login page uses — every non-admin
    // position IS a flight or squadron name, so this is the same
    // enumerable list without hardcoding "Alpha".."Hotel"/"Squadron 1-4"
    // separately. CCT/Administrator aren't audiences, so excluded.
    const NON_AUDIENCE_POSITIONS = new Set(["cct", "administrator"]);
    let audienceOptions = [];

    async function loadAudienceOptions() {
      try {
        const res = await Api.listPositions();
        audienceOptions = (res.positions || []).filter(p => !NON_AUDIENCE_POSITIONS.has(String(p).trim().toLowerCase()));
      } catch (err) {
        audienceOptions = [];
      }
    }

    /** Renders one schedule's table (a single group's items) into a card. */
    function renderScheduleCard(group) {
      const items = group ? group.items : [];
      if (!items.length) {
        return `
          <div class="state-message">
            <div class="state-message__icon">📋</div>
            <p>No schedule items for today. Check back once cadre staff publish today's activities.</p>
          </div>`;
      }
      const { current: currentItem } = Shell.currentAndNextScheduleItems(items, sessionFlights);
      return `
        <div class="card">
          <table class="data-table">
            <thead>
              <tr><th>Time</th><th>Activity</th><th>Location</th><th>Flight</th>${canEditSchedule ? "<th></th>" : ""}</tr>
            </thead>
            <tbody>
              ${items.map((item, i) => `
                <tr class="${item === currentItem ? "schedule-row--current" : ""}">
                  <td data-label="Time" class="mono">${esc(item.Time) || "—"}${item === currentItem ? ` <span class="badge badge--gold" data-tooltip="Your current activity">Now</span>` : ""}</td>
                  <td data-label="Activity">${esc(item.Activity) || "—"}</td>
                  <td data-label="Location">${esc(item.Location) || "—"}</td>
                  <td data-label="Flight">${item.Flight ? `<span class="badge badge--gold">${esc(item.Flight)}</span>` : "—"}</td>
                  ${canEditSchedule ? `
                    <td data-label="" class="schedule-item-row">
                      <button class="btn btn--ghost" data-index="${scheduleRows.indexOf(item)}" data-action="row-menu" data-tooltip="Row actions" style="padding: var(--space-1) var(--space-2);" aria-label="Row actions">⋮</button>
                    </td>
                  ` : ""}
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function render(rows) {
      if (!rows.length) {
        contentEl.innerHTML = `
          <div class="state-message">
            <div class="state-message__icon">📋</div>
            <p>No schedule items yet. Check back once cadre staff publish the day's activities.</p>
          </div>`;
        return;
      }

      const groups = groupSchedule(rows);

      if (!canEditSchedule) {
        // Regular staff only ever see the one schedule matching today's
        // date on their own device — never a picker of other days.
        const todaysGroup = groups.find(g => g.items.some(r => Shell.isScheduleRowToday(r))) || null;
        contentEl.innerHTML = renderScheduleCard(todaysGroup);
        wireRowActions();
        Shell.animateIn(contentEl);
        return;
      }

      // Editors get the full tab UI across every schedule (distinct
      // Date), defaulting to whichever one matches today.
      if (activeGroupKey === null || !groups.some(g => g.key === activeGroupKey)) {
        const todaysGroup = groups.find(g => g.items.some(r => Shell.isScheduleRowToday(r)));
        activeGroupKey = todaysGroup ? todaysGroup.key : groups[0].key;
      }
      const activeGroup = groups.find(g => g.key === activeGroupKey);

      contentEl.innerHTML = `
        <div class="tabs schedule-tabs" role="tablist">
          ${groups.map(g => `<button class="tabs__tab ${g.key === activeGroupKey ? "is-active" : ""}" data-group-key="${esc(g.key)}">${esc(g.label)}</button>`).join("")}
        </div>
        ${renderScheduleCard(activeGroup)}
      `;

      contentEl.querySelectorAll("[data-group-key]").forEach(btn => {
        btn.addEventListener("click", () => { activeGroupKey = btn.dataset.groupKey; render(scheduleRows); });
      });
      wireRowActions();
      Shell.animateIn(contentEl);
    }

    function wireRowActions() {
      contentEl.querySelectorAll("[data-action='row-menu']").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          const row = scheduleRows[Number(btn.dataset.index)];
          const rect = btn.getBoundingClientRect();
          Shell.openContextMenu(rect.right, rect.bottom, [
            {
              label: "Edit row",
              icon: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>',
              onSelect: () => openEditForm(row)
            },
            "divider",
            {
              label: "Delete",
              danger: true,
              icon: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>',
              onSelect: () => deleteItem(row)
            }
          ]);
        });
      });
      Shell.wireTooltips(contentEl);
    }

    /**
     * Schedule has no natural unique key (no id column) — matching on
     * the FULL original row's (Date or legacy Day, Time, Activity) is
     * how we identify "which row is this" for update/delete, since that
     * combination is effectively unique in practice for a printed
     * schedule. If two items ever share all three, editing one could
     * affect the other; unlikely for a daily schedule, but worth
     * knowing. See matchColumnsFor() above.
     */
    /**
     * A single dropdown instead of a chip cloud — with a Flight/Squadron
     * per position, that cloud ran to a dozen-plus pills wrapping across
     * two rows just to pick ONE value. Reuses Shell's themed dropdown
     * (enhanceSelect), same as everywhere else the app replaces a native
     * <select>.
     */
    function renderAudienceField(selected) {
      const options = [{ label: "All", value: "" }, ...audienceOptions.map(p => ({ label: p, value: p }))];
      return `
        <select id="f-audience">
          ${options.map(o => `<option value="${esc(o.value)}" ${(selected || "") === o.value ? "selected" : ""}>${esc(o.label)}</option>`).join("")}
        </select>
      `;
    }

    function renderPendingTable() {
      return `
        <div class="schedule-pending">
          <h4 class="section-label">
            Rows to add (${pendingRows.length})
          </h4>
          <table class="data-table">
            <thead><tr><th>Date</th><th>Time</th><th>Activity</th><th>Location</th><th>Audience</th><th></th></tr></thead>
            <tbody>
              ${pendingRows.map((r, i) => `
                <tr>
                  <td data-label="Date">${esc(r.Date)}</td>
                  <td data-label="Time" class="mono">${esc(r.Time) || "—"}</td>
                  <td data-label="Activity">${esc(r.Activity)}</td>
                  <td data-label="Location">${esc(r.Location) || "—"}</td>
                  <td data-label="Audience">${r.Flight ? esc(r.Flight) : "All"}</td>
                  <td data-label=""><button class="btn btn--ghost" data-remove-pending="${i}" style="padding: var(--space-1) var(--space-2);" aria-label="Remove staged row">✕</button></td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    /**
     * One form drives two modes:
     *   "add"  — supports staging several rows (+ Add Row) before a
     *            single "Save All" writes everything at once, so adding
     *            a whole day's schedule doesn't mean N separate saves.
     *            The Date is picked once via a calendar and applies to
     *            every row staged in the same session.
     *   "edit" — a single existing row, saved immediately as before.
     */
    function renderFormUI(mode, row) {
      const dateValue = mode === "add" ? formDate : (row?.Date || "");
      const timeValue = mode === "edit" ? (row?.Time || "") : "";
      const activityValue = mode === "edit" ? (row?.Activity || "") : "";
      const locationValue = mode === "edit" ? (row?.Location || "") : "";

      formContainer.innerHTML = `
        <div class="card" style="margin-bottom: var(--space-5);">
          <h3 class="section-label">
            ${mode === "add" ? "Add Schedule Items" : "Edit Schedule Item"}
          </h3>
          <div class="schedule-form">
            <div class="field"><label for="f-date">Date</label><input type="date" id="f-date" value="${esc(dateValue)}"></div>
            <div class="field"><label for="f-time">Time</label><input type="time" id="f-time" value="${esc(timeValue)}"></div>
            <div class="field"><label for="f-activity">Activity</label><input id="f-activity" value="${esc(activityValue)}"></div>
            <div class="field"><label for="f-location">Location</label><input id="f-location" value="${esc(locationValue)}"></div>
            <div class="field"><label for="f-audience">Audience</label>${renderAudienceField(currentAudience)}</div>
            <div class="schedule-form-actions">
              ${mode === "add" ? `
                <button class="btn btn--ghost" id="add-row-btn">+ Add Row</button>
                <button class="btn btn--primary" id="save-item-btn" ${pendingRows.length ? "" : "disabled"}>Save All${pendingRows.length ? ` (${pendingRows.length})` : ""}</button>
              ` : `
                <button class="btn btn--primary" id="save-item-btn">Save</button>
              `}
              <button class="btn btn--ghost" id="cancel-item-btn">Cancel</button>
            </div>
          </div>
          ${mode === "add" && pendingRows.length ? renderPendingTable() : ""}
        </div>
      `;

      document.getElementById("cancel-item-btn").addEventListener("click", closeForm);
      document.getElementById("save-item-btn").addEventListener("click", () => mode === "add" ? saveAllPending() : saveEdit());
      if (mode === "add") document.getElementById("add-row-btn").addEventListener("click", stageRow);

      const dateInput = document.getElementById("f-date");
      Shell.enhanceDateInput(dateInput);
      dateInput.addEventListener("change", () => { if (mode === "add") formDate = dateInput.value; });

      Shell.enhanceTimeInput(document.getElementById("f-time"));

      const audienceSelect = document.getElementById("f-audience");
      Shell.enhanceSelect(audienceSelect);
      audienceSelect.addEventListener("change", () => { currentAudience = audienceSelect.value; });

      if (mode === "add") {
        formContainer.querySelectorAll("[data-remove-pending]").forEach(btn => {
          btn.addEventListener("click", () => {
            pendingRows.splice(Number(btn.dataset.removePending), 1);
            renderFormUI("add");
          });
        });
      }

      formContainer.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    /**
     * Opens the add form. `prefillDate` (an active tab's date) means
     * "add more items to this existing schedule" (the "+ Add Item"
     * button); omitting it means "+ New Schedule" — an empty date field
     * the person must pick via the calendar, starting a brand new
     * schedule tab once they save at least one item under it.
     */
    function openAddForm(prefillDate) {
      editingRow = null;
      pendingRows = [];
      currentAudience = "";
      formDate = prefillDate || "";
      renderFormUI("add");
    }

    function openEditForm(row) {
      editingRow = row;
      currentAudience = row.Flight || "";
      renderFormUI("edit", row);
    }

    function closeForm() {
      editingRow = null;
      pendingRows = [];
      formContainer.innerHTML = "";
    }

    /** Validates and stages the current field values as one pending row, then clears Time/Activity/Location for the next entry (Date and Audience carry over). */
    function stageRow() {
      formDate = document.getElementById("f-date").value;
      const time = document.getElementById("f-time").value;
      const activity = document.getElementById("f-activity").value.trim();
      const location = document.getElementById("f-location").value.trim();

      if (!formDate || !activity) {
        Shell.showToast("Date and Activity are required.", { type: "error" });
        return;
      }

      pendingRows.push({ Date: formDate, Day: weekdayFromDate(formDate), Time: time, Activity: activity, Location: location, Flight: currentAudience });
      renderFormUI("add");
    }

    /**
     * Writes every staged row in one go. Each write is still its own
     * optimistic Api.writeRow() call (fire-and-forget, queued in the
     * background) — "one save" here means one user action and one
     * combined success toast, not a single network request.
     */
    function saveAllPending() {
      if (!pendingRows.length) return;
      pendingRows.forEach(row => {
        Api.writeRow("Schedule", row, { matchColumns: matchColumnsFor(row) });
        scheduleRows.push(row);
      });
      const count = pendingRows.length;
      pendingRows = [];
      closeForm();
      Shell.showToast(`${count} schedule item${count === 1 ? "" : "s"} added.`, { type: "success" });
      render(scheduleRows);
    }

    /**
     * Optimistic save: updates the in-memory scheduleRows and re-renders
     * INSTANTLY, then fires the real write in the background (Api's
     * queue) rather than awaiting the network round-trip before showing
     * anything. The header's sync indicator (wired in Shell) reflects
     * whether that background write is still in flight, succeeded, or
     * failed — so a failure isn't silent, it just doesn't block the
     * person's next action to surface.
     */
    function saveEdit() {
      const dateVal = document.getElementById("f-date").value;
      const newRow = {
        Date: dateVal,
        Day: weekdayFromDate(dateVal),
        Time: document.getElementById("f-time").value,
        Activity: document.getElementById("f-activity").value.trim(),
        Location: document.getElementById("f-location").value.trim(),
        Flight: currentAudience
      };

      if (!newRow.Date || !newRow.Activity) {
        Shell.showToast("Date and Activity are required.", { type: "error" });
        return;
      }

      const keyChanged = editingRow.Date !== newRow.Date || editingRow.Day !== newRow.Day || editingRow.Time !== newRow.Time || editingRow.Activity !== newRow.Activity;
      if (keyChanged) {
        // The match key itself changed (e.g. renamed the Activity, or
        // moved to a different date) — matching on the NEW values
        // wouldn't find the old row, so delete the old row explicitly
        // (using ITS OWN matchColumns — it may still be a legacy
        // Day-only row), then add the new one.
        Api.deleteRow("Schedule", editingRow, { matchColumns: matchColumnsFor(editingRow) });
        Api.writeRow("Schedule", newRow, { matchColumns: matchColumnsFor(newRow) });
      } else {
        Api.writeRow("Schedule", newRow, { matchColumns: matchColumnsFor(newRow) });
      }
      const idx = scheduleRows.indexOf(editingRow);
      if (idx >= 0) scheduleRows[idx] = newRow;

      closeForm();
      Shell.showToast("Schedule updated.", { type: "success" });
      render(scheduleRows);
    }

    async function deleteItem(row) {
      const confirmed = await Shell.confirm({
        title: "Remove schedule item?",
        message: `Remove "${esc(row.Activity)}" on ${esc(groupLabel(row.Date, row))}${row.Time ? ` at ${esc(row.Time)}` : ""}?`,
        confirmLabel: "Remove",
      });
      if (!confirmed) return;

      Api.deleteRow("Schedule", row, { matchColumns: matchColumnsFor(row) });
      scheduleRows = scheduleRows.filter(r => r !== row);
      Shell.showToast("Item removed.", { type: "success" });
      render(scheduleRows);
    }

    addItemBtn.addEventListener("click", () => {
      // Add to whatever schedule (date) is currently active, if any.
      const groups = groupSchedule(scheduleRows);
      const active = groups.find(g => g.key === activeGroupKey);
      openAddForm(active ? active.date : "");
    });
    addScheduleBtn.addEventListener("click", () => openAddForm(""));
    if (canEditSchedule) loadAudienceOptions();

    // Instant-then-revalidate load, spinner, error state, and Refresh
    // wiring are all handled by Shell.mountSheet — see js/shell.js. This
    // is the pattern new single-sheet pages should follow.
    Shell.mountSheet("Schedule", {
      container: contentEl,
      loadingText: "Loading schedule…",
      render: (rows) => { scheduleRows = rows; render(scheduleRows); }
    });

    // Export the schedule as it currently stands (columns inferred from
    // whatever the Schedule sheet holds).
    Shell.registerExport(() => ({
      filename: `schedule-${new Date().toISOString().slice(0, 10)}.csv`,
      rows: scheduleRows
    }));

    // Re-render every minute so the current-activity highlight advances
    // on its own as time passes, without a manual refresh or reload.
    setInterval(() => { if (scheduleRows.length) render(scheduleRows); }, 60 * 1000);
</script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register(`${window.APP_BASE_PATH}service-worker.js`);
    }
  </script>
</body>
</html>
