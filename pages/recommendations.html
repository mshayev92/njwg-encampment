<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    // Applied synchronously, before first paint, so a collapsed sidebar
    // renders at its collapsed width immediately instead of flashing
    // open at the default width for a frame and visibly animating shut
    // once js/shell.js runs (see .nav-rail-collapsed in css/app.css).
    // The theme read right after does the same job for dark mode:
    // resolve njwg_theme (light/dark/system) and set data-theme on <html>
    // BEFORE tokens.css is even requested, so a dark-mode device never
    // flashes the light palette for a frame first (see the
    // :root[data-theme="dark"] block in css/tokens.css, and
    // initThemeWatcher_ in js/shell.js for what keeps this in sync for
    // the rest of the page's life, including a live OS theme change).
    try {
      if (localStorage.getItem("njwg_nav_collapsed") === "true") {
        document.documentElement.classList.add("nav-rail-collapsed");
      }
    } catch (e) { /* storage unavailable — falls back to expanded */ }
    try {
      var njwgThemePref = localStorage.getItem("njwg_theme") || "system";
      var njwgThemeResolved = njwgThemePref === "system"
        ? (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
        : njwgThemePref;
      document.documentElement.setAttribute("data-theme", njwgThemeResolved);
    } catch (e) { document.documentElement.setAttribute("data-theme", "light"); }
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Awards — NJWG Encampment</title>
  <meta name="theme-color" content="#0d1250">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="NJWG Encampment">
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../icons/favicon.ico" sizes="any">
  <link rel="icon" href="../icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/app.css">

  <style>
    .rec-tabs { margin-bottom: var(--space-5); }

    .rec-form-field { margin-bottom: var(--space-4); }
    .rec-form-field label {
      display: block;
      font-size: var(--fs-xs);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      color: var(--ink-600);
      margin-bottom: var(--space-2);
    }
    .rec-form-field select,
    .rec-form-field textarea {
      width: 100%;
      font-family: var(--font-body);
      font-size: var(--fs-sm);
      padding: var(--space-3);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--surface);
    }
    .rec-form-field textarea { min-height: 90px; resize: vertical; }

    .rec-attest {
      display: flex;
      align-items: flex-start;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-4);
      background: var(--surface-sunken);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-4);
      font-size: var(--fs-sm);
    }
    .rec-attest input[type="checkbox"] { margin-top: 3px; flex-shrink: 0; }

    .rec-history-list { display: flex; flex-direction: column; gap: var(--space-2); margin-top: var(--space-3); }
    .rec-history-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
    }
    .rec-history-row__body { flex: 1; }
    .rec-history-row__title { font-weight: 600; color: var(--heading); }
    .rec-history-row__meta { font-size: var(--fs-2xs); color: var(--ink-600); margin-top: var(--space-1); text-transform: uppercase; letter-spacing: var(--tracking-wide); }
    .rec-history-row__note { font-size: var(--fs-sm); color: var(--ink-900); margin-top: var(--space-2); white-space: pre-wrap; }

    /* ---- Weekly standings (aggregated top contenders) ---- */
    .rec-mode-tabs { margin-bottom: var(--space-5); }

    .weights-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: var(--space-4) var(--space-5);
      margin-top: var(--space-4);
    }
    .weight-field { display: flex; flex-direction: column; gap: var(--space-2); }
    .weight-field__head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: var(--space-2);
    }
    .weight-field__label { font-size: var(--fs-sm); font-weight: 600; color: var(--heading); }
    .weight-field__value { font-family: var(--font-mono); font-size: var(--fs-sm); color: var(--ink-900); }
    .weight-field__dir {
      font-size: var(--fs-2xs);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      color: var(--ink-600);
    }
    .weight-field__dir--neg { color: var(--red-600); }
    .weight-field input[type="range"] {
      width: 100%;
      accent-color: var(--gold-500);
      cursor: pointer;
    }

    .standings-list { display: flex; flex-direction: column; gap: var(--space-2); margin-top: var(--space-4); }
    .standings-row {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      padding: var(--space-3) var(--space-4);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
    }
    .standings-row--top { border-color: var(--gold-500); box-shadow: inset 3px 0 0 var(--gold-500); }
    .standings-row__rank {
      flex-shrink: 0;
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: var(--surface-sunken);
      font-family: var(--font-display);
      font-weight: 700;
      color: var(--heading);
    }
    .standings-row--top .standings-row__rank { background: var(--gold-100); color: var(--gold-600); }
    .standings-row__body { flex: 1; min-width: 0; }
    .standings-row__name { font-weight: 600; color: var(--heading); }
    .standings-row__breakdown {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-1) var(--space-2);
      margin-top: var(--space-2);
    }
    .standings-chip {
      font-size: var(--fs-2xs);
      color: var(--ink-600);
      background: var(--surface-sunken);
      border-radius: var(--radius-sm);
      padding: 2px var(--space-2);
    }
    .standings-chip--neg { color: var(--red-600); }
    .standings-row__score {
      flex-shrink: 0;
      text-align: right;
      font-family: var(--font-mono);
      font-size: var(--fs-lg);
      font-weight: 700;
      color: var(--heading);
    }
    .standings-row__score small {
      display: block;
      font-family: var(--font-body);
      font-size: var(--fs-2xs);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      color: var(--ink-600);
    }
  </style>
</head>
<body>

  <div class="app-shell">
    <nav class="nav-rail" id="nav-rail">
      <button type="button" class="nav-rail__crest" id="nav-rail-crest" aria-label="Toggle navigation width">
        <span class="nav-rail__crest-mark"><img src="../icons/icon-192.png" alt="NJWG"></span>
        <span class="nav-rail__crest-text">NJWG<span>Encampment</span></span>
      </button>
      <div id="nav-rail-links"></div>
    </nav>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/shell.js"></script>
    <script>
      // See overview.html for why this runs here instead of only inside
      // Shell.init() at the bottom — keeps the sidebar links from ever
      // being visibly empty for a moment on navigation between pages.
      Shell.renderNav("recommendations");
    </script>

    <header class="app-header" id="app-header"></header>

    <main class="app-main">
      <!-- Top-level Daily/Weekly switch. Kept as its own persistent node
           (not rebuilt inside #rec-content) so its sliding indicator has a
           previous position to animate from when toggling modes, the same
           reason Schedule keeps its day-tabs bar alive across renders.
           Hidden until the first render reveals it, so it appears together
           with the rest of the page rather than before content loads. -->
      <div class="tabs rec-mode-tabs" id="rec-mode-tabs" style="display:none;"></div>

      <div id="rec-content">
        <div class="state-message">
          <div class="spinner"></div>
          <p>Loading…</p>
        </div>
      </div>
    </main>
  </div>

  <script>
    Shell.init({ activePage: "recommendations" });

    const contentEl = document.getElementById("rec-content");
    const esc = Shell.escapeHtml;

    const session = Auth.getSession();
    const submitterPosition = (session && (session.Position || session.position)) || "Staff";

    // Positions ARE flights in this app (see js/config.js SQUADRON_FLIGHTS
    // and roster.html's primaryFlight) — a Flight/CC's StaffAccess row is
    // scoped to exactly ONE flight, a Squadron/CC's to several (the ones
    // under that squadron). That distinction is what BE Form 60-13 asks
    // for: Part I (Honor Cadet) is completed by Flight Commanders, Part II
    // (Honor Flight) by Squadron Commanders — so it's used here directly,
    // rather than inventing a separate "role"/edit-grant field this app has
    // no other use for. A position with blank/"all" Flights (CCT/
    // Administrator) is neither a flight nor a squadron, so neither
    // submission form applies to it — it gets the full, unfiltered review
    // instead (see isUnscoped below).
    const sessionFlightList = (Array.isArray(session?.Flights) ? session.Flights : [])
      .filter(f => f && String(f).toLowerCase() !== "all");
    const isFlightRole = sessionFlightList.length === 1;
    const isSquadronRole = sessionFlightList.length > 1;
    const isUnscoped = !isFlightRole && !isSquadronRole;
    const showHonorCadetForm = isFlightRole;
    const showHonorFlightForm = isSquadronRole;

    // Below its own form, a flight/squadron gets a day-tabbed review of ITS
    // OWN past submissions (see renderSubmissionsReview) rather than
    // everyone's — a flight only ever sees its own Honor Cadet history
    // (reviewKinds: ["hc"]); a squadron sees both its own Honor Flight
    // submissions AND the Honor Cadet submissions from the flights under
    // it (reviewKinds: ["hc","hf"]), since both share its Flights scope.
    // Neither gets the Weekly standings tab (see renderContent) — that's
    // reserved for positions with the full, unfiltered view.
    const reviewKinds = isFlightRole ? ["hc"] : ["hc", "hf"];
    const reviewFlightFilter = isUnscoped ? null : sessionFlightList; // null = no filter, sees every flight/squadron

    let rosterRows = [];
    let honorCadetRows = [];
    let honorFlightRows = [];
    // Extra data points the Weekly standings view aggregates. Unused by the
    // Daily view (the recommendation forms/review), so they're loaded but
    // never block the Daily render.
    let uniformRows = [];
    let roomRows = [];
    let ptRows = [];
    let assessmentRows = []; // PhysicalAssessments — the 34-Point Assessment, admin-entered only
    let observationRows = [];
    let hcAttested = false;
    let hfAttested = false;
    // Flights/squadrons may only have ONE recommendation of each kind
    // in flight per day — once submitted, the form is replaced by a
    // read-only view of that submission with an Edit option (which
    // reopens the same form, pre-filled, and updates the existing row
    // in place rather than appending a new one). null = not currently
    // editing today's submission (i.e. showing the read-only view, or
    // there's nothing yet so the blank form shows instead).
    let hcEditingId = null;
    let hfEditingId = null;

    // Daily = the per-day recommendation forms/review (below); Weekly = the
    // aggregated standings that rank top contenders across every data point.
    let activeMode = "daily"; // "daily" | "weekly"
    let modeTabsIndicator = null;
    let activeStandingsTab = "hc"; // "hc" (Honor Cadet) | "hf" (Honor Flight)
    let standingsTabsIndicator = null;

    function groupByFlight(rows) {
      return rows
        .filter(r => String(r.CapId || "").trim() || String(r.Name || "").trim())
        // Flight Commander/Sergeant roster rows (Role populated) are
        // flight staff, not cadets — never eligible for an Honor Cadet
        // nomination (see Shell.isStaffRosterRow).
        .filter(r => !Shell.isStaffRosterRow(r))
        .reduce((groups, row) => {
          const flight = row.Flight || "Unassigned";
          (groups[flight] = groups[flight] || []).push(row);
          return groups;
        }, {});
    }

    /**
     * StaffAccess's Flights column and Roster's Flight column are two
     * independently-typed sources (e.g. "alpha" vs "Alpha") — matching
     * `sessionFlightList` against Roster's own casing here (case-
     * insensitively, same pattern as roster.html's actualOwnFlights) is
     * what makes both the student picker below and the flight options
     * shown in the form actually line up with real Roster rows, instead
     * of silently finding zero students / showing the raw sheet casing.
     */
    function canonicalFlightNames(names) {
      const actual = Object.keys(groupByFlight(rosterRows));
      return names.map(f => actual.find(a => a.toLowerCase() === String(f).toLowerCase()) || f);
    }

    // ---- Honor Cadet Recommendation (Part I — Flight Commanders) ----------

    function honorCadetFlightOptions() {
      return canonicalFlightNames(sessionFlightList);
    }

    function studentsForFlight(flight) {
      return (groupByFlight(rosterRows)[flight] || []).slice().sort((a, b) => String(a.Name).localeCompare(String(b.Name)));
    }

    /** This flight's Honor Cadet recommendation for today, if one was already submitted. */
    function todaysHonorCadetRow() {
      const today = Shell.todayIso();
      const flights = honorCadetFlightOptions();
      return honorCadetRows.find(r => r.Date === today && flights.some(f => String(f).toLowerCase() === String(r.Flight).toLowerCase())) || null;
    }

    function renderHonorCadetSection() {
      const existing = todaysHonorCadetRow();

      // Already submitted today and not currently editing it — show the
      // read-only "here's what you submitted" view instead of the form,
      // per the one-recommendation-per-day rule.
      if (existing && hcEditingId !== existing.Id) {
        return `
          <div class="card" style="margin-bottom: var(--space-6);">
            <h3 class="section-label">Honor Cadet Recommendation</h3>
            <p style="font-size: var(--fs-sm); color: var(--ink-600); margin-top: calc(-1 * var(--space-2)); margin-bottom: var(--space-4);">
              BE Form 60-13, Part I — one recommendation per flight per day. You've already submitted today's.
            </p>
            <div class="rec-history-list">${honorCadetHistoryRowHtml(existing)}</div>
          </div>
        `;
      }

      const defaultFlight = honorCadetFlightOptions()[0] || "";

      return `
        <div class="card" style="margin-bottom: var(--space-6);">
          <h3 class="section-label">Honor Cadet Recommendation</h3>
          <p style="font-size: var(--fs-sm); color: var(--ink-600); margin-top: calc(-1 * var(--space-2)); margin-bottom: var(--space-4);">
            BE Form 60-13, Part I — completed by Flight Commanders, one cadet per flight.
          </p>

          <label class="rec-attest">
            <input type="checkbox" id="hc-attest-checkbox">
            <span>I affirm that I am the Flight Commander submitting this recommendation.</span>
          </label>

          <input type="hidden" id="hc-flight-select" value="${esc(existing ? existing.Flight : defaultFlight)}">

          <div class="rec-form-field">
            <label for="hc-student-select">Student</label>
            <select id="hc-student-select"></select>
          </div>

          <div class="rec-form-field">
            <label for="hc-drill">Drill, Barracks, &amp; Uniforms</label>
            <textarea id="hc-drill" placeholder="How has this cadet distinguished themselves here?">${esc(existing ? existing.DrillBarracksUniforms : "")}</textarea>
          </div>
          <div class="rec-form-field">
            <label for="hc-academics">Academics &amp; Knowledge</label>
            <textarea id="hc-academics">${esc(existing ? existing.AcademicsKnowledge : "")}</textarea>
          </div>
          <div class="rec-form-field">
            <label for="hc-teamwork">Teamwork, Leadership, &amp; Conduct</label>
            <textarea id="hc-teamwork">${esc(existing ? existing.TeamworkLeadershipConduct : "")}</textarea>
          </div>
          <div class="rec-form-field">
            <label for="hc-notes">Additional Notes</label>
            <textarea id="hc-notes">${esc(existing ? existing.AdditionalNotes : "")}</textarea>
          </div>

          <button class="btn btn--primary" id="hc-submit-btn" ${existing ? "" : "disabled"}>${existing ? "Save Changes" : "Submit Recommendation"}</button>
          ${existing ? `<button type="button" class="btn btn--ghost" id="hc-cancel-edit-btn">Cancel</button>` : ""}
        </div>
      `;
    }

    function wireHonorCadetSection() {
      const flightSelect = document.getElementById("hc-flight-select");
      const studentSelect = document.getElementById("hc-student-select");
      const attestCheckbox = document.getElementById("hc-attest-checkbox");
      const submitBtn = document.getElementById("hc-submit-btn");
      const cancelBtn = document.getElementById("hc-cancel-edit-btn");
      if (!studentSelect || !submitBtn) {
        // Nothing to wire but the read-only "already submitted" view — it
        // still needs its Edit button wired.
        wireHonorCadetEditButtons();
        return;
      }

      const existing = hcEditingId ? honorCadetRows.find(r => String(r.Id) === String(hcEditingId)) : null;

      function refreshStudents() {
        const flight = document.getElementById("hc-flight-select").value;
        const students = studentsForFlight(flight);
        studentSelect.innerHTML = students.length
          ? students.map(s => `<option value="${esc(s.CapId)}">${esc(s.Name)} (${esc(s.CapId)})</option>`).join("")
          : `<option value="">No cadets in this flight</option>`;
        if (existing) studentSelect.value = existing.StudentCapId;
        Shell.enhanceSelect(studentSelect);
      }
      refreshStudents();

      if (flightSelect && flightSelect.tagName === "SELECT") {
        Shell.enhanceSelect(flightSelect);
        flightSelect.addEventListener("change", refreshStudents);
      }

      // Editing an existing submission re-affirms nothing new was hidden —
      // it's already attested, so the button starts enabled and the
      // checkbox doesn't reappear (there's no attest checkbox in that
      // branch of renderHonorCadetSection at all).
      if (attestCheckbox) {
        attestCheckbox.addEventListener("change", () => {
          hcAttested = attestCheckbox.checked;
          submitBtn.disabled = !hcAttested;
        });
      }

      if (cancelBtn) {
        cancelBtn.addEventListener("click", () => {
          hcEditingId = null;
          renderDaily();
        });
      }

      submitBtn.addEventListener("click", () => {
        const flight = document.getElementById("hc-flight-select").value;
        const student = studentsForFlight(flight).find(s => String(s.CapId) === studentSelect.value);
        if (!student) { Shell.showToast("Pick a student first.", { type: "error" }); return; }

        const row = {
          Id: existing ? existing.Id : `hc_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
          Date: existing ? existing.Date : Shell.todayIso(),
          Timestamp: new Date().toISOString(),
          SubmittedByPosition: submitterPosition,
          Flight: flight,
          StudentCapId: student.CapId,
          StudentName: student.Name,
          DrillBarracksUniforms: document.getElementById("hc-drill").value.trim(),
          AcademicsKnowledge: document.getElementById("hc-academics").value.trim(),
          TeamworkLeadershipConduct: document.getElementById("hc-teamwork").value.trim(),
          AdditionalNotes: document.getElementById("hc-notes").value.trim()
        };

        Api.writeRow("HonorCadetRecommendations", row, existing ? { matchColumn: "Id" } : {});
        if (existing) {
          honorCadetRows = honorCadetRows.map(r => String(r.Id) === String(row.Id) ? row : r);
        } else {
          honorCadetRows.push(row);
        }
        Api.setCachedRows("HonorCadetRecommendations", honorCadetRows);

        hcEditingId = null;
        hcAttested = false;
        Shell.showToast(existing ? `Recommendation for ${student.Name} updated.` : `Recommendation submitted for ${student.Name}.`, { type: "success" });
        renderDaily();
      });
    }

    function wireHonorCadetEditButtons() {
      document.querySelectorAll("[data-edit-hc]").forEach(btn => {
        btn.addEventListener("click", () => {
          hcEditingId = btn.dataset.editHc;
          renderDaily();
        });
      });
    }

    /** Renders today's already-submitted row with an Edit button (see renderHonorCadetSection). */
    function honorCadetHistoryRowHtml(r) {
      return `
        <div class="rec-history-row" data-id="${esc(r.Id)}">
          <div class="rec-history-row__body">
            <div class="rec-history-row__title">${esc(r.StudentName) || "—"} · ${esc(r.Flight) || "—"}</div>
            <div class="rec-history-row__meta">${esc(r.Date)} · Submitted by ${esc(r.SubmittedByPosition) || "—"}</div>
            ${r.DrillBarracksUniforms ? `<div class="rec-history-row__note"><strong>Drill/Barracks/Uniforms:</strong> ${esc(r.DrillBarracksUniforms)}</div>` : ""}
            ${r.AcademicsKnowledge ? `<div class="rec-history-row__note"><strong>Academics:</strong> ${esc(r.AcademicsKnowledge)}</div>` : ""}
            ${r.TeamworkLeadershipConduct ? `<div class="rec-history-row__note"><strong>Teamwork/Leadership:</strong> ${esc(r.TeamworkLeadershipConduct)}</div>` : ""}
            ${r.AdditionalNotes ? `<div class="rec-history-row__note"><strong>Notes:</strong> ${esc(r.AdditionalNotes)}</div>` : ""}
          </div>
          <button type="button" class="btn btn--ghost" data-edit-hc="${esc(r.Id)}">Edit</button>
        </div>`;
    }

    // ---- Honor Flight Recommendation (Part II — Squadron Commanders) ------

    function honorFlightFlightOptions() {
      return canonicalFlightNames(sessionFlightList);
    }

    /** This squadron's Honor Flight recommendation for today, if one was already submitted. */
    function todaysHonorFlightRow() {
      const today = Shell.todayIso();
      return honorFlightRows.find(r => r.Date === today && String(r.SubmittedByPosition) === String(submitterPosition)) || null;
    }

    function renderHonorFlightSection() {
      const existing = todaysHonorFlightRow();

      if (existing && hfEditingId !== existing.Id) {
        return `
          <div class="card">
            <h3 class="section-label">Honor Flight Recommendation</h3>
            <p style="font-size: var(--fs-sm); color: var(--ink-600); margin-top: calc(-1 * var(--space-2)); margin-bottom: var(--space-4);">
              BE Form 60-13, Part II — one recommendation per squadron per day. You've already submitted today's.
            </p>
            <div class="rec-history-list">${honorFlightHistoryRowHtml(existing)}</div>
          </div>
        `;
      }

      const flights = honorFlightFlightOptions();
      return `
        <div class="card">
          <h3 class="section-label">Honor Flight Recommendation</h3>
          <p style="font-size: var(--fs-sm); color: var(--ink-600); margin-top: calc(-1 * var(--space-2)); margin-bottom: var(--space-4);">
            BE Form 60-13, Part II — completed by Squadron Commanders, submitted independently of any Honor Cadet recommendation.
          </p>

          <label class="rec-attest">
            <input type="checkbox" id="hf-attest-checkbox">
            <span>I affirm that I am the Squadron Commander submitting this recommendation.</span>
          </label>

          <div class="rec-form-field">
            <label for="hf-flight-select">Flight</label>
            <select id="hf-flight-select">
              ${flights.map(f => `<option value="${esc(f)}" ${existing && existing.Flight === f ? "selected" : ""}>${esc(f)}</option>`).join("")}
            </select>
          </div>

          <div class="rec-form-field">
            <label for="hf-drill">Drill, Barracks, &amp; Uniforms</label>
            <textarea id="hf-drill" placeholder="How has this flight distinguished itself here?">${esc(existing ? existing.DrillBarracksUniforms : "")}</textarea>
          </div>
          <div class="rec-form-field">
            <label for="hf-academics">Academics &amp; Knowledge</label>
            <textarea id="hf-academics">${esc(existing ? existing.AcademicsKnowledge : "")}</textarea>
          </div>
          <div class="rec-form-field">
            <label for="hf-teamwork">Teamwork, Leadership, &amp; Conduct</label>
            <textarea id="hf-teamwork">${esc(existing ? existing.TeamworkLeadershipConduct : "")}</textarea>
          </div>
          <div class="rec-form-field">
            <label for="hf-notes">Additional Notes</label>
            <textarea id="hf-notes">${esc(existing ? existing.AdditionalNotes : "")}</textarea>
          </div>

          <button class="btn btn--primary" id="hf-submit-btn" ${existing ? "" : "disabled"}>${existing ? "Save Changes" : "Submit Recommendation"}</button>
          ${existing ? `<button type="button" class="btn btn--ghost" id="hf-cancel-edit-btn">Cancel</button>` : ""}
        </div>
      `;
    }

    function wireHonorFlightSection() {
      const flightSelect = document.getElementById("hf-flight-select");
      const attestCheckbox = document.getElementById("hf-attest-checkbox");
      const submitBtn = document.getElementById("hf-submit-btn");
      const cancelBtn = document.getElementById("hf-cancel-edit-btn");
      if (!flightSelect || !submitBtn) {
        wireHonorFlightEditButtons();
        return;
      }

      const existing = hfEditingId ? honorFlightRows.find(r => String(r.Id) === String(hfEditingId)) : null;

      Shell.enhanceSelect(flightSelect);

      if (attestCheckbox) {
        attestCheckbox.addEventListener("change", () => {
          hfAttested = attestCheckbox.checked;
          submitBtn.disabled = !hfAttested;
        });
      }

      if (cancelBtn) {
        cancelBtn.addEventListener("click", () => {
          hfEditingId = null;
          renderDaily();
        });
      }

      submitBtn.addEventListener("click", () => {
        const flight = flightSelect.value;
        if (!flight) { Shell.showToast("Pick a flight first.", { type: "error" }); return; }

        const row = {
          Id: existing ? existing.Id : `hf_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
          Date: existing ? existing.Date : Shell.todayIso(),
          Timestamp: new Date().toISOString(),
          SubmittedByPosition: submitterPosition,
          Squadron: submitterPosition,
          Flight: flight,
          DrillBarracksUniforms: document.getElementById("hf-drill").value.trim(),
          AcademicsKnowledge: document.getElementById("hf-academics").value.trim(),
          TeamworkLeadershipConduct: document.getElementById("hf-teamwork").value.trim(),
          AdditionalNotes: document.getElementById("hf-notes").value.trim()
        };

        Api.writeRow("HonorFlightRecommendations", row, existing ? { matchColumn: "Id" } : {});
        if (existing) {
          honorFlightRows = honorFlightRows.map(r => String(r.Id) === String(row.Id) ? row : r);
        } else {
          honorFlightRows.push(row);
        }
        Api.setCachedRows("HonorFlightRecommendations", honorFlightRows);

        hfEditingId = null;
        hfAttested = false;
        Shell.showToast(existing ? `Honor Flight recommendation for ${flight} updated.` : `Honor Flight recommendation submitted for ${flight}.`, { type: "success" });
        renderDaily();
      });
    }

    function wireHonorFlightEditButtons() {
      document.querySelectorAll("[data-edit-hf]").forEach(btn => {
        btn.addEventListener("click", () => {
          hfEditingId = btn.dataset.editHf;
          renderDaily();
        });
      });
    }

    /** Renders today's already-submitted row with an Edit button (see renderHonorFlightSection). */
    function honorFlightHistoryRowHtml(r) {
      return `
        <div class="rec-history-row" data-id="${esc(r.Id)}">
          <div class="rec-history-row__body">
            <div class="rec-history-row__title">${esc(r.Flight) || "—"}</div>
            <div class="rec-history-row__meta">${esc(r.Date)} · Submitted by ${esc(r.SubmittedByPosition) || "—"}</div>
            ${r.DrillBarracksUniforms ? `<div class="rec-history-row__note"><strong>Drill/Barracks/Uniforms:</strong> ${esc(r.DrillBarracksUniforms)}</div>` : ""}
            ${r.AcademicsKnowledge ? `<div class="rec-history-row__note"><strong>Academics:</strong> ${esc(r.AcademicsKnowledge)}</div>` : ""}
            ${r.TeamworkLeadershipConduct ? `<div class="rec-history-row__note"><strong>Teamwork/Leadership:</strong> ${esc(r.TeamworkLeadershipConduct)}</div>` : ""}
            ${r.AdditionalNotes ? `<div class="rec-history-row__note"><strong>Notes:</strong> ${esc(r.AdditionalNotes)}</div>` : ""}
          </div>
          <button type="button" class="btn btn--ghost" data-edit-hf="${esc(r.Id)}">Edit</button>
        </div>`;
    }

    // ---- Submission review ------------------------------------------------
    //
    // A read-only review — a Schedule-style sliding tab bar (see
    // Shell.enhanceTabs) to cycle between the Honor Cadet and Honor Flight
    // submissions (skipped entirely when reviewKinds has only one kind — a
    // flight only ever gets Honor Cadet), each sorted most recent DAY first
    // (ties broken by submission time). A second Schedule-style tab bar
    // underneath — the exact same "one tab per distinct date" pattern
    // Schedule uses for its day tabs — narrows the list down to one
    // specific submission day instead of every day merged together.
    //
    // What rows are IN this review at all is scoped by reviewFlightFilter:
    // null (CCT/Administrator — isUnscoped) sees every flight/squadron's
    // submissions; a flight or squadron only sees rows whose Flight is one
    // of its own (sessionFlightList) — a flight's single flight for its own
    // Honor Cadet history, or a squadron's several flights for both its own
    // Honor Flight submissions and its flights' Honor Cadet submissions.

    let activeSubmissionsTab = reviewKinds[0]; // "hc" | "hf" — which recommendation type is showing
    let submissionsTabsIndicator = null;
    let activeSubmissionsDay = "all"; // "all" | a Date string — which day's submissions are showing
    let submissionsDayTabsIndicator = null;

    function submissionsRowsForKind(kind) {
      const rows = kind === "hc" ? honorCadetRows : honorFlightRows;
      if (!reviewFlightFilter) return rows;
      return rows.filter(r => reviewFlightFilter.some(f => String(f).toLowerCase() === String(r.Flight).toLowerCase()));
    }

    /** Every distinct Date value among the currently-showing kind's submissions, chronological. */
    function distinctSubmissionDays(kind) {
      return Array.from(new Set(submissionsRowsForKind(kind).map(r => r.Date).filter(Boolean))).sort();
    }

    /** Short display label for a date ("Mon, Jul 18") — same formatting Schedule's day tabs use. */
    function dayTabLabel(dateStr) {
      const d = new Date(dateStr + "T00:00:00");
      return isNaN(d.getTime()) ? dateStr : d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
    }

    function submissionReviewRowHtml(r, kind) {
      const title = kind === "hc"
        ? `${esc(r.StudentName) || "—"} · ${esc(r.Flight) || "—"}`
        : `${esc(r.Flight) || "—"}`;
      return `
        <div class="rec-history-row">
          <div class="rec-history-row__body">
            <div class="rec-history-row__title">${title}</div>
            <div class="rec-history-row__meta">${esc(r.Date)} · Submitted by ${esc(r.SubmittedByPosition) || "—"}</div>
            ${r.DrillBarracksUniforms ? `<div class="rec-history-row__note"><strong>Drill/Barracks/Uniforms:</strong> ${esc(r.DrillBarracksUniforms)}</div>` : ""}
            ${r.AcademicsKnowledge ? `<div class="rec-history-row__note"><strong>Academics:</strong> ${esc(r.AcademicsKnowledge)}</div>` : ""}
            ${r.TeamworkLeadershipConduct ? `<div class="rec-history-row__note"><strong>Teamwork/Leadership:</strong> ${esc(r.TeamworkLeadershipConduct)}</div>` : ""}
            ${r.AdditionalNotes ? `<div class="rec-history-row__note"><strong>Notes:</strong> ${esc(r.AdditionalNotes)}</div>` : ""}
          </div>
        </div>`;
    }

    function sortedByDay(rows) {
      return rows.slice().sort((a, b) => {
        const dayDiff = String(b.Date || "").localeCompare(String(a.Date || ""));
        if (dayDiff !== 0) return dayDiff;
        return new Date(b.Timestamp) - new Date(a.Timestamp);
      });
    }

    function renderSubmissionsReview() {
      const showKindTabs = reviewKinds.length > 1;
      if (!showKindTabs) activeSubmissionsTab = reviewKinds[0];
      const title = isUnscoped ? "Award Recommendation Submissions" : "Your Recommendations";
      const subtitle = isUnscoped
        ? "Read-only review of every submission, most recent day first."
        : "Switch between days to review what's been submitted.";
      // Only needs its own top margin when it's stacked below a form (the
      // flight/squadron case) — as the sole card in #rec-content (isUnscoped),
      // an extra margin here would double up with .rec-mode-tabs's own
      // margin-bottom above it.
      return `
        <div class="card"${isUnscoped ? "" : ` style="margin-top: var(--space-6);"`}>
          <h3 class="section-label">${title}</h3>
          <p style="font-size: var(--fs-sm); color: var(--ink-600); margin-top: calc(-1 * var(--space-2)); margin-bottom: var(--space-4);">
            ${subtitle}
          </p>
          ${showKindTabs ? `
            <div class="tabs rec-tabs" id="submissions-tabs-bar">
              <button class="tabs__tab ${activeSubmissionsTab === "hc" ? "is-active" : ""}" data-tab="hc">Honor Cadet</button>
              <button class="tabs__tab ${activeSubmissionsTab === "hf" ? "is-active" : ""}" data-tab="hf">Honor Flight</button>
            </div>
          ` : ""}
          <div class="tabs rec-tabs" id="submissions-day-tabs-bar" style="display:none;"></div>
          <div class="rec-history-list" id="submissions-review-list"></div>
        </div>
      `;
    }

    function wireSubmissionsReview() {
      const tabsBarEl = document.getElementById("submissions-tabs-bar");
      if (tabsBarEl) {
        submissionsTabsIndicator = Shell.enhanceTabs(tabsBarEl);

        tabsBarEl.querySelectorAll("[data-tab]").forEach(btn => {
          btn.addEventListener("click", () => {
            if (btn.dataset.tab === activeSubmissionsTab) return;
            activeSubmissionsTab = btn.dataset.tab;
            tabsBarEl.querySelectorAll(".tabs__tab").forEach(b => b.classList.toggle("is-active", b === btn));
            if (submissionsTabsIndicator) submissionsTabsIndicator.move();
            // The set of valid days differs per kind — a day selected for
            // Honor Cadet may not exist under Honor Flight, so start over
            // at "All Days" rather than silently filtering on a stale one.
            activeSubmissionsDay = "all";
            renderSubmissionsDayTabs();
            renderSubmissionsReviewList();
          });
        });
      }

      renderSubmissionsDayTabs();
    }

    /**
     * The day tabs bar underneath the Honor Cadet/Honor Flight tabs — one
     * tab per distinct date the currently-showing kind has a submission on,
     * plus "All Days". Rebuilt (not just re-activated) on every call since
     * the available days themselves can change (switching kind, or a
     * submission added/removed) — same reasoning as the Periods tab in
     * pages/inspections.html rebuilding its tiles fresh each time.
     */
    function renderSubmissionsDayTabs() {
      const bar = document.getElementById("submissions-day-tabs-bar");
      if (!bar) return;
      const days = distinctSubmissionDays(activeSubmissionsTab);

      if (!days.length) {
        bar.style.display = "none";
        bar.innerHTML = "";
        return;
      }

      // A previously-selected day can stop existing (its only submission
      // was removed, or the kind was just switched) — fall back to "all"
      // rather than filtering on a day nothing matches.
      if (activeSubmissionsDay !== "all" && !days.includes(activeSubmissionsDay)) {
        activeSubmissionsDay = "all";
      }

      bar.style.display = "";
      bar.setAttribute("role", "tablist");
      bar.innerHTML = `
        <button class="tabs__tab ${activeSubmissionsDay === "all" ? "is-active" : ""}" data-day="all">All Days</button>
        ${days.map(d => `<button class="tabs__tab ${activeSubmissionsDay === d ? "is-active" : ""}" data-day="${esc(d)}">${esc(dayTabLabel(d))}</button>`).join("")}
      `;
      submissionsDayTabsIndicator = Shell.enhanceTabs(bar);

      bar.querySelectorAll("[data-day]").forEach(btn => {
        btn.addEventListener("click", () => {
          if (btn.dataset.day === activeSubmissionsDay) return;
          activeSubmissionsDay = btn.dataset.day;
          bar.querySelectorAll(".tabs__tab").forEach(b => b.classList.toggle("is-active", b === btn));
          if (submissionsDayTabsIndicator) submissionsDayTabsIndicator.move();
          renderSubmissionsReviewList();
        });
      });
    }

    function renderSubmissionsReviewList() {
      const listEl = document.getElementById("submissions-review-list");
      if (!listEl) return;

      const kind = activeSubmissionsTab;
      let rows = sortedByDay(submissionsRowsForKind(kind));
      if (activeSubmissionsDay !== "all") rows = rows.filter(r => r.Date === activeSubmissionsDay);

      listEl.innerHTML = rows.length
        ? rows.map(row => submissionReviewRowHtml(row, kind)).join("")
        : `<p style="font-size: var(--fs-sm); color: var(--ink-600); margin:0;">No ${kind === "hc" ? "Honor Cadet" : "Honor Flight"} recommendations submitted${activeSubmissionsDay !== "all" ? " on this day" : ""} yet.</p>`;
    }

    // ---- Page assembly -----------------------------------------------------

    const modeTabsBarEl = document.getElementById("rec-mode-tabs");

    /**
     * Reveals and wires the persistent Daily/Weekly switch once (its
     * buttons never change, so unlike Schedule's day tabs it's built a
     * single time and only its active state toggles afterward). Switching
     * modes re-renders #rec-content only, leaving this bar — and its
     * sliding indicator — in place to animate between the two tabs.
     */
    function ensureModeTabs() {
      if (modeTabsBarEl.dataset.wired) return;
      modeTabsBarEl.dataset.wired = "true";
      modeTabsBarEl.style.display = "";
      modeTabsBarEl.setAttribute("role", "tablist");
      modeTabsBarEl.innerHTML = `
        <button class="tabs__tab ${activeMode === "daily" ? "is-active" : ""}" data-mode="daily">Daily</button>
        <button class="tabs__tab ${activeMode === "weekly" ? "is-active" : ""}" data-mode="weekly">Weekly</button>
      `;
      modeTabsIndicator = Shell.enhanceTabs(modeTabsBarEl);
      modeTabsBarEl.querySelectorAll("[data-mode]").forEach(btn => {
        btn.addEventListener("click", () => {
          if (btn.dataset.mode === activeMode) return;
          activeMode = btn.dataset.mode;
          modeTabsBarEl.querySelectorAll(".tabs__tab").forEach(b => b.classList.toggle("is-active", b === btn));
          if (modeTabsIndicator) modeTabsIndicator.move();
          renderContent();
        });
      });
    }

    /**
     * Dispatches to the Daily or Weekly view; called on every (re)render.
     * Weekly (the mode switch itself) is reserved for isUnscoped positions
     * — a flight or squadron never sees the switch (ensureModeTabs is
     * simply never called for them, so #rec-mode-tabs stays hidden) and
     * always renders Daily.
     */
    function renderContent() {
      if (isUnscoped) {
        ensureModeTabs();
      } else {
        activeMode = "daily";
      }
      if (activeMode === "weekly") renderWeekly();
      else renderDaily();
    }

    function renderDaily() {
      if (isUnscoped) {
        contentEl.innerHTML = renderSubmissionsReview();
        wireSubmissionsReview();
        renderSubmissionsReviewList();
        Shell.animateIn(contentEl);
        return;
      }

      // Exactly one of these two is true for a flight/squadron, plus its
      // own scoped, day-tabbed review of past submissions underneath.
      contentEl.innerHTML = `
        ${showHonorCadetForm ? renderHonorCadetSection() : ""}
        ${showHonorFlightForm ? renderHonorFlightSection() : ""}
        ${renderSubmissionsReview()}
      `;

      if (showHonorCadetForm) wireHonorCadetSection();
      if (showHonorFlightForm) wireHonorFlightSection();
      wireSubmissionsReview();
      renderSubmissionsReviewList();
      Shell.animateIn(contentEl);
    }

    // ---- Weekly standings (aggregated top contenders) ---------------------
    //
    // The Daily view captures ONE recommendation per day; the Weekly view
    // steps back and ranks who's actually leading across every quantitative
    // data point the app collects — uniform/room/PT inspection scores,
    // positive vs. concern observations, and the recommendations themselves.
    // Honor Cadet ranks individual cadets; Honor Flight ranks each flight by
    // its cadets' combined (per-cadet average) data, which is what "honor
    // flight of the week" means here. Weights let a reviewer tune how much
    // each data point matters; they're a personal, per-device knob (there's
    // no shared config sheet for them), stored in localStorage.

    // Scoring is out of 100%: each ranking mode (Honor Cadet / Honor Flight)
    // has its OWN set of components, each an editable percent of that
    // mode's 100% total — the two modes don't share one weight
    // configuration, since a component meaningful to one (a cadet's own
    // nominations) isn't meaningful to the other. Each component's slider
    // IS its literal percent — moving one does NOT change any other, on
    // purpose, so the person can adjust every component independently;
    // Save only enables once the mode's percentages actually add up to
    // 100 (see weightsTotal/updateWeightsPanelState).
    const WEIGHT_STORAGE_KEY = "njwg_award_weights_v2";
    const UNIFORM_ITEM_COUNT = 9; // see SCORE_ITEMS in pages/inspections.html
    const ROOM_ITEM_COUNT = 9;    // see ROOM_SCORE_ITEMS in pages/inspections.html
    const ASSESSMENT_MAX_SCORE = 34; // see ASSESSMENT_SCORE_ITEMS in pages/inspections.html

    // dir: +1 raises the score, -1 lowers it (a bad signal). def: default
    // share, out of 100 — each mode's def values sum to 100.
    const RANKING_METRICS = {
      hc: [
        { id: "uniform",    label: "Uniform Inspections",      dir: 1,  def: 15 },
        { id: "room",       label: "Room Inspections",         dir: 1,  def: 15 },
        { id: "pt",         label: "Physical Training",        dir: 1,  def: 10 },
        { id: "assessment", label: "34-Point Assessment",      dir: 1,  def: 10 },
        { id: "posObs",     label: "Positive Observations",    dir: 1,  def: 15 },
        { id: "concernObs", label: "Concern Observations",     dir: -1, def: 15 },
        { id: "hcRecs",     label: "Honor Cadet Nominations",  dir: 1,  def: 20 }
      ],
      hf: [
        { id: "uniform",    label: "Uniform Inspections",      dir: 1,  def: 15 },
        { id: "room",       label: "Room Inspections",         dir: 1,  def: 15 },
        { id: "pt",         label: "Physical Training",        dir: 1,  def: 10 },
        { id: "assessment", label: "34-Point Assessment",      dir: 1,  def: 10 },
        { id: "posObs",     label: "Positive Observations",    dir: 1,  def: 15 },
        { id: "concernObs", label: "Concern Observations",     dir: -1, def: 15 },
        { id: "hfRecs",     label: "Honor Flight Nominations", dir: 1,  def: 20 }
      ]
    };

    function defaultWeightsFor(mode) {
      return Object.fromEntries(RANKING_METRICS[mode].map(m => [m.id, m.def]));
    }

    function defaultWeights() {
      return { hc: defaultWeightsFor("hc"), hf: defaultWeightsFor("hf") };
    }

    function loadWeights() {
      const w = defaultWeights();
      try {
        const stored = JSON.parse(localStorage.getItem(WEIGHT_STORAGE_KEY) || "{}");
        ["hc", "hf"].forEach(mode => {
          const storedMode = stored[mode];
          if (!storedMode) return;
          RANKING_METRICS[mode].forEach(m => {
            if (typeof storedMode[m.id] === "number" && isFinite(storedMode[m.id]) && storedMode[m.id] >= 0) {
              w[mode][m.id] = storedMode[m.id];
            }
          });
        });
      } catch (e) { /* corrupt/absent — fall back to defaults */ }
      return w;
    }

    let weights = loadWeights(); // { hc: { metricId: rawShare }, hf: { metricId: rawShare } } — the last SAVED/applied weights, what the standings are actually scored against.

    // The sliders edit a separate DRAFT copy, not `weights` directly — the
    // standings only re-score once "Save Weights" is clicked, rather than
    // on every drag. Draft starts equal to the saved weights (nothing
    // pending) and is keyed per mode too, so switching the Honor Cadet/
    // Honor Flight tab never loses whichever mode's in-progress edit.
    let draftWeights = { hc: { ...weights.hc }, hf: { ...weights.hf } };

    function saveWeights() {
      try { localStorage.setItem(WEIGHT_STORAGE_KEY, JSON.stringify(weights)); } catch (e) { /* storage full/blocked */ }
    }

    /** Whether `mode`'s draft differs from its last-saved weights — gates the Save button. */
    function weightsAreDirty(mode) {
      return RANKING_METRICS[mode].some(m => Number(draftWeights[mode][m.id]) !== Number(weights[mode][m.id]));
    }

    function flightVisible(flight) {
      // Empty sessionFlightList (CCT/Administrator) sees every flight; a
      // flight/squadron position sees only its own — same visibility rule
      // the rest of the app uses (Shell.flightMatchesAudience).
      return Shell.flightMatchesAudience(sessionFlightList, flight);
    }

    function num(v) { return Number(v) || 0; }
    function mean(arr) { return arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : null; }

    /**
     * Per-cadet raw metric values (before normalization/weighting), one
     * entry per roster cadet in a visible flight. A metric is null when the
     * cadet has no data for it (no inspections of that type, etc.) — null
     * contributes nothing rather than counting as a zero score.
     */
    function cadetRawMetrics() {
      // Flight Commander/Sergeant roster rows (Role populated) are staff,
      // not cadets — excluded from this per-cadet standings computation
      // (see Shell.isStaffRosterRow).
      const cadets = rosterRows.filter(r => String(r.CapId || "").trim() && flightVisible(r.Flight) && !Shell.isStaffRosterRow(r));
      const byCap = {};
      cadets.forEach(c => {
        byCap[String(c.CapId)] = { uniform: [], room: [], ptPassed: 0, ptAttempted: 0, assessment: [], posObs: 0, concernObs: 0, hcRecs: 0 };
      });

      uniformRows.forEach(r => { const e = byCap[String(r.StudentCapId)]; if (e) e.uniform.push(num(r.TotalPoints) / UNIFORM_ITEM_COUNT); });
      roomRows.forEach(r => { const e = byCap[String(r.StudentCapId)]; if (e) e.room.push(num(r.TotalPoints) / ROOM_ITEM_COUNT); });
      ptRows.forEach(r => {
        const e = byCap[String(r.StudentCapId)];
        if (e) { e.ptPassed += num(r.TotalPoints); e.ptAttempted += num(r.ItemsAttempted); }
      });
      assessmentRows.forEach(r => { const e = byCap[String(r.StudentCapId)]; if (e) e.assessment.push(num(r.Score) / ASSESSMENT_MAX_SCORE); });
      observationRows.forEach(r => {
        const e = byCap[String(r.StudentCapId)];
        if (!e) return;
        const s = String(r.Sentiment).toLowerCase();
        if (s === "positive") e.posObs++;
        else if (s === "concern") e.concernObs++;
      });
      honorCadetRows.forEach(r => { const e = byCap[String(r.StudentCapId)]; if (e) e.hcRecs++; });

      return cadets.map(c => {
        const e = byCap[String(c.CapId)];
        return {
          name: c.Name || c.CapId || "—",
          flight: c.Flight || "Unassigned",
          metrics: {
            uniform: mean(e.uniform),
            room: mean(e.room),
            pt: e.ptAttempted ? e.ptPassed / e.ptAttempted : null,
            assessment: mean(e.assessment),
            posObs: e.posObs,
            concernObs: e.concernObs,
            hcRecs: e.hcRecs
          }
        };
      });
    }

    /**
     * Per-flight raw metrics: each shared metric is the mean across the
     * flight's cadets (skipping cadets with no data for it), so flight size
     * doesn't bias the ranking, plus a count of Honor Flight nominations for
     * that flight.
     */
    function flightRawMetrics() {
      const cadetData = cadetRawMetrics();
      const byFlight = {};
      cadetData.forEach(cd => { (byFlight[cd.flight] = byFlight[cd.flight] || []).push(cd.metrics); });

      const hfByFlight = {};
      honorFlightRows.forEach(r => {
        if (!flightVisible(r.Flight)) return;
        const f = r.Flight || "Unassigned";
        hfByFlight[f] = (hfByFlight[f] || 0) + 1;
      });

      return Object.keys(byFlight).sort().map(f => {
        const list = byFlight[f];
        const agg = {};
        ["uniform", "room", "pt", "assessment", "posObs", "concernObs"].forEach(k => {
          const vals = list.map(m => m[k]).filter(v => v !== null && v !== undefined);
          agg[k] = vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : null;
        });
        agg.hfRecs = hfByFlight[f] || 0;
        return { name: f, cadetCount: list.length, metrics: agg };
      });
    }

    function fmtPercent(p) { return `${Math.round(p)}%`; }

    function fmtMetric(id, v) {
      if (v === null || v === undefined) return "—";
      if (id === "uniform" || id === "room" || id === "pt" || id === "assessment") return `${Math.round(num(v) * 100)}%`;
      return String(Math.round(num(v) * 10) / 10);
    }

    function weightFieldHtml(m, mode) {
      const dirText = m.dir < 0 ? "Lowers score" : "Raises score";
      return `
        <div class="weight-field">
          <div class="weight-field__head">
            <span class="weight-field__label">${esc(m.label)}</span>
            <span class="weight-field__value" id="w-val-${mode}-${m.id}">${fmtPercent(draftWeights[mode][m.id])}</span>
          </div>
          <input type="range" min="0" max="100" step="1" value="${draftWeights[mode][m.id]}" data-weight="${m.id}" aria-label="${esc(m.label)} percent">
          <span class="weight-field__dir ${m.dir < 0 ? "weight-field__dir--neg" : ""}">${dirText}</span>
        </div>`;
    }

    function renderWeekly() {
      contentEl.innerHTML = `
        <div class="tabs rec-tabs" id="standings-tabs-bar" style="margin-bottom: var(--space-6);">
          <button class="tabs__tab ${activeStandingsTab === "hc" ? "is-active" : ""}" data-standings="hc">Honor Cadet</button>
          <button class="tabs__tab ${activeStandingsTab === "hf" ? "is-active" : ""}" data-standings="hf">Honor Flight</button>
        </div>

        <div class="card" style="margin-bottom: var(--space-6);">
          <h3 class="section-label" id="weights-title">Scoring Weights</h3>
          <p style="font-size: var(--fs-sm); color: var(--ink-600); margin-top: calc(-1 * var(--space-2)); margin-bottom: 0;">
            Each component is its own percent of the total — moving one does not change the others. Adjust until they add up to 100%, then Save.
          </p>
          <div class="weights-grid" id="weights-grid"></div>
          <div style="margin-top: var(--space-5); display:flex; align-items:center; gap: var(--space-3); flex-wrap:wrap;">
            <button class="btn btn--primary" id="weights-save-btn" disabled>Save Weights</button>
            <button class="btn btn--ghost" id="weights-reset-btn">Reset to defaults</button>
            <span id="weights-total" style="font-size: var(--fs-sm); font-weight:600;"></span>
            <span id="weights-dirty-note" style="display:none; font-size: var(--fs-xs); color: var(--ink-600);">Unsaved changes</span>
          </div>
        </div>

        <div class="card">
          <h3 class="section-label">Top Contenders</h3>
          <p style="font-size: var(--fs-sm); color: var(--ink-600); margin-top: calc(-1 * var(--space-2)); margin-bottom: var(--space-4);">
            Ranked across every data point logged so far, scored out of 100.
          </p>
          <div class="standings-list" id="standings-list"></div>
        </div>
      `;
      wireWeekly();
      renderWeightsPanel();
      renderStandingsList();
      Shell.animateIn(contentEl);
    }

    function wireWeekly() {
      const tabsBarEl = document.getElementById("standings-tabs-bar");
      if (!tabsBarEl) return;
      standingsTabsIndicator = Shell.enhanceTabs(tabsBarEl);
      tabsBarEl.querySelectorAll("[data-standings]").forEach(btn => {
        btn.addEventListener("click", () => {
          if (btn.dataset.standings === activeStandingsTab) return;
          activeStandingsTab = btn.dataset.standings;
          tabsBarEl.querySelectorAll(".tabs__tab").forEach(b => b.classList.toggle("is-active", b === btn));
          if (standingsTabsIndicator) standingsTabsIndicator.move();
          // The Scoring Weights panel is mode-specific (Honor Cadet and
          // Honor Flight each have their own 100% component set), so
          // switching modes has to rebuild it too, not just the standings.
          // The OTHER mode's own draft/dirty state (if any) is untouched —
          // draftWeights is keyed per mode, so switching back later picks
          // up right where that mode's edit was left.
          renderWeightsPanel();
          renderStandingsList();
        });
      });
    }

    /** Sum of `mode`'s draft percentages — must read exactly 100 to allow saving. */
    function weightsTotal(mode) {
      return RANKING_METRICS[mode].reduce((sum, m) => sum + Math.max(0, num(draftWeights[mode][m.id])), 0);
    }

    /** Updates the running total, the Save button's enabled state, and the unsaved-changes note for the currently-active mode. */
    function updateWeightsPanelState() {
      const mode = activeStandingsTab;
      const total = weightsTotal(mode);
      const isValidTotal = total === 100;
      const dirty = weightsAreDirty(mode);

      const totalEl = document.getElementById("weights-total");
      if (totalEl) {
        totalEl.textContent = `Total: ${total}%`;
        totalEl.style.color = isValidTotal ? "var(--green-600)" : "var(--red-600)";
      }

      const saveBtn = document.getElementById("weights-save-btn");
      if (saveBtn) saveBtn.disabled = !(dirty && isValidTotal);

      const note = document.getElementById("weights-dirty-note");
      if (note) {
        if (!dirty) {
          note.style.display = "none";
        } else {
          note.style.display = "";
          note.textContent = isValidTotal ? "Unsaved changes" : "Must add up to 100% before saving";
        }
      }
    }

    /**
     * Renders (and self-wires) the Scoring Weights panel for whichever
     * mode is currently active. Called on its own — separately from the
     * outer renderWeekly() — every time the Honor Cadet/Honor Flight tab
     * switches, so only this panel and the standings list refresh rather
     * than tearing down and rebuilding the tab bar itself.
     */
    function renderWeightsPanel() {
      const mode = activeStandingsTab;
      const metrics = RANKING_METRICS[mode];

      const titleEl = document.getElementById("weights-title");
      if (titleEl) titleEl.textContent = `Scoring Weights — ${mode === "hc" ? "Honor Cadet" : "Honor Flight"}`;

      const gridEl = document.getElementById("weights-grid");
      if (!gridEl) return;
      gridEl.innerHTML = metrics.map(m => weightFieldHtml(m, mode)).join("");

      // Each slider is independent — moving one does NOT rebalance the
      // others (unlike an earlier version of this panel). The person
      // manually adjusts every component until the running total below
      // reads 100%, which — together with an actual change — is what
      // enables Save. Dragging only edits the draft; it deliberately does
      // NOT touch `weights`, save to localStorage, or re-score the
      // standings below. That only happens when "Save Weights" is clicked.
      gridEl.querySelectorAll("input[data-weight]").forEach(input => {
        input.addEventListener("input", () => {
          draftWeights[mode][input.dataset.weight] = Number(input.value);
          const valEl = document.getElementById(`w-val-${mode}-${input.dataset.weight}`);
          if (valEl) valEl.textContent = fmtPercent(Number(input.value));
          updateWeightsPanelState();
        });
      });

      const saveBtn = document.getElementById("weights-save-btn");
      if (saveBtn) {
        saveBtn.onclick = () => {
          weights[mode] = { ...draftWeights[mode] };
          saveWeights();
          updateWeightsPanelState();
          renderStandingsList();
          Shell.showToast("Weights saved.", { type: "success" });
        };
      }

      const resetBtn = document.getElementById("weights-reset-btn");
      if (resetBtn) {
        resetBtn.onclick = () => {
          // Resets the DRAFT only — same Save-gated flow as any other
          // slider change, so reverting to defaults doesn't silently
          // re-score the standings without an explicit Save too.
          draftWeights[mode] = defaultWeightsFor(mode);
          renderWeightsPanel();
        };
      }

      updateWeightsPanelState();
    }

    function renderStandingsList() {
      const listEl = document.getElementById("standings-list");
      if (!listEl) return;

      const mode = activeStandingsTab;
      const metrics = RANKING_METRICS[mode];

      const contenders = mode === "hc"
        ? cadetRawMetrics().map(cd => ({ name: cd.name, sub: cd.flight, metrics: cd.metrics }))
        : flightRawMetrics().map(f => ({ name: f.name, sub: `${f.cadetCount} cadet${f.cadetCount === 1 ? "" : "s"}`, metrics: f.metrics }));

      if (!contenders.length) {
        listEl.innerHTML = `<p style="font-size: var(--fs-sm); color: var(--ink-600); margin:0;">No ${mode === "hc" ? "cadets" : "flights"} with data yet.</p>`;
        return;
      }

      // Normalize each metric against the cohort's max so every axis lands
      // on a comparable 0-1 scale before weighting (a cadet with no data on
      // an axis just scores 0 there).
      const maxByMetric = {};
      metrics.forEach(m => {
        maxByMetric[m.id] = Math.max(0, ...contenders.map(c => num(c.metrics[m.id])));
      });

      // Each component contributes at most its own percent share of the
      // 100% total (norm maxes out at 1), so a perfect cadet/flight with no
      // concerns lands at exactly 100 — this is a literal score out of
      // 100%, not a rank-relative index.
      const scored = contenders.map(c => {
        let score = 0;
        const parts = [];
        metrics.forEach(m => {
          const norm = maxByMetric[m.id] > 0 ? num(c.metrics[m.id]) / maxByMetric[m.id] : 0;
          score += m.dir * num(weights[mode][m.id]) * norm;
          parts.push({ m, rawVal: c.metrics[m.id] });
        });
        return { name: c.name, sub: c.sub, score, parts };
      }).sort((a, b) => b.score - a.score);

      listEl.innerHTML = scored.map((s, i) => {
        const displayScore = Math.max(0, Math.round(s.score));
        return `
          <div class="standings-row ${i === 0 && s.score > 0 ? "standings-row--top" : ""}">
            <div class="standings-row__rank">${i + 1}</div>
            <div class="standings-row__body">
              <div class="standings-row__name">${esc(s.name)}${s.sub ? ` <span style="font-weight:400; color:var(--ink-600); font-size:var(--fs-xs);">${esc(s.sub)}</span>` : ""}</div>
              <div class="standings-row__breakdown">
                ${s.parts.map(p => `<span class="standings-chip ${p.m.dir < 0 ? "standings-chip--neg" : ""}">${esc(p.m.label)}: ${fmtMetric(p.m.id, p.rawVal)}</span>`).join("")}
              </div>
            </div>
            <div class="standings-row__score">${displayScore}<small>/ 100</small></div>
          </div>`;
      }).join("");
    }

    function refreshWeeklyIfActive() {
      if (activeMode === "weekly" && document.getElementById("standings-list")) renderStandingsList();
    }

    function load() {
      const rosterHandle = Api.getSheetCached("Roster", (fresh) => {
        rosterRows = Shell.normalizeRosterRows(fresh.rows || []);
        renderContent();
      });
      const hcHandle = Api.getSheetCached("HonorCadetRecommendations", (fresh) => {
        honorCadetRows = fresh.rows || [];
        if (document.getElementById("submissions-review-list")) {
          if (activeSubmissionsTab === "hc") renderSubmissionsDayTabs();
          renderSubmissionsReviewList();
        }
        refreshWeeklyIfActive();
      });
      const hfHandle = Api.getSheetCached("HonorFlightRecommendations", (fresh) => {
        honorFlightRows = fresh.rows || [];
        if (document.getElementById("submissions-review-list")) {
          if (activeSubmissionsTab === "hf") renderSubmissionsDayTabs();
          renderSubmissionsReviewList();
        }
        refreshWeeklyIfActive();
      });

      // Extra sheets used only by the Weekly standings. They never gate the
      // first render (the Daily view doesn't need them): each seeds its array
      // from whatever's already warm in cache so a switch to Weekly renders
      // immediately, and refreshes the standings in place if the Weekly view
      // is already up when fresher data lands.
      const uniformHandle = Api.getSheetCached("UniformInspections", (fresh) => { uniformRows = fresh.rows || []; refreshWeeklyIfActive(); });
      const roomHandle = Api.getSheetCached("RoomInspections",    (fresh) => { roomRows = fresh.rows || []; refreshWeeklyIfActive(); });
      const ptHandle = Api.getSheetCached("PTInspections",      (fresh) => { ptRows = fresh.rows || []; refreshWeeklyIfActive(); });
      const assessmentHandle = Api.getSheetCached("PhysicalAssessments", (fresh) => { assessmentRows = fresh.rows || []; refreshWeeklyIfActive(); });
      const obsHandle = Api.getSheetCached("Observations",       (fresh) => { observationRows = fresh.rows || []; refreshWeeklyIfActive(); });
      uniformRows = (uniformHandle.data && uniformHandle.data.rows) || [];
      roomRows = (roomHandle.data && roomHandle.data.rows) || [];
      ptRows = (ptHandle.data && ptHandle.data.rows) || [];
      assessmentRows = (assessmentHandle.data && assessmentHandle.data.rows) || [];
      observationRows = (obsHandle.data && obsHandle.data.rows) || [];

      const allCachedNow = !!(rosterHandle.data && hcHandle.data && hfHandle.data);

      if (allCachedNow) {
        rosterRows = Shell.normalizeRosterRows(rosterHandle.data.rows || []);
        honorCadetRows = hcHandle.data.rows || [];
        honorFlightRows = hfHandle.data.rows || [];
        renderContent();
      } else {
        contentEl.innerHTML = `<div class="state-message"><div class="spinner"></div><p>Loading…</p></div>`;
      }

      return Promise.all([rosterHandle.ready, hcHandle.ready, hfHandle.ready])
        .then(([rosterData, hcData, hfData]) => {
          rosterRows = Shell.normalizeRosterRows(rosterData.rows || []);
          honorCadetRows = hcData.rows || [];
          honorFlightRows = hfData.rows || [];
          if (!allCachedNow) renderContent();
        })
        .catch((err) => {
          if (!allCachedNow) {
            contentEl.innerHTML = `
              <div class="state-message">
                <div class="state-message__icon">⚠️</div>
                <p>${esc(err.message)}</p>
              </div>`;
          }
          Shell.showToast(err.message, { type: "error" });
        });
    }

    Shell.registerRefresh(load);
    load();
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register(`${window.APP_BASE_PATH}service-worker.js`);
    }
  </script>
</body>
</html>
