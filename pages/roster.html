<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    // Applied synchronously, before first paint, so a collapsed sidebar
    // renders at its collapsed width immediately instead of flashing
    // open at the default width for a frame and visibly animating shut
    // once js/shell.js runs (see .nav-rail-collapsed in css/app.css).
    // The theme read right after does the same job for dark mode:
    // resolve njwg_theme (light/dark/system) and set data-theme on <html>
    // BEFORE tokens.css is even requested, so a dark-mode device never
    // flashes the light palette for a frame first (see the
    // :root[data-theme="dark"] block in css/tokens.css, and
    // initThemeWatcher_ in js/shell.js for what keeps this in sync for
    // the rest of the page's life, including a live OS theme change).
    try {
      if (localStorage.getItem("njwg_nav_collapsed") === "true") {
        document.documentElement.classList.add("nav-rail-collapsed");
      }
    } catch (e) { /* storage unavailable — falls back to expanded */ }
    try {
      var njwgThemePref = localStorage.getItem("njwg_theme") || "system";
      var njwgThemeResolved = njwgThemePref === "system"
        ? (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
        : njwgThemePref;
      document.documentElement.setAttribute("data-theme", njwgThemeResolved);
    } catch (e) { document.documentElement.setAttribute("data-theme", "light"); }
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roster — NJWG Encampment</title>
  <meta name="theme-color" content="#0d1250">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="NJWG Encampment">
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../icons/favicon.ico" sizes="any">
  <link rel="icon" href="../icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/app.css">

  <style>
    .roster-toolbar {
      display: flex;
      gap: var(--space-3);
      margin-bottom: var(--space-5);
      flex-wrap: wrap;
      align-items: center;
    }
    .roster-toolbar input {
      flex: 1;
      min-width: 200px;
      font-family: var(--font-body);
      font-size: var(--fs-sm);
      padding: var(--space-3);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--surface);
    }

    /* Flight tile grid — shown before a flight is selected */
    .flight-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: var(--space-4);
    }

    .flight-tile {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      cursor: pointer;
      text-align: left;
      box-shadow: var(--shadow-sm);
      transition: border-color var(--duration-fast) var(--ease-standard),
                  transform var(--duration-fast) var(--ease-standard);
      font-family: inherit;
    }

    .flight-tile:hover {
      border-color: var(--gold-500);
      transform: translateY(-2px);
    }

    .flight-tile__name {
      display: block;
      font-family: var(--font-display);
      font-size: var(--fs-md);
      color: var(--heading);
      margin-bottom: var(--space-2);
    }

    .flight-tile__count {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      font-size: var(--fs-xs);
      color: var(--ink-600);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
    }

    /* Detail view header — shown once a flight is selected */
    .flight-detail-header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
    }

    .flight-detail-header h2 {
      font-size: var(--fs-lg);
      color: var(--heading);
      margin: 0;
    }

    .roster-form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: var(--space-3);
      margin-bottom: var(--space-4);
    }
    .roster-form .field { margin-bottom: 0; }
    .roster-form-actions {
      grid-column: 1 / -1;
      display: flex;
      gap: var(--space-3);
    }

    .roster-row-actions {
      display: flex;
      justify-content: flex-end;
    }

    .room-input {
      width: 72px;
      font-family: var(--font-mono);
      font-size: var(--fs-sm);
      padding: var(--space-2);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--surface-sunken);
      color: var(--ink-900);
      text-align: center;
    }
    .room-input:focus { border-color: var(--gold-500); outline: none; }

    /* ---- Flight leadership card ---- */
    .leadership-card {
      margin-bottom: var(--space-4);
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: var(--space-4);
    }
    .leadership-slot__label {
      font-size: var(--fs-2xs);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      color: var(--ink-600);
      margin-bottom: var(--space-1);
    }
    .leadership-slot__value {
      font-family: var(--font-display);
      font-size: var(--fs-md);
      color: var(--heading);
    }
    .leadership-slot__value--empty {
      font-family: var(--font-body);
      font-size: var(--fs-sm);
      color: var(--ink-400);
      font-style: italic;
    }

    /* ---- Wingman teams card ---- */
    .wingman-card { margin-bottom: var(--space-5); }
    .wingman-groups {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
    }
    .wingman-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: var(--surface-sunken);
      border-radius: var(--radius-md);
      flex-wrap: wrap;
    }
    .wingman-group__members {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      align-items: center;
    }
    .wingman-group__chip {
      font-size: var(--fs-xs);
      padding: var(--space-1) var(--space-3);
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--ink-900);
    }
    .wingman-group__actions { display: flex; gap: var(--space-2); flex-shrink: 0; }
    .wingman-picker {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }
    .wingman-picker__list {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }
    .wingman-picker__option {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--fs-sm);
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      background: var(--surface);
      cursor: pointer;
    }
    .wingman-picker__option:has(input:checked) {
      border-color: var(--gold-500);
      background: var(--gold-100);
    }
    .wingman-picker__hint {
      font-size: var(--fs-xs);
      color: var(--ink-600);
    }
    .wingman-empty {
      font-size: var(--fs-sm);
      color: var(--ink-600);
    }
  </style>
</head>
<body>

  <div class="app-shell">
    <nav class="nav-rail" id="nav-rail">
      <button type="button" class="nav-rail__crest" id="nav-rail-crest" aria-label="Toggle navigation width">
        <span class="nav-rail__crest-mark"><img src="../icons/icon-192.png" alt="NJWG"></span>
        <span class="nav-rail__crest-text">NJWG<span>Encampment</span></span>
      </button>
      <div id="nav-rail-links"></div>
    </nav>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/shell.js"></script>
    <script>
      // See overview.html for why this runs here instead of only inside
      // Shell.init() at the bottom — keeps the sidebar links from ever
      // being visibly empty for a moment on navigation between pages.
      Shell.renderNav("roster");
    </script>

    <header class="app-header" id="app-header"></header>

    <main class="app-main">
      <!-- Hidden until the roster has actually loaded (see render() below)
           — this search box is static markup, so it used to appear and be
           interactive instantly while #roster-content was still spinning,
           instead of everything on the page appearing together. -->
      <div class="roster-toolbar" id="roster-toolbar" style="display:none;">
        <input type="search" id="roster-search" aria-label="Search roster by name, CAP ID, or flight" placeholder="Search by name, CAP ID, or flight…">
      </div>

      <div id="roster-form-container"></div>

      <div id="roster-content">
        <div class="state-message">
          <div class="spinner"></div>
          <p>Loading roster…</p>
        </div>
      </div>
    </main>
  </div>

  <script>
    Shell.init({ activePage: "roster" });

    const contentEl = document.getElementById("roster-content");
    const searchInput = document.getElementById("roster-search");
    const toolbarEl = document.getElementById("roster-toolbar");
    const formContainer = document.getElementById("roster-form-container");
    const esc = Shell.escapeHtml;

    // Viewing this page only requires "roster" in Pages. Editing
    // additionally requires "edit-roster" — a separate, explicit grant
    // — so seeing Roster no longer implies being able to change it.
    // This is a client-side convenience to hide controls the backend
    // would reject anyway; assertPageWriteAccess_ in Code.gs is the
    // real check on every write.
    const session = Auth.getSession();
    const sessionPages = (session?.Pages || []).map(p => String(p).toLowerCase());
    const canEditRoster = sessionPages.includes("edit-roster");

    // Roster intentionally is NOT flight-scoped like Inspections/
    // Observations/Overview (see worker/src/auth.js) — any position with
    // "roster" in Pages can browse every flight's cadets, e.g. a
    // squadron position cross-referencing another flight. But a position
    // scoped to one or more real flights (a Flight Commander's one flight,
    // or a Squadron Commander's two) almost always wants THEIR OWN
    // flight(s) first, not a tile grid they have to click through to
    // reach every single time — ownFlights captures those so the default
    // view can open straight into them, while still surfacing every
    // other flight below for the (rarer) cross-reference case. Blank/
    // "all" Flights (CCT/Admin positions) has no owned flight, so those
    // keep the plain tile-grid default unchanged.
    const sessionFlightList = (Array.isArray(session?.Flights) ? session.Flights : []).filter(Boolean);
    const ownFlights = sessionFlightList.filter(f => f.toLowerCase() !== "all");

    // Wingman assignment is its OWN capability, separate from general
    // roster editing — a flight profile (a position whose session is
    // scoped to exactly ONE flight, e.g. a Flight Commander) can manage
    // its own flight's wingman teams whether or not it also has
    // edit-roster (most flight positions won't — adding/removing
    // cadets and editing leadership stays edit-roster/Administrator-
    // only). A squadron position (two owned flights) or CCT/
    // Administrator (no owned flight) still sees the groups read-only.
    // The backend enforces this independently — see
    // assertRosterWriteAccess in worker/src/index.js — this is purely
    // the UI-side reflection of the same rule.
    const isFlightProfile = ownFlights.length === 1;
    const canEditWingman = isFlightProfile;

    let allRows = [];
    let editingCapId = null; // CapId string being edited, or null for "adding new"
    // Null = showing the default view (this position's own flight(s) up
    // top, plus every other flight to browse below, or — for a position
    // that doesn't own a specific flight — the plain flight tile grid). A
    // string = showing that flight's member list ("Unassigned" for rows
    // with no Flight value).
    let selectedFlight = null;
    // CapIds currently checked in an open wingman group editor/creator —
    // reset whenever that picker opens or closes. Keyed by flight since
    // renderDefaultView can show more than one flight's detail at once
    // (a squadron position's two own flights), each with its own
    // independent in-progress selection.
    let wingmanPicker = null; // { flight, groupId } | null — which picker (if any) is open, and for which existing group (null = creating new)
    const wingmanSelection = new Set();

    /** A DOM-safe id fragment derived from a flight name, for the per-own-flight section containers below. */
    function flightDomId(flight) {
      return String(flight).replace(/[^a-zA-Z0-9_-]/g, "_");
    }

    function groupByFlight(rows) {
      return rows
        // Drop blank/placeholder roster rows (no CapId AND no Name) — a
        // stray empty row in the sheet that still has a Flight value
        // would otherwise show up as a phantom cadet card with no name.
        .filter(r => String(r.CapId || "").trim() || String(r.Name || "").trim())
        .reduce((groups, row) => {
          const flight = row.Flight || "Unassigned";
          (groups[flight] = groups[flight] || []).push(row);
          return groups;
        }, {});
    }

    /** Cadet-only count for a flight's tile ("N cadets") — Flight Commander/Sergeant staff rows don't count as cadets. */
    function cadetCount(members) {
      return members.filter(m => !Shell.isStaffRosterRow(m)).length;
    }

    function renderFlightGrid(rows) {
      const grouped = groupByFlight(rows);
      const flightNames = Object.keys(grouped).sort();

      if (!flightNames.length) {
        contentEl.innerHTML = `
          <div class="state-message">
            <div class="state-message__icon">👥</div>
            <p>No roster entries yet.</p>
          </div>`;
        return;
      }

      contentEl.innerHTML = `
        <div class="flight-grid">
          ${flightNames.map(flight => `
            <button class="flight-tile" data-flight="${esc(flight)}">
              <span class="flight-tile__name">${esc(flight)}</span>
              <span class="flight-tile__count">${cadetCount(grouped[flight])} cadet${cadetCount(grouped[flight]) === 1 ? "" : "s"}</span>
            </button>
          `).join("")}
        </div>`;

      contentEl.querySelectorAll(".flight-tile").forEach(tile => {
        tile.addEventListener("click", () => {
          selectedFlight = tile.dataset.flight;
          render(allRows);
        });
      });
      Shell.animateIn(contentEl);
    }

    /**
     * Renders a single flight's cadet table into `container` (defaults
     * to the whole page content). `showBack` controls whether the
     * "← Back" button appears at all — hidden when this is rendered as
     * the top ("your own flight") section of the composite default view
     * (see renderDefaultView), since there's no flight grid to go back
     * TO from there; shown as normal when drilling into any flight
     * (including someone else's) from that grid.
     */
    /**
     * Rank + name for a Flight Commander/Sergeant slot — read-only. This
     * box is the ONE place a leadership entry's name is shown "FirstName
     * LastName" instead of the "LastName, FirstName" used everywhere
     * else in the app for cadets — Commander/Sergeant are the deliberate
     * exception (they're flight staff, not cadets — see
     * Shell.isStaffRosterRow). Role itself is set directly in the Roster
     * sheet, not from this app — there's no in-app way to reassign it,
     * so a change here always requires editing the sheet.
     */
    function renderLeadershipSlot(label, holder) {
      return `
        <div class="leadership-slot">
          <div class="leadership-slot__label">${esc(label)}</div>
          ${holder
            ? `<div class="leadership-slot__value">${esc([holder.Rank, holder.FirstName, holder.LastName].filter(Boolean).join(" "))}</div>`
            : `<div class="leadership-slot__value leadership-slot__value--empty">Not yet assigned</div>`}
        </div>`;
    }

    /** Flight Commander / Flight Sergeant, detected from Role. Prominently above the roster table, per-flight — read-only (see renderLeadershipSlot). */
    function renderLeadershipCard(flight, members) {
      const commander = members.find(m => m.Role === "FlightComm");
      const sergeant = members.find(m => m.Role === "FlightSgt");
      return `
        <div class="card leadership-card">
          ${renderLeadershipSlot("Flight Commander", commander)}
          ${renderLeadershipSlot("Flight Sergeant", sergeant)}
        </div>`;
    }

    /** { groupId: [members] } for a flight's members — Wingman is a shared free-text id written to every member of a team. */
    function wingmanGroups(members) {
      const groups = {};
      members.forEach(m => {
        const g = String(m.Wingman || "").trim();
        if (g) (groups[g] = groups[g] || []).push(m);
      });
      return groups;
    }

    /**
     * The 2-3-cadet picker used both to CREATE a new team (editingGroupId
     * null) and to EDIT an existing one (pre-checked with its current
     * members). Candidates are cadets (never flight staff — see
     * Shell.isStaffRosterRow) who are either currently unassigned or
     * already in the team being edited, so editing a team doesn't hide
     * its own members just because they're "already assigned."
     */
    function renderWingmanPicker(members, editingGroupId, groups) {
      const currentGroupCapIds = editingGroupId ? (groups[editingGroupId] || []).map(m => String(m.CapId)) : [];
      const candidates = members.filter(m =>
        !Shell.isStaffRosterRow(m) &&
        (!String(m.Wingman || "").trim() || currentGroupCapIds.includes(String(m.CapId)))
      );
      return `
        <div class="wingman-picker" style="margin-top: var(--space-3);">
          <div class="wingman-picker__hint">Select 2–3 cadets for this team.</div>
          <div class="wingman-picker__list">
            ${candidates.map(m => `
              <label class="wingman-picker__option">
                <input type="checkbox" value="${esc(m.CapId)}" ${wingmanSelection.has(String(m.CapId)) ? "checked" : ""}>
                ${esc(m.Name)}
              </label>
            `).join("")}
          </div>
          <div style="display:flex; gap: var(--space-3);">
            <button class="btn btn--primary" id="wingman-save-btn">${editingGroupId ? "Save Team" : "Create Team"}</button>
            <button class="btn btn--ghost" id="wingman-cancel-btn">Cancel</button>
          </div>
        </div>`;
    }

    /**
     * Wingman team groups for this flight — read-only for everyone except
     * a position scoped to exactly this one flight (a "flight profile,"
     * e.g. Flight Commander; see canEditWingman/isFlightProfile above).
     * Kept as its own card, separate from the leadership card and the
     * roster table, so it reads as one clear idea (cadet pairs/trios)
     * rather than more
     * columns crammed into the table.
     */
    function renderWingmanCard(flight, members) {
      const groups = wingmanGroups(members);
      const groupIds = Object.keys(groups);
      const openHere = wingmanPicker && wingmanPicker.flight === flight;

      return `
        <div class="card wingman-card">
          <h3 class="section-label">Wingman Teams</h3>
          ${groupIds.length ? `
            <div class="wingman-groups">
              ${groupIds.map(gid => `
                <div class="wingman-group">
                  <div class="wingman-group__members">
                    ${groups[gid].map(m => `<span class="wingman-group__chip">${esc(m.Name)}</span>`).join("")}
                  </div>
                  ${canEditWingman ? `
                    <div class="wingman-group__actions">
                      <button class="btn btn--ghost" data-wingman-edit="${esc(gid)}" style="padding: var(--space-1) var(--space-3);">Edit</button>
                      <button class="btn btn--ghost" data-wingman-disband="${esc(gid)}" style="padding: var(--space-1) var(--space-3); color: var(--red-600);">Disband</button>
                    </div>
                  ` : ""}
                </div>
              `).join("")}
            </div>
          ` : `<p class="wingman-empty">No wingman teams yet.</p>`}
          ${canEditWingman ? (openHere
            ? renderWingmanPicker(members, wingmanPicker.groupId, groups)
            : `<button class="btn btn--ghost" id="wingman-new-btn">+ New Wingman Team</button>`
          ) : ""}
        </div>`;
    }

    function wireWingmanCard(target, flight, members) {
      const groups = wingmanGroups(members);

      target.querySelectorAll("[data-wingman-edit]").forEach(btn => {
        btn.addEventListener("click", () => {
          const gid = btn.dataset.wingmanEdit;
          wingmanSelection.clear();
          (groups[gid] || []).forEach(m => wingmanSelection.add(String(m.CapId)));
          wingmanPicker = { flight, groupId: gid };
          render(allRows);
        });
      });

      target.querySelectorAll("[data-wingman-disband]").forEach(btn => {
        btn.addEventListener("click", async () => {
          const gid = btn.dataset.wingmanDisband;
          const confirmed = await Shell.confirm({
            title: "Disband wingman team?",
            message: "This removes the wingman assignment for every cadet in this team.",
            confirmLabel: "Disband"
          });
          if (confirmed) saveWingmanGroup(flight, gid, []);
        });
      });

      const newBtn = target.querySelector("#wingman-new-btn");
      if (newBtn) newBtn.addEventListener("click", () => {
        wingmanSelection.clear();
        wingmanPicker = { flight, groupId: null };
        render(allRows);
      });

      target.querySelectorAll('.wingman-picker__option input[type="checkbox"]').forEach(cb => {
        cb.addEventListener("change", () => {
          if (cb.checked) wingmanSelection.add(cb.value); else wingmanSelection.delete(cb.value);
        });
      });

      const saveBtn = target.querySelector("#wingman-save-btn");
      if (saveBtn) saveBtn.addEventListener("click", () => {
        const selected = Array.from(wingmanSelection);
        if (selected.length < 2 || selected.length > 3) {
          Shell.showToast("A wingman team needs 2 or 3 cadets.", { type: "error" });
          return;
        }
        saveWingmanGroup(flight, wingmanPicker.groupId, selected);
      });

      const cancelBtn = target.querySelector("#wingman-cancel-btn");
      if (cancelBtn) cancelBtn.addEventListener("click", () => {
        wingmanPicker = null;
        wingmanSelection.clear();
        render(allRows);
      });
    }

    function renderFlightDetail(rows, flight, { showBack = true, container = null } = {}) {
      const target = container || contentEl;
      // members = every roster row in this flight, including the two
      // leadership (staff) rows — the leadership/wingman cards need the
      // full set. The table below only ever shows cadets: leadership
      // rows appear EXCLUSIVELY in the dedicated leadership card above
      // it, never duplicated into the general cadet list (see
      // Shell.isStaffRosterRow).
      const members = rows.filter(m => (m.Flight || "Unassigned") === flight);
      const cadets = members.filter(m => !Shell.isStaffRosterRow(m));

      target.innerHTML = `
        <div class="flight-detail-header">
          ${showBack ? `<button class="btn btn--ghost" id="back-to-flights-btn">← Back</button>` : ""}
          <h2>${esc(flight)}</h2>
          ${canEditRoster ? `<button class="btn btn--ghost" id="add-cadet-btn" style="margin-left:auto;">+ Add Cadet</button>` : ""}
        </div>
        ${members.length ? renderLeadershipCard(flight, members) : ""}
        ${cadets.length ? `
          <div class="card" style="padding: 0; overflow-x: auto;">
            <table class="data-table">
              <thead>
                <tr><th>CAP ID</th><th>Name</th><th>Rank</th><th>Age</th><th>Sex</th><th>Room</th>${canEditRoster ? "<th></th>" : ""}</tr>
              </thead>
              <tbody>
                ${cadets.map(m => `
                  <tr>
                    <td data-label="CAP ID" class="mono">${esc(m.CapId) || "—"}</td>
                    <td data-label="Name">${esc(m.Name) || "—"}</td>
                    <td data-label="Rank">${esc(m.Rank) || "—"}</td>
                    <td data-label="Age">${esc(m.Age) || "—"}</td>
                    <td data-label="Sex">${esc(m.Sex) || "—"}</td>
                    <td data-label="Room">
                      <input type="text" class="room-input" inputmode="numeric" placeholder="—" aria-label="Room number for ${esc(m.Name)}" data-capid="${esc(m.CapId)}" value="${esc(m.Room || "")}">
                    </td>
                    ${canEditRoster ? `
                      <td data-label="" class="roster-row-actions">
                        <button class="btn btn--ghost" data-action="row-menu" data-capid="${esc(m.CapId)}" data-tooltip="Row actions" style="padding: var(--space-1) var(--space-2);" aria-label="Row actions">⋮</button>
                      </td>
                    ` : ""}
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        ` : `
          <div class="state-message">
            <div class="state-message__icon">👥</div>
            <p>No cadets in this flight.</p>
          </div>
        `}
        ${members.length ? renderWingmanCard(flight, members) : ""}
      `;

      // Scoped to `target`, not document.getElementById — a squadron
      // position can render more than one own-flight section at once
      // (see renderDefaultView's actualOwnFlights loop), each with its
      // own "add-cadet-btn"/"back-to-flights-btn" id, so a global lookup
      // would only ever find the first section's button.
      const addBtn = target.querySelector("#add-cadet-btn");
      if (addBtn) addBtn.addEventListener("click", () => openForm(null, flight));

      if (members.length) wireWingmanCard(target, flight, members);

      // Room assignment: unlike everything else on this table, ANY
      // signed-in position can edit it — no edit-roster, no flight
      // scoping (see resolveRosterWrite's Room exception in
      // worker/src/index.js). Saves on blur ("change"), and Enter is
      // wired to blur() so it saves immediately too — without this, an
      // Enter press neither blurs a plain <input> nor fires "change" by
      // itself, so someone typing a number and hitting Enter (the
      // instinctive "commit this" action, especially coming from a
      // spreadsheet) would see nothing happen. Deliberately does NOT
      // re-render the view afterward on success — nothing else on
      // screen depends on a cadet's Room, so a full re-render would only
      // risk disrupting focus/typing in a neighboring row's input for
      // zero visible benefit.
      target.querySelectorAll(".room-input").forEach(input => {
        input.addEventListener("keydown", (e) => { if (e.key === "Enter") input.blur(); });
        input.addEventListener("change", () => saveRoomAssignment(input.dataset.capid, input.value.trim(), input));
      });

      target.querySelectorAll("[data-action='row-menu']").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          const m = allRows.find(r => String(r.CapId) === btn.dataset.capid);
          const rect = btn.getBoundingClientRect();
          Shell.openContextMenu(rect.right, rect.bottom, [
            {
              label: "Edit row",
              icon: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>',
              onSelect: () => openForm(m, flight)
            },
            "divider",
            {
              label: "Remove",
              danger: true,
              icon: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>',
              onSelect: () => deleteStudent(m)
            }
          ]);
        });
      });
      Shell.wireTooltips(target);

      const backBtn = target.querySelector("#back-to-flights-btn");
      if (backBtn) {
        backBtn.addEventListener("click", () => {
          selectedFlight = null;
          searchInput.value = "";
          render(allRows);
        });
      }
      // When rendered into its own sub-container (the composite default
      // view's primary-flight section), the caller animates the WHOLE
      // composite together instead — animating here too would fade in
      // the primary section on its own timing, out of step with the
      // "Other Flights" grid below it.
      if (!container) Shell.animateIn(target);
    }

    /**
     * The default (nothing drilled into, no active search) view. A
     * position scoped to one or more real flights (ownFlights — one for
     * a Flight Commander, two for a Squadron Commander) sees THEIR OWN
     * flight(s)' cadet lists immediately — no tile to click through
     * first — with every other flight still reachable via a tile grid
     * underneath, for the rarer cross-flight lookup. Everyone else (no
     * owned flight — blank/"all"/CCT/Admin) keeps the plain flight tile
     * grid unchanged.
     */
    function renderDefaultView(rows) {
      if (!ownFlights.length) { renderFlightGrid(rows); return; }

      const grouped = groupByFlight(rows);
      // Case-insensitive match against the Roster sheet's own Flight
      // spelling — StaffAccess's Flights column and Roster's Flight
      // column are two independently-typed sources, so "Alpha" vs
      // "alpha" shouldn't silently split into two different "flights."
      const actualOwnFlights = ownFlights
        .map(f => Object.keys(grouped).find(g => g.toLowerCase() === f.toLowerCase()) || f);
      const ownLower = new Set(actualOwnFlights.map(f => f.toLowerCase()));
      const otherFlightNames = Object.keys(grouped).filter(f => !ownLower.has(f.toLowerCase())).sort();

      contentEl.innerHTML = `
        ${actualOwnFlights.map(flight => `<div id="own-flight-section-${esc(flightDomId(flight))}" style="margin-bottom: var(--space-6);"></div>`).join("")}
        ${otherFlightNames.length ? `
          <h3 style="margin-top: var(--space-6); margin-bottom: var(--space-3); font-size: var(--fs-sm); text-transform: uppercase; letter-spacing: var(--tracking-wide); color: var(--ink-600);">Other Flights</h3>
          <div class="flight-grid">
            ${otherFlightNames.map(flight => `
              <button class="flight-tile" data-flight="${esc(flight)}">
                <span class="flight-tile__name">${esc(flight)}</span>
                <span class="flight-tile__count">${cadetCount(grouped[flight])} cadet${cadetCount(grouped[flight]) === 1 ? "" : "s"}</span>
              </button>
            `).join("")}
          </div>
        ` : ""}
      `;

      actualOwnFlights.forEach(flight => {
        renderFlightDetail(rows, flight, { showBack: false, container: document.getElementById(`own-flight-section-${flightDomId(flight)}`) });
      });

      contentEl.querySelectorAll(".flight-tile").forEach(tile => {
        tile.addEventListener("click", () => {
          selectedFlight = tile.dataset.flight;
          render(allRows);
        });
      });
      Shell.animateIn(contentEl);
    }

    /**
     * Names are never shown until a specific flight tile is clicked (or,
     * for a single-flight position, that flight IS the default view —
     * see renderDefaultView/primaryFlight above) — search results still
     * only ever surface flight-level tiles with counts, never a flat
     * list of cadets.
     */
    function render(rows) {
      // Reveal the search toolbar (hidden by default in the static HTML —
      // see its style="display:none") now that there's actually a roster
      // to search. Idempotent — harmless to set on every render.
      toolbarEl.style.display = "";
      if (selectedFlight) {
        renderFlightDetail(rows, selectedFlight);
      } else {
        renderDefaultView(rows);
      }
    }

    function applyFilter() {
      const q = searchInput.value.trim();

      if (!q) {
        selectedFlight = null;
        render(allRows);
        return;
      }

      // A search query jumps straight to matching cadets/flights, but
      // still surfaces results grouped as flight tiles rather than
      // exposing names directly — clicking a tile still requires a
      // second click to see the members inside it. Name matching goes
      // through Shell.rosterNameMatches so "First Last", "Last, First",
      // and a partial of either name alone all work — not just a plain
      // substring of the combined display string.
      selectedFlight = null;
      const qLower = q.toLowerCase();
      const filtered = allRows.filter(m =>
        Shell.rosterNameMatches(m, q) ||
        String(m.CapId).toLowerCase().includes(qLower) ||
        String(m.Flight).toLowerCase().includes(qLower)
      );
      renderFlightGrid(filtered);
    }

    // ---- Roster row writes: never leak the computed .Name field (see
    // Shell.normalizeRosterRows) back into a write — the Roster sheet has
    // no Name column, and the worker auto-creates any new header key it
    // sees in a write payload, so writing an object that still has .Name
    // on it would silently add a spurious "Name" column to the sheet. ----

    const ROSTER_FIELDS = ["CapId", "FirstName", "LastName", "Rank", "Flight", "Age", "Sex", "Role", "Wingman", "Room"];

    function toRosterRow(row) {
      const out = {};
      ROSTER_FIELDS.forEach(f => { out[f] = row[f] != null ? row[f] : ""; });
      return out;
    }

    /** Writes one roster row (stripped to real columns) and reconciles allRows/Api's cache with the optimistic result — the shared save path for leadership/wingman/room changes below. Does NOT re-render; call render(allRows) after the caller's own batch of changes settles. */
    function persistRosterRow(row) {
      const payload = toRosterRow(row);
      Api.writeRow("Roster", payload, { matchColumn: "CapId" });
      const idx = allRows.findIndex(r => String(r.CapId) === String(row.CapId));
      const withName = { ...payload, Name: Shell.cadetDisplayName(payload) };
      if (idx >= 0) allRows[idx] = withName; else allRows.push(withName);
    }

    /**
     * Reconciles Api's SHARED cache (read by every other page, and by
     * global search) with allRows after a local write — same purpose as
     * every other page's own Api.setCachedRows call, EXCEPT this one
     * strips the computed .Name field back off first (via toRosterRow)
     * before caching. Api's cache is meant to be a faithful mirror of
     * what the server actually has; caching allRows verbatim would leak
     * .Name into it permanently, and every subsequent read of that
     * cached copy would carry a "Name" field the server never sent and
     * doesn't recognize as a real column.
     */
    function syncRosterCache() {
      Api.setCachedRows("Roster", allRows.map(toRosterRow));
    }

    /**
     * Room assignment — open to ANY signed-in position (no edit-roster,
     * no flight scoping), unlike everything else Roster writes. Skips
     * the write entirely if the value didn't actually change (e.g. the
     * field was merely focused and blurred), same "don't write a no-op"
     * discipline as the rest of the app's optimistic writes.
     *
     * Unlike persistRosterRow (used for leadership/wingman), this AWAITS
     * the real server round-trip ({ optimistic: false }) instead of
     * firing-and-forgetting. Room is a plain text field someone might
     * type into and never revisit, so a failed write needs to be
     * impossible to miss — with the normal optimistic path, a rejected
     * write only shows up as a quiet change to the header's sync
     * indicator (see js/api.js), never a toast, so it would look saved
     * (the input still shows what was typed) right up until a reload
     * silently reverted it. Awaiting here means a failure surfaces
     * immediately as an error toast AND visibly reverts the input back
     * to the last known-saved value, instead of leaving a phantom value
     * on screen that was never actually persisted.
     */
    async function saveRoomAssignment(capId, room, inputEl) {
      const idx = allRows.findIndex(r => String(r.CapId) === String(capId));
      if (idx < 0) return;
      const current = allRows[idx];
      const previousRoom = current.Room || "";
      if (String(previousRoom) === String(room || "")) return;

      const payload = toRosterRow({ ...current, Room: room });
      try {
        await Api.writeRow("Roster", payload, { matchColumn: "CapId", optimistic: false });
      } catch (err) {
        if (inputEl) inputEl.value = previousRoom;
        Shell.showToast(err.message || "Couldn't save that room number.", { type: "error" });
        return;
      }

      const withName = { ...payload, Name: Shell.cadetDisplayName(payload) };
      allRows[idx] = withName;
      syncRosterCache();
      Shell.showToast("Room updated.", { type: "success" });
    }

    /**
     * Creates/edits (existingGroupId set) or disbands (selectedCapIds
     * empty) a wingman team: every member's Wingman column becomes the
     * shared group id, and anyone who was in this group but got
     * unchecked has theirs cleared. groupId is a fresh id the first time
     * a team is created, then stays stable across edits.
     */
    function saveWingmanGroup(flight, existingGroupId, selectedCapIds) {
      const groupId = existingGroupId || `wg_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
      const members = groupByFlight(allRows)[flight] || [];
      const selectedSet = new Set(selectedCapIds.map(String));

      members.forEach(m => {
        const cap = String(m.CapId);
        const currentGroup = String(m.Wingman || "").trim();
        const shouldBeInGroup = selectedSet.has(cap);
        const wasInThisGroup = existingGroupId && currentGroup === existingGroupId;

        if (shouldBeInGroup && currentGroup !== groupId) {
          persistRosterRow({ ...m, Wingman: groupId });
        } else if (!shouldBeInGroup && wasInThisGroup) {
          persistRosterRow({ ...m, Wingman: "" });
        }
      });

      syncRosterCache();
      wingmanPicker = null;
      wingmanSelection.clear();
      Shell.showToast(selectedCapIds.length ? "Wingman team saved." : "Wingman team disbanded.", { type: "success" });
      render(allRows);
    }

    // ---- Add / edit / delete ----

    function openForm(student, flightContext) {
      editingCapId = student ? String(student.CapId) : null;

      formContainer.innerHTML = `
        <div class="card" style="margin-bottom: var(--space-5);">
          <h3 class="section-label">
            ${student ? "Edit Cadet" : "Add Cadet"}
          </h3>
          <div class="roster-form">
            <div class="field"><label for="f-capid">CAP ID</label><input id="f-capid" value="${esc(student?.CapId || "")}" ${student ? "readonly" : ""}></div>
            <div class="field"><label for="f-first">First Name</label><input id="f-first" value="${esc(student?.FirstName || "")}"></div>
            <div class="field"><label for="f-last">Last Name</label><input id="f-last" value="${esc(student?.LastName || "")}"></div>
            <div class="field"><label for="f-rank">Rank</label><input id="f-rank" value="${esc(student?.Rank || "")}"></div>
            <div class="field"><label for="f-flight">Flight</label><input id="f-flight" value="${esc(student?.Flight || flightContext || "")}"></div>
            <div class="field"><label for="f-age">Age</label><input id="f-age" type="number" min="10" max="18" value="${esc(student?.Age || "")}"></div>
            <div class="field">
              <label for="f-sex">Sex</label>
              <select id="f-sex">
                <option value="" ${!student?.Sex ? "selected" : ""}>—</option>
                <option value="M" ${student?.Sex === "M" ? "selected" : ""}>Male</option>
                <option value="F" ${student?.Sex === "F" ? "selected" : ""}>Female</option>
              </select>
            </div>
            <div class="roster-form-actions">
              <button class="btn btn--primary" id="save-cadet-btn">Save</button>
              <button class="btn btn--ghost" id="cancel-cadet-btn">Cancel</button>
            </div>
          </div>
        </div>
      `;

      document.getElementById("cancel-cadet-btn").addEventListener("click", closeForm);
      document.getElementById("save-cadet-btn").addEventListener("click", saveStudent);
      formContainer.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function closeForm() {
      editingCapId = null;
      formContainer.innerHTML = "";
    }

    /**
     * Optimistic save: updates allRows and re-renders INSTANTLY, then
     * fires the real write in the background. See the sync indicator
     * in the header for whether it actually landed — this function
     * doesn't wait to find out before showing success.
     *
     * Role and Wingman aren't on this form at all. Role has no in-app
     * editor at all (see renderLeadershipSlot) — it's set directly in
     * the Roster sheet. Wingman is managed exclusively through the
     * wingman picker (saveWingmanGroup above), which enforces "only in
     * one team at a time" and is permission-scoped differently (a
     * flight profile, not necessarily edit-roster — see
     * assertRosterWriteAccess in worker/src/index.js). Editing an
     * existing row here preserves whatever Role/Wingman it already has
     * (see the ...existing spread below).
     */
    function saveStudent() {
      const existing = editingCapId ? allRows.find(r => String(r.CapId) === editingCapId) : null;
      const row = {
        ...(existing ? toRosterRow(existing) : {}),
        CapId: document.getElementById("f-capid").value.trim(),
        FirstName: document.getElementById("f-first").value.trim(),
        LastName: document.getElementById("f-last").value.trim(),
        Rank: document.getElementById("f-rank").value.trim(),
        Flight: document.getElementById("f-flight").value.trim(),
        Age: document.getElementById("f-age").value.trim(),
        Sex: document.getElementById("f-sex").value.trim()
      };

      if (!row.CapId || (!row.FirstName && !row.LastName)) {
        Shell.showToast("CAP ID and at least a first or last name are required.", { type: "error" });
        return;
      }

      // Adding new: block a duplicate CapId client-side (the backend
      // would otherwise just append a second row with the same id,
      // since matchColumn only updates-in-place for an EXISTING match).
      if (!editingCapId && allRows.some(r => String(r.CapId).toLowerCase() === row.CapId.toLowerCase())) {
        Shell.showToast("A cadet with that CAP ID already exists.", { type: "error" });
        return;
      }

      persistRosterRow(row);
      // Reconcile Api's cache with this optimistic result immediately —
      // writeRow() only marks the sheet's cache stale, it doesn't know
      // what the new rows look like. Without this, the next background
      // revalidation fetches the server's (now actually updated) rows,
      // sees them differ from the stale pre-write cache, and re-fires
      // this page's onFresh subscriber — a second render()/animateIn()
      // replaying the entrance animation right after this save's own.
      syncRosterCache();

      closeForm();
      Shell.showToast(editingCapId ? "Cadet updated." : "Cadet added.", { type: "success" });
      render(allRows);
    }

    async function deleteStudent(student) {
      if (!student) return;
      const confirmed = await Shell.confirm({
        title: "Remove cadet?",
        message: `Remove ${esc(student.Name || student.CapId)} from the roster? This does not delete their inspection history.`,
        confirmLabel: "Remove",
      });
      if (!confirmed) return;

      Api.deleteRow("Roster", student, { matchColumn: "CapId" });
      allRows = allRows.filter(r => r !== student);
      syncRosterCache();
      Shell.showToast("Cadet removed.", { type: "success" });
      render(allRows);
    }

    /**
     * Instant-then-revalidate load: shows cached Roster data right away
     * if this page has fetched it before this session, while quietly
     * refetching in the background and re-rendering only if something
     * changed. First-ever load still shows the spinner briefly, same
     * as before — there's no cache yet to show instantly.
     */
    function load() {
      const { data: cached, ready } = Api.getSheetCached("Roster", (fresh) => {
        allRows = Shell.normalizeRosterRows(fresh.rows || []);
        render(allRows);
      });

      if (cached) {
        allRows = Shell.normalizeRosterRows(cached.rows || []);
        selectedFlight = null;
        render(allRows);
      } else {
        contentEl.innerHTML = `<div class="state-message"><div class="spinner"></div><p>Loading roster…</p></div>`;
      }

      return ready.then((data) => {
        allRows = Shell.normalizeRosterRows(data.rows || []);
        if (!cached) { selectedFlight = null; render(allRows); }
      }).catch((err) => {
        if (!cached) {
          contentEl.innerHTML = `
            <div class="state-message">
              <div class="state-message__icon">⚠️</div>
              <p>${err.message}</p>
            </div>`;
        }
        Shell.showToast(err.message, { type: "error" });
      });
    }

    searchInput.addEventListener("input", applyFilter);
    Shell.registerRefresh(load);

    // Export the full roster. Lead with the common identity columns —
    // Name first (the combined "LastName, FirstName" display string,
    // same as before) followed by the FirstName/LastName it's built
    // from, then any additional columns present in the data (Role,
    // Wingman among them).
    Shell.registerExport(() => {
      const lead = ["Name", "FirstName", "LastName", "CapId", "Rank", "Flight", "Age", "Sex", "Room"];
      const extra = Array.from(allRows.reduce((set, r) => {
        Object.keys(r || {}).forEach(k => { if (!lead.includes(k)) set.add(k); });
        return set;
      }, new Set()));
      return {
        filename: `roster-${new Date().toISOString().slice(0, 10)}.csv`,
        columns: [...lead, ...extra],
        rows: allRows
      };
    });

    load();
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register(`${window.APP_BASE_PATH}service-worker.js`);
    }
  </script>
</body>
</html>
