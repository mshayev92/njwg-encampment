<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roster — NJWG CAP Encampment</title>
  <meta name="theme-color" content="#0b2545">
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../icons/icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/app.css">

  <style>
    .roster-toolbar {
      display: flex;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
      flex-wrap: wrap;
      align-items: center;
    }
    .roster-toolbar input {
      flex: 1;
      min-width: 200px;
      font-family: var(--font-body);
      font-size: var(--fs-sm);
      padding: var(--space-3);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--surface);
    }

    /* Flight tile grid — shown before a flight is selected */
    .flight-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: var(--space-4);
    }

    .flight-tile {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      cursor: pointer;
      text-align: left;
      box-shadow: var(--shadow-sm);
      transition: border-color var(--duration-fast) var(--ease-standard),
                  transform var(--duration-fast) var(--ease-standard);
      font-family: inherit;
    }

    .flight-tile:hover {
      border-color: var(--gold-500);
      transform: translateY(-2px);
    }

    .flight-tile__name {
      display: block;
      font-family: var(--font-display);
      font-size: var(--fs-md);
      color: var(--navy-900);
      margin-bottom: var(--space-2);
    }

    .flight-tile__count {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      font-size: var(--fs-xs);
      color: var(--ink-600);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
    }

    /* Detail view header — shown once a flight is selected */
    .flight-detail-header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
    }

    .flight-detail-header h2 {
      font-size: var(--fs-lg);
      color: var(--navy-900);
      margin: 0;
    }
  </style>
</head>
<body>

  <div class="app-shell">
    <nav class="nav-rail" id="nav-rail"></nav>
    <header class="app-header" id="app-header"></header>
    <div class="duty-strip" id="duty-strip"></div>

    <main class="app-main">
      <div class="page-header">
        <div>
          <span class="page-header__eyebrow">Cadre Tools</span>
          <h1>Roster</h1>
        </div>
        <button class="btn btn--ghost" id="refresh-btn">Refresh</button>
      </div>

      <div class="roster-toolbar">
        <input type="search" id="roster-search" placeholder="Search by name, CAP ID, or flight…">
      </div>

      <div id="roster-content">
        <div class="state-message">
          <div class="spinner"></div>
          <p>Loading roster…</p>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/shell.js"></script>
  <script>
    Shell.init({ activePage: "roster" });

    const contentEl = document.getElementById("roster-content");
    const refreshBtn = document.getElementById("refresh-btn");
    const searchInput = document.getElementById("roster-search");

    let allRows = [];
    // Null = showing the flight tile grid. A string = showing that
    // flight's member list ("Unassigned" for rows with no Flight value).
    let selectedFlight = null;

    function groupByFlight(rows) {
      return rows.reduce((groups, row) => {
        const flight = row.Flight || "Unassigned";
        (groups[flight] = groups[flight] || []).push(row);
        return groups;
      }, {});
    }

    function renderFlightGrid(rows) {
      const grouped = groupByFlight(rows);
      const flightNames = Object.keys(grouped).sort();

      if (!flightNames.length) {
        contentEl.innerHTML = `
          <div class="state-message">
            <div class="state-message__icon">👥</div>
            <p>No roster entries yet.</p>
          </div>`;
        return;
      }

      contentEl.innerHTML = `
        <div class="flight-grid">
          ${flightNames.map(flight => `
            <button class="flight-tile" data-flight="${flight}">
              <span class="flight-tile__name">${flight}</span>
              <span class="flight-tile__count">${grouped[flight].length} cadet${grouped[flight].length === 1 ? "" : "s"}</span>
            </button>
          `).join("")}
        </div>`;

      contentEl.querySelectorAll(".flight-tile").forEach(tile => {
        tile.addEventListener("click", () => {
          selectedFlight = tile.dataset.flight;
          render(allRows);
        });
      });
    }

    function renderFlightDetail(rows, flight) {
      const members = rows.filter(m => (m.Flight || "Unassigned") === flight);

      contentEl.innerHTML = `
        <div class="flight-detail-header">
          <button class="btn btn--ghost" id="back-to-flights-btn">← Back</button>
          <h2>${flight}</h2>
        </div>
        ${members.length ? `
          <div class="card" style="padding: 0; overflow-x: auto;">
            <table class="data-table">
              <thead>
                <tr><th>CAP ID</th><th>Name</th><th>Rank</th></tr>
              </thead>
              <tbody>
                ${members.map(m => `
                  <tr>
                    <td data-label="CAP ID" class="mono">${m.CapId || "—"}</td>
                    <td data-label="Name">${m.Name || "—"}</td>
                    <td data-label="Rank">${m.Rank || "—"}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        ` : `
          <div class="state-message">
            <div class="state-message__icon">👥</div>
            <p>No cadets in this flight.</p>
          </div>
        `}
      `;

      const backBtn = document.getElementById("back-to-flights-btn");
      if (backBtn) {
        backBtn.addEventListener("click", () => {
          selectedFlight = null;
          searchInput.value = "";
          render(allRows);
        });
      }
    }

    /**
     * Names are never shown until a specific flight tile is clicked —
     * the initial view (and the view after searching) only ever shows
     * flight-level tiles with counts, never a flat list of cadets.
     */
    function render(rows) {
      if (selectedFlight) {
        renderFlightDetail(rows, selectedFlight);
      } else {
        renderFlightGrid(rows);
      }
    }

    function applyFilter() {
      const q = searchInput.value.trim().toLowerCase();

      if (!q) {
        selectedFlight = null;
        render(allRows);
        return;
      }

      // A search query jumps straight to matching cadets/flights, but
      // still surfaces results grouped as flight tiles rather than
      // exposing names directly — clicking a tile still requires a
      // second click to see the members inside it.
      selectedFlight = null;
      const filtered = allRows.filter(m =>
        String(m.Name).toLowerCase().includes(q) ||
        String(m.CapId).toLowerCase().includes(q) ||
        String(m.Flight).toLowerCase().includes(q)
      );
      renderFlightGrid(filtered);
    }

    async function load() {
      contentEl.innerHTML = `<div class="state-message"><div class="spinner"></div><p>Loading roster…</p></div>`;
      try {
        const data = await Api.getSheet("Roster");
        allRows = data.rows || [];
        selectedFlight = null;
        render(allRows);
      } catch (err) {
        contentEl.innerHTML = `
          <div class="state-message">
            <div class="state-message__icon">⚠️</div>
            <p>${err.message}</p>
          </div>`;
        Shell.showToast(err.message, { type: "error" });
      }
    }

    refreshBtn.addEventListener("click", load);
    searchInput.addEventListener("input", applyFilter);
    load();
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register(`${window.APP_BASE_PATH}service-worker.js`);
    }
  </script>
</body>
</html>
