<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    // Applied synchronously, before first paint, so a collapsed sidebar
    // renders at its collapsed width immediately instead of flashing
    // open at the default width for a frame and visibly animating shut
    // once js/shell.js runs (see .nav-rail-collapsed in css/app.css).
    // The theme read right after does the same job for dark mode:
    // resolve njwg_theme (light/dark/system) and set data-theme on <html>
    // BEFORE tokens.css is even requested, so a dark-mode device never
    // flashes the light palette for a frame first (see the
    // :root[data-theme="dark"] block in css/tokens.css, and
    // initThemeWatcher_ in js/shell.js for what keeps this in sync for
    // the rest of the page's life, including a live OS theme change).
    try {
      if (localStorage.getItem("njwg_nav_collapsed") === "true") {
        document.documentElement.classList.add("nav-rail-collapsed");
      }
    } catch (e) { /* storage unavailable — falls back to expanded */ }
    try {
      var njwgThemePref = localStorage.getItem("njwg_theme") || "system";
      var njwgThemeResolved = njwgThemePref === "system"
        ? (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
        : njwgThemePref;
      document.documentElement.setAttribute("data-theme", njwgThemeResolved);
    } catch (e) { document.documentElement.setAttribute("data-theme", "light"); }
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/app.css">

  <style>
    /* One consistent gap between every top-level section (weather,
       activity, flights) via flex `gap` — previously the weather grid
       used its own margin-bottom (--space-5) while the cards below it
       relied on .card + .card's margin-top (--space-4), so the gap
       under the weather card didn't match the gap between the cards
       following it. */
    .overview-stack {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }
    .overview-stack .card + .card {
      margin-top: 0;
    }

    .overview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: var(--space-4);
    }

    /* ---- Welcome card: a time-of-day "scene" (gradient sky + sun/moon/
       stars/clouds), purely CSS — no images or network calls, so it
       never has anything to fail/load and matches every other card's
       instant-from-cache render timing. Recomputed on the SAME 60s
       interval Overview already uses for Now/Next, so it naturally
       transitions from one scene to the next as real time passes while
       the tab stays open. */
    .welcome-card {
      position: relative;
      overflow: hidden;
      isolation: isolate;
      min-height: 128px;
      display: flex;
      align-items: center;
    }

    .welcome-card__scene {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .welcome-card__content {
      position: relative;
      z-index: 1;
    }

    .welcome-card__greeting {
      font-family: var(--font-display);
      font-size: var(--fs-sm);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wider);
      opacity: 0.85;
    }

    .welcome-card__position {
      font-family: var(--font-display);
      font-size: var(--fs-2xl);
      margin-top: var(--space-1);
    }

    .welcome-card__stars {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(1.5px 1.5px at 20% 25%, #fff, transparent),
        radial-gradient(1.5px 1.5px at 40% 55%, #fff, transparent),
        radial-gradient(1px 1px at 60% 15%, #fff, transparent),
        radial-gradient(1px 1px at 75% 40%, #fff, transparent),
        radial-gradient(1.5px 1.5px at 85% 65%, #fff, transparent),
        radial-gradient(1px 1px at 30% 75%, #fff, transparent),
        radial-gradient(1px 1px at 10% 50%, #fff, transparent),
        radial-gradient(1px 1px at 90% 25%, #fff, transparent);
      opacity: 0.9;
    }

    /* Dawn (5-8am): soft sunrise pink/orange fading to pale morning blue. */
    .welcome-card--dawn { background: linear-gradient(180deg, #ffd9a0 0%, #ffb199 40%, #8ec5e8 100%); color: #3a2410; }
    /* Day (8am-5pm): bright clear sky. */
    .welcome-card--day { background: linear-gradient(180deg, #4fa8e0 0%, #bfe3f7 100%); color: #103050; }
    /* Dusk (5-8pm): sunset gradient, warm orange over deep purple. */
    .welcome-card--dusk { background: linear-gradient(180deg, #33245f 0%, #b3466b 55%, #ff9d5c 100%); color: #fff3e6; }
    /* Night (8pm-5am): deep indigo, echoing the app's own nav-rail palette. */
    .welcome-card--night { background: linear-gradient(180deg, #0d1250 0%, #1a2470 100%); color: #f4f4fb; }

    /* ---- Weather graphics ----
       Each condition is drawn as its OWN little illustrated scene on top
       of the time-of-day sky gradient — a rayed sun, a crescent moon,
       puffy clouds, an overcast cloud bank, angled rain, a lightning
       bolt, drifting fog bands (see renderWelcomeCard for how they're
       composed per condition). These are actual CSS-drawn elements, not
       tint overlays: the sky keeps its dawn/day/dusk/night color and the
       weather sits on top as recognizable shapes. No snow scene — this is
       a summer encampment, so those NWS icon codes never map to one (see
       weatherConditionBucket). Everything is pure CSS, so nothing here
       loads or can fail; a device with no weather data just draws the
       clear-sky scene (sun by day, crescent moon + stars by night). */

    /* Sun with slowly-rotating rays (clear + partly-cloudy days). The
       disc is a radial-gradient; the rays are a conic-gradient masked to
       a thin ring just outside it, so they read as discrete spokes. */
    .wx-sun {
      position: absolute;
      right: 56px; top: 24px;
      width: 56px; height: 56px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 34%, #fff7d4 0%, #ffd63f 58%, #ffbf1c 100%);
      box-shadow: 0 0 30px 8px rgba(255, 210, 80, 0.5);
    }
    .wx-sun::before {
      content: "";
      position: absolute;
      inset: -19px;
      border-radius: 50%;
      background: repeating-conic-gradient(from 0deg, rgba(255, 216, 96, 0.95) 0deg 2.6deg, transparent 2.6deg 30deg);
      -webkit-mask: radial-gradient(circle, transparent 50%, #000 53%, #000 63%, transparent 70%);
              mask: radial-gradient(circle, transparent 50%, #000 53%, #000 63%, transparent 70%);
      animation: wx-spin 70s linear infinite;
    }
    @keyframes wx-spin { to { transform: rotate(360deg); } }

    /* Crescent moon (clear + partly-cloudy nights) — the lit crescent is
       carved by an inset box-shadow, so it needs no sky-colored cut-out
       and stays correct on any scene. */
    .wx-moon {
      position: absolute;
      right: 60px; top: 26px;
      width: 44px; height: 44px;
      border-radius: 50%;
      box-shadow: inset -13px -6px 0 0 #eef1fb, 0 0 24px 6px rgba(230, 235, 255, 0.4);
    }

    /* Puffy cloud: a rounded body plus two circular lobes on top. The
       fill is a variable so the lobes (::before/::after) always match
       whatever a condition modifier sets. */
    .wx-cloud {
      --cloud-fill: #ffffff;
      position: absolute;
      width: 90px; height: 27px;
      background: var(--cloud-fill);
      border-radius: 28px;
      filter: drop-shadow(0 6px 10px rgba(40, 50, 90, 0.16));
    }
    .wx-cloud::before, .wx-cloud::after {
      content: ""; position: absolute; background: var(--cloud-fill); border-radius: 50%;
    }
    .wx-cloud::before { width: 43px; height: 43px; left: 13px; top: -21px; }
    .wx-cloud::after  { width: 29px; height: 29px; right: 15px; top: -13px; }
    .wx-cloud--gray  { --cloud-fill: #d6dbe8; }
    .wx-cloud--rain  { --cloud-fill: #aab3c9; }
    .wx-cloud--storm { --cloud-fill: #6a7290; }

    /* Soft overcast sky mass behind the puffy clouds (cloudy/rain/storm):
       a blurred elliptical gradient, not a flat rectangle, so the sky
       reads as "socked in" without a sticker-like tint box. */
    .wx-cloudbank {
      position: absolute;
      right: -30px; top: -30px;
      width: 330px; height: 148px;
      border-radius: 50%;
      filter: blur(14px);
      opacity: 0.92;
    }
    .wx-cloudbank--gray  { background: radial-gradient(ellipse at 62% 42%, rgba(214, 219, 232, 0.95) 0%, rgba(214, 219, 232, 0) 70%); }
    .wx-cloudbank--rain  { background: radial-gradient(ellipse at 62% 42%, rgba(150, 160, 184, 0.95) 0%, rgba(150, 160, 184, 0) 70%); }
    .wx-cloudbank--storm { background: radial-gradient(ellipse at 62% 42%, rgba(70, 78, 104, 0.97) 0%, rgba(70, 78, 104, 0) 72%); }

    /* Angled rain streaks (rain + storm), falling from beneath the cloud
       cluster on the right. */
    .wx-rain { position: absolute; right: 22px; top: 72px; width: 150px; height: 52px; overflow: hidden; }
    .wx-rain__drop {
      position: absolute; top: 0;
      width: 2px; height: 12px; border-radius: 2px;
      background: linear-gradient(180deg, transparent, rgba(196, 224, 255, 0.9));
      animation: wx-rain-fall linear infinite;
    }
    @keyframes wx-rain-fall {
      0% { transform: translate(0, -14px) rotate(12deg); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translate(11px, 52px) rotate(12deg); opacity: 0; }
    }

    /* Lightning bolt (storm) — always drawn (so a glance always reads
       "storm"), with a periodic bright glow-flash rather than blinking
       in and out of existence. */
    .wx-bolt {
      position: absolute; right: 92px; top: 60px;
      width: 24px; height: 38px;
      background: linear-gradient(180deg, #fff1a8 0%, #ffcf3a 100%);
      clip-path: polygon(58% 0%, 16% 54%, 44% 54%, 30% 100%, 84% 40%, 56% 40%);
      animation: wx-bolt-flash 4.5s ease-in-out infinite;
    }
    @keyframes wx-bolt-flash {
      0%, 84%, 100% { filter: drop-shadow(0 0 4px rgba(255, 206, 70, 0.5)); }
      86% { filter: drop-shadow(0 0 13px rgba(255, 232, 120, 1)); }
      88% { filter: drop-shadow(0 0 3px rgba(255, 206, 70, 0.4)); }
      90% { filter: drop-shadow(0 0 13px rgba(255, 232, 120, 1)); }
    }

    /* Drifting fog/haze bands. */
    .wx-fog { position: absolute; inset: 0; overflow: hidden; }
    .wx-fog__band {
      position: absolute; left: -25%;
      width: 150%; height: 15px; border-radius: 999px;
      background: rgba(228, 232, 240, 0.5);
      filter: blur(5px);
      animation: wx-fog-drift ease-in-out infinite alternate;
    }
    @keyframes wx-fog-drift { from { transform: translateX(-6%); } to { transform: translateX(6%); } }

    .weather-card {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    .weather-card__body {
      display: flex;
      align-items: center;
      gap: var(--space-4);
    }

    /* Black flag now lives inline in the weather card (Overview no
       longer gets a separate full-width banner row — see js/shell.js'
       renderBlackFlagBanner_) since weather/outdoor-activity impact is
       exactly the context black flag status is most relevant to. */
    .weather-card__blackflag {
      background: #000;
      color: #fff;
      border-radius: var(--radius-md);
      padding: var(--space-2) var(--space-3);
      font-family: var(--font-display);
      font-size: var(--fs-xs);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
    }

    .weather-card__temp {
      font-family: var(--font-display);
      font-size: var(--fs-3xl);
      color: var(--heading);
    }

    .weather-card__details {
      font-size: var(--fs-sm);
      color: var(--ink-600);
    }

    .weather-card__location {
      font-size: var(--fs-xs);
      color: var(--ink-600);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      margin-bottom: var(--space-1);
    }

    .activity-row {
      display: flex;
      align-items: baseline;
      gap: var(--space-3);
      padding: var(--space-3) 0;
    }
    .activity-row + .activity-row { border-top: 1px solid var(--line); }

    .activity-row__label {
      font-family: var(--font-display);
      font-size: var(--fs-2xs);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      color: var(--ink-600);
      width: 56px;
      flex-shrink: 0;
    }

    .activity-row__title {
      font-size: var(--fs-md);
      color: var(--ink-900);
    }

    .activity-row__meta {
      font-size: var(--fs-xs);
      color: var(--ink-600);
    }

    .activity-row--empty .activity-row__title {
      color: var(--ink-600);
      font-size: var(--fs-sm);
    }
  </style>
</head>
<body>

  <div class="app-shell">
    <nav class="nav-rail" id="nav-rail">
      <button type="button" class="nav-rail__crest" id="nav-rail-crest" aria-label="Toggle navigation width">
        <span class="nav-rail__crest-mark"><img src="../icons/icon-192.png" alt="NJWG"></span>
        <span class="nav-rail__crest-text">NJWG<span>Encampment</span></span>
      </button>
      <div id="nav-rail-links"></div>
    </nav>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/shell.js"></script>
    <script>
      // Render the sidebar links as early as physically possible — right
      // after #nav-rail-links exists, rather than waiting for the rest of
      // this page (header, main content, this page's own script) to parse
      // first. Without this, the browser could paint that div empty for a
      // moment before the equivalent call inside Shell.init() below ever
      // ran, making the sidebar visibly flash empty on every navigation
      // between pages. Shell.init() still owns auth-gating/redirects and
      // skips re-rendering the nav since this already ran.
      Shell.renderNav("overview");
    </script>

    <header class="app-header" id="app-header"></header>

    <main class="app-main">
      <div id="page-content">
        <div class="state-message">
          <div class="spinner"></div>
          <p>Loading overview…</p>
        </div>
      </div>
    </main>
  </div>

  <script>
    Shell.init({ activePage: "overview" });

    const contentEl = document.getElementById("page-content");
    const session = Auth.getSession();
    const esc = Shell.escapeHtml;
    const allowedFlights = (session && Array.isArray(session.Flights)) ? session.Flights : [];

    function isFlightAllowed(flight) {
      return Shell.flightMatchesAudience(allowedFlights, flight);
    }

    /**
     * The National Weather Service API (api.weather.gov) is a two-step
     * lookup: /points/{lat},{lon} resolves a lat/lon into the gridpoint
     * forecast endpoint for that location, then that endpoint's first
     * period is the current/upcoming-hour conditions. Both calls share
     * the same abort timeout budget below so a hang on either leg still
     * lets the page settle.
     */
    async function fetchWeather() {
      const lat = window.APP_CONFIG.WEATHER_LAT;
      const lon = window.APP_CONFIG.WEATHER_LON;
      // A bare fetch() to a third-party service can hang indefinitely on a
      // flaky connection or captive portal, and it never settles. Because
      // the WHOLE page render is gated behind weatherLoaded (set only in
      // fetchWeather's .finally below), a hang there would leave Overview —
      // the default landing page — stuck on its loading spinner forever.
      // Abort after 8s so the promise always settles and the page renders
      // (weather simply shows "unavailable" if the call didn't come back).
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 8000);
      const headers = { "Accept": "application/geo+json" };
      try {
        const pointsResp = await fetch(`https://api.weather.gov/points/${lat},${lon}`, { signal: controller.signal, headers });
        if (!pointsResp.ok) throw new Error("Weather service unavailable.");
        const points = await pointsResp.json();
        const forecastHourlyUrl = points.properties && points.properties.forecastHourly;
        if (!forecastHourlyUrl) throw new Error("Weather service unavailable.");

        const forecastResp = await fetch(forecastHourlyUrl, { signal: controller.signal, headers });
        if (!forecastResp.ok) throw new Error("Weather service unavailable.");
        const forecast = await forecastResp.json();
        const period = forecast.properties && forecast.properties.periods && forecast.properties.periods[0];
        if (!period) throw new Error("Weather service unavailable.");

        return {
          current: {
            temperatureF: period.temperature,
            shortForecast: period.shortForecast,
            windSpeed: period.windSpeed,
            relativeHumidity: period.relativeHumidity && typeof period.relativeHumidity.value === "number" ? period.relativeHumidity.value : null,
            icon: period.icon || ""
          }
        };
      } finally {
        clearTimeout(timeoutId);
      }
    }

    /**
     * Black flag now renders INLINE in the weather card (weather/outdoor-
     * activity impact is exactly the context it's most relevant to)
     * instead of Overview's old separate full-width banner row — see
     * js/shell.js's renderBlackFlagBanner_, which used to own that
     * banner on a completely independent load pipeline from the rest of
     * this page. Gated behind the SAME "everything's ready" check as
     * every other card here (see blackFlagLoaded below), so it settles
     * in the same visual beat instead of popping in on its own.
     */
    function renderWeatherCard(weather, blackFlagStatus) {
      const blackFlagActive = !!(blackFlagStatus && (blackFlagStatus.Active === true || blackFlagStatus.Active === "TRUE" || blackFlagStatus.Active === "true"));
      const blackFlagHtml = blackFlagActive
        ? `<div class="weather-card__blackflag">⚑ Black Flag — outdoor activity restricted</div>`
        : "";

      if (!weather || !weather.current) {
        return `
          <div class="card weather-card">
            ${blackFlagHtml}
            <div class="weather-card__body">
              <div>
                <div class="weather-card__location">${window.APP_CONFIG.WEATHER_LOCATION_NAME}</div>
                <div class="weather-card__details">Weather unavailable right now.</div>
              </div>
            </div>
          </div>`;
      }

      const c = weather.current;
      const label = c.shortForecast || "—";
      const humidityText = c.relativeHumidity !== null ? `Humidity ${Math.round(c.relativeHumidity)}% · ` : "";
      return `
        <div class="card weather-card">
          ${blackFlagHtml}
          <div class="weather-card__body">
            <div class="weather-card__temp">${Math.round(c.temperatureF)}°F</div>
            <div>
              <div class="weather-card__location">${window.APP_CONFIG.WEATHER_LOCATION_NAME}</div>
              <div class="weather-card__details">${label} · ${humidityText}Wind ${c.windSpeed || "—"}</div>
            </div>
          </div>
        </div>
      `;
    }

    /**
     * Which of the four CSS "scenes" (see .welcome-card--dawn/day/dusk/
     * night above) matches the device's current local time.
     */
    function timeOfDayScene() {
      const hour = new Date().getHours();
      if (hour >= 5 && hour < 8) return "dawn";
      if (hour >= 8 && hour < 17) return "day";
      if (hour >= 17 && hour < 20) return "dusk";
      return "night";
    }

    /**
     * Buckets an NWS forecast icon (e.g. ".../icons/land/day/tsra,40?size=medium")
     * down to one of six drawn weather scenes: clear, partly (partly
     * cloudy), cloudy (overcast), fog, rain, storm. NWS icon URLs encode
     * the condition as the last path segment before the query string, an
     * optional "wind_" prefix, and an optional ",<percent>" chance suffix
     * — strip both to get the bare condition code. No weather data yet/at
     * all (fetchWeather failed, or hasn't resolved) reads the same as a
     * clear sky — the welcome card enhances the time-of-day scene with
     * current conditions, never blocks or degrades it when weather is
     * unavailable.
     */
    function weatherConditionBucket(weather) {
      const icon = weather && weather.current ? weather.current.icon : null;
      if (!icon) return "clear";
      const segments = icon.split("?")[0].split("/");
      const raw = (segments[segments.length - 1] || "").split(",")[0];
      const code = raw.replace(/^wind_/, "");
      if (["tsra", "tsra_sct", "tsra_hi"].includes(code)) return "storm";
      if (["fog", "haze", "dust", "smoke"].includes(code)) return "fog";
      // Rain, drizzle, and mixed-precip codes all draw the rain scene. The
      // snow codes are folded in here too purely as a defensive fallback:
      // this is a summer encampment so they shouldn't occur, and there's
      // no snow scene — falling precipitation reads far better as rain
      // than as a clear sky if an out-of-season code ever slips through.
      if (["rain", "rain_showers", "rain_showers_hi", "rain_sleet", "rain_snow", "rain_fzra", "sleet", "snow", "blizzard"].includes(code)) return "rain";
      if (["bkn", "ovc"].includes(code)) return "cloudy";
      if (code === "sct") return "partly";
      return "clear"; // skc (clear), few (mostly clear), and anything unrecognized
    }

    // Explicit, hand-placed raindrop positions/timings (across the ~150px
    // rain box that sits under the cloud cluster), so the streaks read as
    // natural rain rather than a uniform grid — same "hand-placed, not
    // generated" approach the clouds themselves use in renderWelcomeCard.
    const WELCOME_RAINDROPS = [
      { left: "8px",   delay: "0s",    duration: "0.72s" },
      { left: "28px",  delay: "0.28s", duration: "0.62s" },
      { left: "48px",  delay: "0.12s", duration: "0.74s" },
      { left: "68px",  delay: "0.4s",  duration: "0.58s" },
      { left: "88px",  delay: "0.05s", duration: "0.68s" },
      { left: "108px", delay: "0.32s", duration: "0.6s" },
      { left: "128px", delay: "0.18s", duration: "0.7s" },
      { left: "18px",  delay: "0.5s",  duration: "0.64s" }
    ];

    /** Sun (day/dawn/dusk) or crescent moon (night) — the "clear sky" element, also reused as the peeking body behind a partly-cloudy scene. */
    function wxSunOrMoon(isNight) {
      return isNight ? `<div class="wx-moon"></div>` : `<div class="wx-sun"></div>`;
    }

    /** A single puffy cloud with an optional fill modifier and inline position. */
    function wxCloud(modifier, style) {
      return `<div class="wx-cloud ${modifier}" style="${style}"></div>`;
    }

    /** The angled rain-streak layer, shared by the rain and storm scenes. */
    function wxRain() {
      return `<div class="wx-rain">${WELCOME_RAINDROPS.map(d =>
        `<div class="wx-rain__drop" style="left:${d.left}; animation-delay:${d.delay}; animation-duration:${d.duration};"></div>`
      ).join("")}</div>`;
    }

    /**
     * Composes the drawn weather scene (the graphics behind the greeting)
     * for one condition, given whether it's currently night. Each branch
     * is its own little illustration — see the .wx-* CSS above.
     */
    function wxSceneGraphics(condition, isNight) {
      const stars = isNight ? `<div class="welcome-card__stars"></div>` : "";
      switch (condition) {
        case "partly":
          return `
            ${stars}
            ${wxSunOrMoon(isNight)}
            ${wxCloud("", "right:26px; top:56px;")}
          `;
        case "cloudy":
          return `
            <div class="wx-cloudbank wx-cloudbank--gray"></div>
            ${wxCloud("wx-cloud--gray", "right:104px; top:52px;")}
            ${wxCloud("", "right:38px; top:30px;")}
          `;
        case "fog":
          return `
            <div class="wx-fog">
              <div class="wx-fog__band" style="top:26%; animation-duration:9s;"></div>
              <div class="wx-fog__band" style="top:45%; animation-duration:12s; animation-delay:-3s;"></div>
              <div class="wx-fog__band" style="top:63%; animation-duration:10s; animation-delay:-6s;"></div>
              <div class="wx-fog__band" style="top:80%; animation-duration:13s; animation-delay:-2s;"></div>
            </div>
          `;
        case "rain":
          return `
            <div class="wx-cloudbank wx-cloudbank--rain"></div>
            ${wxCloud("wx-cloud--gray", "right:116px; top:44px;")}
            ${wxCloud("wx-cloud--rain", "right:44px; top:24px;")}
            ${wxRain()}
          `;
        case "storm":
          return `
            <div class="wx-cloudbank wx-cloudbank--storm"></div>
            ${wxCloud("wx-cloud--storm", "right:116px; top:42px;")}
            ${wxCloud("wx-cloud--storm", "right:44px; top:22px;")}
            ${wxRain()}
            <div class="wx-bolt"></div>
          `;
        case "clear":
        default:
          return `${stars}${wxSunOrMoon(isNight)}`;
      }
    }

    /**
     * "Welcome, {Position}" — its own box at the top of the page, with a
     * purely-CSS scene behind the text: the time-of-day gradient sky
     * (dawn/day/dusk/night) with a drawn illustration of the CURRENT
     * weather on top (sun, crescent moon, clouds, rain, lightning, or
     * fog — see wxSceneGraphics / the .wx-* CSS above), so the card
     * reflects both "when" and "what's it doing outside." Recomputed on
     * the same 60s interval as Now/Next AND whenever fresh weather data
     * lands (see load() below), so it transitions on its own as real
     * time/weather change while the tab stays open.
     */
    function renderWelcomeCard(weather) {
      const scene = timeOfDayScene();
      const condition = weatherConditionBucket(weather);
      const position = (session && (session.Position || session.position)) || "Staff";
      return `
        <div class="card welcome-card welcome-card--${scene} welcome-card--wx-${condition}">
          <div class="welcome-card__scene">
            ${wxSceneGraphics(condition, scene === "night")}
          </div>
          <div class="welcome-card__content">
            <div class="welcome-card__greeting">Welcome</div>
            <div class="welcome-card__position">${esc(position)}</div>
          </div>
        </div>
      `;
    }

    /** One "Now"/"Next" row inside the activity card. */
    function renderActivityRow(label, item) {
      if (!item) {
        return `
          <div class="activity-row activity-row--empty">
            <div class="activity-row__label">${label}</div>
            <div class="activity-row__title">Nothing scheduled</div>
          </div>`;
      }
      const meta = [item.Time, item.Location, item.Flight].filter(Boolean).map(esc).join(" · ");
      return `
        <div class="activity-row">
          <div class="activity-row__label">${label}</div>
          <div>
            <div class="activity-row__title">${esc(item.Activity) || "—"}</div>
            ${meta ? `<div class="activity-row__meta">${meta}</div>` : ""}
          </div>
        </div>`;
    }

    /**
     * "Your Activity Today" — scoped to this position's own Flights
     * (same convention as Your Flights below), so two different
     * positions looking at the same schedule can see two different
     * "current" activities.
     */
    function renderActivityCard(scheduleRows) {
      if (scheduleRows === null) {
        return `<div class="card"><div class="state-message" style="padding: var(--space-4);"><div class="spinner spinner--sm"></div></div></div>`;
      }
      const { current, next } = Shell.currentAndNextScheduleItems(scheduleRows, allowedFlights);
      return `
        <div class="card">
          <h2 class="card-title">Your Activity Today</h2>
          ${renderActivityRow("Now", current)}
          ${renderActivityRow("Next", next)}
        </div>
      `;
    }

    /**
     * "Today's Inspections" — how many of this position's own cadets
     * (same Flight scoping as Your Flights) have been inspected TODAY,
     * for whatever's actually scheduled today. Deliberately just a
     * single day's completion snapshot ("are we on track today?"), not
     * the historical breakdowns/progression charts already on the
     * Inspections page's own Trends tab ("how have we been doing over
     * time?") — different question, so not shown at all when nothing is
     * scheduled today rather than repeating that page's own content.
     */
    function renderInspectionProgressCard(rosterRows, uniformRows, roomRows, ptRows, periods) {
      const todayStr = Shell.todayIso();
      const todaysPeriods = periods.filter(p => p.Date === todayStr);
      if (!todaysPeriods.length) return "";

      const cadets = rosterRows.filter(r => isFlightAllowed(r.Flight) && (String(r.CapId || "").trim() || String(r.Name || "").trim()));
      if (!cadets.length) return "";

      const rowsByCategory = { uniform: uniformRows, room: roomRows, pt: ptRows };

      const sections = todaysPeriods.map(period => {
        const rows = rowsByCategory[period.Category] || [];
        const inspectedCapIds = new Set(rows.filter(r => r.Date === todayStr).map(r => String(r.StudentCapId)));
        const inspectedCount = cadets.filter(c => inspectedCapIds.has(String(c.CapId))).length;
        const pct = Math.round((inspectedCount / cadets.length) * 100);
        const label = period.Category === "room" ? "Room Inspection"
          : period.Category === "pt" ? "Physical Training"
          : `Uniform — ${period.UniformType || "—"}`;
        return `
          <div style="margin-bottom: var(--space-3);">
            <div class="progress__label-row">
              <span>${esc(label)}</span>
              <span>${inspectedCount}/${cadets.length}</span>
            </div>
            <div class="progress"><div class="progress__fill" style="width:${pct}%;"></div></div>
          </div>`;
      }).join("");

      return `
        <div class="card">
          <h2 class="card-title">Today's Inspections</h2>
          ${sections}
        </div>`;
    }

    /**
     * "Observations This Week" — a chronological glance at what's
     * actually been logged lately (scoped to allowed flights), plus a
     * quick positive/concern count. The Observations page's own Trends
     * tab already breaks this down per-student/per-flight — nowhere else
     * shows a plain recent-activity feed across the whole scope, which
     * is what makes this worth having here rather than a duplicate.
     */
    function renderObservationsPulseCard(observationRows) {
      const scoped = observationRows.filter(o => isFlightAllowed(o.Flight));
      if (!scoped.length) {
        return `
          <div class="card">
            <h2 class="card-title">Observations This Week</h2>
            <p style="color: var(--ink-600); margin:0;">No observations logged yet.</p>
          </div>`;
      }

      const weekAgo = Date.now() - 7 * 86400000;
      const thisWeek = scoped.filter(o => new Date(o.Timestamp).getTime() >= weekAgo);
      const positiveCount = thisWeek.filter(o => String(o.Sentiment).toLowerCase() === "positive").length;
      const concernCount = thisWeek.length - positiveCount;

      const recent = [...scoped].sort((a, b) => new Date(b.Timestamp) - new Date(a.Timestamp)).slice(0, 4);

      return `
        <div class="card">
          <h2 class="card-title">Observations This Week</h2>
          <div style="display:flex; gap: var(--space-2); flex-wrap:wrap; margin-bottom: var(--space-4);">
            <span class="badge" style="background: var(--surface-sunken); color: var(--ink-600);">${thisWeek.length} logged</span>
            <span class="badge" style="background: var(--green-100); color: var(--green-600);">${positiveCount} positive</span>
            <span class="badge" style="background: var(--amber-100); color: var(--amber-600);">${concernCount} concern</span>
          </div>
          ${recent.map(o => `
            <div class="activity-row">
              <div class="activity-row__label">${esc(Shell.formatTime(o.Timestamp))}</div>
              <div>
                <div class="activity-row__title">${esc(o.StudentName) || "—"}${o.Tag ? ` — ${esc(o.Tag)}` : ""}</div>
                <div class="activity-row__meta">${esc(o.Flight) || "—"} · ${String(o.Sentiment).toLowerCase() === "positive" ? "Positive" : "Concern"}</div>
              </div>
            </div>
          `).join("")}
        </div>`;
    }

    // Weather and roster come from two independent sources (a live
    // fetch vs. the persisted Api cache) that can resolve at different
    // times — track the latest of each and re-render the combined view
    // whenever either updates, rather than waiting on both together.
    let lastWeather = null;
    let lastRosterRows = null;
    let lastScheduleRows = null;
    let lastUniformRows = null;
    let lastRoomRows = null;
    let lastPtRows = null;
    let lastInspectionPeriods = null;
    let lastObservationRows = null;
    let lastBlackFlagStatus = null;
    // These come from independent sources (Api's sheet cache x7, a
    // direct National Weather Service API fetch) that used to each trigger their OWN
    // renderAll() the moment they landed — so a cold load visibly built
    // itself piece by piece (weather popping in after the rest, in
    // particular), and a warm-cache load could still replay the
    // entrance animation once per piece. These flags gate the FIRST
    // render behind everything being ready, so the page appears once,
    // fully formed, instead of assembling in front of you.
    let rosterLoaded = false;
    let scheduleLoaded = false;
    let weatherLoaded = false;
    let uniformLoaded = false;
    let roomLoaded = false;
    let ptLoaded = false;
    let periodsLoaded = false;
    let observationsLoaded = false;
    let blackFlagLoaded = false;

    function renderAll() {
      if (!rosterLoaded || !scheduleLoaded || !weatherLoaded || !uniformLoaded || !roomLoaded || !ptLoaded || !periodsLoaded || !observationsLoaded || !blackFlagLoaded) {
        contentEl.innerHTML = `<div class="state-message"><div class="spinner"></div><p>Loading overview…</p></div>`;
        return;
      }
      contentEl.innerHTML = `
        <div class="overview-stack">
          ${renderWelcomeCard(lastWeather)}
          <div class="overview-grid">
            ${renderWeatherCard(lastWeather, lastBlackFlagStatus)}
            ${renderActivityCard(lastScheduleRows)}
          </div>
          ${renderInspectionProgressCard(lastRosterRows || [], lastUniformRows || [], lastRoomRows || [], lastPtRows || [], lastInspectionPeriods || [])}
          ${renderObservationsPulseCard(lastObservationRows || [])}
        </div>
      `;
      Shell.animateIn(contentEl);
    }

    function load() {
      // Roster: render instantly from the persisted cache (near-instant
      // on any page after the first, since Shell.init warms it), then
      // silently refresh in the background.
      const { data: cached, ready } = Api.getSheetCached("Roster", (fresh) => {
        lastRosterRows = fresh.rows || [];
        renderAll();
      });

      const rosterHadCache = !!cached;
      if (cached) {
        lastRosterRows = cached.rows || [];
        rosterLoaded = true;
      }

      ready.catch((err) => {
        Shell.showToast(err.message, { type: "error" });
      }).finally(() => {
        // Loaded=true regardless of success/failure — a failed piece
        // shouldn't block the other two from ever appearing; the render
        // functions already tolerate a null/empty array for whichever
        // piece didn't come through.
        rosterLoaded = true;
        // Only render here if this sheet WASN'T already showing from
        // cache — if it was, this settling is just the background
        // revalidation confirming: either the data actually changed
        // (onFresh above already re-rendered) or it didn't (nothing new
        // to show). Without this guard, EVERY background revalidation —
        // even a byte-identical one — replayed renderAll()'s full
        // innerHTML rebuild and Shell.animateIn(), producing a second,
        // spurious "flash" moments after the real reveal on every load.
        if (!rosterHadCache) renderAll();
      });

      // Schedule: same instant-cache pattern, independent of Roster.
      const scheduleHandle = Api.getSheetCached("Schedule", (fresh) => {
        lastScheduleRows = fresh.rows || [];
        renderAll();
      });
      const scheduleHadCache = !!scheduleHandle.data;
      if (scheduleHandle.data) { lastScheduleRows = scheduleHandle.data.rows || []; scheduleLoaded = true; }
      scheduleHandle.ready.catch(() => { /* surfaced by the Schedule page itself if it matters */ }).finally(() => {
        scheduleLoaded = true;
        // See the matching comment on Roster's ready.finally() above.
        if (!scheduleHadCache) renderAll();
      });

      // Weather has no backend cache of its own (it's a direct call to
      // the National Weather Service API, not the Apps Script) — fetched every load, and now
      // gates the first render the same way Roster/Schedule do instead
      // of patching in separately once the other two are already shown.
      fetchWeather().then((w) => { lastWeather = w; }).catch(() => { lastWeather = null; }).finally(() => {
        weatherLoaded = true;
        renderAll();
      });

      // Uniform/Room inspections + inspection periods (for Today's
      // Inspections) and Observations (for Observations This Week) — all
      // four are already in PREFETCH_SHEETS, so this is normally an
      // instant cache hit rather than a fresh network round trip; same
      // instant-cache-then-background-refresh pattern as Roster/Schedule.
      const uniformHandle = Api.getSheetCached("UniformInspections", (fresh) => {
        lastUniformRows = fresh.rows || [];
        renderAll();
      });
      const uniformHadCache = !!uniformHandle.data;
      if (uniformHandle.data) { lastUniformRows = uniformHandle.data.rows || []; uniformLoaded = true; }
      uniformHandle.ready.catch(() => { /* surfaced by the Inspections page itself if it matters */ }).finally(() => {
        uniformLoaded = true;
        // See the matching comment on Roster's ready.finally() above.
        if (!uniformHadCache) renderAll();
      });

      const roomHandle = Api.getSheetCached("RoomInspections", (fresh) => {
        lastRoomRows = fresh.rows || [];
        renderAll();
      });
      const roomHadCache = !!roomHandle.data;
      if (roomHandle.data) { lastRoomRows = roomHandle.data.rows || []; roomLoaded = true; }
      roomHandle.ready.catch(() => { /* surfaced by the Inspections page itself if it matters */ }).finally(() => {
        roomLoaded = true;
        // See the matching comment on Roster's ready.finally() above.
        if (!roomHadCache) renderAll();
      });

      const ptHandle = Api.getSheetCached("PTInspections", (fresh) => {
        lastPtRows = fresh.rows || [];
        renderAll();
      });
      const ptHadCache = !!ptHandle.data;
      if (ptHandle.data) { lastPtRows = ptHandle.data.rows || []; ptLoaded = true; }
      ptHandle.ready.catch(() => { /* surfaced by the Inspections page itself if it matters */ }).finally(() => {
        ptLoaded = true;
        // See the matching comment on Roster's ready.finally() above.
        if (!ptHadCache) renderAll();
      });

      const periodsHandle = Api.getSheetCached("InspectionPeriods", (fresh) => {
        lastInspectionPeriods = fresh.rows || [];
        renderAll();
      });
      const periodsHadCache = !!periodsHandle.data;
      if (periodsHandle.data) { lastInspectionPeriods = periodsHandle.data.rows || []; periodsLoaded = true; }
      periodsHandle.ready.catch(() => { /* surfaced by the Inspections page itself if it matters */ }).finally(() => {
        periodsLoaded = true;
        // See the matching comment on Roster's ready.finally() above.
        if (!periodsHadCache) renderAll();
      });

      const observationsHandle = Api.getSheetCached("Observations", (fresh) => {
        lastObservationRows = fresh.rows || [];
        renderAll();
      });
      const observationsHadCache = !!observationsHandle.data;
      if (observationsHandle.data) { lastObservationRows = observationsHandle.data.rows || []; observationsLoaded = true; }
      observationsHandle.ready.catch(() => { /* surfaced by the Observations page itself if it matters */ }).finally(() => {
        observationsLoaded = true;
        // See the matching comment on Roster's ready.finally() above.
        if (!observationsHadCache) renderAll();
      });

      // Black flag status, now rendered inline in the weather card (see
      // renderWeatherCard) instead of via Shell's old separate banner —
      // reading it directly here means it's gated behind the SAME
      // "everything's ready" check as the rest of this page.
      const blackFlagHandle = Api.getSheetCached("BlackFlagStatus", (fresh) => {
        lastBlackFlagStatus = (fresh.rows || [])[0] || null;
        renderAll();
      });
      const blackFlagHadCache = !!blackFlagHandle.data;
      if (blackFlagHandle.data) { lastBlackFlagStatus = (blackFlagHandle.data.rows || [])[0] || null; blackFlagLoaded = true; }
      blackFlagHandle.ready.catch(() => { /* surfaced by the header pill on other pages if it matters */ }).finally(() => {
        blackFlagLoaded = true;
        // See the matching comment on Roster's ready.finally() above.
        if (!blackFlagHadCache) renderAll();
      });

      // One synchronous call for whatever's ALREADY warm in cache right
      // now (shows the spinner if nothing is yet, or renders instantly
      // if everything already was). The async branches above only call
      // renderAll() again for a piece that either (a) wasn't cached yet —
      // its FIRST arrival is what reveals it, or (b) genuinely changed on
      // background revalidation (via each sheet's onFresh callback) — so
      // this doesn't risk a second visible entrance animation for data
      // that didn't actually change.
      renderAll();
    }

    Shell.registerRefresh(load);
    load();

    // Re-render every minute so "Now"/"Next" advances on its own as time
    // passes, without requiring a manual refresh or page reload.
    setInterval(renderAll, 60 * 1000);
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register(`${window.APP_BASE_PATH}service-worker.js`);
    }
  </script>
</body>
</html>
