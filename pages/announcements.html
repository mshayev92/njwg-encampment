<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    // Applied synchronously, before first paint, so a collapsed sidebar
    // renders at its collapsed width immediately instead of flashing
    // open at the default width for a frame and visibly animating shut
    // once js/shell.js runs (see .nav-rail-collapsed in css/app.css).
    // The theme read right after does the same job for dark mode:
    // resolve njwg_theme (light/dark/system) and set data-theme on <html>
    // BEFORE tokens.css is even requested, so a dark-mode device never
    // flashes the light palette for a frame first (see the
    // :root[data-theme="dark"] block in css/tokens.css, and
    // initThemeWatcher_ in js/shell.js for what keeps this in sync for
    // the rest of the page's life, including a live OS theme change).
    try {
      if (localStorage.getItem("njwg_nav_collapsed") === "true") {
        document.documentElement.classList.add("nav-rail-collapsed");
      }
    } catch (e) { /* storage unavailable — falls back to expanded */ }
    try {
      var njwgThemePref = localStorage.getItem("njwg_theme") || "system";
      var njwgThemeResolved = njwgThemePref === "system"
        ? (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
        : njwgThemePref;
      document.documentElement.setAttribute("data-theme", njwgThemeResolved);
    } catch (e) { document.documentElement.setAttribute("data-theme", "light"); }
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Announcements — NJWG Encampment</title>
  <meta name="theme-color" content="#f4f5fa">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="NJWG Encampment">
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../icons/favicon.ico" sizes="any">
  <link rel="icon" href="../icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/app.css">

  <style>
    .black-flag-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      padding: var(--space-5);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      margin-bottom: var(--space-5);
    }

    .black-flag-card__label {
      font-family: var(--font-display);
      font-size: var(--fs-md);
      color: var(--heading);
    }

    .black-flag-card__status {
      font-size: var(--fs-xs);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      color: var(--ink-600);
      margin-top: var(--space-1);
    }

    .flag-toggle-btn {
      padding: var(--space-3) var(--space-5);
      border-radius: var(--radius-md);
      border: none;
      font-weight: 700;
      font-family: var(--font-display);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
    }

    .flag-toggle-btn--activate {
      background: #000;
      color: #fff;
    }

    .flag-toggle-btn--deactivate {
      background: var(--surface-sunken);
      color: var(--ink-900);
      border: 1px solid var(--line);
    }

    .richtext-editor {
      width: 100%;
      min-height: 90px;
      font-family: var(--font-body);
      font-size: var(--fs-sm);
      padding: var(--space-3);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--surface-sunken);
      margin-bottom: var(--space-3);
      overflow-y: auto;
    }

    .richtext-editor:empty::before {
      content: attr(data-placeholder);
      color: var(--ink-600);
    }

    .richtext-editor ul, .richtext-editor ol {
      padding-left: var(--space-5);
    }

    .announcement-feed {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      margin-top: var(--space-5);
    }

    .announcement-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: var(--space-4);
    }

    .announcement-card__meta {
      font-size: var(--fs-2xs);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      color: var(--ink-600);
      margin-bottom: var(--space-2);
    }

    .announcement-card__message {
      font-size: var(--fs-sm);
      color: var(--ink-900);
    }

    .announcement-card__message ul, .announcement-card__message ol {
      padding-left: var(--space-5);
    }

    .read-only-notice {
      padding: var(--space-4);
      background: var(--amber-100);
      color: var(--amber-600);
      border-radius: var(--radius-md);
      font-size: var(--fs-sm);
      margin-bottom: var(--space-5);
    }
  </style>
</head>
<body>

  <div class="app-shell">
    <nav class="nav-rail" id="nav-rail">
      <button type="button" class="nav-rail__crest" id="nav-rail-crest" aria-label="Toggle navigation width">
        <span class="nav-rail__crest-mark"><img src="../icons/icon-192.png" alt="NJWG"></span>
        <span class="nav-rail__crest-text">NJWG<span>Encampment</span></span>
      </button>
      <div id="nav-rail-links"></div>
    </nav>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/richtext.js"></script>
    <script src="../js/shell.js"></script>
    <script>
      // See overview.html for why this runs here instead of only inside
      // Shell.init() at the bottom — keeps the sidebar links from ever
      // being visibly empty for a moment on navigation between pages.
      Shell.renderNav("announcements");
    </script>

    <header class="app-header" id="app-header"></header>

    <main class="app-main">
      <div id="page-content">
        <div class="state-message">
          <div class="spinner"></div>
          <p>Loading…</p>
        </div>
      </div>
    </main>
  </div>

  <script>
    Shell.init({ activePage: "announcements" });
    Shell.markAnnouncementsSeen();

    const contentEl = document.getElementById("page-content");
    const session = Auth.getSession();
    const esc = Shell.escapeHtml;

    // Posting/toggling black flag requires "announcements" in this
    // position's own Pages — since this page itself is gated by
    // "announcements" via Shell.requirePageAccess, reaching this page
    // at all already implies write access. Kept as an explicit check
    // here too since Code.gs is the real enforcement point regardless.
    const canPost = (session.Pages || []).map(p => String(p).toLowerCase()).includes("announcements");

    let blackFlagStatus = null;
    let announcements = [];
    let editingAnnouncementId = null; // Id of the announcement being edited, or null when posting a new one

    function renderBlackFlagCard() {
      const active = blackFlagStatus && (blackFlagStatus.Active === true || blackFlagStatus.Active === "TRUE" || blackFlagStatus.Active === "true");
      return `
        <div class="black-flag-card">
          <div>
            <div class="black-flag-card__label">⚑ Black Flag</div>
            <div class="black-flag-card__status">${active ? "Currently ACTIVE" : "Currently inactive"}${blackFlagStatus && blackFlagStatus.UpdatedBy ? ` · last set by ${esc(blackFlagStatus.UpdatedBy)}` : ""}</div>
          </div>
          ${canPost ? `
            <button class="flag-toggle-btn ${active ? "flag-toggle-btn--deactivate" : "flag-toggle-btn--activate"}" id="toggle-flag-btn">
              ${active ? "Deactivate" : "Activate"}
            </button>
          ` : ""}
        </div>
      `;
    }

    function renderPostForm() {
      if (!canPost) return "";
      const editing = editingAnnouncementId !== null;
      return `
        <div class="card post-form">
          <h2 class="card-title">${editing ? "Edit Announcement" : "Post an Announcement"}</h2>
          <div class="richtext-editor" id="message-input" contenteditable="true" data-placeholder="Write an announcement for all staff…"></div>
          <div style="display:flex; gap: var(--space-3);">
            <button class="btn btn--primary" id="post-btn">${editing ? "Save Changes" : "Post Announcement"}</button>
            ${editing ? `<button class="btn btn--ghost" id="cancel-edit-btn">Cancel</button>` : ""}
          </div>
        </div>
      `;
    }

    function renderFeed() {
      const sorted = announcements.slice().sort((a, b) => new Date(b.Timestamp) - new Date(a.Timestamp));
      if (!sorted.length) {
        return `<div class="state-message"><div class="state-message__icon">📣</div><p>No announcements yet.</p></div>`;
      }
      return `
        <div class="announcement-feed">
          ${sorted.map(a => `
            <div class="announcement-card">
              <div class="announcement-card__meta" style="display:flex; align-items:center; justify-content:space-between; gap: var(--space-3);">
                <span>${esc(a.Position || "—")} · ${esc(Shell.formatDateTime(a.Timestamp))}</span>
                ${canPost ? `
                  <span style="display:flex; gap: var(--space-1);">
                    <button class="btn btn--ghost" data-edit-id="${esc(a.Id)}" data-tooltip="Edit announcement" style="padding: var(--space-1) var(--space-2);" aria-label="Edit announcement">✎</button>
                    <button class="btn btn--ghost" data-delete-id="${esc(a.Id)}" data-tooltip="Delete announcement" style="padding: var(--space-1) var(--space-2);" aria-label="Delete announcement">✕</button>
                  </span>
                ` : ""}
              </div>
              <div class="announcement-card__message">${RichText.sanitize(a.Message || "")}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function render() {
      contentEl.innerHTML = `
        ${renderBlackFlagCard()}
        ${!canPost ? `<div class="read-only-notice">Your position can view announcements but not post them.</div>` : ""}
        ${renderPostForm()}
        ${renderFeed()}
      `;

      const toggleBtn = document.getElementById("toggle-flag-btn");
      if (toggleBtn) toggleBtn.addEventListener("click", toggleBlackFlag);

      const postBtn = document.getElementById("post-btn");
      if (postBtn) postBtn.addEventListener("click", postAnnouncement);
      const cancelEditBtn = document.getElementById("cancel-edit-btn");
      if (cancelEditBtn) cancelEditBtn.addEventListener("click", cancelEditAnnouncement);

      contentEl.querySelectorAll("[data-edit-id]").forEach(btn => {
        btn.addEventListener("click", () => startEditAnnouncement(btn.dataset.editId));
      });
      contentEl.querySelectorAll("[data-delete-id]").forEach(btn => {
        btn.addEventListener("click", () => deleteAnnouncement(btn.dataset.deleteId));
      });
      Shell.wireTooltips(contentEl);
      Shell.animateIn(contentEl);
    }

    /** Prefills the post form from an existing announcement and switches it into edit mode. */
    function startEditAnnouncement(id) {
      const a = announcements.find(x => String(x.Id) === String(id));
      if (!a) return;
      editingAnnouncementId = a.Id;
      render();
      document.getElementById("message-input").innerHTML = RichText.sanitize(a.Message || "");
      document.querySelector(".post-form").scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function cancelEditAnnouncement() {
      editingAnnouncementId = null;
      render();
    }

    /**
     * Updates local state and re-renders immediately rather than
     * re-fetching from the server — Api.writeRow() is optimistic (it
     * resolves before the real network write actually lands), so a
     * re-fetch right after it can race the write and read back the OLD
     * data, making the sync pill flip to "Synced" while nothing visibly
     * changed. Matches the pattern roster.html/schedule.html already
     * use for the same reason.
     */
    function toggleBlackFlag() {
      const active = blackFlagStatus && (blackFlagStatus.Active === true || blackFlagStatus.Active === "TRUE" || blackFlagStatus.Active === "true");

      const newStatus = {
        RecordKey: "singleton",
        Active: !active,
        UpdatedBy: session.Position,
        UpdatedAt: new Date().toISOString()
      };

      // Optimistic: flip local state and re-render instantly; the real
      // write fires in the background and the header's sync indicator
      // reflects whether it lands. Api.writeRow resolves before the network
      // write returns, so there's no background failure to await/catch.
      Api.writeRow("BlackFlagStatus", newStatus, { matchColumn: "RecordKey" });
      blackFlagStatus = newStatus;
      Api.setCachedRows("BlackFlagStatus", [newStatus]);
      render();
      Shell.refreshGlobalAlerts();
    }

    function postAnnouncement() {
      const editor = document.getElementById("message-input");
      const message = RichText.sanitize(editor.innerHTML);
      if (RichText.isEmpty(message)) {
        Shell.showToast("Write a message before posting.", { type: "error" });
        return;
      }

      const editing = editingAnnouncementId !== null;
      const existing = editing ? announcements.find(a => String(a.Id) === String(editingAnnouncementId)) : null;

      const announcementRow = editing && existing
        ? { ...existing, Message: message }
        : {
            Id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
            Timestamp: new Date().toISOString(),
            Position: session.Position,
            Message: message
          };

      // Optimistic, same as every other write in the app: update local
      // state and re-render instantly; the real write fires in the
      // background and the header's sync indicator reflects whether it
      // lands. Api.writeRow resolves BEFORE the network write returns, so
      // there's no background failure to await/catch here.
      Api.writeRow("Announcements", announcementRow, editing ? { matchColumns: ["Id"] } : {});
      if (editing) {
        const idx = announcements.findIndex(a => String(a.Id) === String(editingAnnouncementId));
        if (idx >= 0) announcements[idx] = announcementRow; else announcements.unshift(announcementRow);
        editingAnnouncementId = null;
      } else {
        announcements = [announcementRow, ...announcements];
      }
      Api.setCachedRows("Announcements", announcements);
      render();
      Shell.refreshGlobalAlerts();
      Shell.showToast(editing ? "Announcement updated." : "Announcement posted.", { type: "success" });
    }

    /**
     * Removes locally and re-renders instantly, then gives a few seconds
     * to Undo before the delete actually reaches the server (see
     * Shell.showUndoToast) — replaces the old upfront "are you sure?"
     * confirm.
     */
    function deleteAnnouncement(id) {
      const removed = announcements.find(a => String(a.Id) === String(id));
      const removedIndex = announcements.findIndex(a => String(a.Id) === String(id));
      announcements = announcements.filter(a => String(a.Id) !== String(id));
      if (editingAnnouncementId === id) editingAnnouncementId = null;
      Api.setCachedRows("Announcements", announcements);
      render();
      Shell.refreshGlobalAlerts();

      Shell.showUndoToast(
        "Announcement removed.",
        () => Api.deleteRow("Announcements", { Id: id }, { matchColumns: ["Id"] }),
        {
          onUndo: () => {
            if (!removed) return;
            announcements.splice(removedIndex, 0, removed);
            Api.setCachedRows("Announcements", announcements);
            render();
            Shell.refreshGlobalAlerts();
          }
        }
      );
    }

    let announcementsLoaded = false;
    let blackFlagLoaded = false;

    function renderIfReady() {
      if (!announcementsLoaded || !blackFlagLoaded) {
        contentEl.innerHTML = `<div class="state-message"><div class="spinner"></div><p>Loading…</p></div>`;
        return;
      }
      render();
    }

    /**
     * Renders instantly from the persisted cache (see js/api.js) if
     * present, then always awaits the real network round-trip before
     * resolving — callers that just performed a write (toggleBlackFlag,
     * postAnnouncement) rely on `await load()` reflecting the true
     * server state, not just whatever was cached from before their
     * write landed.
     */
    async function load() {
      if (!navigator.onLine) {
        contentEl.innerHTML = `
          <div class="state-message">
            <div class="state-message__icon">📵</div>
            <p>You're offline. Connect to the internet to view announcements.</p>
          </div>`;
        return;
      }
      const a = Api.getSheetCached("Announcements", (fresh) => {
        announcements = fresh.rows || [];
        announcementsLoaded = true;
        renderIfReady();
      });
      const f = Api.getSheetCached("BlackFlagStatus", (fresh) => {
        blackFlagStatus = (fresh.rows || [])[0] || null;
        blackFlagLoaded = true;
        renderIfReady();
      });

      if (a.data) { announcements = a.data.rows || []; announcementsLoaded = true; }
      if (f.data) { blackFlagStatus = (f.data.rows || [])[0] || null; blackFlagLoaded = true; }
      renderIfReady();

      try {
        await Promise.all([a.ready, f.ready]);
      } catch (err) {
        if (!announcementsLoaded || !blackFlagLoaded) {
          contentEl.innerHTML = `
            <div class="state-message">
              <div class="state-message__icon">⚠️</div>
              <p>${err.message}</p>
            </div>`;
        }
        Shell.showToast(err.message, { type: "error" });
      }
    }

    Shell.registerRefresh(load);
    load();

    // Connectivity can drop (or come back) while this page is already open
    // — load() above only catches the "arrived while offline" case.
    // Re-running it on both events means the "you're offline" lockout
    // appears the instant connectivity drops, and the real feed loads the
    // instant it returns, instead of either only happening on the next
    // full page load/navigation.
    window.addEventListener("offline", load);
    window.addEventListener("online", load);
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register(`${window.APP_BASE_PATH}service-worker.js`);
    }
  </script>
</body>
</html>
