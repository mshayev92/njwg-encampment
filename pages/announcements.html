<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Announcements — NJWG Encampment</title>
  <meta name="theme-color" content="#0d1250">
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../icons/favicon.ico" sizes="any">
  <link rel="icon" href="../icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/app.css">

  <style>
    .black-flag-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      padding: var(--space-5);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      margin-bottom: var(--space-5);
    }

    .black-flag-card__label {
      font-family: var(--font-display);
      font-size: var(--fs-md);
      color: var(--navy-900);
    }

    .black-flag-card__status {
      font-size: var(--fs-xs);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      color: var(--ink-600);
      margin-top: var(--space-1);
    }

    .flag-toggle-btn {
      padding: var(--space-3) var(--space-5);
      border-radius: var(--radius-md);
      border: none;
      font-weight: 700;
      font-family: var(--font-display);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
    }

    .flag-toggle-btn--activate {
      background: #000;
      color: #fff;
    }

    .flag-toggle-btn--deactivate {
      background: var(--surface-sunken);
      color: var(--ink-900);
      border: 1px solid var(--line);
    }

    .richtext-toolbar {
      display: flex;
      gap: var(--space-1);
      margin-bottom: var(--space-2);
    }

    .richtext-toolbar button {
      padding: var(--space-2) var(--space-3);
      font-size: var(--fs-sm);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--ink-900);
      cursor: pointer;
    }

    .richtext-toolbar button:hover {
      border-color: var(--gold-500);
    }

    .richtext-editor {
      width: 100%;
      min-height: 90px;
      font-family: var(--font-body);
      font-size: var(--fs-sm);
      padding: var(--space-3);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--surface-sunken);
      margin-bottom: var(--space-3);
      overflow-y: auto;
    }

    .richtext-editor:empty::before {
      content: attr(data-placeholder);
      color: var(--ink-600);
    }

    .richtext-editor ul, .richtext-editor ol {
      padding-left: var(--space-5);
    }

    .announcement-feed {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      margin-top: var(--space-5);
    }

    .announcement-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: var(--space-4);
    }

    .announcement-card__meta {
      font-size: var(--fs-2xs);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      color: var(--ink-600);
      margin-bottom: var(--space-2);
    }

    .announcement-card__message {
      font-size: var(--fs-sm);
      color: var(--ink-900);
    }

    .announcement-card__message ul, .announcement-card__message ol {
      padding-left: var(--space-5);
    }

    .read-only-notice {
      padding: var(--space-4);
      background: var(--amber-100);
      color: var(--amber-600);
      border-radius: var(--radius-md);
      font-size: var(--fs-sm);
      margin-bottom: var(--space-5);
    }
  </style>
</head>
<body>

  <div class="app-shell">
    <nav class="nav-rail" id="nav-rail"></nav>
    <header class="app-header" id="app-header"></header>

    <main class="app-main">
      <div id="page-content">
        <div class="state-message">
          <div class="spinner"></div>
          <p>Loading…</p>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/richtext.js"></script>
  <script src="../js/shell.js"></script>
  <script>
    Shell.init({ activePage: "announcements" });
    Shell.markAnnouncementsSeen();

    const contentEl = document.getElementById("page-content");
    const session = Auth.getSession();
    const esc = Shell.escapeHtml;

    // Posting/toggling black flag requires "announcements" in this
    // position's own Pages — since this page itself is gated by
    // "announcements" via Shell.requirePageAccess, reaching this page
    // at all already implies write access. Kept as an explicit check
    // here too since Code.gs is the real enforcement point regardless.
    const canPost = (session.Pages || []).map(p => String(p).toLowerCase()).includes("announcements");

    let blackFlagStatus = null;
    let announcements = [];

    function renderBlackFlagCard() {
      const active = blackFlagStatus && (blackFlagStatus.Active === true || blackFlagStatus.Active === "TRUE" || blackFlagStatus.Active === "true");
      return `
        <div class="black-flag-card">
          <div>
            <div class="black-flag-card__label">⚑ Black Flag</div>
            <div class="black-flag-card__status">${active ? "Currently ACTIVE" : "Currently inactive"}${blackFlagStatus && blackFlagStatus.UpdatedBy ? ` · last set by ${esc(blackFlagStatus.UpdatedBy)}` : ""}</div>
          </div>
          ${canPost ? `
            <button class="flag-toggle-btn ${active ? "flag-toggle-btn--deactivate" : "flag-toggle-btn--activate"}" id="toggle-flag-btn">
              ${active ? "Deactivate" : "Activate"}
            </button>
          ` : ""}
        </div>
      `;
    }

    function renderPostForm() {
      if (!canPost) return "";
      return `
        <div class="card post-form">
          <h2 style="font-size: var(--fs-lg); color: var(--navy-900);">Post an Announcement</h2>
          ${RichText.TOOLBAR_HTML}
          <div class="richtext-editor" id="message-input" contenteditable="true" data-placeholder="Write an announcement for all staff…"></div>
          <button class="btn btn--primary" id="post-btn">Post Announcement</button>
        </div>
      `;
    }

    function renderFeed() {
      const sorted = announcements.slice().sort((a, b) => new Date(b.Timestamp) - new Date(a.Timestamp));
      if (!sorted.length) {
        return `<div class="state-message"><div class="state-message__icon">📣</div><p>No announcements yet.</p></div>`;
      }
      return `
        <div class="announcement-feed">
          ${sorted.map(a => `
            <div class="announcement-card">
              <div class="announcement-card__meta" style="display:flex; align-items:center; justify-content:space-between; gap: var(--space-3);">
                <span>${esc(a.Position || "—")} · ${esc(new Date(a.Timestamp).toLocaleString())}</span>
                ${canPost ? `<button class="btn btn--ghost" data-delete-id="${esc(a.Id)}" data-tooltip="Delete announcement" style="padding: var(--space-1) var(--space-2);" aria-label="Delete announcement">✕</button>` : ""}
              </div>
              <div class="announcement-card__message">${RichText.sanitize(a.Message || "")}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function render() {
      contentEl.innerHTML = `
        ${renderBlackFlagCard()}
        ${!canPost ? `<div class="read-only-notice">Your position can view announcements but not post them.</div>` : ""}
        ${renderPostForm()}
        ${renderFeed()}
      `;

      const toggleBtn = document.getElementById("toggle-flag-btn");
      if (toggleBtn) toggleBtn.addEventListener("click", toggleBlackFlag);

      const postBtn = document.getElementById("post-btn");
      if (postBtn) postBtn.addEventListener("click", postAnnouncement);

      const toolbar = contentEl.querySelector(".richtext-toolbar");
      const editor = document.getElementById("message-input");
      if (toolbar && editor) RichText.attach(toolbar, editor);

      contentEl.querySelectorAll("[data-delete-id]").forEach(btn => {
        btn.addEventListener("click", () => deleteAnnouncement(btn.dataset.deleteId));
      });
      Shell.wireTooltips(contentEl);
    }

    /**
     * Updates local state and re-renders immediately rather than
     * re-fetching from the server — Api.writeRow() is optimistic (it
     * resolves before the real network write actually lands), so a
     * re-fetch right after it can race the write and read back the OLD
     * data, making the sync pill flip to "Synced" while nothing visibly
     * changed. Matches the pattern roster.html/schedule.html already
     * use for the same reason.
     */
    async function toggleBlackFlag() {
      const active = blackFlagStatus && (blackFlagStatus.Active === true || blackFlagStatus.Active === "TRUE" || blackFlagStatus.Active === "true");
      const toggleBtn = document.getElementById("toggle-flag-btn");
      toggleBtn.disabled = true;

      const newStatus = {
        RecordKey: "singleton",
        Active: !active,
        UpdatedBy: session.Position,
        UpdatedAt: new Date().toISOString()
      };

      try {
        await Api.writeRow("BlackFlagStatus", newStatus, { matchColumn: "RecordKey" });
        blackFlagStatus = newStatus;
        render();
        Shell.refreshGlobalAlerts();
      } catch (err) {
        Shell.showToast(err.message, { type: "error" });
        toggleBtn.disabled = false;
      }
    }

    async function postAnnouncement() {
      const editor = document.getElementById("message-input");
      const message = RichText.sanitize(editor.innerHTML);
      if (RichText.isEmpty(message)) {
        Shell.showToast("Write a message before posting.", { type: "error" });
        return;
      }

      const postBtn = document.getElementById("post-btn");
      postBtn.disabled = true;
      postBtn.textContent = "Posting…";

      const newAnnouncement = {
        Id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
        Timestamp: new Date().toISOString(),
        Position: session.Position,
        Message: message
      };

      try {
        await Api.writeRow("Announcements", newAnnouncement);
        announcements = [newAnnouncement, ...announcements];
        render();
        Shell.refreshGlobalAlerts();
        Shell.showToast("Announcement posted.", { type: "success" });
      } catch (err) {
        Shell.showToast(err.message, { type: "error" });
      } finally {
        postBtn.disabled = false;
        postBtn.textContent = "Post Announcement";
      }
    }

    async function deleteAnnouncement(id) {
      const confirmed = await Shell.confirm({
        title: "Delete announcement?",
        message: "This can't be undone.",
        confirmLabel: "Delete",
      });
      if (!confirmed) return;

      // Optimistic, same as every other write on this page: update local
      // state and re-render instantly; the real delete fires in the
      // background (Api's queue), with the header's sync indicator — not
      // a rejected promise here — reflecting whether it actually lands.
      Api.deleteRow("Announcements", { Id: id }, { matchColumns: ["Id"] });
      announcements = announcements.filter(a => String(a.Id) !== String(id));
      render();
      Shell.showToast("Announcement deleted.", { type: "success" });
      Shell.refreshGlobalAlerts();
    }

    let announcementsLoaded = false;
    let blackFlagLoaded = false;

    function renderIfReady() {
      if (!announcementsLoaded || !blackFlagLoaded) {
        contentEl.innerHTML = `<div class="state-message"><div class="spinner"></div><p>Loading…</p></div>`;
        return;
      }
      render();
    }

    /**
     * Renders instantly from the persisted cache (see js/api.js) if
     * present, then always awaits the real network round-trip before
     * resolving — callers that just performed a write (toggleBlackFlag,
     * postAnnouncement) rely on `await load()` reflecting the true
     * server state, not just whatever was cached from before their
     * write landed.
     */
    async function load() {
      const a = Api.getSheetCached("Announcements", (fresh) => {
        announcements = fresh.rows || [];
        announcementsLoaded = true;
        renderIfReady();
      });
      const f = Api.getSheetCached("BlackFlagStatus", (fresh) => {
        blackFlagStatus = (fresh.rows || [])[0] || null;
        blackFlagLoaded = true;
        renderIfReady();
      });

      if (a.data) { announcements = a.data.rows || []; announcementsLoaded = true; }
      if (f.data) { blackFlagStatus = (f.data.rows || [])[0] || null; blackFlagLoaded = true; }
      renderIfReady();

      try {
        await Promise.all([a.ready, f.ready]);
      } catch (err) {
        if (!announcementsLoaded || !blackFlagLoaded) {
          contentEl.innerHTML = `
            <div class="state-message">
              <div class="state-message__icon">⚠️</div>
              <p>${err.message}</p>
            </div>`;
        }
        Shell.showToast(err.message, { type: "error" });
      }
    }

    Shell.registerRefresh(load);
    load();
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register(`${window.APP_BASE_PATH}service-worker.js`);
    }
  </script>
</body>
</html>
