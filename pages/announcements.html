<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Announcements — NJWG CAP Encampment</title>
  <meta name="theme-color" content="#0b2545">
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../icons/icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/app.css">

  <style>
    .black-flag-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      padding: var(--space-5);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      margin-bottom: var(--space-5);
    }

    .black-flag-card__label {
      font-family: var(--font-display);
      font-size: var(--fs-md);
      color: var(--navy-900);
    }

    .black-flag-card__status {
      font-size: var(--fs-xs);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      color: var(--ink-600);
      margin-top: var(--space-1);
    }

    .flag-toggle-btn {
      padding: var(--space-3) var(--space-5);
      border-radius: var(--radius-md);
      border: none;
      font-weight: 700;
      font-family: var(--font-display);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
    }

    .flag-toggle-btn--activate {
      background: #000;
      color: #fff;
    }

    .flag-toggle-btn--deactivate {
      background: var(--surface-sunken);
      color: var(--ink-900);
      border: 1px solid var(--line);
    }

    .post-form textarea {
      width: 100%;
      min-height: 90px;
      font-family: var(--font-body);
      font-size: var(--fs-sm);
      padding: var(--space-3);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--surface-sunken);
      resize: vertical;
      margin-bottom: var(--space-3);
    }

    .announcement-feed {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      margin-top: var(--space-5);
    }

    .announcement-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: var(--space-4);
    }

    .announcement-card__meta {
      font-size: var(--fs-2xs);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      color: var(--ink-600);
      margin-bottom: var(--space-2);
    }

    .announcement-card__message {
      font-size: var(--fs-sm);
      color: var(--ink-900);
      white-space: pre-wrap;
    }

    .read-only-notice {
      padding: var(--space-4);
      background: var(--amber-100);
      color: var(--amber-600);
      border-radius: var(--radius-md);
      font-size: var(--fs-sm);
      margin-bottom: var(--space-5);
    }
  </style>
</head>
<body>

  <div class="app-shell">
    <nav class="nav-rail" id="nav-rail"></nav>
    <header class="app-header" id="app-header"></header>
    <div class="duty-strip" id="duty-strip"></div>

    <main class="app-main">
      <div class="page-header">
        <div>
          <span class="page-header__eyebrow">Cadre Tools</span>
          <h1>Announcements</h1>
        </div>
        <button class="btn btn--ghost" id="refresh-btn">Refresh</button>
      </div>

      <div id="page-content">
        <div class="state-message">
          <div class="spinner"></div>
          <p>Loading…</p>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/shell.js"></script>
  <script>
    Shell.init({ activePage: "announcements" });
    Shell.markAnnouncementsSeen();

    const contentEl = document.getElementById("page-content");
    const refreshBtn = document.getElementById("refresh-btn");
    const session = Auth.getSession();

    // Posting/toggling black flag requires "announcements" in this
    // position's own Pages — since this page itself is gated by
    // "announcements" via Shell.requirePageAccess, reaching this page
    // at all already implies write access. Kept as an explicit check
    // here too since Code.gs is the real enforcement point regardless.
    const canPost = (session.Pages || []).map(p => String(p).toLowerCase()).includes("announcements");

    let blackFlagStatus = null;
    let announcements = [];

    function renderBlackFlagCard() {
      const active = blackFlagStatus && (blackFlagStatus.Active === true || blackFlagStatus.Active === "TRUE" || blackFlagStatus.Active === "true");
      return `
        <div class="black-flag-card">
          <div>
            <div class="black-flag-card__label">⚑ Black Flag</div>
            <div class="black-flag-card__status">${active ? "Currently ACTIVE" : "Currently inactive"}${blackFlagStatus && blackFlagStatus.UpdatedBy ? ` · last set by ${blackFlagStatus.UpdatedBy}` : ""}</div>
          </div>
          ${canPost ? `
            <button class="flag-toggle-btn ${active ? "flag-toggle-btn--deactivate" : "flag-toggle-btn--activate"}" id="toggle-flag-btn">
              ${active ? "Deactivate" : "Activate"}
            </button>
          ` : ""}
        </div>
      `;
    }

    function renderPostForm() {
      if (!canPost) return "";
      return `
        <div class="card post-form">
          <h2 style="font-size: var(--fs-lg); color: var(--navy-900);">Post an Announcement</h2>
          <textarea id="message-input" placeholder="Write an announcement for all staff…"></textarea>
          <button class="btn btn--primary" id="post-btn">Post Announcement</button>
        </div>
      `;
    }

    function renderFeed() {
      const sorted = announcements.slice().sort((a, b) => new Date(b.Timestamp) - new Date(a.Timestamp));
      if (!sorted.length) {
        return `<div class="state-message"><div class="state-message__icon">📣</div><p>No announcements yet.</p></div>`;
      }
      return `
        <div class="announcement-feed">
          ${sorted.map(a => `
            <div class="announcement-card">
              <div class="announcement-card__meta">${a.Position || "—"} · ${new Date(a.Timestamp).toLocaleString()}</div>
              <div class="announcement-card__message">${a.Message || ""}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function render() {
      contentEl.innerHTML = `
        ${renderBlackFlagCard()}
        ${!canPost ? `<div class="read-only-notice">Your position can view announcements but not post them.</div>` : ""}
        ${renderPostForm()}
        ${renderFeed()}
      `;

      const toggleBtn = document.getElementById("toggle-flag-btn");
      if (toggleBtn) toggleBtn.addEventListener("click", toggleBlackFlag);

      const postBtn = document.getElementById("post-btn");
      if (postBtn) postBtn.addEventListener("click", postAnnouncement);
    }

    async function toggleBlackFlag() {
      const active = blackFlagStatus && (blackFlagStatus.Active === true || blackFlagStatus.Active === "TRUE" || blackFlagStatus.Active === "true");
      const toggleBtn = document.getElementById("toggle-flag-btn");
      toggleBtn.disabled = true;

      try {
        await Api.writeRow("BlackFlagStatus", {
          RecordKey: "singleton",
          Active: !active,
          UpdatedBy: session.Position,
          UpdatedAt: new Date().toISOString()
        }, { matchColumn: "RecordKey" });
        await load();
        Shell.refreshGlobalAlerts();
      } catch (err) {
        Shell.showToast(err.message, { type: "error" });
        toggleBtn.disabled = false;
      }
    }

    async function postAnnouncement() {
      const input = document.getElementById("message-input");
      const message = input.value.trim();
      if (!message) {
        Shell.showToast("Write a message before posting.", { type: "error" });
        return;
      }

      const postBtn = document.getElementById("post-btn");
      postBtn.disabled = true;
      postBtn.textContent = "Posting…";

      try {
        await Api.writeRow("Announcements", {
          Id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
          Timestamp: new Date().toISOString(),
          Position: session.Position,
          Message: message
        });
        await load();
        Shell.refreshGlobalAlerts();
        Shell.showToast("Announcement posted.", { type: "success" });
      } catch (err) {
        Shell.showToast(err.message, { type: "error" });
      } finally {
        postBtn.disabled = false;
        postBtn.textContent = "Post Announcement";
      }
    }

    async function load() {
      contentEl.innerHTML = `<div class="state-message"><div class="spinner"></div><p>Loading…</p></div>`;
      try {
        const [announcementData, flagData] = await Promise.all([
          Api.getSheet("Announcements"),
          Api.getSheet("BlackFlagStatus")
        ]);
        announcements = announcementData.rows || [];
        blackFlagStatus = (flagData.rows || [])[0] || null;
        render();
      } catch (err) {
        contentEl.innerHTML = `
          <div class="state-message">
            <div class="state-message__icon">⚠️</div>
            <p>${err.message}</p>
          </div>`;
        Shell.showToast(err.message, { type: "error" });
      }
    }

    refreshBtn.addEventListener("click", load);
    load();
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register(`${window.APP_BASE_PATH}service-worker.js`);
    }
  </script>
</body>
</html>
