<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    // Applied synchronously, before first paint, so a collapsed sidebar
    // renders at its collapsed width immediately instead of flashing
    // open at the default width for a frame and visibly animating shut
    // once js/shell.js runs (see .nav-rail-collapsed in css/app.css).
    // The theme read right after does the same job for dark mode:
    // resolve njwg_theme (light/dark/system) and set data-theme on <html>
    // BEFORE tokens.css is even requested, so a dark-mode device never
    // flashes the light palette for a frame first (see the
    // :root[data-theme="dark"] block in css/tokens.css, and
    // initThemeWatcher_ in js/shell.js for what keeps this in sync for
    // the rest of the page's life, including a live OS theme change).
    try {
      if (localStorage.getItem("njwg_nav_collapsed") === "true") {
        document.documentElement.classList.add("nav-rail-collapsed");
      }
    } catch (e) { /* storage unavailable — falls back to expanded */ }
    try {
      var njwgThemePref = localStorage.getItem("njwg_theme") || "system";
      var njwgThemeResolved = njwgThemePref === "system"
        ? (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
        : njwgThemePref;
      document.documentElement.setAttribute("data-theme", njwgThemeResolved);
    } catch (e) { document.documentElement.setAttribute("data-theme", "light"); }
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — NJWG Encampment</title>
  <meta name="theme-color" content="#f4f5fa">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="NJWG Encampment">
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../icons/favicon.ico" sizes="any">
  <link rel="icon" href="../icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/app.css">

  <style>
    .admin-tabs { margin-bottom: var(--space-5); }

    /* ---- Staff Access ---- */
    .staff-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    .staff-group + .staff-group {
      margin-top: var(--space-6);
    }
    .staff-group:first-of-type {
      margin-top: var(--space-5);
    }

    .staff-group__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      margin-bottom: var(--space-3);
    }

    .staff-group__title {
      font-family: var(--font-display);
      font-size: var(--fs-sm);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--ink-600);
      margin: 0;
    }

    .staff-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-3);
      flex-wrap: wrap;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: var(--space-4);
    }

    .staff-row__name {
      font-family: var(--font-display);
      font-size: var(--fs-md);
      color: var(--heading);
      display: flex;
      align-items: center;
      gap: var(--space-2);
      flex-wrap: wrap;
    }

    .staff-row__meta {
      font-size: var(--fs-xs);
      color: var(--ink-600);
      margin-top: var(--space-1);
    }

    .staff-row__chips {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-1);
      margin-top: var(--space-2);
    }

    /* "Preview access" panel (see renderAccessPreview) — a read-only
       summary of what a position's Pages/Flights actually resolve to,
       styled as a quiet inset block rather than a modal since it's meant
       to sit open alongside the row while comparing a few positions. */
    .staff-row__preview {
      margin-top: var(--space-3);
      padding: var(--space-3);
      background: var(--surface-sunken);
      border-radius: var(--radius-md);
      font-size: var(--fs-sm);
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
    }
    .staff-row__preview strong { color: var(--ink-600); font-weight: 600; }

    .chip {
      font-size: var(--fs-2xs);
      font-family: var(--font-mono);
      background: var(--surface-sunken);
      color: var(--ink-600);
      border-radius: var(--radius-sm);
      padding: 2px var(--space-2);
    }

    .staff-row__actions {
      display: flex;
      gap: var(--space-2);
      flex-shrink: 0;
    }

    .admin-form input[type="text"],
    .admin-form input[type="password"],
    .admin-form input[type="number"] {
      width: 100%;
      font-family: var(--font-body);
      font-size: var(--fs-sm);
      padding: var(--space-3);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--surface-sunken);
      color: var(--ink-900);
    }

    /* Numbers here are always small (minutes, a request count, days/
       hours) — a full-width box for typing "5" looks odd next to the
       text/password fields above, which genuinely need the room. */
    .admin-form input[type="number"] {
      max-width: 140px;
    }

    .admin-form label.field-label {
      display: block;
      font-size: var(--fs-xs);
      font-weight: 600;
      color: var(--ink-600);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      margin: var(--space-4) 0 var(--space-2);
    }

    .admin-form .hint {
      font-size: var(--fs-2xs);
      color: var(--ink-600);
      margin-top: var(--space-1);
    }

    .page-checks {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: var(--space-2);
    }

    /* .flight-check reuses this exact look for the Flights multi-select
       below — kept as a SEPARATE class (not just another .page-check)
       so the Pages-reading selector in savePosition() (".page-check
       input:checked") can't accidentally sweep up flight checkboxes too. */
    .page-check, .flight-check {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-3);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--surface-sunken);
      font-size: var(--fs-sm);
    }
    .page-check__main {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      flex: 1;
      min-width: 0;
      cursor: pointer;
    }

    .page-check__main input { width: 18px; height: 18px; flex-shrink: 0; }

    /* Inspections/Awards, once every checked flight is Advanced Training
       School — see ATS_EXCLUDED_PAGE_IDS/updateAtsPageGating below. */
    .page-check--ats-disabled {
      opacity: 0.5;
    }
    .page-check--ats-disabled .page-check__main { cursor: not-allowed; }
    .page-check__label { overflow-wrap: break-word; min-width: 0; }

    /* Small pencil toggle for a page's edit-gate (e.g. edit-roster),
       sitting INSIDE that page's own box instead of as a separate
       checkbox row further down the grid — grants view + edit access
       for a page in one place instead of two disconnected entries. */
    .page-check__edit {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--ink-600);
      cursor: pointer;
      font-size: var(--fs-sm);
    }
    .page-check__edit:hover { border-color: var(--gold-500); }
    .page-check__edit.is-active {
      background: var(--gold-100);
      border-color: var(--gold-500);
      color: var(--gold-600);
    }

    .clear-pw {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      margin-top: var(--space-2);
      font-size: var(--fs-sm);
      color: var(--ink-600);
    }

    /* ---- Login Activity ---- */
    .log-toolbar {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      flex-wrap: wrap;
      margin-bottom: var(--space-4);
    }
    .log-summary {
      font-size: var(--fs-sm);
      color: var(--ink-600);
    }
    .log-summary strong { color: var(--red-600); }
  </style>
</head>
<body>

  <div class="app-shell">
    <nav class="nav-rail" id="nav-rail">
      <button type="button" class="nav-rail__crest" id="nav-rail-crest" aria-label="Toggle navigation width">
        <span class="nav-rail__crest-mark"><img src="../icons/icon-192.png" alt="NJWG"></span>
        <span class="nav-rail__crest-text">NJWG<span>Encampment</span></span>
      </button>
      <div id="nav-rail-links"></div>
    </nav>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/shell.js"></script>
    <script>
      // See overview.html for why this runs here instead of only inside
      // Shell.init() at the bottom — keeps the sidebar links from ever
      // being visibly empty for a moment on navigation between pages.
      Shell.renderNav("admin");
    </script>

    <header class="app-header" id="app-header"></header>

    <main class="app-main">
      <!-- Hidden until the active tab's data has actually loaded (see
           renderStaffTab()/renderLogTab() below) — this tab bar is static
           markup, so it used to appear and be clickable instantly while
           #admin-content was still spinning, instead of everything on the
           page appearing together. -->
      <div class="admin-tabs tabs" id="admin-tabs-bar" style="display:none;">
        <button class="tabs__tab is-active" data-tab="staff">Staff Access</button>
        <button class="tabs__tab" data-tab="log">Login Activity</button>
        <button class="tabs__tab" data-tab="settings">Worker Settings</button>
      </div>

      <div id="admin-content">
        <div class="state-message"><div class="spinner"></div><p>Loading…</p></div>
      </div>
    </main>
  </div>

  <script>
    Shell.init({ activePage: "admin" });

    const contentEl = document.getElementById("admin-content");
    const tabsBarEl = document.getElementById("admin-tabs-bar");
    const tabButtons = document.querySelectorAll(".tabs__tab");
    const esc = Shell.escapeHtml;
    const session = Auth.getSession();

    // Assignable page tokens: the app's real nav pages plus the write
    // gates the backend checks (see PAGE_WRITE_GATES in worker/src/auth.js).
    // Derived from NAV_ITEMS so it can't drift as pages are added.
    const EDIT_GATES = [
      { id: "edit-roster", label: "Edit roster" },
      { id: "edit-schedule", label: "Edit schedule" },
      { id: "edit-inspections", label: "Edit inspection periods" }
    ];
    const KNOWN_PAGES = [
      ...window.APP_CONFIG.NAV_ITEMS.map(n => ({ id: n.id, label: n.label })),
      ...EDIT_GATES
    ];

    // Inspections and Awards both exclude Advanced Training School
    // (India/Juliet — see Shell.isAtsFlight) from everything they show
    // (see groupByFlight's own ATS filter in pages/inspections.html and
    // pages/recommendations.html) — granting either page to a position
    // scoped to ATS flights only would just hand it a permanently empty
    // page, so the option to do that is removed here rather than left as
    // a working-but-pointless dead end. A position scoped to "All
    // flights" (or any mix including a non-ATS flight) is unaffected;
    // this only fires when EVERY flight checked is an ATS one.
    const ATS_EXCLUDED_PAGE_IDS = ["inspections", "recommendations"];

    let activeTab = "staff";
    let staff = [];              // [{ Position, Pages[], Flights[], hasPassword }]
    let loginEntries = [];       // [{ Timestamp, Type, Identifier, Success }]
    let logTotal = 0;
    let editing = null;          // Position being edited, "" for a new one, or null when the form is closed
    let bulkGroup = null;         // "flights" | "ats" | null — which group's bulk "Edit all" form is open, mutually exclusive with `editing`
    let failuresOnly = false;
    // Real flight names, sourced from the Roster tab (read is "any"
    // signed-in position per SHEET_PERMISSIONS, so this works regardless
    // of whether "roster" is in the Admin position's own Pages) — drives
    // the Flights multi-select below instead of requiring someone to
    // physically type comma-separated flight names that have to exactly
    // match Roster's own casing.
    let rosterFlightNames = [];

    function distinctFlightNames(rows) {
      const set = new Set();
      (rows || []).forEach(r => { if (r.Flight && String(r.Flight).trim()) set.add(String(r.Flight).trim()); });
      return Array.from(set).sort();
    }

    (() => {
      const { data: cached, ready } = Api.getSheetCached("Roster", (fresh) => {
        rosterFlightNames = distinctFlightNames(fresh.rows || []);
        if (activeTab === "staff" && editing !== null) renderStaffTab();
      });
      if (cached) rosterFlightNames = distinctFlightNames(cached.rows || []);
      ready.then((data) => {
        if (!cached) rosterFlightNames = distinctFlightNames(data.rows || []);
      }).catch(() => { /* best-effort — flights just falls back to free-typed custom entries below */ });
    })();

    // ---- Staff Access ----------------------------------------------------

    function flightsSummary(flights) {
      if (!flights.length) return "All flights";
      if (flights.some(f => f.toLowerCase() === "all")) return "All flights";
      return flights.join(", ");
    }

    // A position is an "Advanced Training School" position when every
    // flight it's scoped to is one of the fixed ATS flights (India/
    // Juliet — see Shell.isAtsFlight in js/shell.js), regardless of what
    // the position happens to be named. This is what separates the ATS
    // group from the ordinary Flights group below.
    function isAtsPosition(s) {
      const flights = s.Flights || [];
      return flights.length > 0 && flights.every(f => Shell.isAtsFlight(f));
    }

    // A "flight position" is any StaffAccess position whose NAME matches
    // an actual flight in the Roster (the same "position name IS the
    // flight name" convention index.html's login screen already uses),
    // excluding ATS positions (those get their own group below) —
    // data-driven off rosterFlightNames rather than a hardcoded list, so
    // it never needs updating when a flight is added/renamed/removed.
    // These are what "Edit all Flights" below bulk-applies Pages to.
    function flightPositions() {
      const flightNamesLower = new Set(rosterFlightNames.map(f => f.toLowerCase()));
      return staff.filter(s => flightNamesLower.has(s.Position.toLowerCase()) && !isAtsPosition(s));
    }

    function atsPositions() {
      return staff.filter(isAtsPosition);
    }

    function groupPositions(key) {
      if (key === "flights") return flightPositions();
      if (key === "ats") return atsPositions();
      return [];
    }

    function renderStaffForm() {
      if (editing === null && !bulkGroup) {
        return `<button class="btn btn--primary" id="add-position-btn">+ Add Position</button>`;
      }
      if (bulkGroup) return renderBulkFlightsForm(bulkGroup);
      const isNew = editing === "";
      const current = isNew ? null : staff.find(s => s.Position === editing);
      const currentPages = current ? current.Pages.map(p => p.toLowerCase()) : [];
      const currentFlights = current ? current.Flights : [];

      // One box per BASE page (not a separate row for its edit-* gate —
      // see the pencil toggle rendered inside each box below). Any custom
      // token already on this row that isn't a known base page or edit
      // gate still gets its own plain checkbox, same as before.
      const editGateByBase = new Map(EDIT_GATES.map(g => [g.id.replace(/^edit-/, ""), g]));
      const basePages = window.APP_CONFIG.NAV_ITEMS.map(n => ({ id: n.id, label: n.label }));
      const knownIds = new Set([...basePages.map(p => p.id), ...EDIT_GATES.map(g => g.id)]);
      const customPages = currentPages.filter(p => !knownIds.has(p)).map(id => ({ id, label: id }));

      return `
        <div class="card admin-form">
          <h2 class="card-title">${isNew ? "Add Position" : `Edit “${esc(editing)}”`}</h2>

          <label class="field-label" for="pos-name">Position name</label>
          <input type="text" id="pos-name" value="${esc(editing)}" ${isNew ? "" : "disabled"} placeholder="e.g. Bravo Flight, CCT, Administrator">
          ${isNew ? "" : `<div class="hint">Position name is the key and can't be changed here — delete and re-add to rename.</div>`}

          <label class="field-label">Pages this position can access</label>
          <div class="hint" style="margin-top:0; margin-bottom: var(--space-2);">Check a page to grant it, and use the ✎ where present to also grant edit access for that page. Inspections and Awards are unavailable once every checked flight below is Advanced Training School — both exclude ATS entirely, so granting them would just be a permanently empty page.</div>
          <div class="page-checks">
            ${basePages.map(p => {
              const editGate = editGateByBase.get(p.id);
              const viewChecked = currentPages.includes(p.id.toLowerCase());
              const editChecked = !!editGate && currentPages.includes(editGate.id.toLowerCase());
              return `
                <div class="page-check" data-page-id="${esc(p.id)}">
                  <label class="page-check__main">
                    <input type="checkbox" value="${esc(p.id)}" ${viewChecked ? "checked" : ""}>
                    <span class="page-check__label">${esc(p.label)}</span>
                  </label>
                  ${editGate ? `
                    <button type="button" class="page-check__edit${editChecked ? " is-active" : ""}" data-edit-gate="${esc(editGate.id)}" data-tooltip="${esc(editGate.label)}" aria-pressed="${editChecked}" aria-label="${esc(editGate.label)}">✎</button>
                    <input type="checkbox" class="page-check__edit-input" value="${esc(editGate.id)}" ${editChecked ? "checked" : ""} hidden>
                  ` : ""}
                </div>
              `;
            }).join("")}
            ${customPages.map(p => `
              <div class="page-check">
                <label class="page-check__main">
                  <input type="checkbox" value="${esc(p.id)}" checked>
                  <span class="page-check__label">${esc(p.label)}</span>
                </label>
              </div>
            `).join("")}
          </div>

          <label class="field-label">Flights</label>
          <div class="hint" style="margin-top:0; margin-bottom: var(--space-2);">Leave every flight unchecked (or check "All flights") to grant access to every flight's cadets.</div>
          ${(() => {
            const currentLower = currentFlights.map(f => f.toLowerCase());
            // Blank Flights already means "all" per the backend (see
            // flightsSummary() above) — reflect that as the checkbox
            // being CHECKED by default, not an empty, unchecked-looking
            // grid that reads as "no flights" instead of "every flight."
            const isAll = !currentFlights.length || currentFlights.every(f => f.toLowerCase() === "all");
            // Any flight already on this row that Roster doesn't currently
            // have a cadet in (stale data, or typed in before this cadet
            // existed) still gets its own checkbox — editing a position
            // should never silently drop a flight it already had.
            const extraFlights = currentFlights.filter(f => f.toLowerCase() !== "all" && !rosterFlightNames.some(r => r.toLowerCase() === f.toLowerCase()));
            const allFlightOptions = [...rosterFlightNames, ...extraFlights];
            return `
              <div class="page-checks" style="margin-bottom: var(--space-2);">
                <div class="flight-check">
                  <label class="page-check__main">
                    <input type="checkbox" id="pos-flights-all" ${isAll ? "checked" : ""}>
                    <span class="page-check__label">All flights</span>
                  </label>
                </div>
              </div>
              <div class="page-checks" id="pos-flights-grid" style="${isAll ? "display:none;" : ""}">
                ${allFlightOptions.length ? allFlightOptions.map(f => `
                  <div class="flight-check">
                    <label class="page-check__main">
                      <input type="checkbox" class="pos-flight-check" value="${esc(f)}" ${currentLower.includes(f.toLowerCase()) ? "checked" : ""}>
                      <span class="page-check__label">${esc(f)}</span>
                    </label>
                  </div>
                `).join("") : `<div class="hint" style="margin:0;">No flights found in the Roster yet — add cadets there first, or check "All flights" above.</div>`}
              </div>
            `;
          })()}

          <label class="field-label" for="pos-password">Password</label>
          <input type="password" id="pos-password" autocomplete="new-password" placeholder="${current && current.hasPassword ? "Leave blank to keep the current password" : "Leave blank for no password"}">
          <div class="hint">Positions with a password require it at sign-in (e.g. CCT, Administrator). The current password is never shown.</div>
          ${current && current.hasPassword ? `
            <label class="clear-pw"><input type="checkbox" id="clear-pw"> Remove the password (make this position open)</label>
          ` : ""}

          <div style="display:flex; gap: var(--space-3); margin-top: var(--space-5);">
            <button class="btn btn--primary" id="save-position-btn">${isNew ? "Create Position" : "Save Changes"}</button>
            <button class="btn btn--ghost" id="cancel-position-btn">Cancel</button>
          </div>
        </div>
      `;
    }

    /**
     * "Edit all" for a group — since positions within a group normally
     * hold the same Pages, this applies one set of checkboxes to ALL of
     * them in one Save instead of opening each one individually. It's a
     * bulk WRITE, not a live-inheriting default: after using this, a
     * specific position can still be opened and edited on its own (the
     * normal "Edit <position>" flow below), exactly as before — that
     * edit only touches that one position and isn't overwritten by this
     * form existing. Starts with nothing checked (there's no single
     * "current" set of Pages to show when members might differ from
     * each other) — Flights/Password are untouched per-position fields,
     * so this form only ever has Pages checkboxes, no Flights/Password
     * section.
     */
    function renderBulkFlightsForm(key) {
      const positions = groupPositions(key);
      const groupTitle = key === "ats" ? "Advanced Training School" : "Flights";
      const editGateByBase = new Map(EDIT_GATES.map(g => [g.id.replace(/^edit-/, ""), g]));
      // Every position this bulk form applies to is ATS-scoped when
      // key === "ats" (see atsPositions()) — Inspections/Awards would be
      // a permanently empty page for all of them either way, so they're
      // left off the list entirely here rather than offered and then
      // silently stripped on save.
      const basePages = window.APP_CONFIG.NAV_ITEMS
        .filter(n => key !== "ats" || !ATS_EXCLUDED_PAGE_IDS.includes(n.id))
        .map(n => ({ id: n.id, label: n.label }));

      return `
        <div class="card admin-form">
          <h2 class="card-title">Edit all — ${esc(groupTitle)}</h2>
          <div class="hint" style="margin-top:0;">
            Applies the Pages checked below to every position in this group at once — ${positions.map(p => esc(p.Position)).join(", ")} — overwriting each one's current Pages. Each position's own Flights scope and Password are left untouched. You can still open and edit one specific position afterward to give it different access, the same as always.
          </div>

          <label class="field-label">Pages this group can access</label>
          <div class="page-checks">
            ${basePages.map(p => {
              const editGate = editGateByBase.get(p.id);
              return `
                <div class="page-check">
                  <label class="page-check__main">
                    <input type="checkbox" value="${esc(p.id)}">
                    <span class="page-check__label">${esc(p.label)}</span>
                  </label>
                  ${editGate ? `
                    <button type="button" class="page-check__edit" data-edit-gate="${esc(editGate.id)}" data-tooltip="${esc(editGate.label)}" aria-pressed="false" aria-label="${esc(editGate.label)}">✎</button>
                    <input type="checkbox" class="page-check__edit-input" value="${esc(editGate.id)}" hidden>
                  ` : ""}
                </div>
              `;
            }).join("")}
          </div>

          <div style="display:flex; gap: var(--space-3); margin-top: var(--space-5);">
            <button class="btn btn--primary" id="save-all-flights-btn">Apply to all ${positions.length}</button>
            <button class="btn btn--ghost" id="cancel-all-flights-btn">Cancel</button>
          </div>
        </div>
      `;
    }

    // Positions whose "Preview access" panel is currently expanded — a
    // Set (not a single value) so more than one can be open for
    // side-by-side comparison. Purely a display toggle: computed entirely
    // from `staff` data already loaded for this tab, no extra network
    // call and no real session/token involved — see renderAccessPreview.
    let previewOpenPositions = new Set();

    /**
     * A read-only, safe alternative to actually signing in as another
     * position just to check what it can see — everything here is
     * derived from the SAME Pages/Flights data the staff list already
     * has, using the identical page/edit-gate matching logic
     * renderStaffForm uses to pre-check its own boxes.
     */
    function renderAccessPreview(s) {
      const pagesLower = s.Pages.map(p => p.toLowerCase());
      const editGateByBase = new Map(EDIT_GATES.map(g => [g.id.replace(/^edit-/, ""), g]));
      const basePages = window.APP_CONFIG.NAV_ITEMS.map(n => ({ id: n.id, label: n.label }));
      const visible = basePages.filter(p => pagesLower.includes(p.id.toLowerCase()));
      const withEdit = basePages.filter(p => {
        const gate = editGateByBase.get(p.id);
        return gate && pagesLower.includes(gate.id.toLowerCase());
      });
      const knownIds = new Set([...basePages.map(p => p.id), ...EDIT_GATES.map(g => g.id)]);
      const customTokens = s.Pages.filter(p => !knownIds.has(p.toLowerCase()));

      return `
        <div class="staff-row__preview">
          <div class="staff-row__preview-row"><strong>Sees:</strong> ${visible.length ? visible.map(p => esc(p.label)).join(", ") : "Nothing — no pages granted yet"}</div>
          <div class="staff-row__preview-row"><strong>Can edit:</strong> ${withEdit.length ? withEdit.map(p => esc(p.label)).join(", ") : "Nothing"}</div>
          <div class="staff-row__preview-row"><strong>Flights:</strong> ${esc(flightsSummary(s.Flights))}</div>
          ${customTokens.length ? `<div class="staff-row__preview-row"><strong>Other tokens:</strong> ${customTokens.map(esc).join(", ")}</div>` : ""}
        </div>
      `;
    }

    function renderStaffRow(s) {
      const isAdmin = s.Pages.map(p => p.toLowerCase()).includes("admin");
      const previewOpen = previewOpenPositions.has(s.Position);
      return `
        <div class="staff-row">
          <div style="min-width:0;">
            <div class="staff-row__name">
              ${esc(s.Position)}
              ${isAdmin ? `<span class="badge badge--gold">Admin</span>` : ""}
              ${s.hasPassword ? `<span class="badge badge--garnet">🔒 Password</span>` : ""}
            </div>
            <div class="staff-row__meta">${esc(flightsSummary(s.Flights))} · ${s.Pages.length} page${s.Pages.length === 1 ? "" : "s"}</div>
            <div class="staff-row__chips">
              ${(() => {
                // Show at most CHIP_LIMIT page chips and fold the
                // rest into a single "+N" chip, rather than letting
                // a position with many pages wrap the whole card
                // onto extra rows of chips (see .staff-row__chips'
                // flex-wrap — a card with 10 pages used to grow
                // tall with 2-3 rows of little tags).
                const CHIP_LIMIT = 5;
                const shown = s.Pages.slice(0, CHIP_LIMIT);
                const hidden = s.Pages.length - shown.length;
                const chips = shown.map(p => `<span class="chip">${esc(p)}</span>`).join("");
                const overflow = hidden > 0 ? `<span class="chip" data-tooltip="${esc(s.Pages.slice(CHIP_LIMIT).join(", "))}">+${hidden}</span>` : "";
                return chips + overflow || `<span class="chip">no pages</span>`;
              })()}
            </div>
            ${previewOpen ? renderAccessPreview(s) : ""}
          </div>
          <div class="staff-row__actions">
            <button class="btn btn--ghost" data-preview="${esc(s.Position)}" aria-expanded="${previewOpen}">${previewOpen ? "Hide preview" : "Preview access"}</button>
            <button class="btn btn--ghost" data-edit="${esc(s.Position)}">Edit</button>
            <button class="btn btn--danger" data-delete="${esc(s.Position)}">Delete</button>
          </div>
        </div>`;
    }

    /**
     * One named section of the staff list (Flights / Advanced Training
     * School / Other) — grouping keeps the flat list from turning into
     * a wall of near-identical flight rows, and gives each group its own
     * "Edit all" bulk-permissions entry point (only shown once there's
     * more than one position in the group to actually bulk-apply to).
     */
    function renderStaffGroup(title, positions, bulkKey) {
      if (!positions.length) return "";
      const bulkBtn = bulkKey && positions.length > 1 ? `
        <button class="btn btn--ghost" id="edit-all-${esc(bulkKey)}-btn" data-tooltip="Applies one set of Pages to every position in this group at once — ${positions.map(p => esc(p.Position)).join(", ")}">Edit all</button>
      ` : "";
      return `
        <div class="staff-group">
          <div class="staff-group__header">
            <h3 class="staff-group__title">${esc(title)}</h3>
            ${bulkBtn}
          </div>
          <div class="staff-list">
            ${positions.map(renderStaffRow).join("")}
          </div>
        </div>
      `;
    }

    function renderStaffList() {
      if (!staff.length) {
        return `
          <div class="state-message">
            <div class="state-message__icon">🗝️</div>
            <p>No positions found. If you're locked out, add <span class="chip">admin</span> to a position's Pages column directly in the StaffAccess Google Sheet to bootstrap the first administrator.</p>
          </div>`;
      }
      const sortByName = arr => arr.slice().sort((a, b) => a.Position.localeCompare(b.Position));
      const flights = flightPositions();
      const ats = atsPositions();
      const grouped = new Set([...flights, ...ats].map(s => s.Position));
      const other = staff.filter(s => !grouped.has(s.Position));
      return [
        renderStaffGroup("Flights", sortByName(flights), "flights"),
        renderStaffGroup("Advanced Training School", sortByName(ats), "ats"),
        renderStaffGroup("Other", sortByName(other), null),
      ].join("");
    }

    function renderStaffTab() {
      // The tabs bar is hidden (display:none) until now — enhanceTabs()'s
      // sliding indicator was positioned while it was still hidden
      // (offsetWidth/Left both read 0 on a display:none element), so it
      // needs to re-measure now that the bar is actually visible.
      tabsBarEl.style.display = "";
      if (adminTabsIndicator) adminTabsIndicator.move();
      contentEl.innerHTML = renderStaffForm() + renderStaffList();

      const addBtn = document.getElementById("add-position-btn");
      if (addBtn) addBtn.addEventListener("click", () => { editing = ""; renderStaffTab(); });
      const editAllFlightsBtn = document.getElementById("edit-all-flights-btn");
      if (editAllFlightsBtn) editAllFlightsBtn.addEventListener("click", () => { bulkGroup = "flights"; renderStaffTab(); });
      const editAllAtsBtn = document.getElementById("edit-all-ats-btn");
      if (editAllAtsBtn) editAllAtsBtn.addEventListener("click", () => { bulkGroup = "ats"; renderStaffTab(); });

      const saveBtn = document.getElementById("save-position-btn");
      if (saveBtn) saveBtn.addEventListener("click", savePosition);
      const cancelBtn = document.getElementById("cancel-position-btn");
      if (cancelBtn) cancelBtn.addEventListener("click", () => { editing = null; renderStaffTab(); });

      const saveAllFlightsBtn = document.getElementById("save-all-flights-btn");
      if (saveAllFlightsBtn) saveAllFlightsBtn.addEventListener("click", saveBulkFlights);
      const cancelAllFlightsBtn = document.getElementById("cancel-all-flights-btn");
      if (cancelAllFlightsBtn) cancelAllFlightsBtn.addEventListener("click", () => { bulkGroup = null; renderStaffTab(); });

      contentEl.querySelectorAll("[data-edit]").forEach(b =>
        b.addEventListener("click", () => { editing = b.dataset.edit; renderStaffTab(); window.scrollTo({ top: 0, behavior: "smooth" }); }));
      contentEl.querySelectorAll("[data-delete]").forEach(b =>
        b.addEventListener("click", () => deletePosition(b.dataset.delete)));
      contentEl.querySelectorAll("[data-preview]").forEach(b =>
        b.addEventListener("click", () => {
          const position = b.dataset.preview;
          if (previewOpenPositions.has(position)) previewOpenPositions.delete(position);
          else previewOpenPositions.add(position);
          renderStaffTab();
        }));

      // Pencil toggle for a page's edit-gate — flips its own hidden
      // checkbox (read by savePosition() the same as every other
      // .page-check input) rather than the page's view-access checkbox
      // right next to it.
      contentEl.querySelectorAll(".page-check__edit").forEach(btn => {
        btn.addEventListener("click", () => {
          const input = btn.nextElementSibling;
          input.checked = !input.checked;
          btn.classList.toggle("is-active", input.checked);
          btn.setAttribute("aria-pressed", String(input.checked));
        });
      });

      const allFlightsCheckbox = document.getElementById("pos-flights-all");
      const flightsGrid = document.getElementById("pos-flights-grid");
      if (allFlightsCheckbox && flightsGrid) {
        allFlightsCheckbox.addEventListener("change", () => {
          flightsGrid.style.display = allFlightsCheckbox.checked ? "none" : "";
          updateAtsPageGating();
        });
      }
      if (flightsGrid) {
        flightsGrid.querySelectorAll(".pos-flight-check").forEach(cb => cb.addEventListener("change", updateAtsPageGating));
      }
      updateAtsPageGating(); // reflect this position's Flights as already checked, on first render

      Shell.wireTooltips(contentEl);
      Shell.animateIn(contentEl);
    }

    /**
     * Disables (and force-unchecks) the Inspections/Awards Pages
     * checkboxes whenever every currently-CHECKED flight is Advanced
     * Training School — see ATS_EXCLUDED_PAGE_IDS above. Re-run on every
     * Flights checkbox change (wired in renderStaffTab) so it tracks
     * live edits, not just the position's saved state. "All flights"
     * checked, or no flight checked at all (also "all," per the backend
     * — see flightsSummary), is never ATS-only and always re-enables
     * both pages.
     */
    function updateAtsPageGating() {
      const allFlightsCheckbox = document.getElementById("pos-flights-all");
      const checkedFlights = allFlightsCheckbox && allFlightsCheckbox.checked
        ? []
        : Array.from(contentEl.querySelectorAll(".pos-flight-check:checked")).map(i => i.value);
      const isAtsOnly = checkedFlights.length > 0 && checkedFlights.every(f => Shell.isAtsFlight(f));

      ATS_EXCLUDED_PAGE_IDS.forEach(pageId => {
        const box = contentEl.querySelector(`.page-check[data-page-id="${pageId}"]`);
        if (!box) return;
        box.classList.toggle("page-check--ats-disabled", isAtsOnly);
        const input = box.querySelector(".page-check__main input");
        if (input) {
          input.disabled = isAtsOnly;
          if (isAtsOnly) input.checked = false;
        }
        // Inspections' edit-inspections pencil is meaningless without
        // the base page itself — disable/uncheck it the same way.
        const editBtn = box.querySelector(".page-check__edit");
        const editInput = box.querySelector(".page-check__edit-input");
        if (isAtsOnly && editBtn && editInput) {
          editInput.checked = false;
          editBtn.classList.remove("is-active");
          editBtn.setAttribute("aria-pressed", "false");
        }
        if (editBtn) editBtn.disabled = isAtsOnly;
      });
    }

    async function savePosition() {
      const nameInput = document.getElementById("pos-name");
      const position = nameInput.value.trim();
      if (!position) { Shell.showToast("Enter a position name.", { type: "error" }); return; }

      let pages = Array.from(contentEl.querySelectorAll(".page-check input:checked")).map(i => i.value);
      const flightsAllChecked = document.getElementById("pos-flights-all").checked;
      const flights = flightsAllChecked
        ? []
        : Array.from(contentEl.querySelectorAll(".pos-flight-check:checked")).map(i => i.value);
      const passwordVal = document.getElementById("pos-password").value;
      const clearPw = document.getElementById("clear-pw");

      // Belt-and-suspenders alongside updateAtsPageGating's live UI
      // disabling above — strip Inspections/Awards (and Inspections'
      // edit-inspections gate) here too if every flight ends up ATS-only,
      // so this can't slip through even if the reactive gating somehow
      // didn't run (e.g. the checkbox state changed without a "change"
      // event, or a future edit to this form misses re-wiring it).
      if (flights.length && flights.every(f => Shell.isAtsFlight(f))) {
        pages = pages.filter(p => !ATS_EXCLUDED_PAGE_IDS.includes(p.toLowerCase()) && p.toLowerCase() !== "edit-inspections");
      }

      const row = { position, pages, flights };
      if (clearPw && clearPw.checked) row.clearPassword = true;
      else if (passwordVal) row.password = passwordVal;

      const btn = document.getElementById("save-position-btn");
      btn.disabled = true; btn.textContent = "Saving…";
      try {
        await Api.adminSaveStaffAccess(row);
        editing = null;
        renderStaffTab(); // close form immediately; loadStaff() refreshes data
        await loadStaff();
        Shell.showToast("Saved.", { type: "success" });
      } catch (err) {
        Shell.showToast(err.message, { type: "error" });
        btn.disabled = false; btn.textContent = "Save Changes";
      }
    }

    /**
     * Applies the checked Pages to every position in `bulkGroup` in one
     * go — one adminSaveStaffAccess call per position, each preserving
     * THAT position's own Flights/Password (read from the already-loaded
     * `staff` list) so this only ever touches Pages. Partial failure (one
     * position's save rejected — e.g. it would've dropped the last
     * Administrator, vanishingly unlikely for a flight/ATS position but
     * not impossible) is reported by name rather than silently losing
     * track of which ones actually got the new Pages and which didn't.
     */
    async function saveBulkFlights() {
      const pages = Array.from(contentEl.querySelectorAll(".page-check input:checked")).map(i => i.value);
      const positions = groupPositions(bulkGroup);

      const btn = document.getElementById("save-all-flights-btn");
      btn.disabled = true; btn.textContent = "Applying…";

      const results = await Promise.allSettled(positions.map(p =>
        Api.adminSaveStaffAccess({ position: p.Position, pages, flights: p.Flights })
      ));
      const failed = results
        .map((r, i) => ({ r, position: positions[i].Position }))
        .filter(x => x.r.status === "rejected");

      bulkGroup = null;
      renderStaffTab();
      await loadStaff();

      if (failed.length) {
        Shell.showToast(`Applied to ${positions.length - failed.length}/${positions.length}. Failed: ${failed.map(f => f.position).join(", ")}.`, { type: "error" });
      } else {
        Shell.showToast(`Applied to all ${positions.length}.`, { type: "success" });
      }
    }

    async function deletePosition(position) {
      const confirmed = await Shell.confirm({
        title: `Delete “${position}”?`,
        message: "Anyone signed in as this position stays signed in until their session expires, but no one will be able to sign in as it again.",
        confirmLabel: "Delete Position"
      });
      if (!confirmed) return;
      try {
        await Api.adminDeleteStaffAccess(position);
        await loadStaff();
        Shell.showToast("Position deleted.", { type: "success" });
      } catch (err) {
        Shell.showToast(err.message, { type: "error" });
      }
    }

    // ---- Login Activity --------------------------------------------------

    function isSuccess(entry) {
      return String(entry.Success).trim().toLowerCase() === "true";
    }

    function renderLogTab() {
      tabsBarEl.style.display = "";
      if (adminTabsIndicator) adminTabsIndicator.move();
      const shown = failuresOnly ? loginEntries.filter(e => !isSuccess(e)) : loginEntries;
      const failures = loginEntries.filter(e => !isSuccess(e)).length;

      contentEl.innerHTML = `
        <div class="log-toolbar">
          <div class="tabs" role="group" aria-label="Filter">
            <button class="tabs__tab ${failuresOnly ? "" : "is-active"}" data-filter="all">All</button>
            <button class="tabs__tab ${failuresOnly ? "is-active" : ""}" data-filter="failures">Failures Only</button>
          </div>
          <div class="log-summary">
            Showing ${shown.length} of ${logTotal} recorded · <strong>${failures}</strong> failed attempt${failures === 1 ? "" : "s"} in this window
          </div>
        </div>

        ${shown.length ? `
          <table class="data-table">
            <thead>
              <tr><th>Time</th><th>Type</th><th>Identifier</th><th>Result</th></tr>
            </thead>
            <tbody>
              ${shown.map(e => {
                const ok = isSuccess(e);
                const when = e.Timestamp ? Shell.formatDateTime(e.Timestamp) : "—";
                return `
                  <tr>
                    <td data-label="Time" class="mono">${esc(when)}</td>
                    <td data-label="Type">${esc(e.Type || "—")}</td>
                    <td data-label="Identifier">${esc(e.Identifier || "—")}</td>
                    <td data-label="Result"><span class="badge ${ok ? "badge--success" : "badge--error"}">${ok ? "Success" : "Failed"}</span></td>
                  </tr>`;
              }).join("")}
            </tbody>
          </table>
        ` : `
          <div class="state-message"><div class="state-message__icon">🪵</div><p>No login activity recorded yet.</p></div>
        `}
      `;

      contentEl.querySelectorAll("[data-filter]").forEach(b =>
        b.addEventListener("click", () => { failuresOnly = b.dataset.filter === "failures"; renderLogTab(); }));
      Shell.enhanceTabs(contentEl.querySelector(".log-toolbar .tabs"));
      Shell.animateIn(contentEl);
    }

    // ---- Worker Settings ---------------------------------------------------
    //
    // A small, deliberately short list of operational knobs — see
    // worker/src/runtimeConfig.js for how these are stored/read on the
    // backend. Everything here changes LIVE for every device, with no
    // redeploy, within about a minute (the Worker re-checks its own
    // cached copy of these values every 60s). Only settings with a real,
    // explainable effect on cost or reliability are here — this is not a
    // dumping ground for every constant in the codebase.

    let workerConfig = null; // null until first loaded
    const DEFAULT_WORKER_CONFIG = {
      rateLimitPerMinute: 60,
      maintenanceMode: false,
      deviceTokenLifetimeHoursPersonal: 24 * 14,
      deviceTokenLifetimeHoursShared: 8,
      flightColors: {}
    };

    function renderSettingsTab() {
      tabsBarEl.style.display = "";
      if (adminTabsIndicator) adminTabsIndicator.move();
      const cfg = workerConfig || DEFAULT_WORKER_CONFIG;
      const personalDays = Math.round(cfg.deviceTokenLifetimeHoursPersonal / 24);

      contentEl.innerHTML = `
        <div class="card admin-form">
          <h2 class="card-title">Worker Settings</h2>
          <p class="hint" style="margin-top:0;">
            These control how the backend (the Cloudflare Worker) behaves for every device, and take effect live for everyone within about a minute — no redeploy needed. The defaults below are safe for normal use; only change one of these if you have a specific reason to.
          </p>

          <label class="field-label">Google Sheet edited directly?</label>
          <div class="hint" style="margin-top:0;">
            Edits made THROUGH this app — any Save or Delete on any page — always show up for everyone within moments; this button has no effect on those. It only matters after someone edits the Google Sheet directly, bypassing the app entirely: click it and the change shows up for everyone right away, instead of waiting for the Worker to notice on its own.
          </div>
          <button class="btn btn--primary" id="sync-sheets-btn" style="margin-top: var(--space-3);">Sync Now</button>

          <label class="field-label" for="cfg-rate-limit" style="margin-top: var(--space-5);">Requests allowed per device per minute</label>
          <input type="number" id="cfg-rate-limit" min="10" max="300" step="5" value="${cfg.rateLimitPerMinute}">
          <div class="hint">
            Caps how many requests one signed-in device can make per minute, protecting the Worker and the Google Sheet from being overwhelmed by a single device. Lower it only if you suspect abuse or a malfunctioning device; raise it if legitimate staff see "Too many requests" during normal heavy use, e.g. right after a big announcement when everyone opens the app at once. Default: 60.
          </div>

          <label class="clear-pw" style="margin-top: var(--space-5);">
            <input type="checkbox" id="cfg-maintenance-mode" ${cfg.maintenanceMode ? "checked" : ""}>
            Maintenance mode (read-only)
          </label>
          <div class="hint">
            When on, every page keeps loading and showing data as normal, but Saving and Deleting is paused everywhere — Roster, Schedule, Inspections, Notes, Observations, Announcements, Black Flag, and Awards — with a clear message instead of failing partway through. Staff Access management (this tab) and push-alert sign-up still work as usual. Turn this on before a bulk edit directly in the Google Sheet, or if the Sheet is having problems, so the app doesn't fight you or pile up failed saves; turn it back off when you're done.
          </div>

          <label class="field-label" for="cfg-device-personal" style="margin-top: var(--space-5);">Personal device sign-in length (days)</label>
          <input type="number" id="cfg-device-personal" min="1" max="30" step="1" value="${personalDays}">
          <div class="hint">
            How long a device marked "My own device" at the passphrase gate stays unlocked before needing the passphrase again. Longer means fewer passphrase re-entries over the encampment; shorter reduces how long a lost or stolen device stays usable. Default: 14 days.
          </div>

          <label class="field-label" for="cfg-device-shared">Shared/desk device sign-in length (hours)</label>
          <input type="number" id="cfg-device-shared" min="1" max="168" step="1" value="${cfg.deviceTokenLifetimeHoursShared}">
          <div class="hint">
            The same, for a device marked "Shared / desk device" at the passphrase gate — kept short on purpose so it doesn't stay unlocked all day for whoever sits down next. This is separate from the 2-hour inactivity timeout that already signs a POSITION out on any device; that timeout is unaffected by this setting. Default: 8 hours.
          </div>

          <div style="display:flex; gap: var(--space-3); margin-top: var(--space-5);">
            <button class="btn btn--primary" id="save-settings-btn">Save Changes</button>
            <button class="btn btn--ghost" id="reset-settings-btn">Reset to Defaults</button>
          </div>
        </div>

        <div class="card admin-form" style="margin-top: var(--space-5);">
          <h2 class="card-title">Flight Colors</h2>
          <p class="hint" style="margin-top:0;">
            The colored accents used throughout the app (Overview's Flight Standings and Today's Inspections bars, the Roster/Inspections/Observations flight tiles, Schedule's Flight badge) come from this list. "Sync from Roster" reads the ACTUAL cell background color of each flight's rows in the Roster sheet's Flight column and uses that — not a hand-typed guess — so it always matches what's really in the Sheet. Re-run it any time a flight is recolored, added, or removed there.
          </p>
          <div id="flight-colors-preview" style="display:flex; flex-wrap:wrap; gap: var(--space-2); margin-bottom: var(--space-4);">
            ${Object.keys(cfg.flightColors || {}).length ? Object.entries(cfg.flightColors).map(([flight, color]) => `
              <span class="chip" style="background:${esc(color)}22; color:${esc(color)}; font-family: var(--font-body); text-transform: capitalize;">${esc(flight)}</span>
            `).join("") : `<span class="hint" style="margin:0;">Not synced yet — every page is using its built-in fallback colors.</span>`}
          </div>
          <button class="btn btn--primary" id="sync-flight-colors-btn">Sync from Roster</button>
        </div>
      `;

      document.getElementById("save-settings-btn").addEventListener("click", saveWorkerSettings);
      document.getElementById("reset-settings-btn").addEventListener("click", () => {
        // Only resets what's shown in the form — nothing is actually
        // saved (and nothing changes for any device) until Save Changes
        // is clicked, same as editing any field by hand.
        workerConfig = { ...DEFAULT_WORKER_CONFIG, flightColors: cfg.flightColors };
        renderSettingsTab();
        Shell.showToast("Fields reset to defaults — click Save Changes to apply.", { type: "" });
      });
      document.getElementById("sync-flight-colors-btn").addEventListener("click", syncFlightColors);
      document.getElementById("sync-sheets-btn").addEventListener("click", syncSheets);

      Shell.animateIn(contentEl);
    }

    async function syncSheets() {
      const btn = document.getElementById("sync-sheets-btn");
      btn.disabled = true;
      btn.textContent = "Syncing…";
      try {
        await Api.adminSyncSheets();
        // So THIS device sees the direct Sheet edit right away too,
        // instead of only after its own cache happens to expire.
        await Shell.hardRefresh();
        Shell.showToast("Synced — direct Sheet edits now show up for everyone.", { type: "success" });
      } catch (err) {
        Shell.showToast(err.message, { type: "error" });
      } finally {
        btn.disabled = false;
        btn.textContent = "Sync Now";
      }
    }

    async function syncFlightColors() {
      const btn = document.getElementById("sync-flight-colors-btn");
      btn.disabled = true;
      btn.textContent = "Syncing…";
      try {
        const res = await Api.adminSyncFlightColors();
        workerConfig = { ...(workerConfig || DEFAULT_WORKER_CONFIG), flightColors: res.colors || {} };
        // So THIS device reflects the change immediately, not just after
        // whatever page happens to load next — see Shell.refreshFlightColors.
        await Shell.refreshFlightColors();
        renderSettingsTab();
        Shell.showToast(`Synced ${res.flightsFound} flight color${res.flightsFound === 1 ? "" : "s"} from Roster.`, { type: "success" });
      } catch (err) {
        Shell.showToast(err.message, { type: "error" });
        btn.disabled = false;
        btn.textContent = "Sync from Roster";
      }
    }

    async function saveWorkerSettings() {
      const patch = {
        rateLimitPerMinute: Number(document.getElementById("cfg-rate-limit").value),
        maintenanceMode: document.getElementById("cfg-maintenance-mode").checked,
        deviceTokenLifetimeHoursPersonal: Number(document.getElementById("cfg-device-personal").value) * 24,
        deviceTokenLifetimeHoursShared: Number(document.getElementById("cfg-device-shared").value)
      };

      const btn = document.getElementById("save-settings-btn");
      btn.disabled = true; btn.textContent = "Saving…";
      try {
        const res = await Api.adminSaveWorkerConfig(patch);
        // The backend clamps every field to a sane range — re-render from
        // what it actually stored, so e.g. a value typed above the max
        // visibly snaps back to the clamp instead of silently disagreeing
        // with what's really in effect.
        workerConfig = res.config;
        renderSettingsTab();
        Shell.showToast("Worker settings saved.", { type: "success" });
      } catch (err) {
        Shell.showToast(err.message, { type: "error" });
        btn.disabled = false; btn.textContent = "Save Changes";
      }
    }

    async function loadWorkerConfig() {
      try {
        const res = await Api.adminGetWorkerConfig();
        const fresh = res.config;
        const changed = JSON.stringify(fresh) !== JSON.stringify(workerConfig);
        workerConfig = fresh;
        if (activeTab === "settings" && changed) renderSettingsTab();
      } catch (err) {
        if (activeTab === "settings") contentEl.innerHTML = `<div class="state-message"><div class="state-message__icon">⚠️</div><p>${esc(err.message)}</p></div>`;
        Shell.showToast(err.message, { type: "error" });
      }
    }

    // ---- Loading + tabs --------------------------------------------------

    async function loadStaff() {
      try {
        const res = await Api.adminListStaffAccess();
        const fresh = res.positions || [];
        // showActiveTab() already rendered synchronously from whatever
        // was cached in `staff` BEFORE this network call started (so
        // switching back to an already-visited tab feels instant). Only
        // re-render here if this fetch actually came back different —
        // otherwise switching Staff Access <-> Login Activity replayed
        // the entrance animation a second time moments after the first,
        // for a re-render that changed nothing on screen.
        const changed = JSON.stringify(fresh) !== JSON.stringify(staff);
        staff = fresh;
        if (activeTab === "staff" && changed) renderStaffTab();
      } catch (err) {
        if (activeTab === "staff") contentEl.innerHTML = `<div class="state-message"><div class="state-message__icon">⚠️</div><p>${esc(err.message)}</p></div>`;
        Shell.showToast(err.message, { type: "error" });
      }
    }

    async function loadLog() {
      try {
        const res = await Api.adminListLoginLog({ limit: 200 });
        const freshEntries = res.entries || [];
        const freshTotal = res.total || freshEntries.length;
        // Same reasoning as loadStaff() above — skip the redundant
        // re-render/re-animate when this fetch didn't change anything
        // from what was already shown from cache.
        const changed = freshTotal !== logTotal || JSON.stringify(freshEntries) !== JSON.stringify(loginEntries);
        loginEntries = freshEntries;
        logTotal = freshTotal;
        if (activeTab === "log" && changed) renderLogTab();
      } catch (err) {
        if (activeTab === "log") contentEl.innerHTML = `<div class="state-message"><div class="state-message__icon">⚠️</div><p>${esc(err.message)}</p></div>`;
        Shell.showToast(err.message, { type: "error" });
      }
    }

    function updateExport() {
      // Only the Login Activity tab has something worth exporting.
      if (activeTab === "log") {
        Shell.registerExport(() => ({
          filename: `login-activity-${new Date().toISOString().slice(0, 10)}.csv`,
          columns: ["Timestamp", "Type", "Identifier", "Success"],
          rows: (failuresOnly ? loginEntries.filter(e => !isSuccess(e)) : loginEntries)
        }));
      } else {
        Shell.registerExport(null);
      }
    }

    function showActiveTab() {
      updateExport();
      if (activeTab === "log") {
        if (loginEntries.length || logTotal) renderLogTab();
        else { contentEl.innerHTML = `<div class="state-message"><div class="spinner"></div><p>Loading…</p></div>`; }
        loadLog();
      } else if (activeTab === "settings") {
        if (workerConfig) renderSettingsTab();
        else { contentEl.innerHTML = `<div class="state-message"><div class="spinner"></div><p>Loading…</p></div>`; }
        loadWorkerConfig();
      } else {
        if (staff.length) renderStaffTab();
        else { contentEl.innerHTML = `<div class="state-message"><div class="spinner"></div><p>Loading…</p></div>`; }
        loadStaff();
      }
    }

    const adminTabsIndicator = Shell.enhanceTabs(document.querySelector(".admin-tabs"));
    tabButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        tabButtons.forEach(b => b.classList.remove("is-active"));
        btn.classList.add("is-active");
        adminTabsIndicator.move();
        activeTab = btn.dataset.tab;
        editing = null;
        showActiveTab();
      });
    });

    function refresh() {
      editing = null;
      showActiveTab();
    }
    Shell.registerRefresh(refresh);

    // Initial load.
    showActiveTab();
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register(`${window.APP_BASE_PATH}service-worker.js`);
    }
  </script>
</body>
</html>
