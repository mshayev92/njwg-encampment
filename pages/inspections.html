<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inspections — NJWG Encampment</title>
  <meta name="theme-color" content="#0d1250">
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../icons/favicon.ico" sizes="any">
  <link rel="icon" href="../icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/app.css">

  <style>
    .inspection-tabs {
      margin-bottom: var(--space-5);
    }

    .tabs__tab:disabled {
      color: var(--ink-400);
      cursor: not-allowed;
    }

    .flight-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: var(--space-4);
    }

    .flight-tile {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      cursor: pointer;
      text-align: left;
      box-shadow: var(--shadow-sm);
      transition: border-color var(--duration-fast) var(--ease-standard),
                  transform var(--duration-fast) var(--ease-standard);
      font-family: inherit;
    }

    .flight-tile:hover {
      border-color: var(--gold-500);
      transform: translateY(-2px);
    }

    .flight-tile__name {
      display: block;
      font-family: var(--font-display);
      font-size: var(--fs-md);
      color: var(--indigo-900);
      margin-bottom: var(--space-2);
    }

    .flight-tile__count {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      font-size: var(--fs-xs);
      color: var(--ink-600);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
    }

    .student-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .student-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      width: 100%;
    }

    .student-row:hover {
      border-color: var(--gold-500);
    }

    .student-row__name {
      font-weight: 600;
      color: var(--indigo-900);
    }

    .student-row__meta {
      font-size: var(--fs-xs);
      color: var(--ink-600);
      font-family: var(--font-mono);
    }

    .student-row__status {
      font-size: var(--fs-2xs);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      padding: var(--space-1) var(--space-2);
      border-radius: 999px;
    }

    .student-row__status--done {
      background: var(--green-100);
      color: var(--green-600);
    }

    .detail-header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
      flex-wrap: wrap;
    }

    .detail-header h2 {
      font-size: var(--fs-lg);
      color: var(--indigo-900);
      margin: 0;
    }

    .scorecard-meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: var(--space-3);
      margin-bottom: var(--space-5);
      padding: var(--space-4);
      background: var(--surface-sunken);
      border-radius: var(--radius-md);
      font-size: var(--fs-sm);
    }

    .scorecard-meta__item span {
      display: block;
      font-size: var(--fs-2xs);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      color: var(--ink-600);
      margin-bottom: var(--space-1);
    }

    .scorecard-section {
      margin-bottom: var(--space-5);
    }

    .scorecard-section h3 {
      font-size: var(--fs-sm);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      color: var(--ink-600);
      margin-bottom: var(--space-3);
    }

    .scorecard-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      padding: var(--space-3) 0;
      border-bottom: 1px solid var(--line);
    }

    .scorecard-item:last-child { border-bottom: none; }

    .scorecard-item__label { font-size: var(--fs-sm); color: var(--ink-900); }

    .scorecard-toggle {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      overflow: hidden;
      flex-shrink: 0;
    }

    .scorecard-toggle button {
      padding: var(--space-2) var(--space-4);
      font-size: var(--fs-sm);
      font-weight: 600;
      border: none;
      background: var(--surface);
      color: var(--ink-600);
      cursor: pointer;
    }

    .scorecard-toggle button.is-selected.value-0 {
      background: var(--red-100);
      color: var(--red-600);
    }

    .scorecard-toggle button.is-selected.value-1 {
      background: var(--green-100);
      color: var(--green-600);
    }

    .scorecard-total {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-4);
      background: var(--indigo-900);
      color: var(--surface);
      border-radius: var(--radius-md);
      font-family: var(--font-display);
      font-size: var(--fs-md);
      margin-bottom: var(--space-5);
    }

    .scorecard-notes textarea {
      width: 100%;
      min-height: 100px;
      font-family: var(--font-body);
      font-size: var(--fs-sm);
      padding: var(--space-3);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--surface-sunken);
      resize: vertical;
    }

    .room-placeholder {
      text-align: center;
      padding: var(--space-8) var(--space-5);
      color: var(--ink-600);
    }

    /* ---- Inspection history (per student, multiple dates) ---- */
    .history-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      margin-bottom: var(--space-5);
    }

    .history-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
    }

    .history-row__date {
      font-family: var(--font-mono);
      font-size: var(--fs-sm);
      color: var(--indigo-900);
      font-weight: 600;
    }

    .history-row__meta {
      font-size: var(--fs-xs);
      color: var(--ink-600);
    }

    .history-row__score {
      font-family: var(--font-display);
      font-size: var(--fs-sm);
    }

    /* ---- Trends tab ---- */
    .trends-toolbar {
      display: flex;
      gap: var(--space-3);
      margin-bottom: var(--space-5);
      flex-wrap: wrap;
      align-items: center;
    }

    .trends-toolbar select {
      font-family: var(--font-body);
      font-size: var(--fs-sm);
      padding: var(--space-2) var(--space-3);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--surface);
    }

    .flight-avg-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }

    .flight-avg-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      box-shadow: var(--shadow-sm);
    }

    .flight-avg-card__name {
      font-family: var(--font-display);
      font-size: var(--fs-sm);
      color: var(--indigo-900);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      margin-bottom: var(--space-2);
    }

    .flight-avg-card__value {
      font-family: var(--font-display);
      font-size: var(--fs-2xl);
      color: var(--indigo-900);
      line-height: 1;
    }

    .flight-avg-card__value span {
      font-size: var(--fs-md);
      color: var(--ink-600);
    }

    .flight-avg-card__bar-track {
      height: 6px;
      border-radius: 999px;
      background: var(--surface-sunken);
      margin-top: var(--space-3);
      overflow: hidden;
    }

    .flight-avg-card__bar-fill {
      height: 100%;
      background: var(--gold-500);
      border-radius: 999px;
    }

    .flight-avg-card__count {
      font-size: var(--fs-2xs);
      color: var(--ink-600);
      margin-top: var(--space-2);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
    }

    .trend-item-breakdown {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .trend-item-row {
      display: grid;
      grid-template-columns: 200px 1fr 48px;
      align-items: center;
      gap: var(--space-3);
      font-size: var(--fs-sm);
    }

    .trend-item-row__label { color: var(--ink-900); }

    .trend-item-row__track {
      height: 8px;
      border-radius: 999px;
      background: var(--surface-sunken);
      overflow: hidden;
    }

    .trend-item-row__fill {
      height: 100%;
      border-radius: 999px;
    }

    .trend-item-row__fill--good { background: var(--green-600); }
    .trend-item-row__fill--warn { background: var(--amber-600); }
    .trend-item-row__fill--bad { background: var(--red-600); }

    .trend-item-row__pct {
      text-align: right;
      font-family: var(--font-mono);
      color: var(--ink-600);
    }
  </style>
</head>
<body>

  <div class="app-shell">
    <nav class="nav-rail" id="nav-rail"></nav>
    <header class="app-header" id="app-header"></header>
    <div class="duty-strip" id="duty-strip"></div>

    <main class="app-main">
      <div class="inspection-tabs tabs">
        <button class="tabs__tab is-active" data-tab="uniform">Uniform</button>
        <button class="tabs__tab" data-tab="trends">Trends</button>
        <button class="tabs__tab" data-tab="room" disabled data-tooltip="Coming soon">Room</button>
      </div>

      <div id="inspection-content">
        <div class="state-message">
          <div class="spinner"></div>
          <p>Loading…</p>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/shell.js"></script>
  <script>
    Shell.init({ activePage: "inspections" });

    const contentEl = document.getElementById("inspection-content");
    const tabButtons = document.querySelectorAll(".tabs__tab");

    // The 9 scored line items, matching the printed scorecard exactly.
    // key = the UniformInspections column name written to the Sheet.
    const SCORE_ITEMS = [
      { key: "Haircut", label: "Haircut" },
      { key: "CosmeticsOrShave", label: "Cosmetics or Shave" },
      { key: "CleanlinessPress", label: "Cleanliness / Press" },
      { key: "ShirtTuck", label: "Shirt Tuck" },
      { key: "PatchesNametag", label: "Patches / Nametag" },
      { key: "InsigniaRibbons", label: "Insignia & Ribbons" },
      { key: "GigLine", label: "Gig Line" },
      { key: "BootBlousingShoeShine", label: "Boot Blousing / Shoe Shine" },
      { key: "MilitaryBearingCourtesy", label: "Military Bearing & Courtesy" }
    ];

    let rosterRows = [];
    let allInspections = []; // ALL rows from UniformInspections (multiple per student now)
    let inspectionsByStudent = {}; // StudentCapId -> array of rows, newest first
    let selectedFlight = null;
    let selectedStudent = null;
    let selectedInspectionDate = null; // null = new inspection; a Date string = editing/viewing that day's entry
    let currentScores = {};
    // Explicit view-mode flag so a background refresh can re-render
    // whatever's on screen without guessing from the DOM. One of:
    // "flights" | "students" | "history" | "scorecard"
    let currentView = "flights";

    const session = Auth.getSession();
    const allowedFlights = (session && Array.isArray(session.Flights)) ? session.Flights : [];

    /** Empty/absent Flights on the session means "all flights" per Code.gs. */
    function isFlightAllowed(flight) {
      if (!allowedFlights.length) return true;
      if (allowedFlights.some(f => f.toLowerCase() === "all")) return true;
      return allowedFlights.some(f => f.toLowerCase() === String(flight || "").toLowerCase());
    }

    function groupByFlight(rows) {
      return rows
        .filter(r => isFlightAllowed(r.Flight))
        .reduce((groups, row) => {
          const flight = row.Flight || "Unassigned";
          (groups[flight] = groups[flight] || []).push(row);
          return groups;
        }, {});
    }

    function renderFlightGrid() {
      currentView = "flights";
      const grouped = groupByFlight(rosterRows);
      const flightNames = Object.keys(grouped).sort();

      if (!flightNames.length) {
        contentEl.innerHTML = `
          <div class="state-message">
            <div class="state-message__icon">🪖</div>
            <p>No flights available to inspect.</p>
          </div>`;
        return;
      }

      contentEl.innerHTML = `
        <div class="flight-grid">
          ${flightNames.map(flight => `
            <button class="flight-tile" data-flight="${flight}">
              <span class="flight-tile__name">${flight}</span>
              <span class="flight-tile__count">${grouped[flight].length} cadet${grouped[flight].length === 1 ? "" : "s"}</span>
            </button>
          `).join("")}
        </div>`;

      contentEl.querySelectorAll(".flight-tile").forEach(tile => {
        tile.addEventListener("click", () => {
          selectedFlight = tile.dataset.flight;
          renderStudentList();
        });
      });
    }

    function renderStudentList() {
      currentView = "students";
      const grouped = groupByFlight(rosterRows);
      const members = grouped[selectedFlight] || [];

      contentEl.innerHTML = `
        <div class="detail-header">
          <button class="btn btn--ghost" id="back-to-flights-btn">← Back</button>
          <h2>${selectedFlight}</h2>
        </div>
        ${members.length ? `
          <div class="student-list">
            ${members.map(m => {
              const history = inspectionsByStudent[String(m.CapId)] || [];
              const latest = history[0]; // sorted newest first
              return `
                <button class="student-row" data-capid="${m.CapId}">
                  <div>
                    <div class="student-row__name">${m.Name || "—"}</div>
                    <div class="student-row__meta">${m.CapId || "—"} · ${m.Rank || "—"}</div>
                  </div>
                  ${latest ? `<span class="student-row__status student-row__status--done">${history.length > 1 ? `${history.length}x · ` : ""}Latest ${latest.TotalPoints}/${SCORE_ITEMS.length}</span>` : ""}
                </button>`;
            }).join("")}
          </div>
        ` : `
          <div class="state-message">
            <div class="state-message__icon">🪖</div>
            <p>No cadets in this flight.</p>
          </div>
        `}
      `;

      document.getElementById("back-to-flights-btn").addEventListener("click", () => {
        selectedFlight = null;
        renderFlightGrid();
      });

      contentEl.querySelectorAll(".student-row").forEach(row => {
        row.addEventListener("click", () => {
          selectedStudent = members.find(m => String(m.CapId) === row.dataset.capid);
          renderHistory();
        });
      });
    }

    /**
     * Shows this student's past inspections (newest first) with a
     * "New inspection" button. Clicking a past entry opens the
     * scorecard pre-filled with that day's scores for viewing/editing;
     * "New inspection" opens a blank scorecard for today (or updates
     * today's entry in place if one already exists for today).
     */
    function renderHistory() {
      currentView = "history";
      const history = inspectionsByStudent[String(selectedStudent.CapId)] || [];
      const todayStr = new Date().toLocaleDateString("en-CA");
      const hasToday = history.some(h => h.Date === todayStr);

      contentEl.innerHTML = `
        <div class="detail-header">
          <button class="btn btn--ghost" id="back-to-students-btn">← Back</button>
          <h2>${selectedStudent.Name || "—"}</h2>
        </div>

        <div class="scorecard-meta">
          <div class="scorecard-meta__item"><span>Student CAP ID</span>${selectedStudent.CapId || "—"}</div>
          <div class="scorecard-meta__item"><span>Flight</span>${selectedFlight}</div>
          <div class="scorecard-meta__item"><span>Total Inspections</span>${history.length}</div>
        </div>

        <button class="btn btn--primary" id="new-inspection-btn" style="margin-bottom: var(--space-5);">
          ${hasToday ? "Update Today's Inspection" : "New Inspection"}
        </button>

        ${history.length ? `
          <div class="history-list">
            ${history.map(h => `
              <div class="history-row" data-date="${h.Date}" style="cursor:pointer;">
                <div>
                  <div class="history-row__date">${h.Date}</div>
                  <div class="history-row__meta">${h.InspectingPosition || "—"}${h.Notes ? " · has notes" : ""}</div>
                </div>
                <div class="history-row__score">${h.TotalPoints ?? "—"} / ${SCORE_ITEMS.length}</div>
              </div>
            `).join("")}
          </div>
        ` : `
          <div class="state-message">
            <div class="state-message__icon">🪖</div>
            <p>No inspections recorded yet for this cadet.</p>
          </div>
        `}
      `;

      document.getElementById("back-to-students-btn").addEventListener("click", () => {
        selectedStudent = null;
        renderStudentList();
      });

      document.getElementById("new-inspection-btn").addEventListener("click", () => {
        selectedInspectionDate = hasToday ? todayStr : null;
        renderScorecard();
      });

      contentEl.querySelectorAll(".history-row").forEach(row => {
        row.addEventListener("click", () => {
          selectedInspectionDate = row.dataset.date;
          renderScorecard();
        });
      });
    }

    function renderScorecard() {
      currentView = "scorecard";
      const history = inspectionsByStudent[String(selectedStudent.CapId)] || [];
      const existing = selectedInspectionDate
        ? (history.find(h => h.Date === selectedInspectionDate) || {})
        : {};

      currentScores = {};
      SCORE_ITEMS.forEach(item => {
        const v = existing[item.key];
        currentScores[item.key] = (v === 1 || v === "1") ? 1 : ((v === 0 || v === "0") ? 0 : null);
      });

      const now = new Date();
      const dateStr = selectedInspectionDate || now.toLocaleDateString("en-CA"); // YYYY-MM-DD
      const timestampStr = now.toISOString();
      const isEditingPast = !!selectedInspectionDate;

      contentEl.innerHTML = `
        <div class="detail-header">
          <button class="btn btn--ghost" id="back-to-history-btn">← Back</button>
          <h2>${selectedStudent.Name || "—"}</h2>
        </div>

        <div class="scorecard-meta">
          <div class="scorecard-meta__item"><span>Student CAP ID</span>${selectedStudent.CapId || "—"}</div>
          <div class="scorecard-meta__item"><span>Flight</span>${selectedFlight}</div>
          <div class="scorecard-meta__item"><span>Inspecting Position</span>${session.Position}</div>
          <div class="scorecard-meta__item"><span>Date</span>${dateStr}${isEditingPast ? " (editing existing entry)" : ""}</div>
        </div>

        <div class="scorecard-section">
          <h3>Personal Appearance / Military Bearing</h3>
          ${SCORE_ITEMS.map(item => `
            <div class="scorecard-item">
              <span class="scorecard-item__label">${item.label}</span>
              <div class="scorecard-toggle" data-key="${item.key}">
                <button type="button" class="score-btn value-0" data-value="0">0</button>
                <button type="button" class="score-btn value-1" data-value="1">1</button>
              </div>
            </div>
          `).join("")}
        </div>

        <div class="scorecard-total">
          <span>Total points</span>
          <span id="total-points-display">${computeTotal()} / ${SCORE_ITEMS.length}</span>
        </div>

        <div class="scorecard-section scorecard-notes">
          <h3>Notes</h3>
          <textarea id="notes-input" placeholder="Optional notes…">${existing.Notes || ""}</textarea>
        </div>

        <button class="btn btn--primary" id="submit-scorecard-btn">Save Inspection</button>
      `;

      document.getElementById("back-to-history-btn").addEventListener("click", () => {
        selectedInspectionDate = null;
        renderHistory();
      });

      SCORE_ITEMS.forEach(item => updateToggleUI(item.key));

      contentEl.querySelectorAll(".scorecard-toggle").forEach(toggle => {
        const key = toggle.dataset.key;
        toggle.querySelectorAll(".score-btn").forEach(btn => {
          btn.addEventListener("click", () => {
            currentScores[key] = Number(btn.dataset.value);
            updateToggleUI(key);
            document.getElementById("total-points-display").textContent = `${computeTotal()} / ${SCORE_ITEMS.length}`;
          });
        });
      });

      document.getElementById("submit-scorecard-btn").addEventListener("click", () => submitScorecard(dateStr, timestampStr));
    }

    function updateToggleUI(key) {
      const toggle = contentEl.querySelector(`.scorecard-toggle[data-key="${key}"]`);
      if (!toggle) return;
      toggle.querySelectorAll(".score-btn").forEach(btn => {
        const selected = Number(btn.dataset.value) === currentScores[key];
        btn.classList.toggle("is-selected", selected);
      });
    }

    function computeTotal() {
      return SCORE_ITEMS.reduce((sum, item) => sum + (currentScores[item.key] === 1 ? 1 : 0), 0);
    }

    function submitScorecard(dateStr, timestampStr) {
      const unscored = SCORE_ITEMS.filter(item => currentScores[item.key] !== 0 && currentScores[item.key] !== 1);
      if (unscored.length) {
        Shell.showToast(`Score every item before saving (missing: ${unscored.map(i => i.label).join(", ")}).`, { type: "error" });
        return;
      }

      const row = {
        StudentCapId: selectedStudent.CapId,
        StudentName: selectedStudent.Name,
        Flight: selectedFlight,
        InspectingPosition: session.Position,
        Date: dateStr,
        Timestamp: timestampStr,
        Notes: document.getElementById("notes-input").value.trim()
      };
      SCORE_ITEMS.forEach(item => { row[item.key] = currentScores[item.key]; });
      row.TotalPoints = computeTotal();

      // Composite match on (StudentCapId, Date): re-inspecting the SAME
      // day updates that entry in place; a NEW day appends a fresh row,
      // preserving history for trends. Fires in the background — the
      // header's sync indicator reflects whether it lands, but the
      // person doesn't wait on the network to see their save reflected.
      Api.writeRow("UniformInspections", row, { matchColumns: ["StudentCapId", "Date"] });

      const capId = String(selectedStudent.CapId);
      const list = inspectionsByStudent[capId] || (inspectionsByStudent[capId] = []);
      const idx = list.findIndex(h => h.Date === dateStr);
      if (idx >= 0) list[idx] = row; else list.unshift(row);
      list.sort((a, b) => (a.Date < b.Date ? 1 : -1));

      Shell.showToast("Inspection saved.", { type: "success" });
      selectedInspectionDate = null;
      renderHistory();
    }

    /**
     * Flight-vs-flight averages. Uses each cadet's MOST RECENT
     * inspection only (not every historical entry) so a flight that
     * was scored low once early on isn't dragged down forever — this
     * shows "how is this flight doing right now," not a lifetime
     * average. A "count basis" toggle lets you switch to all-time if
     * you want the fuller picture instead.
     */
    let trendsBasis = "latest"; // "latest" | "all"

    function computeFlightTrends(basis) {
      const grouped = groupByFlight(rosterRows);
      const flightNames = Object.keys(grouped).sort();

      return flightNames.map(flight => {
        const members = grouped[flight];
        const relevantRows = [];
        members.forEach(m => {
          const history = inspectionsByStudent[String(m.CapId)] || [];
          if (!history.length) return;
          if (basis === "latest") relevantRows.push(history[0]);
          else relevantRows.push(...history);
        });

        const itemAverages = {};
        SCORE_ITEMS.forEach(item => {
          const scored = relevantRows.filter(r => r[item.key] === 1 || r[item.key] === 0 || r[item.key] === "1" || r[item.key] === "0");
          const passCount = scored.filter(r => Number(r[item.key]) === 1).length;
          itemAverages[item.key] = scored.length ? passCount / scored.length : null;
        });

        const totalAvg = relevantRows.length
          ? relevantRows.reduce((sum, r) => sum + (Number(r.TotalPoints) || 0), 0) / relevantRows.length
          : null;

        return { flight, count: relevantRows.length, studentsInspected: new Set(relevantRows.map(r => r.StudentCapId)).size, totalAvg, itemAverages };
      });
    }

    function renderTrends() {
      currentView = "trends";
      const data = computeFlightTrends(trendsBasis);

      contentEl.innerHTML = `
        <div class="trends-toolbar">
          <label style="font-size: var(--fs-sm); color: var(--ink-600);">Showing:</label>
          <select id="trends-basis-select">
            <option value="latest" ${trendsBasis === "latest" ? "selected" : ""}>Each cadet's latest inspection</option>
            <option value="all" ${trendsBasis === "all" ? "selected" : ""}>All inspections (all-time)</option>
          </select>
        </div>

        ${data.length ? `
          <div class="flight-avg-grid">
            ${data.map(d => `
              <div class="flight-avg-card">
                <div class="flight-avg-card__name">${d.flight}</div>
                ${d.totalAvg !== null ? `
                  <div class="flight-avg-card__value">${d.totalAvg.toFixed(1)}<span> / ${SCORE_ITEMS.length}</span></div>
                  <div class="flight-avg-card__bar-track">
                    <div class="flight-avg-card__bar-fill" style="width:${Math.round((d.totalAvg / SCORE_ITEMS.length) * 100)}%;"></div>
                  </div>
                  <div class="flight-avg-card__count">${d.studentsInspected} cadet${d.studentsInspected === 1 ? "" : "s"} · ${d.count} scorecard${d.count === 1 ? "" : "s"}</div>
                ` : `
                  <div class="flight-avg-card__count" style="margin-top: var(--space-2);">No inspections yet</div>
                `}
              </div>
            `).join("")}
          </div>

          <div class="card">
            <h3 style="font-size: var(--fs-sm); text-transform: uppercase; letter-spacing: var(--tracking-wide); color: var(--ink-600); margin-bottom: var(--space-4);">
              Pass rate by item, across all flights
            </h3>
            <div class="trend-item-breakdown">
              ${SCORE_ITEMS.map(item => {
                let scored = 0, passed = 0;
                Object.values(inspectionsByStudent).forEach(history => {
                  const rows = trendsBasis === "latest" ? history.slice(0, 1) : history;
                  rows.forEach(r => {
                    const v = r[item.key];
                    if (v === 1 || v === 0 || v === "1" || v === "0") {
                      scored++;
                      if (Number(v) === 1) passed++;
                    }
                  });
                });
                const pct = scored ? Math.round((passed / scored) * 100) : null;
                const fillClass = pct === null ? "" : pct >= 85 ? "trend-item-row__fill--good" : pct >= 60 ? "trend-item-row__fill--warn" : "trend-item-row__fill--bad";
                return `
                  <div class="trend-item-row">
                    <span class="trend-item-row__label">${item.label}</span>
                    <div class="trend-item-row__track">
                      <div class="trend-item-row__fill ${fillClass}" style="width:${pct ?? 0}%;"></div>
                    </div>
                    <span class="trend-item-row__pct">${pct === null ? "—" : pct + "%"}</span>
                  </div>
                `;
              }).join("")}
            </div>
          </div>
        ` : `
          <div class="state-message">
            <div class="state-message__icon">📊</div>
            <p>No inspection data yet.</p>
          </div>
        `}
      `;

      const basisSelect = document.getElementById("trends-basis-select");
      if (basisSelect) {
        basisSelect.addEventListener("change", () => {
          trendsBasis = basisSelect.value;
          renderTrends();
        });
        Shell.enhanceSelect(basisSelect);
      }
    }

    function renderRoomPlaceholder() {
      currentView = "room";
      contentEl.innerHTML = `
        <div class="room-placeholder">
          <div class="state-message__icon">🧹</div>
          <p>Room inspections aren't set up yet — check back soon.</p>
        </div>`;
    }

    /**
     * Rebuilds inspectionsByStudent from a fresh UniformInspections
     * rows array — shared by both the initial cached render and the
     * background-refresh callback so the grouping/sorting logic lives
     * in one place.
     */
    function reindexInspections(rows) {
      allInspections = rows || [];
      inspectionsByStudent = {};
      allInspections.forEach(row => {
        const capId = String(row.StudentCapId);
        (inspectionsByStudent[capId] = inspectionsByStudent[capId] || []).push(row);
      });
      Object.values(inspectionsByStudent).forEach(list => list.sort((a, b) => (a.Date < b.Date ? 1 : -1)));
    }

    /**
     * Re-renders whatever view is currently on screen, without resetting
     * drill-down state (used after a background data refresh). The
     * scorecard is deliberately EXCLUDED here — it holds in-progress,
     * unsaved toggle state in `currentScores`, and re-rendering it from
     * fresh server data would silently discard whatever the person is
     * mid-way through scoring. A background refresh while the scorecard
     * is open just updates the underlying data quietly; the person sees
     * it next time they navigate away and back.
     */
    function renderActiveView() {
      if (currentView === "trends") return renderTrends();
      if (currentView === "room") return renderRoomPlaceholder();
      if (currentView === "scorecard") return; // don't clobber in-progress scoring
      if (currentView === "history" && selectedStudent) return renderHistory();
      if (currentView === "students" && selectedFlight) return renderStudentList();
      return renderFlightGrid();
    }

    /**
     * Instant-then-revalidate load: renders cached Roster +
     * UniformInspections data immediately if this page has fetched
     * them before this session, while a background refetch checks for
     * anything newer. First-ever load shows the spinner as before.
     */
    function load() {
      let rosterCached, inspectionsCached;

      const rosterHandle = Api.getSheetCached("Roster", (fresh) => {
        rosterRows = fresh.rows || [];
        renderActiveView();
      });
      const inspectionsHandle = Api.getSheetCached("UniformInspections", (fresh) => {
        reindexInspections(fresh.rows || []);
        renderActiveView();
      });

      rosterCached = rosterHandle.data;
      inspectionsCached = inspectionsHandle.data;

      if (rosterCached && inspectionsCached) {
        rosterRows = rosterCached.rows || [];
        reindexInspections(inspectionsCached.rows || []);
        renderFlightGrid();
      } else {
        contentEl.innerHTML = `<div class="state-message"><div class="spinner"></div><p>Loading…</p></div>`;
      }

      return Promise.all([rosterHandle.ready, inspectionsHandle.ready])
        .then(([rosterData, inspectionData]) => {
          rosterRows = rosterData.rows || [];
          reindexInspections(inspectionData.rows || []);
          if (!rosterCached || !inspectionsCached) {
            selectedFlight = null;
            selectedStudent = null;
            selectedInspectionDate = null;
            renderFlightGrid();
          }
        })
        .catch((err) => {
          if (!rosterCached || !inspectionsCached) {
            contentEl.innerHTML = `
              <div class="state-message">
                <div class="state-message__icon">⚠️</div>
                <p>${err.message}</p>
              </div>`;
          }
          Shell.showToast(err.message, { type: "error" });
        });
    }

    tabButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        if (btn.disabled) return;
        tabButtons.forEach(b => b.classList.remove("is-active"));
        btn.classList.add("is-active");
        if (btn.dataset.tab === "uniform") {
          selectedFlight = null;
          selectedStudent = null;
          renderFlightGrid();
        } else if (btn.dataset.tab === "trends") {
          renderTrends();
        } else {
          renderRoomPlaceholder();
        }
      });
    });

    Shell.registerRefresh(load);
    load();
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register(`${window.APP_BASE_PATH}service-worker.js`);
    }
  </script>
</body>
</html>
