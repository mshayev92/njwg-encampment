<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    // Applied synchronously, before first paint, so a collapsed sidebar
    // renders at its collapsed width immediately instead of flashing
    // open at the default width for a frame and visibly animating shut
    // once js/shell.js runs (see .nav-rail-collapsed in css/app.css).
    try {
      if (localStorage.getItem("njwg_nav_collapsed") === "true") {
        document.documentElement.classList.add("nav-rail-collapsed");
      }
    } catch (e) { /* storage unavailable — falls back to expanded */ }
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inspections — NJWG Encampment</title>
  <meta name="theme-color" content="#0d1250">
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../icons/favicon.ico" sizes="any">
  <link rel="icon" href="../icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/app.css">

  <style>
    .inspection-tabs {
      margin-bottom: var(--space-5);
    }

    .tabs__tab:disabled {
      color: var(--ink-400);
      cursor: not-allowed;
    }

    .flight-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: var(--space-4);
    }

    .flight-tile {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      cursor: pointer;
      text-align: left;
      box-shadow: var(--shadow-sm);
      transition: border-color var(--duration-fast) var(--ease-standard),
                  transform var(--duration-fast) var(--ease-standard);
      font-family: inherit;
    }

    .flight-tile:hover {
      border-color: var(--gold-500);
      transform: translateY(-2px);
    }

    .flight-tile__name {
      display: block;
      font-family: var(--font-display);
      font-size: var(--fs-md);
      color: var(--indigo-900);
      margin-bottom: var(--space-2);
    }

    .flight-tile__count {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      font-size: var(--fs-xs);
      color: var(--ink-600);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
    }

    .student-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .student-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      width: 100%;
    }

    .student-row:hover {
      border-color: var(--gold-500);
    }

    .student-row__name {
      font-weight: 600;
      color: var(--indigo-900);
    }

    .student-row__meta {
      font-size: var(--fs-xs);
      color: var(--ink-600);
      font-family: var(--font-mono);
    }

    .student-row__status {
      font-size: var(--fs-2xs);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      padding: var(--space-1) var(--space-2);
      border-radius: 999px;
    }

    .student-row__status--done {
      background: var(--green-100);
      color: var(--green-600);
    }

    .detail-header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
      flex-wrap: wrap;
    }

    .detail-header h2 {
      font-size: var(--fs-lg);
      color: var(--indigo-900);
      margin: 0;
    }

    .scorecard-meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: var(--space-3);
      margin-bottom: var(--space-5);
      padding: var(--space-4);
      background: var(--surface-sunken);
      border-radius: var(--radius-md);
      font-size: var(--fs-sm);
    }

    .scorecard-meta__item span {
      display: block;
      font-size: var(--fs-2xs);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      color: var(--ink-600);
      margin-bottom: var(--space-1);
    }

    .scorecard-section {
      margin-bottom: var(--space-5);
    }

    .scorecard-section h3 {
      font-size: var(--fs-sm);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      color: var(--ink-600);
      margin-bottom: var(--space-3);
    }

    .scorecard-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      padding: var(--space-3) 0;
      border-bottom: 1px solid var(--line);
    }

    .scorecard-item:last-child { border-bottom: none; }

    .scorecard-item__label { font-size: var(--fs-sm); color: var(--ink-900); }

    .scorecard-toggle {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      overflow: hidden;
      flex-shrink: 0;
    }

    .scorecard-toggle button {
      padding: var(--space-2) var(--space-4);
      font-size: var(--fs-sm);
      font-weight: 600;
      border: none;
      background: var(--surface);
      color: var(--ink-600);
      cursor: pointer;
    }

    .scorecard-toggle button.is-selected.value-0 {
      background: var(--red-100);
      color: var(--red-600);
    }

    .scorecard-toggle button.is-selected.value-1 {
      background: var(--green-100);
      color: var(--green-600);
    }

    /* A small pop whenever a 0/1 toggle becomes the selected one — pure
       visual feedback that the tap registered, on top of the color
       change above. Replays every time .is-selected is freshly added
       (see updateToggleUI in the script below), not just once. */
    @keyframes score-pop {
      0% { transform: scale(0.85); }
      60% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
    .scorecard-toggle button.is-selected {
      animation: score-pop 220ms var(--ease-standard);
    }

    /* Brief pulse on the running total whenever a score changes, so the
       number updating doesn't just silently swap — see the score-btn
       click handler below, which re-triggers this the same way
       Shell.animateIn does. */
    @keyframes total-pulse {
      0% { transform: scale(1); }
      40% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
    #total-points-display {
      display: inline-block;
    }
    #total-points-display.total-pulse {
      animation: total-pulse 260ms var(--ease-standard);
    }

    .scorecard-total {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-4);
      background: var(--indigo-900);
      color: var(--surface);
      border-radius: var(--radius-md);
      font-family: var(--font-display);
      font-size: var(--fs-md);
      margin-bottom: var(--space-5);
    }

    .scorecard-notes textarea {
      width: 100%;
      min-height: 100px;
      font-family: var(--font-body);
      font-size: var(--fs-sm);
      padding: var(--space-3);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--surface-sunken);
      resize: vertical;
    }

    /* ---- Inspection history (per student, multiple dates) ---- */
    .history-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      margin-bottom: var(--space-5);
    }

    .history-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
    }

    .history-row__date {
      font-family: var(--font-mono);
      font-size: var(--fs-sm);
      color: var(--indigo-900);
      font-weight: 600;
    }

    .history-row__meta {
      font-size: var(--fs-xs);
      color: var(--ink-600);
    }

    .history-row__score {
      font-family: var(--font-display);
      font-size: var(--fs-sm);
    }

    /* ---- Trends tab ---- */
    .trends-toolbar {
      display: flex;
      gap: var(--space-3);
      margin-bottom: var(--space-5);
      flex-wrap: wrap;
      align-items: center;
    }

    .trends-type-toggle {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .trends-type-toggle button {
      padding: var(--space-2) var(--space-4);
      font-size: var(--fs-sm);
      font-weight: 600;
      border: none;
      background: var(--surface);
      color: var(--ink-600);
      cursor: pointer;
    }

    .trends-type-toggle button.is-selected {
      background: var(--indigo-900);
      color: var(--surface);
    }

    .trends-toolbar select {
      font-family: var(--font-body);
      font-size: var(--fs-sm);
      padding: var(--space-2) var(--space-3);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--surface);
    }

    .flight-avg-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }

    .flight-avg-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      box-shadow: var(--shadow-sm);
    }

    .flight-avg-card__name {
      font-family: var(--font-display);
      font-size: var(--fs-sm);
      color: var(--indigo-900);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      margin-bottom: var(--space-2);
    }

    .flight-avg-card__value {
      font-family: var(--font-display);
      font-size: var(--fs-2xl);
      color: var(--indigo-900);
      line-height: 1;
    }

    .flight-avg-card__value span {
      font-size: var(--fs-md);
      color: var(--ink-600);
    }

    .flight-avg-card__bar-track {
      height: 6px;
      border-radius: 999px;
      background: var(--surface-sunken);
      margin-top: var(--space-3);
      overflow: hidden;
    }

    .flight-avg-card__bar-fill {
      height: 100%;
      background: var(--gold-500);
      border-radius: 999px;
    }

    .flight-avg-card__count {
      font-size: var(--fs-2xs);
      color: var(--ink-600);
      margin-top: var(--space-2);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
    }

    .trend-item-breakdown {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .trend-item-row {
      display: grid;
      grid-template-columns: 200px 1fr 48px;
      align-items: center;
      gap: var(--space-3);
      font-size: var(--fs-sm);
    }

    .trend-item-row__label { color: var(--ink-900); }

    .trend-item-row__track {
      height: 8px;
      border-radius: 999px;
      background: var(--surface-sunken);
      overflow: hidden;
    }

    .trend-item-row__fill {
      height: 100%;
      border-radius: 999px;
    }

    .trend-item-row__fill--good { background: var(--green-600); }
    .trend-item-row__fill--warn { background: var(--amber-600); }
    .trend-item-row__fill--bad { background: var(--red-600); }

    .trend-item-row__pct {
      text-align: right;
      font-family: var(--font-mono);
      color: var(--ink-600);
    }

    /* The 200px fixed label column overflows narrow phones — stack the
       item label above its bar there. */
    @media (max-width: 560px) {
      .trend-item-row {
        grid-template-columns: 1fr auto;
        grid-template-areas: "label pct" "track track";
        gap: var(--space-1) var(--space-3);
      }
      .trend-item-row__label { grid-area: label; }
      .trend-item-row__pct { grid-area: pct; }
      .trend-item-row__track { grid-area: track; }
    }

    /* Scoring is the core tablet interaction — make the 0/1 toggles a
       comfortable finger target on touch devices. */
    @media (pointer: coarse) {
      .scorecard-toggle button { min-height: 44px; min-width: 56px; }
      .tabs__tab { min-height: 40px; }
    }

    /* Trends: average-score-over-time line chart (renderProgressionChart) */
    .progression-chart__svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .progression-legend {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-3);
      margin-top: var(--space-3);
    }

    .progression-legend__item {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      font-size: var(--fs-xs);
      color: var(--ink-600);
    }

    .progression-legend__swatch {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div class="app-shell">
    <nav class="nav-rail" id="nav-rail">
      <button type="button" class="nav-rail__crest" id="nav-rail-crest" aria-label="Toggle navigation width">
        <span class="nav-rail__crest-mark"><img src="../icons/icon-192.png" alt="NJWG"></span>
        <span class="nav-rail__crest-text">NJWG<span>Encampment</span></span>
      </button>
      <div id="nav-rail-links"></div>
    </nav>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/shell.js"></script>
    <script>
      // See overview.html for why this runs here instead of only inside
      // Shell.init() at the bottom — keeps the sidebar links from ever
      // being visibly empty for a moment on navigation between pages.
      Shell.renderNav("inspections");
    </script>

    <header class="app-header" id="app-header"></header>

    <main class="app-main">
      <div id="periods-section"></div>

      <!-- Hidden until everything has actually loaded (see load()'s
           allCachedNow gate below) — this tab bar is static markup, so it
           used to appear and be clickable instantly while the periods box
           and flight grid below it were still loading, instead of
           everything on the page appearing together. -->
      <div class="inspection-tabs tabs" id="inspection-tabs-bar" style="display:none;">
        <button class="tabs__tab is-active" data-tab="uniform">Uniform</button>
        <button class="tabs__tab" data-tab="room">Room</button>
        <button class="tabs__tab" data-tab="trends">Trends</button>
      </div>

      <div id="inspection-content">
        <div class="state-message">
          <div class="spinner"></div>
          <p>Loading…</p>
        </div>
      </div>
    </main>
  </div>

  <script>
    Shell.init({ activePage: "inspections" });

    const contentEl = document.getElementById("inspection-content");
    const tabsBarEl = document.getElementById("inspection-tabs-bar");
    const tabButtons = document.querySelectorAll(".tabs__tab");
    const esc = Shell.escapeHtml;

    // The 9 scored line items, matching the printed scorecard exactly.
    // key = the UniformInspections column name written to the Sheet.
    const SCORE_ITEMS = [
      { key: "Haircut", label: "Haircut" },
      { key: "CosmeticsOrShave", label: "Cosmetics or Shave" },
      { key: "CleanlinessPress", label: "Cleanliness / Press" },
      { key: "ShirtTuck", label: "Shirt Tuck" },
      { key: "PatchesNametag", label: "Patches / Nametag" },
      { key: "InsigniaRibbons", label: "Insignia & Ribbons" },
      { key: "GigLine", label: "Gig Line" },
      { key: "BootBlousingShoeShine", label: "Boot Blousing / Shoe Shine" },
      { key: "MilitaryBearingCourtesy", label: "Military Bearing & Courtesy" }
    ];

    // The 9 scored line items for a room/barracks inspection, matching
    // the printed Barracks Scorecard exactly. key = the RoomInspections
    // column name written to the Sheet. Grouped into the two sections
    // ("Bunk"/"Locker") the printed form uses.
    const ROOM_SCORE_ITEMS = [
      { key: "HospitalCorners", label: "Hospital Corners: Approx. 45 degrees", section: "Bunk" },
      { key: "Pillow", label: "Pillow: On correct side, & centered", section: "Bunk" },
      { key: "Collar", label: "Collar: 18 inches from head, 6 inches wide", section: "Bunk" },
      { key: "SheetsBlanket", label: "Sheets & Blanket: Tucked in, minimal wrinkles", section: "Bunk" },
      { key: "Shoes", label: "Shoes: In correct order, neat", section: "Bunk" },
      { key: "Towel", label: "Towel: Hung on left locker door", section: "Locker" },
      { key: "TopShelf", label: "Top Shelf: Items neatly placed", section: "Locker" },
      { key: "Clothes", label: "Clothes: In correct order, hangers 3in apart", section: "Locker" },
      { key: "TopOfDrawerCabinet", label: "Top of Drawer/Cabinet: Items in correct position", section: "Locker" }
    ];

    // Per-type config driving the shared flight/student/history/scorecard
    // flow below. Student identity fields (CapId, Name, Flight) and the
    // inspecting position are never part of the form itself — they come
    // from the Roster and the logged-in session, same as Uniform.
    const INSPECTION_TYPES = {
      uniform: {
        sheet: "UniformInspections",
        items: SCORE_ITEMS,
        sectionTitle: "Personal Appearance / Military Bearing"
      },
      room: {
        sheet: "RoomInspections",
        items: ROOM_SCORE_ITEMS,
        sectionTitle: null // grouped by each item's own `section` instead
      }
    };

    let activeType = "uniform"; // "uniform" | "room"

    let rosterRows = [];
    let inspectionsByType = {
      uniform: { all: [], byStudent: {} },
      room: { all: [], byStudent: {} }
    };
    let selectedFlight = null;
    let selectedStudent = null;
    let selectedInspectionDate = null; // null = new inspection; a Date string = editing/viewing that day's entry
    let currentScores = {};
    // Explicit view-mode flag so a background refresh can re-render
    // whatever's on screen without guessing from the DOM. One of:
    // "flights" | "students" | "history" | "scorecard"
    let currentView = "flights";

    function activeItems() { return INSPECTION_TYPES[activeType].items; }
    function activeSheet() { return INSPECTION_TYPES[activeType].sheet; }
    function activeInspectionsByStudent() { return inspectionsByType[activeType].byStudent; }

    const session = Auth.getSession();
    const allowedFlights = (session && Array.isArray(session.Flights)) ? session.Flights : [];

    // Scheduling inspection PERIODS (this encampment does uniform X on
    // this day, room Y on that day) is a separate write-gate from
    // scoring an actual inspection — same "edit-<page>" convention as
    // Roster/Schedule (see PAGE_WRITE_GATES in worker/src/auth.js).
    const sessionPages = (session?.Pages || []).map(p => String(p).toLowerCase());
    const canEditInspections = sessionPages.includes("edit-inspections");
    let inspectionPeriods = [];
    let editingPeriodId = null; // Id of the period being edited, or null; periods form is closed unless this or showPeriodForm is set
    let showPeriodForm = false;

    /** Empty/absent Flights on the session means "all flights" per Code.gs. Also expands squadron audiences (see Shell.flightMatchesAudience). */
    function isFlightAllowed(flight) {
      return Shell.flightMatchesAudience(allowedFlights, flight);
    }

    function groupByFlight(rows) {
      return rows
        .filter(r => isFlightAllowed(r.Flight))
        // Drop blank/placeholder roster rows (no CapId AND no Name) —
        // a stray empty row in the sheet that still has a Flight value
        // was showing up as a phantom flight with one uninspectable
        // "—" cadet (see the student-list card with no real name).
        .filter(r => String(r.CapId || "").trim() || String(r.Name || "").trim())
        .reduce((groups, row) => {
          const flight = row.Flight || "Unassigned";
          (groups[flight] = groups[flight] || []).push(row);
          return groups;
        }, {});
    }

    // ---- Inspection periods (scheduling what's inspected on what date) ----
    //
    // A period is one Sheet row: { Id, Date, Category, UniformType }.
    // Category is "uniform" or "room" — matches an INSPECTION_TYPES key
    // directly. UniformType ("OCP/ABU" or "Blues") only applies when
    // Category is "uniform". Writing requires "edit-inspections" (see
    // PAGE_WRITE_GATES in worker/src/auth.js); everyone signed in can
    // read the schedule so they know what's coming up.

    function periodLabel(p) {
      return p.Category === "room" ? "Room Inspection" : `Uniform — ${p.UniformType || "—"}`;
    }

    /** The period (if any) scheduled for `dateStr` in the currently active tab's category. */
    function periodForActiveType(dateStr) {
      return inspectionPeriods.find(p => p.Date === dateStr && p.Category === activeType) || null;
    }

    function renderPeriodsSection() {
      const container = document.getElementById("periods-section");
      if (!container) return;

      const todayStr = Shell.todayIso();
      const upcoming = inspectionPeriods
        .filter(p => p.Date >= todayStr)
        .sort((a, b) => (a.Date < b.Date ? -1 : 1));

      container.innerHTML = `
        <div class="card" style="margin-bottom: var(--space-5);">
          <div style="display:flex; align-items:center; justify-content:space-between; gap: var(--space-3); flex-wrap:wrap;">
            <h3 style="font-size: var(--fs-sm); text-transform: uppercase; letter-spacing: var(--tracking-wide); color: var(--ink-600); margin: 0;">Inspection Periods</h3>
            ${canEditInspections ? `<button class="btn btn--ghost" id="add-period-btn">${showPeriodForm ? "Cancel" : "+ Schedule Period"}</button>` : ""}
          </div>
          <div id="periods-form-slot"></div>
          <div style="margin-top: var(--space-4);">
            ${upcoming.length ? `
              <div class="history-list" style="margin-bottom: 0;">
                ${upcoming.map(p => `
                  <div class="history-row">
                    <div>
                      <div class="history-row__date">${esc(p.Date)}${p.Date === todayStr ? " · Today" : ""}</div>
                      <div class="history-row__meta">${esc(periodLabel(p))}</div>
                    </div>
                    ${canEditInspections ? `
                      <span style="display:flex; gap: var(--space-1);">
                        <button class="btn btn--ghost" data-edit-period="${esc(p.Id)}" style="padding: var(--space-1) var(--space-2);" aria-label="Edit period">✎</button>
                        <button class="btn btn--ghost" data-delete-period="${esc(p.Id)}" style="padding: var(--space-1) var(--space-2);" aria-label="Delete period">✕</button>
                      </span>
                    ` : ""}
                  </div>
                `).join("")}
              </div>
            ` : `<p style="font-size: var(--fs-sm); color: var(--ink-600); margin: 0;">No upcoming inspection periods scheduled.</p>`}
          </div>
        </div>
      `;

      if (showPeriodForm || editingPeriodId !== null) {
        renderPeriodForm(editingPeriodId ? inspectionPeriods.find(p => String(p.Id) === String(editingPeriodId)) : null);
      }

      const addBtn = document.getElementById("add-period-btn");
      if (addBtn) {
        addBtn.addEventListener("click", () => {
          if (editingPeriodId !== null) {
            // Switch from editing an existing period to a fresh "new period" form.
            editingPeriodId = null;
            showPeriodForm = true;
          } else {
            showPeriodForm = !showPeriodForm;
          }
          renderPeriodsSection();
        });
      }

      container.querySelectorAll("[data-edit-period]").forEach(btn => {
        btn.addEventListener("click", () => {
          editingPeriodId = btn.dataset.editPeriod;
          showPeriodForm = false;
          renderPeriodsSection();
        });
      });
      container.querySelectorAll("[data-delete-period]").forEach(btn => {
        btn.addEventListener("click", () => deletePeriod(btn.dataset.deletePeriod));
      });
      Shell.animateIn(container);
    }

    function renderPeriodForm(existing) {
      const slot = document.getElementById("periods-form-slot");
      if (!slot || !canEditInspections) return;

      const editing = !!existing;
      let selection = existing
        ? (existing.Category === "room" ? "room" : (existing.UniformType === "Blues" ? "uniform-blues" : "uniform-ocp"))
        : "uniform-ocp";

      slot.innerHTML = `
        <div style="display:flex; flex-wrap:wrap; gap: var(--space-4); align-items:flex-end; margin: var(--space-4) 0; padding-top: var(--space-4); border-top: 1px solid var(--line);">
          <div class="field" style="margin-bottom:0; min-width: 160px;"><label for="period-date">Date</label><input type="date" id="period-date" value="${esc(existing?.Date || "")}"></div>
          <div class="field" style="margin-bottom:0;">

      const dateInput = document.getElementById("period-date");
      Shell.enhanceDateInput(dateInput);

      const toggle = document.getElementById("period-type-toggle");
      function syncToggleUI() {
        toggle.querySelectorAll("button").forEach(btn => {

    function savePeriod(existing, dateInput, getSelection) {
      const dateStr = dateInput.value;
      if (!dateStr) {
        Shell.showToast("Pick a date before saving.", { type: "error" });
        return;
      }
      const selection = getSelection();
      const category = selection === "room" ? "room" : "uniform";
      const uniformType = selection === "uniform-blues" ? "Blues" : (selection === "uniform-ocp" ? "OCP/ABU" : "");

      const row = existing
        ? { ...existing, Date: dateStr, Category: category, UniformType: uniformType }
        : {
            Id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
            Date: dateStr,
            Category: category,
            UniformType: uniformType,
            CreatedBy: session.Position,
            CreatedAt: new Date().toISOString()
          };

      Api.writeRow("InspectionPeriods", row, { matchColumns: ["Id"] });

      const idx = inspectionPeriods.findIndex(p => String(p.Id) === String(row.Id));
      if (idx >= 0) inspectionPeriods[idx] = row; else inspectionPeriods.push(row);
      // See the matching comment in submitScorecard() above — reconciles
      // Api's cache with this optimistic result so the next background
      // revalidation doesn't find a "changed" sheet and re-fire this
      // page's onFresh subscriber, which would replay the entrance
      // animation a second time right after this save's own.
      Api.setCachedRows("InspectionPeriods", inspectionPeriods);

      showPeriodForm = false;
      editingPeriodId = null;
      Shell.showToast(existing ? "Period updated." : "Period scheduled.", { type: "success" });
      renderPeriodsSection();
      if (currentView === "flights" || currentView === "history") renderActiveView();
    }

    async function deletePeriod(id) {
      const confirmed = await Shell.confirm({
        title: "Delete inspection period?",
        message: "This can't be undone.",
        confirmLabel: "Delete"
      });
      if (!confirmed) return;

      Api.deleteRow("InspectionPeriods", { Id: id }, { matchColumns: ["Id"] });
      inspectionPeriods = inspectionPeriods.filter(p => String(p.Id) !== String(id));
      if (String(editingPeriodId) === String(id)) editingPeriodId = null;
      Api.setCachedRows("InspectionPeriods", inspectionPeriods);
      Shell.showToast("Period deleted.", { type: "success" });
      renderPeriodsSection();
      if (currentView === "flights" || currentView === "history") renderActiveView();
    }

    /**
     * Shows this student's past inspections (newest first) with a
     * "New inspection" button. Clicking a past entry opens the
     * scorecard pre-filled with that day's scores for viewing/editing;
     * "New inspection" opens a blank scorecard for today (or updates
     * today's entry in place if one already exists for today).
     */
    function renderHistory() {
      currentView = "history";
      const history = activeInspectionsByStudent()[String(selectedStudent.CapId)] || [];
      const todayStr = new Date().toLocaleDateString("en-CA");
      const hasToday = history.some(h => h.Date === todayStr);
      const todaysPeriod = periodForActiveType(todayStr);

      // What's actually scheduled TODAY, across BOTH categories — not
      // just whichever tab happens to be active. A generic "New
      // Inspection" button used to give no clue which of possibly
      // several scheduled periods it would file under; now each
      // scheduled period gets its own explicit button (e.g. "Room
      // Inspection", "Uniform — OCP/ABU"), and clicking one switches to
      // that period's tab/category automatically so the entry can only
      // land in the period it names. Falls back to a single generic
      // button (today's ad-hoc entry in the currently active tab) when
      // nothing at all is scheduled for today.
      const scheduledToday = inspectionPeriods.filter(p => p.Date === todayStr);

      function inspectionButtonsHtml() {
        if (!scheduledToday.length) {
          return `
            <button class="btn btn--primary" id="new-inspection-btn" style="margin-bottom: var(--space-5);">

              return `
                <button class="btn btn--primary" data-period-btn="${esc(p.Id)}" data-period-category="${esc(p.Category)}">

      contentEl.innerHTML = `
        <div class="detail-header">

        <div class="scorecard-meta">
          <div class="scorecard-meta__item"><span>Student CAP ID</span>${esc(selectedStudent.CapId) || "—"}</div>
          <div class="scorecard-meta__item"><span>Flight</span>${esc(selectedFlight)}</div>
          <div class="scorecard-meta__item"><span>Total Inspections</span>${history.length}</div>

        ${todaysPeriod ? `<div class="alert alert--warning" style="margin-bottom: var(--space-4);">📋 Scheduled for today: <strong>${esc(periodLabel(todaysPeriod))}</strong></div>` : ""}

        ${inspectionButtonsHtml()}

        ${history.length ? `
          <div class="history-list">
            ${history.map(h => `
              <div class="history-row" data-date="${esc(h.Date)}" style="cursor:pointer;">

                </div>
                <div class="history-row__score">${h.TotalPoints ?? "—"} / ${activeItems().length}</div>
              </div>
            `).join("")}
          </div>
        ` : `
          <div class="state-message">
            <div class="state-message__icon">🪖</div>
            <p>No inspections recorded yet for this cadet.</p>
          </div>
        `}

      document.getElementById("back-to-students-btn").addEventListener("click", () => {
        selectedStudent = null;
        renderStudentList();
      });

      const newInspectionBtn = document.getElementById("new-inspection-btn");
      if (newInspectionBtn) {
        newInspectionBtn.addEventListener("click", () => {
          selectedInspectionDate = hasToday ? todayStr : null;
          renderScorecard();
        });
      }

      contentEl.querySelectorAll("[data-period-btn]").forEach(btn => {
        btn.addEventListener("click", () => {
          // Land the entry in the exact period it was scheduled under —
          // switch to that period's category/tab first (so activeType,
          // and everything derived from it, matches the period BEFORE
          // the scorecard opens), then open today's entry for it.
          activateTab(btn.dataset.periodCategory);
          selectedInspectionDate = todayStr;
          renderScorecard();
        });
      });

      contentEl.querySelectorAll(".history-row").forEach(row => {
        row.addEventListener("click", () => {

    function renderScorecard() {
      currentView = "scorecard";
      const items = activeItems();
      const history = activeInspectionsByStudent()[String(selectedStudent.CapId)] || [];
      const existing = selectedInspectionDate
        ? (history.find(h => h.Date === selectedInspectionDate) || {})
        : {};

      currentScores = {};
      items.forEach(item => {
        const v = existing[item.key];
        currentScores[item.key] = (v === 1 || v === "1") ? 1 : ((v === 0 || v === "0") ? 0 : null);
      });

      const now = new Date();
      const dateStr = selectedInspectionDate || now.toLocaleDateString("en-CA"); // YYYY-MM-DD
      const timestampStr = now.toISOString();
      const isEditingPast = !!selectedInspectionDate;

      // Uniform has one flat section; Room groups items under the
      // printed scorecard's "Bunk"/"Locker" headers instead.
      const sectionTitle = INSPECTION_TYPES[activeType].sectionTitle;
      const sections = sectionTitle
        ? [{ title: sectionTitle, items }]
        : Array.from(new Set(items.map(i => i.section))).map(section => ({
            title: section,
            items: items.filter(i => i.section === section)
          }));

      contentEl.innerHTML = `
        <div class="detail-header">
          <button class="btn btn--ghost" id="back-to-history-btn">← Back</button>
          <h2>${esc(selectedStudent.Name) || "—"}</h2>
        </div>

        <div class="scorecard-meta">
          <div class="scorecard-meta__item"><span>Student CAP ID</span>${esc(selectedStudent.CapId) || "—"}</div>
          <div class="scorecard-meta__item"><span>Flight</span>${esc(selectedFlight)}</div>
          <div class="scorecard-meta__item"><span>Inspecting Position</span>${esc(session.Position)}</div>
          <div class="scorecard-meta__item"><span>Date</span>${esc(dateStr)}${isEditingPast ? " (editing existing entry)" : ""}</div>
        </div>

        ${sections.map(sec => `
          <div class="scorecard-section">
            <h3>${esc(sec.title)}</h3>
            ${sec.items.map(item => `
              <div class="scorecard-item">
                <span class="scorecard-item__label">${item.label}</span>
                <div class="scorecard-toggle" data-key="${item.key}">
                  <button type="button" class="score-btn value-0" data-value="0">0</button>
                  <button type="button" class="score-btn value-1" data-value="1">1</button>
                </div>
              </div>
            `).join("")}
          </div>
        `).join("")}

        <div class="scorecard-total">
          <span>Total points</span>
          <span id="total-points-display">${computeTotal()} / ${items.length}</span>
        </div>

        <div class="scorecard-section scorecard-notes">
          <h3>Notes</h3>
          <textarea id="notes-input" placeholder="Optional notes…">${esc(existing.Notes || "")}</textarea>
        </div>

        <button class="btn btn--primary" id="submit-scorecard-btn">Save Inspection</button>
      `;

      document.getElementById("back-to-history-btn").addEventListener("click", () => {
        selectedInspectionDate = null;
        renderHistory();
      });

      items.forEach(item => updateToggleUI(item.key));

      contentEl.querySelectorAll(".scorecard-toggle").forEach(toggle => {
        const key = toggle.dataset.key;
        toggle.querySelectorAll(".score-btn").forEach(btn => {
          btn.addEventListener("click", () => {
            currentScores[key] = Number(btn.dataset.value);
            updateToggleUI(key);
            const totalEl = document.getElementById("total-points-display");
            totalEl.textContent = `${computeTotal()} / ${items.length}`;
            // Retriggerable pulse — same remove/reflow/add dance as
            // Shell.animateIn, so scoring several items in a row pulses
            // every time instead of only the first.
            totalEl.classList.remove("total-pulse");
            void totalEl.offsetWidth;
            totalEl.classList.add("total-pulse");
          });
        });
      });

      document.getElementById("submit-scorecard-btn").addEventListener("click", () => submitScorecard(dateStr, timestampStr));
      Shell.animateIn(contentEl);
    }

    function updateToggleUI(key) {
      const toggle = contentEl.querySelector(`.scorecard-toggle[data-key="${key}"]`);
      if (!toggle) return;
      toggle.querySelectorAll(".score-btn").forEach(btn => {
        const selected = Number(btn.dataset.value) === currentScores[key];
        btn.classList.toggle("is-selected", selected);
      });
    }

    function computeTotal() {
      return activeItems().reduce((sum, item) => sum + (currentScores[item.key] === 1 ? 1 : 0), 0);
    }

    function submitScorecard(dateStr, timestampStr) {
      const items = activeItems();
      const unscored = items.filter(item => currentScores[item.key] !== 0 && currentScores[item.key] !== 1);
      if (unscored.length) {
        Shell.showToast(`Score every item before saving (missing: ${unscored.map(i => i.label).join(", ")}).`, { type: "error" });
        return;
      }

      const row = {
        StudentCapId: selectedStudent.CapId,
        StudentName: selectedStudent.Name,
        Flight: selectedFlight,
        InspectingPosition: session.Position,
        Date: dateStr,
        Timestamp: timestampStr,
        Notes: document.getElementById("notes-input").value.trim()
      };
      items.forEach(item => { row[item.key] = currentScores[item.key]; });
      row.TotalPoints = computeTotal();

      // Composite match on (StudentCapId, Date): re-inspecting the SAME
      // day updates that entry in place; a NEW day appends a fresh row,
      // preserving history for trends. Fires in the background — the
      // header's sync indicator reflects whether it lands, but the
      // person doesn't wait on the network to see their save reflected.
      Api.writeRow(activeSheet(), row, { matchColumns: ["StudentCapId", "Date"] });

      const capId = String(selectedStudent.CapId);
      const bucket = inspectionsByType[activeType];
      const list = bucket.byStudent[capId] || (bucket.byStudent[capId] = []);
      const idx = list.findIndex(h => h.Date === dateStr);
      if (idx >= 0) list[idx] = row; else list.unshift(row);
      list.sort((a, b) => (a.Date < b.Date ? 1 : -1));

      // Keep the FLAT "all" array (what Api's cache actually stores) in
      // sync with the byStudent index we just patched above, then push
      // it into Api's cache immediately. Api.writeRow() only marks the
      // sheet's cache STALE — it doesn't know what the optimistic result
      // looks like — so without this, the next background revalidation
      // (the periodic Api.warmCache poll, or just re-opening this view)
      // fetches the server's now-actually-updated rows, finds them
      // different from the stale pre-write cache, and fires this page's
      // onFresh subscriber again: a second render()/animateIn() replaying
      // the entrance animation moments after the one from this save.
      // Reconciling the cache here means that revalidation finds nothing
      // changed, so it stays silent.
      const allIdx = bucket.all.findIndex(h => String(h.StudentCapId) === capId && h.Date === dateStr);
      if (allIdx >= 0) bucket.all[allIdx] = row; else bucket.all.push(row);
      Api.setCachedRows(activeSheet(), bucket.all);

      Shell.showToast("Inspection saved.", { type: "success" });
      selectedInspectionDate = null;
      renderHistory();
    }

    /**
     * Flight-vs-flight averages. Uses each cadet's MOST RECENT
     * inspection only (not every historical entry) so a flight that
     * was scored low once early on isn't dragged down forever — this
     * shows "how is this flight doing right now," not a lifetime
     * average. A "count basis" toggle lets you switch to all-time if
     * you want the fuller picture instead.
     */
    let trendsBasis = "latest"; // "latest" | "all"
    let trendsType = "uniform"; // "uniform" | "room" — which inspection's trends are on screen

    function computeFlightTrends(type, basis) {
      const items = INSPECTION_TYPES[type].items;
      const byStudent = inspectionsByType[type].byStudent;
      const grouped = groupByFlight(rosterRows);
      const flightNames = Object.keys(grouped).sort();

      return flightNames.map(flight => {
        const members = grouped[flight];
        const relevantRows = [];
        members.forEach(m => {
          const history = byStudent[String(m.CapId)] || [];
          if (!history.length) return;
          if (basis === "latest") relevantRows.push(history[0]);
          else relevantRows.push(...history);
        });

        const itemAverages = {};
        items.forEach(item => {
          const scored = relevantRows.filter(r => r[item.key] === 1 || r[item.key] === 0 || r[item.key] === "1" || r[item.key] === "0");
          const passCount = scored.filter(r => Number(r[item.key]) === 1).length;
          itemAverages[item.key] = scored.length ? passCount / scored.length : null;
        });

        const totalAvg = relevantRows.length
          ? relevantRows.reduce((sum, r) => sum + (Number(r.TotalPoints) || 0), 0) / relevantRows.length
          : null;

        return { flight, count: relevantRows.length, studentsInspected: new Set(relevantRows.map(r => r.StudentCapId)).size, totalAvg, itemAverages };
      });
    }

    /**
     * Per-flight average score % on each date that flight has at least
     * one recorded inspection — the input to the "progression over time"
     * line chart. Uses EVERY inspection on record (not just each
     * cadet's latest, unlike the flight-average cards above) since a
     * trend over time is inherently about the historical sequence, not
     * a current snapshot.
     */
    function computeProgressionSeries(type) {
      const items = INSPECTION_TYPES[type].items;
      const grouped = groupByFlight(rosterRows); // already scoped to allowed flights
      const byStudent = inspectionsByType[type].byStudent;

      const flightOfCapId = new Map();
      Object.entries(grouped).forEach(([flight, members]) => {
        members.forEach(m => flightOfCapId.set(String(m.CapId), flight));
      });

      // date -> flight -> { sum, count }
      const buckets = new Map();
      Object.entries(byStudent).forEach(([capId, history]) => {
        const flight = flightOfCapId.get(capId);
        if (!flight || !items.length) return;
        history.forEach(row => {
          const pct = (Number(row.TotalPoints) || 0) / items.length * 100;
          if (!buckets.has(row.Date)) buckets.set(row.Date, {});
          const dayBucket = buckets.get(row.Date);
          dayBucket[flight] = dayBucket[flight] || { sum: 0, count: 0 };
          dayBucket[flight].sum += pct;
          dayBucket[flight].count += 1;
        });
      });

      const dates = Array.from(buckets.keys()).sort();
      const series = Object.keys(grouped).sort().map(flight => ({
        flight,
        points: dates.map(date => {
          const b = buckets.get(date)[flight];
          return b ? Math.round((b.sum / b.count) * 10) / 10 : null;
        })
      })).filter(s => s.points.some(p => p !== null));

      return { dates, series };
    }

    const PROGRESSION_CHART_COLORS = [
      "var(--indigo-700)", "var(--gold-600)", "var(--garnet-600)",
      "var(--green-600)", "var(--amber-600)", "var(--steel-300)"
    ];

    /** Inline-SVG line chart — no charting library in this codebase, and one flight-average-over-time chart doesn't warrant adding one. */
    function renderProgressionChart(type) {
      const { dates, series } = computeProgressionSeries(type);
      if (dates.length < 2 || !series.length) {
        return `<div class="state-message" style="padding: var(--space-5) 0;"><p>Not enough inspection history yet to chart a trend — need at least two different inspection dates.</p></div>`;
      }

      const W = 640, H = 220, padL = 34, padR = 12, padT = 12, padB = 26;
      const plotW = W - padL - padR, plotH = H - padT - padB;
      const xStep = dates.length > 1 ? plotW / (dates.length - 1) : 0;
      const xAt = (i) => padL + i * xStep;
      const yAt = (pct) => padT + plotH - (pct / 100) * plotH;

      const gridLines = [0, 25, 50, 75, 100].map(pct => `
        <line x1="${padL}" y1="${yAt(pct)}" x2="${W - padR}" y2="${yAt(pct)}" stroke="var(--line)" stroke-width="1"/>
        <text x="${padL - 6}" y="${yAt(pct) + 3}" text-anchor="end" font-size="9" fill="var(--ink-600)">${pct}%</text>
      `).join("");

      // Only label every Nth date so a long history doesn't overlap its own labels.
      const labelEvery = Math.max(1, Math.ceil(dates.length / 6));
      const xLabels = dates.map((d, i) => (i % labelEvery === 0 || i === dates.length - 1)
        ? `<text x="${xAt(i)}" y="${H - 6}" text-anchor="middle" font-size="9" fill="var(--ink-600)">${esc(d.slice(5))}</text>`
        : ""
      ).join("");

      const lines = series.map((s, i) => {
        const color = PROGRESSION_CHART_COLORS[i % PROGRESSION_CHART_COLORS.length];
        const pts = s.points.map((p, idx) => p === null ? null : `${xAt(idx)},${yAt(p)}`).filter(Boolean).join(" ");
        const dots = s.points.map((p, idx) => p === null ? "" : `<circle cx="${xAt(idx)}" cy="${yAt(p)}" r="2.5" fill="${color}"/>`).join("");
        return `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>${dots}`;
      }).join("");

      const legend = series.map((s, i) => `
        <span class="progression-legend__item">
          <span class="progression-legend__swatch" style="background:${PROGRESSION_CHART_COLORS[i % PROGRESSION_CHART_COLORS.length]};"></span>
          ${esc(s.flight)}
        </span>
      `).join("");

      return `
        <div class="progression-chart">
          <svg viewBox="0 0 ${W} ${H}" class="progression-chart__svg" role="img" aria-label="Average score percentage by flight over time">
            ${gridLines}
            ${lines}
            ${xLabels}
          </svg>
          <div class="progression-legend">${legend}</div>
        </div>
      `;
    }

    function renderTrends() {
      currentView = "trends";
      const items = INSPECTION_TYPES[trendsType].items;
      const byStudent = inspectionsByType[trendsType].byStudent;
      const data = computeFlightTrends(trendsType, trendsBasis);

      // The per-item pass-rate breakdown below must respect the same
      // flight scoping the average cards use — otherwise a flight-scoped
      // position would see item stats aggregated across flights it isn't
      // allowed to view. Restrict it to cadets in the viewer's allowed
      // flights (groupByFlight already filters by isFlightAllowed).
      const allowedCapIds = new Set();
      Object.values(groupByFlight(rosterRows)).forEach(members =>
        members.forEach(m => allowedCapIds.add(String(m.CapId)))
      );

      contentEl.innerHTML = `
        <div class="trends-toolbar">
          <div class="trends-type-toggle" id="trends-type-toggle">
            <button type="button" class="${trendsType === "uniform" ? "is-selected" : ""}" data-type="uniform">Uniform</button>
            <button type="button" class="${trendsType === "room" ? "is-selected" : ""}" data-type="room">Room</button>
          </div>
          <label style="font-size: var(--fs-sm); color: var(--ink-600);">Showing:</label>
          <select id="trends-basis-select">
            <option value="latest" ${trendsBasis === "latest" ? "selected" : ""}>Each cadet's latest inspection</option>
            <option value="all" ${trendsBasis === "all" ? "selected" : ""}>All inspections (all-time)</option>
          </select>
        </div>

        <h3 class="section-label">
          ${trendsType === "room" ? "Room Inspection Trends" : "Uniform Inspection Trends"}
        </h3>

        ${data.length ? `
          <div class="flight-avg-grid">
            ${data.map(d => `
              <div class="flight-avg-card">
                <div class="flight-avg-card__name">${esc(d.flight)}</div>
                ${d.totalAvg !== null ? `
                  <div class="flight-avg-card__value">${d.totalAvg.toFixed(1)}<span> / ${items.length}</span></div>
                  <div class="flight-avg-card__bar-track">
                    <div class="flight-avg-card__bar-fill" style="width:${Math.round((d.totalAvg / items.length) * 100)}%;"></div>
                  </div>
                  <div class="flight-avg-card__count">${d.studentsInspected} cadet${d.studentsInspected === 1 ? "" : "s"} · ${d.count} scorecard${d.count === 1 ? "" : "s"}</div>
                ` : `
                  <div class="flight-avg-card__count" style="margin-top: var(--space-2);">No inspections yet</div>
                `}
              </div>
            `).join("")}
          </div>

          <div class="card">
            <h3 class="section-label">
              Pass rate by item, across all flights
            </h3>
            <div class="trend-item-breakdown">
              ${items.map(item => {
                let scored = 0, passed = 0;
                Object.entries(byStudent).forEach(([capId, history]) => {
                  if (!allowedCapIds.has(capId)) return;
                  const rows = trendsBasis === "latest" ? history.slice(0, 1) : history;
                  rows.forEach(r => {
                    const v = r[item.key];
                    if (v === 1 || v === 0 || v === "1" || v === "0") {
                      scored++;
                      if (Number(v) === 1) passed++;
                    }
                  });
                });
                const pct = scored ? Math.round((passed / scored) * 100) : null;
                const fillClass = pct === null ? "" : pct >= 85 ? "trend-item-row__fill--good" : pct >= 60 ? "trend-item-row__fill--warn" : "trend-item-row__fill--bad";
                return `
                  <div class="trend-item-row">
                    <span class="trend-item-row__label">${item.label}</span>
                    <div class="trend-item-row__track">
                      <div class="trend-item-row__fill ${fillClass}" style="width:${pct ?? 0}%;"></div>
                    </div>
                    <span class="trend-item-row__pct">${pct === null ? "—" : pct + "%"}</span>
                  </div>
                `;
              }).join("")}
            </div>
          </div>

          <div class="card" style="margin-top: var(--space-4);">
            <h3 class="section-label">Average score over time, by flight</h3>
            ${renderProgressionChart(trendsType)}
          </div>
        ` : `
          <div class="state-message">
            <div class="state-message__icon">📊</div>
            <p>No ${trendsType} inspection data yet.</p>
          </div>
        `}
      `;

      document.getElementById("trends-type-toggle").querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => {
          trendsType = btn.dataset.type;
          renderTrends();
        });
      });

      const basisSelect = document.getElementById("trends-basis-select");
      if (basisSelect) {
        basisSelect.addEventListener("change", () => {
          trendsBasis = basisSelect.value;
          renderTrends();
        });
        Shell.enhanceSelect(basisSelect);
      }
      Shell.animateIn(contentEl);
    }

    /**
     * Rebuilds a type's byStudent index from a fresh rows array —
     * shared by both the initial cached render and the background-
     * refresh callback so the grouping/sorting logic lives in one place.
     */
    function reindexInspections(type, rows) {
      const bucket = inspectionsByType[type];
      bucket.all = rows || [];
      bucket.byStudent = {};
      bucket.all.forEach(row => {
        const capId = String(row.StudentCapId);
        (bucket.byStudent[capId] = bucket.byStudent[capId] || []).push(row);
      });
      Object.values(bucket.byStudent).forEach(list => list.sort((a, b) => (a.Date < b.Date ? 1 : -1)));
    }

    /**
     * Re-renders whatever view is currently on screen, without resetting
     * drill-down state (used after a background data refresh). The
     * scorecard is deliberately EXCLUDED here — it holds in-progress,
     * unsaved toggle state in `currentScores`, and re-rendering it from
     * fresh server data would silently discard whatever the person is
     * mid-way through scoring. A background refresh while the scorecard
     * is open just updates the underlying data quietly; the person sees
     * it next time they navigate away and back.
     */
    function renderActiveView() {
      if (currentView === "trends") return renderTrends();
      if (currentView === "scorecard") return; // don't clobber in-progress scoring
      if (currentView === "history" && selectedStudent) return renderHistory();
      if (currentView === "students" && selectedFlight) return renderStudentList();
      return renderFlightGrid();
    }

    /**
     * Instant-then-revalidate load: renders cached Roster + both
     * inspection sheets immediately if this page has fetched them
     * before this session, while a background refetch checks for
     * anything newer. First-ever load shows the spinner as before.
     */

    /**
     * The tabs bar is hidden (display:none) until now — enhanceTabs()'s
     * sliding indicator was positioned while it was still hidden
     * (offsetWidth/Left both read 0 on a display:none element), so it
     * needs to re-measure once the bar is actually visible.
     */
    function revealTabsBar() {
      tabsBarEl.style.display = "";
      if (inspectionTabsIndicator) inspectionTabsIndicator.move();
    }

    function load() {
      const rosterHandle = Api.getSheetCached("Roster", (fresh) => {
        rosterRows = fresh.rows || [];
        renderActiveView();
      });
      const uniformHandle = Api.getSheetCached("UniformInspections", (fresh) => {
        reindexInspections("uniform", fresh.rows || []);
        renderActiveView();
      });
      const roomHandle = Api.getSheetCached("RoomInspections", (fresh) => {
        reindexInspections("room", fresh.rows || []);
        renderActiveView();
      });
      const periodsHandle = Api.getSheetCached("InspectionPeriods", (fresh) => {
        inspectionPeriods = fresh.rows || [];
        renderPeriodsSection();
        renderActiveView();
      });

      // The periods box (its own container, #periods-section) and the
      // main flight grid used to load independently — periods rendered
      // the instant ITS sheet was cached (or an empty "no periods
      // scheduled" placeholder if it wasn't, even while the main grid
      // was still spinning), so the two boxes visibly populated at
      // different times instead of the page appearing all at once.
      // allCachedNow gates BOTH behind every one of the four sheets
      // being ready together — either synchronously right now (warm
      // cache) or once the cold load's Promise.all resolves below.
      const allCachedNow = !!(rosterHandle.data && uniformHandle.data && roomHandle.data && periodsHandle.data);

      if (allCachedNow) {
        rosterRows = rosterHandle.data.rows || [];
        reindexInspections("uniform", uniformHandle.data.rows || []);
        reindexInspections("room", roomHandle.data.rows || []);
        inspectionPeriods = periodsHandle.data.rows || [];
        revealTabsBar();
        renderPeriodsSection();
        renderFlightGrid();
      } else {
        contentEl.innerHTML = `<div class="state-message"><div class="spinner"></div><p>Loading…</p></div>`;
      }

      return Promise.all([rosterHandle.ready, uniformHandle.ready, roomHandle.ready, periodsHandle.ready])
        .then(([rosterData, uniformData, roomData, periodsData]) => {
          rosterRows = rosterData.rows || [];
          reindexInspections("uniform", uniformData.rows || []);
          reindexInspections("room", roomData.rows || []);
          inspectionPeriods = periodsData.rows || [];
          // Only re-render here on a COLD load — when everything was
          // already cached and rendered together above, this same
          // "ready" resolving again on a warm load would otherwise
          // re-render both a second time moments after the first, even
          // when the revalidated data is identical (each handle's own
          // subscriber above already re-renders on any ACTUAL change).
          if (!allCachedNow) {
            selectedFlight = null;
            selectedStudent = null;
            selectedInspectionDate = null;
            revealTabsBar();
            renderPeriodsSection();
            renderFlightGrid();
          }
        })
        .catch((err) => {
          if (!allCachedNow) {
            contentEl.innerHTML = `
              <div class="state-message">
                <div class="state-message__icon">⚠️</div>
                <p>${err.message}</p>
              </div>`;
          }
          Shell.showToast(err.message, { type: "error" });
        });
    }

    const inspectionTabsIndicator = Shell.enhanceTabs(document.querySelector(".inspection-tabs"));

    /**
     * Switches the top uniform/room/trends tab, both from a direct tab
     * click and programmatically (a period button in renderHistory needs
     * to land on the right tab BEFORE opening that period's scorecard —
     * see the period-button handling there).
     */
    function activateTab(tab) {
      tabButtons.forEach(b => b.classList.toggle("is-active", b.dataset.tab === tab));
      inspectionTabsIndicator.move();
      if (tab === "trends") {
        renderTrends();
      } else {
        activeType = tab === "room" ? "room" : "uniform";
      }
    }

    tabButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        if (btn.disabled) return;
        activateTab(btn.dataset.tab);
        if (btn.dataset.tab !== "trends") {
          selectedFlight = null;
          selectedStudent = null;
          renderFlightGrid();
        }
      });
    });

    Shell.registerRefresh(load);

    // Export the active inspection type's records, scoped to the flights
    // this position may view, in the sheet's column order.
    Shell.registerExport(() => {
      const items = INSPECTION_TYPES[activeType].items;
      const columns = ["StudentCapId", "StudentName", "Flight", "InspectingPosition", "Date", "Timestamp",
        ...items.map(i => i.key), "TotalPoints", "Notes"];
      const rows = (inspectionsByType[activeType].all || []).filter(r => isFlightAllowed(r.Flight));
      return { filename: `inspections-${activeType}-${new Date().toISOString().slice(0, 10)}.csv`, columns, rows };
    });

    load();
</script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register(`${window.APP_BASE_PATH}service-worker.js`);
    }
  </script>
</body>
</html>
