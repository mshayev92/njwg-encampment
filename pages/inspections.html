<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    // Applied synchronously, before first paint, so a collapsed sidebar
    // renders at its collapsed width immediately instead of flashing
    // open at the default width for a frame and visibly animating shut
    // once js/shell.js runs (see .nav-rail-collapsed in css/app.css).
    try {
      if (localStorage.getItem("njwg_nav_collapsed") === "true") {
        document.documentElement.classList.add("nav-rail-collapsed");
      }
    } catch (e) { /* storage unavailable — falls back to expanded */ }
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inspections — NJWG Encampment</title>
  <meta name="theme-color" content="#0d1250">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="NJWG Encampment">
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../icons/favicon.ico" sizes="any">
  <link rel="icon" href="../icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/app.css">

  <style>
    .inspection-tabs {
      margin-bottom: var(--space-5);
    }

    .tabs__tab:disabled {
      color: var(--ink-400);
      cursor: not-allowed;
    }

    .flight-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: var(--space-4);
    }

    .flight-tile {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      cursor: pointer;
      text-align: left;
      box-shadow: var(--shadow-sm);
      transition: border-color var(--duration-fast) var(--ease-standard),
                  transform var(--duration-fast) var(--ease-standard);
      font-family: inherit;
    }

    .flight-tile:hover {
      border-color: var(--gold-500);
      transform: translateY(-2px);
    }

    .flight-tile__name {
      display: block;
      font-family: var(--font-display);
      font-size: var(--fs-md);
      color: var(--indigo-900);
      margin-bottom: var(--space-2);
    }

    .flight-tile__count {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      font-size: var(--fs-xs);
      color: var(--ink-600);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
    }

    .student-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .student-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      width: 100%;
    }

    .student-row:hover {
      border-color: var(--gold-500);
    }

    .student-row__name {
      font-weight: 600;
      color: var(--indigo-900);
    }

    .student-row__meta {
      font-size: var(--fs-xs);
      color: var(--ink-600);
      font-family: var(--font-mono);
    }

    .detail-header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
      flex-wrap: wrap;
    }

    .detail-header h2 {
      font-size: var(--fs-lg);
      color: var(--indigo-900);
      margin: 0;
    }

    .scorecard-meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: var(--space-3);
      margin-bottom: var(--space-5);
      padding: var(--space-4);
      background: var(--surface-sunken);
      border-radius: var(--radius-md);
      font-size: var(--fs-sm);
    }

    .scorecard-meta__item span {
      display: block;
      font-size: var(--fs-2xs);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      color: var(--ink-600);
      margin-bottom: var(--space-1);
    }

    .scorecard-section {
      margin-bottom: var(--space-5);
    }

    .scorecard-section h3 {
      font-size: var(--fs-sm);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      color: var(--ink-600);
      margin-bottom: var(--space-3);
    }

    .scorecard-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      padding: var(--space-3) 0;
      border-bottom: 1px solid var(--line);
    }

    .scorecard-item:last-child { border-bottom: none; }

    .scorecard-item__label { font-size: var(--fs-sm); color: var(--ink-900); }

    .scorecard-toggle {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      overflow: hidden;
      flex-shrink: 0;
    }

    .scorecard-toggle button {
      padding: var(--space-2) var(--space-4);
      font-size: var(--fs-sm);
      font-weight: 600;
      border: none;
      background: var(--surface);
      color: var(--ink-600);
      cursor: pointer;
    }

    .scorecard-toggle button.is-selected.value-0 {
      background: var(--red-100);
      color: var(--red-600);
    }

    .scorecard-toggle button.is-selected.value-1 {
      background: var(--green-100);
      color: var(--green-600);
    }

    /* A small pop whenever a 0/1 toggle becomes the selected one — pure
       visual feedback that the tap registered, on top of the color
       change above. Replays every time .is-selected is freshly added
       (see updateToggleUI in the script below), not just once. */
    @keyframes score-pop {
      0% { transform: scale(0.85); }
      60% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
    .scorecard-toggle button.is-selected {
      animation: score-pop 220ms var(--ease-standard);
    }

    /* Brief pulse on the running total whenever a score changes, so the
       number updating doesn't just silently swap — see the score-btn
       click handler below, which re-triggers this the same way
       Shell.animateIn does. */
    @keyframes total-pulse {
      0% { transform: scale(1); }
      40% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
    #total-points-display {
      display: inline-block;
    }
    #total-points-display.total-pulse {
      animation: total-pulse 260ms var(--ease-standard);
    }

    .scorecard-total {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-4);
      background: var(--indigo-900);
      color: var(--surface);
      border-radius: var(--radius-md);
      font-family: var(--font-display);
      font-size: var(--fs-md);
      margin-bottom: var(--space-5);
    }

    .scorecard-notes textarea {
      width: 100%;
      min-height: 100px;
      font-family: var(--font-body);
      font-size: var(--fs-sm);
      padding: var(--space-3);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--surface-sunken);
      resize: vertical;
    }

    /* ---- Inspection history (per student, multiple dates) ---- */
    .history-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      margin-bottom: var(--space-5);
    }

    .history-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
    }

    .history-row__date {
      font-family: var(--font-mono);
      font-size: var(--fs-sm);
      color: var(--indigo-900);
      font-weight: 600;
    }

    .history-row__meta {
      font-size: var(--fs-xs);
      color: var(--ink-600);
    }

    .history-row__score {
      font-family: var(--font-display);
      font-size: var(--fs-sm);
    }

    /* ---- Trends tab ---- */
    .trends-toolbar {
      display: flex;
      gap: var(--space-3);
      margin-bottom: var(--space-5);
      flex-wrap: wrap;
      align-items: center;
    }

    .trends-type-toggle {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .trends-type-toggle button {
      padding: var(--space-2) var(--space-4);
      font-size: var(--fs-sm);
      font-weight: 600;
      border: none;
      background: var(--surface);
      color: var(--ink-600);
      cursor: pointer;
    }

    .trends-type-toggle button.is-selected {
      background: var(--indigo-900);
      color: var(--surface);
    }

    .trends-toolbar select {
      font-family: var(--font-body);
      font-size: var(--fs-sm);
      padding: var(--space-2) var(--space-3);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--surface);
    }

    .flight-avg-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }

    .flight-avg-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      box-shadow: var(--shadow-sm);
    }

    .flight-avg-card__name {
      font-family: var(--font-display);
      font-size: var(--fs-sm);
      color: var(--indigo-900);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      margin-bottom: var(--space-2);
    }

    .flight-avg-card__value {
      font-family: var(--font-display);
      font-size: var(--fs-2xl);
      color: var(--indigo-900);
      line-height: 1;
    }

    .flight-avg-card__value span {
      font-size: var(--fs-md);
      color: var(--ink-600);
    }

    .flight-avg-card__bar-track {
      height: 6px;
      border-radius: 999px;
      background: var(--surface-sunken);
      margin-top: var(--space-3);
      overflow: hidden;
    }

    .flight-avg-card__bar-fill {
      height: 100%;
      background: var(--gold-500);
      border-radius: 999px;
    }

    .flight-avg-card__count {
      font-size: var(--fs-2xs);
      color: var(--ink-600);
      margin-top: var(--space-2);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
    }

    .trend-item-breakdown {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .trend-item-row {
      display: grid;
      grid-template-columns: 200px 1fr 48px;
      align-items: center;
      gap: var(--space-3);
      font-size: var(--fs-sm);
    }

    .trend-item-row__label { color: var(--ink-900); }

    .trend-item-row__track {
      height: 8px;
      border-radius: 999px;
      background: var(--surface-sunken);
      overflow: hidden;
    }

    .trend-item-row__fill {
      height: 100%;
      border-radius: 999px;
    }

    .trend-item-row__fill--good { background: var(--green-600); }
    .trend-item-row__fill--warn { background: var(--amber-600); }
    .trend-item-row__fill--bad { background: var(--red-600); }

    .trend-item-row__pct {
      text-align: right;
      font-family: var(--font-mono);
      color: var(--ink-600);
    }

    /* The 200px fixed label column overflows narrow phones — stack the
       item label above its bar there. */
    @media (max-width: 560px) {
      .trend-item-row {
        grid-template-columns: 1fr auto;
        grid-template-areas: "label pct" "track track";
        gap: var(--space-1) var(--space-3);
      }
      .trend-item-row__label { grid-area: label; }
      .trend-item-row__pct { grid-area: pct; }
      .trend-item-row__track { grid-area: track; }
    }

    /* Scoring is the core tablet interaction — make the 0/1 toggles a
       comfortable finger target on touch devices. */
    @media (pointer: coarse) {
      .scorecard-toggle button { min-height: 44px; min-width: 56px; }
      .tabs__tab { min-height: 40px; }
    }

    /* Trends: average-score-over-time line chart (renderProgressionChart) */
    .progression-chart__svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .progression-legend {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-3);
      margin-top: var(--space-3);
    }

    .progression-legend__item {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      font-size: var(--fs-xs);
      color: var(--ink-600);
    }

    .progression-legend__swatch {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div class="app-shell">
    <nav class="nav-rail" id="nav-rail">
      <button type="button" class="nav-rail__crest" id="nav-rail-crest" aria-label="Toggle navigation width">
        <span class="nav-rail__crest-mark"><img src="../icons/icon-192.png" alt="NJWG"></span>
        <span class="nav-rail__crest-text">NJWG<span>Encampment</span></span>
      </button>
      <div id="nav-rail-links"></div>
    </nav>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/shell.js"></script>
    <script>
      // See overview.html for why this runs here instead of only inside
      // Shell.init() at the bottom — keeps the sidebar links from ever
      // being visibly empty for a moment on navigation between pages.
      Shell.renderNav("inspections");
    </script>

    <header class="app-header" id="app-header"></header>

    <main class="app-main">
      <div id="periods-section"></div>

      <!-- Hidden until everything has actually loaded (see load()'s
           allCachedNow gate below) — this tab bar is static markup, so it
           used to appear and be clickable instantly while the periods box
           and flight grid below it were still loading, instead of
           everything on the page appearing together. -->
      <div class="inspection-tabs tabs" id="inspection-tabs-bar" style="display:none;">
        <button class="tabs__tab is-active" data-tab="inspect">Inspect</button>
        <button class="tabs__tab" data-tab="periods">Periods</button>
        <button class="tabs__tab" data-tab="trends">Trends</button>
      </div>

      <div id="inspection-content">
        <div class="state-message">
          <div class="spinner"></div>
          <p>Loading…</p>
        </div>
      </div>
    </main>
  </div>

  <script>
    Shell.init({ activePage: "inspections" });

    const contentEl = document.getElementById("inspection-content");
    const tabsBarEl = document.getElementById("inspection-tabs-bar");
    const tabButtons = document.querySelectorAll(".tabs__tab");
    const esc = Shell.escapeHtml;

    // The 9 scored line items, matching the printed scorecard exactly.
    // key = the UniformInspections column name written to the Sheet.
    const SCORE_ITEMS = [
      { key: "Haircut", label: "Haircut" },
      { key: "CosmeticsOrShave", label: "Cosmetics or Shave" },
      { key: "CleanlinessPress", label: "Cleanliness / Press" },
      { key: "ShirtTuck", label: "Shirt Tuck" },
      { key: "PatchesNametag", label: "Patches / Nametag" },
      { key: "InsigniaRibbons", label: "Insignia & Ribbons" },
      { key: "GigLine", label: "Gig Line" },
      { key: "BootBlousingShoeShine", label: "Boot Blousing / Shoe Shine" },
      { key: "MilitaryBearingCourtesy", label: "Military Bearing & Courtesy" }
    ];

    // The 9 scored line items for a room/barracks inspection, matching
    // the printed Barracks Scorecard exactly. key = the RoomInspections
    // column name written to the Sheet. Grouped into the two sections
    // ("Bunk"/"Locker") the printed form uses.
    const ROOM_SCORE_ITEMS = [
      { key: "HospitalCorners", label: "Hospital Corners: Approx. 45 degrees", section: "Bunk" },
      { key: "Pillow", label: "Pillow: On correct side, & centered", section: "Bunk" },
      { key: "Collar", label: "Collar: 18 inches from head, 6 inches wide", section: "Bunk" },
      { key: "SheetsBlanket", label: "Sheets & Blanket: Tucked in, minimal wrinkles", section: "Bunk" },
      { key: "Shoes", label: "Shoes: In correct order, neat", section: "Bunk" },
      { key: "Towel", label: "Towel: Hung on left locker door", section: "Locker" },
      { key: "TopShelf", label: "Top Shelf: Items neatly placed", section: "Locker" },
      { key: "Clothes", label: "Clothes: In correct order, hangers 3in apart", section: "Locker" },
      { key: "TopOfDrawerCabinet", label: "Top of Drawer/Cabinet: Items in correct position", section: "Locker" }
    ];

    // The 5 Physical Fitness Test line items (BE Form 6013-style PT
    // scorecard). Unlike uniform/room's 0/1 toggles, every item here is
    // OPTIONAL (a cadet may not attempt every event) and is scored by
    // comparing a raw entered value against the age/sex chart below,
    // rather than a manual pass/fail tap. `key` is the raw-value column;
    // its companion Pass column is `${key}Pass` (see PT_INSPECTION_COLUMNS
    // in worker/src/auth.js). `type` drives the input widget: "count" is a
    // plain number, "time" parses "mm:ss". `better` says which direction
    // beats the standard (higher for reps/laps/reach, lower for a run time).
    const PT_SCORE_ITEMS = [
      { key: "PacerLaps", label: "PACER (20m Shuttle Run)", unit: "laps completed", type: "count", better: "higher" },
      { key: "MileRunTime", label: "Mile Run", unit: "mm:ss", type: "time", better: "lower" },
      { key: "CurlUps", label: "Curl-Ups", unit: "reps", type: "count", better: "higher" },
      { key: "PushUps", label: "Push-Ups", unit: "reps", type: "count", better: "higher" },
      { key: "SitReach", label: "Sit & Reach", unit: "inches", type: "decimal", better: "higher" }
    ];

    // AFI 36-2905-style age/sex PT standards chart. Ages 10-17 map
    // directly; 18 covers "18+" (the chart's oldest bracket). MileRunTime
    // is stored in whole seconds here (parsed from "mm:ss") so it can be
    // compared directly against a raw entry parsed the same way.
    const PT_CHART = {
      male: {
        10: { PacerLaps: 17, MileRunTime: 690, CurlUps: 12, PushUps: 7, SitReach: 8 },
        11: { PacerLaps: 20, MileRunTime: 670, CurlUps: 15, PushUps: 8, SitReach: 8 },
        12: { PacerLaps: 23, MileRunTime: 640, CurlUps: 18, PushUps: 10, SitReach: 8 },
        13: { PacerLaps: 29, MileRunTime: 586, CurlUps: 21, PushUps: 12, SitReach: 8 },
        14: { PacerLaps: 36, MileRunTime: 562, CurlUps: 24, PushUps: 14, SitReach: 8 },
        15: { PacerLaps: 42, MileRunTime: 544, CurlUps: 24, PushUps: 16, SitReach: 8 },
        16: { PacerLaps: 47, MileRunTime: 522, CurlUps: 24, PushUps: 18, SitReach: 8 },
        17: { PacerLaps: 50, MileRunTime: 502, CurlUps: 24, PushUps: 18, SitReach: 8 },
        18: { PacerLaps: 54, MileRunTime: 484, CurlUps: 24, PushUps: 18, SitReach: 8 }
      },
      female: {
        10: { PacerLaps: 17, MileRunTime: 690, CurlUps: 12, PushUps: 7, SitReach: 9 },
        11: { PacerLaps: 20, MileRunTime: 670, CurlUps: 15, PushUps: 7, SitReach: 10 },
        12: { PacerLaps: 23, MileRunTime: 640, CurlUps: 18, PushUps: 7, SitReach: 10 },
        13: { PacerLaps: 25, MileRunTime: 620, CurlUps: 18, PushUps: 7, SitReach: 10 },
        14: { PacerLaps: 27, MileRunTime: 609, CurlUps: 18, PushUps: 7, SitReach: 10 },
        15: { PacerLaps: 30, MileRunTime: 598, CurlUps: 18, PushUps: 7, SitReach: 12 },
        16: { PacerLaps: 32, MileRunTime: 586, CurlUps: 18, PushUps: 7, SitReach: 12 },
        17: { PacerLaps: 35, MileRunTime: 574, CurlUps: 18, PushUps: 7, SitReach: 12 },
        18: { PacerLaps: 38, MileRunTime: 562, CurlUps: 18, PushUps: 7, SitReach: 12 }
      }
    };

    /** The chart row for this age/sex, or null if either is missing/out of range. */
    function ptStandardFor(age, sex) {
      const ageNum = Math.round(Number(age));
      if (!ageNum || isNaN(ageNum)) return null;
      const bracket = Math.min(18, Math.max(10, ageNum));
      const table = String(sex || "").trim().toUpperCase().startsWith("F") ? PT_CHART.female : PT_CHART.male;
      return table[bracket] || null;
    }

    /** Parses "mm:ss" (or a bare number of seconds) into whole seconds, or null if unparseable. */
    function parseMinSecToSeconds(str) {
      const s = String(str || "").trim();
      if (!s) return null;
      const m = s.match(/^(\d+):(\d{1,2})$/);
      if (m) return Number(m[1]) * 60 + Number(m[2]);
      const n = Number(s);
      return isNaN(n) ? null : n;
    }

    function formatSecondsToMinSec(totalSeconds) {
      if (totalSeconds === null || totalSeconds === undefined || isNaN(totalSeconds)) return "";
      const secs = Math.round(totalSeconds);
      return `${Math.floor(secs / 60)}:${String(secs % 60).padStart(2, "0")}`;
    }

    /**
     * Evaluates one PT item's raw entered value against the age/sex
     * standard. Returns true/false, or null when there's nothing to
     * compare (blank entry, or no standard available for this student).
     */
    function evaluatePtItem(item, rawValue, standard) {
      if (!standard || standard[item.key] === undefined) return null;
      const threshold = standard[item.key];
      const value = item.type === "time" ? parseMinSecToSeconds(rawValue) : Number(rawValue);
      if (value === null || value === undefined || isNaN(value)) return null;
      return item.better === "lower" ? value <= threshold : value >= threshold;
    }

    // Per-type config driving the shared flight/student/history/scorecard
    // flow below. Student identity fields (CapId, Name, Flight) and the
    // inspecting position are never part of the form itself — they come
    // from the Roster and the logged-in session, same as Uniform.
    const INSPECTION_TYPES = {
      uniform: {
        sheet: "UniformInspections",
        items: SCORE_ITEMS,
        sectionTitle: "Personal Appearance / Military Bearing"
      },
      room: {
        sheet: "RoomInspections",
        items: ROOM_SCORE_ITEMS,
        sectionTitle: null // grouped by each item's own `section` instead
      },
      pt: {
        sheet: "PTInspections",
        items: PT_SCORE_ITEMS,
        sectionTitle: "Physical Fitness Test",
        isPt: true // every item optional, scored via ptStandardFor() instead of a manual 0/1 toggle
      }
    };

    let activeType = "uniform"; // "uniform" | "room" | "pt"

    let rosterRows = [];
    let inspectionsByType = {
      uniform: { all: [], byStudent: {} },
      room: { all: [], byStudent: {} },
      pt: { all: [], byStudent: {} }
    };
    let selectedFlight = null;
    let selectedStudent = null;
    let selectedInspectionDate = null; // null = new inspection; a Date string = editing/viewing that day's entry
    let currentScores = {};
    // Which scheduled period (if any) the scorecard about to open should be
    // filed under — set right before renderScorecard()/renderPtScorecard()
    // by whichever button opened it (a specific period button, one of the
    // ad-hoc type buttons, or a raw history-row click). "" means no period
    // (an ad-hoc entry). currentPeriodId is the value actually used on
    // save — see renderScorecard/renderPtScorecard, which resolve it from
    // either the entry ALREADY being edited (preserves its original
    // association) or this pending value (a brand-new entry).
    let pendingPeriodId = "";
    let currentPeriodId = "";
    let selectedPeriod = null; // the InspectionPeriods row currently drilled into on the Periods tab
    // Explicit view-mode flag so a background refresh can re-render
    // whatever's on screen without guessing from the DOM. One of:
    // "flights" | "students" | "history" | "scorecard" | "periods-tiles" | "period-detail" | "trends"
    let currentView = "flights";

    function activeItems() { return INSPECTION_TYPES[activeType].items; }
    function activeSheet() { return INSPECTION_TYPES[activeType].sheet; }
    function activeInspectionsByStudent() { return inspectionsByType[activeType].byStudent; }

    const session = Auth.getSession();
    const allowedFlights = (session && Array.isArray(session.Flights)) ? session.Flights : [];

    // Scheduling inspection PERIODS (this encampment does uniform X on
    // this day, room Y on that day) is a separate write-gate from
    // scoring an actual inspection — same "edit-<page>" convention as
    // Roster/Schedule (see PAGE_WRITE_GATES in worker/src/auth.js).
    const sessionPages = (session?.Pages || []).map(p => String(p).toLowerCase());
    const canEditInspections = sessionPages.includes("edit-inspections");
    let inspectionPeriods = [];
    let editingPeriodId = null; // Id of the period being edited, or null; periods form is closed unless this or showPeriodForm is set
    let showPeriodForm = false;

    /** Empty/absent Flights on the session means "all flights" per Code.gs. Also expands squadron audiences (see Shell.flightMatchesAudience). */
    function isFlightAllowed(flight) {
      return Shell.flightMatchesAudience(allowedFlights, flight);
    }

    function groupByFlight(rows) {
      return rows
        .filter(r => isFlightAllowed(r.Flight))
        // Drop blank/placeholder roster rows (no CapId AND no Name) —
        // a stray empty row in the sheet that still has a Flight value
        // was showing up as a phantom flight with one uninspectable
        // "—" cadet (see the student-list card with no real name).
        .filter(r => String(r.CapId || "").trim() || String(r.Name || "").trim())
        .reduce((groups, row) => {
          const flight = row.Flight || "Unassigned";
          (groups[flight] = groups[flight] || []).push(row);
          return groups;
        }, {});
    }

    /**
     * Sorts flight names so this position's OWN flight(s) come first —
     * one for a Flight Commander, two for a Squadron Commander, in the
     * order StaffAccess lists them — with anything else alphabetical
     * after. Since groupByFlight already restricts a flight/squadron
     * position down to just its own allowed flights (see isFlightAllowed
     * above), this mostly governs the ORDER two owned flights appear in
     * for a squadron position, rather than surfacing extra ones; CCT/
     * Administrator (blank/"all" Flights) sees every flight with no
     * ownership ranking, so this is just a plain alphabetical sort for
     * them, same as before.
     */
    function orderFlightNames(names) {
      if (!allowedFlights.length) return names.slice().sort();
      const rank = new Map(allowedFlights.map((f, i) => [String(f).toLowerCase(), i]));
      return names.slice().sort((a, b) => {
        const ra = rank.has(a.toLowerCase()) ? rank.get(a.toLowerCase()) : Infinity;
        const rb = rank.has(b.toLowerCase()) ? rank.get(b.toLowerCase()) : Infinity;
        return ra !== rb ? ra - rb : a.localeCompare(b);
      });
    }

    // ---- Inspection periods (scheduling what's inspected on what date) ----
    //
    // A period is one Sheet row: { Id, Date, Category, UniformType }.
    // Category is "uniform" or "room" — matches an INSPECTION_TYPES key
    // directly. UniformType ("OCP/ABU" or "Blues") only applies when
    // Category is "uniform". Writing requires "edit-inspections" (see
    // PAGE_WRITE_GATES in worker/src/auth.js); everyone signed in can
    // read the schedule so they know what's coming up.

    function periodLabel(p) {
      if (p.Category === "room") return "Room Inspection";
      if (p.Category === "pt") return "Physical Training";
      return `Uniform — ${p.UniformType || "—"}`;
    }

    /** Every period (any category) scheduled for `dateStr` — the Inspect tab no longer has a single "active type" to filter by, so callers that used to check one category now check all of them. */
    function periodsForDate(dateStr) {
      return inspectionPeriods.filter(p => p.Date === dateStr);
    }

    function renderPeriodsSection() {
      const container = document.getElementById("periods-section");
      if (!container) return;

      const todayStr = Shell.todayIso();
      const upcoming = inspectionPeriods
        .filter(p => canEditInspections ? p.Date >= todayStr : p.Date === todayStr)
        .sort((a, b) => (a.Date < b.Date ? -1 : 1));

      container.innerHTML = `
        <div class="card" style="margin-bottom: var(--space-5);">
          <div style="display:flex; align-items:center; justify-content:space-between; gap: var(--space-3); flex-wrap:wrap;">
            <h3 style="font-size: var(--fs-sm); text-transform: uppercase; letter-spacing: var(--tracking-wide); color: var(--ink-600); margin: 0;">Inspection Periods</h3>
            ${canEditInspections ? `<button class="btn btn--ghost" id="add-period-btn">${showPeriodForm ? "Cancel" : "+ Schedule Period"}</button>` : ""}
          </div>
          <div id="periods-form-slot"></div>
          <div style="margin-top: var(--space-4);">
            ${upcoming.length ? `
              <div class="history-list" style="margin-bottom: 0;">
                ${upcoming.map(p => `
                  <div class="history-row">
                    <div>
                      <div class="history-row__date">${esc(p.Date)}${p.Date === todayStr ? " · Today" : ""}</div>
                      <div class="history-row__meta">${esc(periodLabel(p))}</div>
                    </div>
                    ${canEditInspections ? `
                      <span style="display:flex; gap: var(--space-1);">
                        <button class="btn btn--ghost" data-edit-period="${esc(p.Id)}" style="padding: var(--space-1) var(--space-2);" aria-label="Edit period">✎</button>
                        <button class="btn btn--ghost" data-delete-period="${esc(p.Id)}" style="padding: var(--space-1) var(--space-2);" aria-label="Delete period">✕</button>
                      </span>
                    ` : ""}
                  </div>
                `).join("")}
              </div>
            ` : `<p style="font-size: var(--fs-sm); color: var(--ink-600); margin: 0;">No upcoming inspection periods scheduled.</p>`}
          </div>
        </div>
      `;

      if (showPeriodForm || editingPeriodId !== null) {
        renderPeriodForm(editingPeriodId ? inspectionPeriods.find(p => String(p.Id) === String(editingPeriodId)) : null);
      }

      const addBtn = document.getElementById("add-period-btn");
      if (addBtn) {
        addBtn.addEventListener("click", () => {
          if (editingPeriodId !== null) {
            // Switch from editing an existing period to a fresh "new period" form.
            editingPeriodId = null;
            showPeriodForm = true;
          } else {
            showPeriodForm = !showPeriodForm;
          }
          renderPeriodsSection();
        });
      }

      container.querySelectorAll("[data-edit-period]").forEach(btn => {
        btn.addEventListener("click", () => {
          editingPeriodId = btn.dataset.editPeriod;
          showPeriodForm = false;
          renderPeriodsSection();
        });
      });
      container.querySelectorAll("[data-delete-period]").forEach(btn => {
        btn.addEventListener("click", () => deletePeriod(btn.dataset.deletePeriod));
      });
      Shell.animateIn(container);
    }

    function renderPeriodForm(existing) {
      const slot = document.getElementById("periods-form-slot");
      if (!slot || !canEditInspections) return;

      const editing = !!existing;
      let selection = existing
        ? (existing.Category === "room" ? "room" : existing.Category === "pt" ? "pt" : (existing.UniformType === "Blues" ? "uniform-blues" : "uniform-ocp"))
        : "uniform-ocp";

      slot.innerHTML = `
        <div style="display:flex; flex-wrap:wrap; gap: var(--space-4); align-items:flex-end; margin: var(--space-4) 0; padding-top: var(--space-4); border-top: 1px solid var(--line);">
          <div class="field" style="margin-bottom:0; min-width: 160px;"><label for="period-date">Date</label><input type="date" id="period-date" value="${esc(existing?.Date || "")}"></div>
          <div class="field" style="margin-bottom:0;">
            <label>Type</label>
            <div class="trends-type-toggle" id="period-type-toggle">
              <button type="button" data-type="uniform-ocp">OCP/ABU</button>
              <button type="button" data-type="uniform-blues">Blues</button>
              <button type="button" data-type="room">Room</button>
              <button type="button" data-type="pt">PT</button>
            </div>
          </div>
          <div style="display:flex; gap: var(--space-3);">
            <button class="btn btn--primary" id="save-period-btn">${editing ? "Save Changes" : "Add Period"}</button>
            <button class="btn btn--ghost" id="cancel-period-btn">Cancel</button>
          </div>
        </div>
      `;

      const dateInput = document.getElementById("period-date");
      Shell.enhanceDateInput(dateInput);

      const toggle = document.getElementById("period-type-toggle");
      function syncToggleUI() {
        toggle.querySelectorAll("button").forEach(btn => {
          btn.classList.toggle("is-selected", btn.dataset.type === selection);
        });
      }
      syncToggleUI();
      toggle.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => { selection = btn.dataset.type; syncToggleUI(); });
      });

      document.getElementById("cancel-period-btn").addEventListener("click", () => {
        showPeriodForm = false;
        editingPeriodId = null;
        renderPeriodsSection();
      });

      document.getElementById("save-period-btn").addEventListener("click", () => savePeriod(existing, dateInput, () => selection));
    }

    function savePeriod(existing, dateInput, getSelection) {
      const dateStr = dateInput.value;
      if (!dateStr) {
        Shell.showToast("Pick a date before saving.", { type: "error" });
        return;
      }
      const selection = getSelection();
      const category = selection === "room" ? "room" : selection === "pt" ? "pt" : "uniform";
      const uniformType = selection === "uniform-blues" ? "Blues" : (selection === "uniform-ocp" ? "OCP/ABU" : "");

      const row = existing
        ? { ...existing, Date: dateStr, Category: category, UniformType: uniformType }
        : {
            Id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
            Date: dateStr,
            Category: category,
            UniformType: uniformType,
            CreatedBy: session.Position,
            CreatedAt: new Date().toISOString()
          };

      Api.writeRow("InspectionPeriods", row, { matchColumns: ["Id"] });

      const idx = inspectionPeriods.findIndex(p => String(p.Id) === String(row.Id));
      if (idx >= 0) inspectionPeriods[idx] = row; else inspectionPeriods.push(row);
      // See the matching comment in submitScorecard() above — reconciles
      // Api's cache with this optimistic result so the next background
      // revalidation doesn't find a "changed" sheet and re-fire this
      // page's onFresh subscriber, which would replay the entrance
      // animation a second time right after this save's own.
      Api.setCachedRows("InspectionPeriods", inspectionPeriods);

      showPeriodForm = false;
      editingPeriodId = null;
      Shell.showToast(existing ? "Period updated." : "Period scheduled.", { type: "success" });
      renderPeriodsSection();
      if (currentView === "flights" || currentView === "history") renderActiveView();
    }

    async function deletePeriod(id) {
      const confirmed = await Shell.confirm({
        title: "Delete inspection period?",
        message: "This can't be undone.",
        confirmLabel: "Delete"
      });
      if (!confirmed) return;

      Api.deleteRow("InspectionPeriods", { Id: id }, { matchColumns: ["Id"] });
      inspectionPeriods = inspectionPeriods.filter(p => String(p.Id) !== String(id));
      if (String(editingPeriodId) === String(id)) editingPeriodId = null;
      // A deleted period disappears from the Periods tab immediately —
      // the scores already recorded under it are untouched (they live in
      // the UniformInspections/RoomInspections/PTInspections sheets, keyed
      // by InspectionPeriodId, not in InspectionPeriods itself), so if its
      // detail view happens to be open, back out to the tile grid rather
      // than showing a detail page for a period that no longer exists.
      if (selectedPeriod && String(selectedPeriod.Id) === String(id)) {
        selectedPeriod = null;
        if (currentView === "period-detail") currentView = "periods-tiles";
      }
      Api.setCachedRows("InspectionPeriods", inspectionPeriods);
      Shell.showToast("Period deleted.", { type: "success" });
      renderPeriodsSection();
      if (currentView === "flights" || currentView === "history" || currentView === "periods-tiles" || currentView === "period-detail") renderActiveView();
    }

    // ---- Periods tab (tiles of scheduled periods -> per-flight scores) ----
    //
    // Distinct from the "Inspection Periods" summary box above (which only
    // shows what's upcoming, for scheduling) — this tab is for REVIEWING
    // periods that have already happened (or are happening today), each as
    // a tappable tile, the same "cube" pattern as the flight grid. Tapping
    // one shows what each flight actually scored under it, computed only
    // from rows tagged with that exact period's Id.

    function periodsForReview() {
      const todayStr = Shell.todayIso();
      return inspectionPeriods
        .filter(p => p.Date <= todayStr)
        .sort((a, b) => (a.Date < b.Date ? 1 : a.Date > b.Date ? -1 : 0)); // most recent first
    }

    function renderPeriodsTab() {
      currentView = "periods-tiles";
      const periods = periodsForReview();

      if (!periods.length) {
        contentEl.innerHTML = `
          <div class="state-message">
            <div class="state-message__icon">📋</div>
            <p>No inspection periods have happened yet.</p>
          </div>`;
        return;
      }

      contentEl.innerHTML = `
        <div class="flight-grid">
          ${periods.map(p => `
            <button class="flight-tile" data-period-id="${esc(p.Id)}">
              <span class="flight-tile__name">${esc(periodLabel(p))}</span>
              <span class="flight-tile__count">${esc(p.Date)}${p.Date === Shell.todayIso() ? " · Today" : ""}</span>
            </button>
          `).join("")}
        </div>`;

      contentEl.querySelectorAll("[data-period-id]").forEach(tile => {
        tile.addEventListener("click", () => {
          selectedPeriod = inspectionPeriods.find(p => String(p.Id) === tile.dataset.periodId) || null;
          if (selectedPeriod) renderPeriodDetail(selectedPeriod);
        });
      });
      Shell.animateIn(contentEl);
    }

    /**
     * Per-flight scores for ONE period, matched purely by
     * InspectionPeriodId — not "latest" or "all-time" like the Trends
     * averages, just whatever was actually scored under this specific
     * scheduled period. PT periods are summarized as a pass rate
     * (passed/attempted events); uniform/room as an average score out of
     * the scorecard's item count, same denominator Trends uses.
     */
    function computePeriodFlightScores(period) {
      const type = period.Category;
      const bucket = inspectionsByType[type];
      const grouped = groupByFlight(rosterRows);
      const flightNames = orderFlightNames(Object.keys(grouped));
      const periodRows = (bucket.all || []).filter(r => String(r.InspectionPeriodId) === String(period.Id));

      return flightNames.map(flight => {
        const capIds = new Set((grouped[flight] || []).map(m => String(m.CapId)));
        const rows = periodRows.filter(r => capIds.has(String(r.StudentCapId)));

        if (type === "pt") {
          const totals = rows.reduce((acc, r) => {
            acc.passed += Number(r.TotalPoints) || 0;
            acc.attempted += Number(r.ItemsAttempted) || 0;
            return acc;
          }, { passed: 0, attempted: 0 });
          return {
            flight, count: rows.length,
            pct: totals.attempted ? Math.round((totals.passed / totals.attempted) * 100) : null,
            label: totals.attempted ? `${totals.passed} / ${totals.attempted} passed` : null
          };
        }

        const items = INSPECTION_TYPES[type].items;
        const avg = rows.length ? rows.reduce((sum, r) => sum + (Number(r.TotalPoints) || 0), 0) / rows.length : null;
        return {
          flight, count: rows.length,
          pct: avg !== null ? Math.round((avg / items.length) * 100) : null,
          label: avg !== null ? `${avg.toFixed(1)} / ${items.length}` : null
        };
      });
    }

    function renderPeriodDetail(period) {
      currentView = "period-detail";
      const scores = computePeriodFlightScores(period);

      contentEl.innerHTML = `
        <div class="detail-header">
          <button class="btn btn--ghost" id="back-to-periods-btn">← Back</button>
          <h2>${esc(periodLabel(period))} · ${esc(period.Date)}</h2>
        </div>

        <div class="flight-avg-grid">
          ${scores.map(s => `
            <div class="flight-avg-card">
              <div class="flight-avg-card__name">${esc(s.flight)}</div>
              ${s.label ? `
                <div class="flight-avg-card__value">${esc(s.label)}</div>
                <div class="flight-avg-card__bar-track">
                  <div class="flight-avg-card__bar-fill" style="width:${s.pct ?? 0}%;"></div>
                </div>
                <div class="flight-avg-card__count">${s.count} cadet${s.count === 1 ? "" : "s"} scored</div>
              ` : `
                <div class="flight-avg-card__count" style="margin-top: var(--space-2);">No scores yet</div>
              `}
            </div>
          `).join("")}
        </div>
      `;

      document.getElementById("back-to-periods-btn").addEventListener("click", () => {
        selectedPeriod = null;
        renderPeriodsTab();
      });
      Shell.animateIn(contentEl);
    }

    function renderFlightGrid() {
      currentView = "flights";
      const grouped = groupByFlight(rosterRows);
      const flightNames = orderFlightNames(Object.keys(grouped));
      const todaysPeriods = periodsForDate(new Date().toLocaleDateString("en-CA"));

      if (!flightNames.length) {
        contentEl.innerHTML = `
          <div class="state-message">
            <div class="state-message__icon">🪖</div>
            <p>No flights available to inspect.</p>
          </div>`;
        return;
      }

      // A position scoped to one or more of its OWN flights (a Flight or
      // Squadron Commander) sees every one of those flights' cadet lists
      // directly, stacked, with no tile to click through first — same
      // principle as Roster's own-flight sections (see roster.html).
      // groupByFlight above already restricts such a position down to
      // exactly its own allowed flights (see isFlightAllowed), so this
      // never hides anything; it just skips a redundant "pick which of
      // your own flight(s)" step. Only a position with NO owned flight
      // (blank/"all" — CCT/Administrator) picks from the tile grid below.
      if (allowedFlights.length) {
        renderOwnFlightsDirect(grouped, flightNames, todaysPeriods);
        return;
      }

      contentEl.innerHTML = `
        ${todaysPeriods.length ? `<div class="alert alert--warning" style="margin-bottom: var(--space-4);">📋 Scheduled for today: <strong>${todaysPeriods.map(p => esc(periodLabel(p))).join(", ")}</strong></div>` : ""}
        <div class="flight-grid">
          ${flightNames.map(flight => `
            <button class="flight-tile" data-flight="${esc(flight)}">
              <span class="flight-tile__name">${esc(flight)}</span>
              <span class="flight-tile__count">${grouped[flight].length} cadet${grouped[flight].length === 1 ? "" : "s"}</span>
            </button>
          `).join("")}
        </div>`;

      contentEl.querySelectorAll(".flight-tile").forEach(tile => {
        tile.addEventListener("click", () => {
          selectedFlight = tile.dataset.flight;
          renderStudentList();
        });
      });
      Shell.animateIn(contentEl);
    }

    /**
     * Every one of this position's own flights, each as its own header +
     * cadet list, stacked on one page — no flight tile to click through
     * first (see the branch in renderFlightGrid above). A student row's
     * flight is recorded in a data attribute since, unlike the single-
     * selectedFlight tile-picked view, more than one flight's cadets can
     * be on screen together here.
     */
    function renderOwnFlightsDirect(grouped, flightNames, todaysPeriods) {
      contentEl.innerHTML = `
        ${todaysPeriods.length ? `<div class="alert alert--warning" style="margin-bottom: var(--space-4);">📋 Scheduled for today: <strong>${todaysPeriods.map(p => esc(periodLabel(p))).join(", ")}</strong></div>` : ""}
        ${flightNames.map(flight => {
          const members = grouped[flight] || [];
          return `
            <div style="margin-bottom: var(--space-6);">
              <div class="detail-header">
                <h2>${esc(flight)}</h2>
              </div>
              ${members.length ? `
                <div class="student-list">
                  ${members.map(m => `
                    <button class="student-row" data-flight="${esc(flight)}" data-capid="${esc(m.CapId)}">
                      <div>
                        <div class="student-row__name">${esc(m.Name) || "—"}</div>
                        <div class="student-row__meta">${esc(m.CapId) || "—"} · ${esc(m.Rank) || "—"}</div>
                      </div>
                    </button>`
                  ).join("")}
                </div>
              ` : `
                <div class="state-message">
                  <div class="state-message__icon">🪖</div>
                  <p>No cadets in this flight.</p>
                </div>
              `}
            </div>
          `;
        }).join("")}
      `;

      contentEl.querySelectorAll(".student-row").forEach(row => {
        row.addEventListener("click", () => {
          selectedFlight = row.dataset.flight;
          selectedStudent = (grouped[selectedFlight] || []).find(m => String(m.CapId) === row.dataset.capid);
          renderHistory();
        });
      });
      Shell.animateIn(contentEl);
    }

    function renderStudentList() {
      currentView = "students";
      const grouped = groupByFlight(rosterRows);
      const members = grouped[selectedFlight] || [];
      // No Back button when this is the only flight available — there's
      // no flight grid to go back TO (see the auto-open in
      // renderFlightGrid above).
      const hasOtherFlights = Object.keys(grouped).length > 1;

      contentEl.innerHTML = `
        <div class="detail-header">
          ${hasOtherFlights ? `<button class="btn btn--ghost" id="back-to-flights-btn">← Back</button>` : ""}
          <h2>${esc(selectedFlight)}</h2>
        </div>
        ${members.length ? `
          <div class="student-list">
            ${members.map(m => `
              <button class="student-row" data-capid="${esc(m.CapId)}">
                <div>
                  <div class="student-row__name">${esc(m.Name) || "—"}</div>
                  <div class="student-row__meta">${esc(m.CapId) || "—"} · ${esc(m.Rank) || "—"}</div>
                </div>
              </button>`
            ).join("")}
          </div>
        ` : `
          <div class="state-message">
            <div class="state-message__icon">🪖</div>
            <p>No cadets in this flight.</p>
          </div>
        `}
      `;

      const backBtn = document.getElementById("back-to-flights-btn");
      if (backBtn) {
        backBtn.addEventListener("click", () => {
          selectedFlight = null;
          renderFlightGrid();
        });
      }

      contentEl.querySelectorAll(".student-row").forEach(row => {
        row.addEventListener("click", () => {
          selectedStudent = members.find(m => String(m.CapId) === row.dataset.capid);
          renderHistory();
        });
      });
      Shell.animateIn(contentEl);
    }

    const TYPE_LABELS = { uniform: "Uniform", room: "Room", pt: "Physical Training" };

    /**
     * This student's Uniform + Room + PT inspections, merged into one
     * newest-first list — the Inspect tab has no per-type tab anymore, so
     * a cadet's history has to show every kind of inspection together.
     * Each entry is tagged with __type so the row can label itself and
     * route back into the right scorecard when clicked.
     */
    function mergedHistoryForStudent(capId) {
      const capIdStr = String(capId);
      const entries = [];
      Object.keys(inspectionsByType).forEach(type => {
        (inspectionsByType[type].byStudent[capIdStr] || []).forEach(row => entries.push({ ...row, __type: type }));
      });
      entries.sort((a, b) => (a.Date < b.Date ? 1 : a.Date > b.Date ? -1 : 0));
      return entries;
    }

    /**
     * Shows this student's past inspections (newest first, every type
     * merged together) with buttons to start today's inspection(s).
     * Clicking a past entry opens the scorecard pre-filled with that
     * day's scores for viewing/editing; each button below opens a blank
     * scorecard for today (or updates today's entry in place if one
     * already exists).
     */
    function renderHistory() {
      currentView = "history";
      const history = mergedHistoryForStudent(selectedStudent.CapId);
      const todayStr = new Date().toLocaleDateString("en-CA");

      // What's actually scheduled TODAY, across every category — each
      // scheduled period gets its own explicit button (e.g. "Room
      // Inspection", "Uniform — OCP/ABU"), naming exactly which period the
      // entry will be filed under (see pendingPeriodId/currentPeriodId).
      // With nothing scheduled, one ad-hoc button per inspection type
      // lets the person pick what they're logging instead.
      const scheduledToday = inspectionPeriods.filter(p => p.Date === todayStr);

      function inspectionButtonsHtml() {
        if (!scheduledToday.length) {
          return `
            <div style="display:flex; flex-wrap:wrap; gap: var(--space-2); margin-bottom: var(--space-5);">
              ${Object.keys(INSPECTION_TYPES).map(type => {
                const doneToday = (inspectionsByType[type].byStudent[String(selectedStudent.CapId)] || []).some(h => h.Date === todayStr);
                return `
                  <button class="btn btn--primary" data-adhoc-type="${type}">
                    ${doneToday ? "Update: " : "New "}${TYPE_LABELS[type]} Inspection
                  </button>
                `;
              }).join("")}
            </div>
          `;
        }
        return `
          <div style="display:flex; flex-wrap:wrap; gap: var(--space-2); margin-bottom: var(--space-5);">
            ${scheduledToday.map(p => {
              const doneForThisPeriod = (inspectionsByType[p.Category].byStudent[String(selectedStudent.CapId)] || []).some(h => h.Date === todayStr);
              return `
                <button class="btn btn--primary" data-period-btn="${esc(p.Id)}" data-period-category="${esc(p.Category)}">
                  ${doneForThisPeriod ? "Update: " : ""}${esc(periodLabel(p))}
                </button>
              `;
            }).join("")}
          </div>
        `;
      }

      contentEl.innerHTML = `
        <div class="detail-header">
          <button class="btn btn--ghost" id="back-to-students-btn">← Back</button>
          <h2>${esc(selectedStudent.Name) || "—"}</h2>
        </div>

        <div class="scorecard-meta">
          <div class="scorecard-meta__item"><span>Student CAP ID</span>${esc(selectedStudent.CapId) || "—"}</div>
          <div class="scorecard-meta__item"><span>Flight</span>${esc(selectedFlight)}</div>
          <div class="scorecard-meta__item"><span>Total Inspections</span>${history.length}</div>
        </div>

        ${inspectionButtonsHtml()}

        ${history.length ? `
          <div class="history-list">
            ${history.map(h => {
              const scoreLabel = INSPECTION_TYPES[h.__type].isPt
                ? `${h.TotalPoints ?? 0} / ${h.ItemsAttempted || 0} passed`
                : `${h.TotalPoints ?? "—"} / ${INSPECTION_TYPES[h.__type].items.length}`;
              return `
                <div class="history-row" data-date="${esc(h.Date)}" data-type="${esc(h.__type)}" style="cursor:pointer;">
                  <div>
                    <div class="history-row__date">${esc(h.Date)}</div>
                    <div class="history-row__meta">${TYPE_LABELS[h.__type]} · ${esc(h.InspectingPosition) || "—"}${h.Notes ? " · has notes" : ""}</div>
                  </div>
                  <div class="history-row__score">${scoreLabel}</div>
                </div>
              `;
            }).join("")}
          </div>
        ` : `
          <div class="state-message">
            <div class="state-message__icon">🪖</div>
            <p>No inspections recorded yet for this cadet.</p>
          </div>
        `}
      `;

      document.getElementById("back-to-students-btn").addEventListener("click", () => {
        selectedStudent = null;
        // A position with owned flight(s) never went through the
        // single-selectedFlight student list to get here (see
        // renderFlightGrid's branch) — going back means re-showing every
        // owned flight's list again, not just the one this student was
        // in. Only CCT/Administrator (no owned flights) actually came
        // from renderStudentList's tile-picked single-flight view.
        if (allowedFlights.length) renderFlightGrid();
        else renderStudentList();
      });

      contentEl.querySelectorAll("[data-adhoc-type]").forEach(btn => {
        btn.addEventListener("click", () => {
          activeType = btn.dataset.adhocType;
          pendingPeriodId = ""; // no scheduled period — an ad-hoc entry
          const doneToday = (inspectionsByType[activeType].byStudent[String(selectedStudent.CapId)] || []).some(h => h.Date === todayStr);
          selectedInspectionDate = doneToday ? todayStr : null;
          renderScorecard();
        });
      });

      contentEl.querySelectorAll("[data-period-btn]").forEach(btn => {
        btn.addEventListener("click", () => {
          // Land the entry in the exact period it was scheduled under —
          // set activeType to that period's category BEFORE the scorecard
          // opens, and remember the period's own Id so the saved row
          // carries it (see currentPeriodId in renderScorecard).
          activeType = btn.dataset.periodCategory;
          pendingPeriodId = btn.dataset.periodBtn;
          selectedInspectionDate = todayStr;
          renderScorecard();
        });
      });

      contentEl.querySelectorAll(".history-row").forEach(row => {
        row.addEventListener("click", () => {
          activeType = row.dataset.type;
          // No pending selection here — renderScorecard falls back to the
          // clicked entry's OWN InspectionPeriodId (via `existing`), which
          // is the correct association for something already saved.
          pendingPeriodId = "";
          selectedInspectionDate = row.dataset.date;
          renderScorecard();
        });
      });
      Shell.animateIn(contentEl);
    }

    function renderScorecard() {
      currentView = "scorecard";
      const isPt = !!INSPECTION_TYPES[activeType].isPt;
      if (isPt) return renderPtScorecard();

      const items = activeItems();
      const history = activeInspectionsByStudent()[String(selectedStudent.CapId)] || [];
      const existing = selectedInspectionDate
        ? (history.find(h => h.Date === selectedInspectionDate) || {})
        : {};
      // A row already being edited keeps its OWN period association;
      // only a genuinely new entry (existing = {}) takes whatever period
      // was just selected on the history screen. See pendingPeriodId.
      currentPeriodId = (existing.InspectionPeriodId != null && existing.InspectionPeriodId !== "")
        ? existing.InspectionPeriodId
        : (pendingPeriodId || "");

      currentScores = {};
      items.forEach(item => {
        const v = existing[item.key];
        currentScores[item.key] = (v === 1 || v === "1") ? 1 : ((v === 0 || v === "0") ? 0 : null);
      });

      const now = new Date();
      const dateStr = selectedInspectionDate || now.toLocaleDateString("en-CA"); // YYYY-MM-DD
      const timestampStr = now.toISOString();
      const isEditingPast = !!selectedInspectionDate;

      // Uniform has one flat section; Room groups items under the
      // printed scorecard's "Bunk"/"Locker" headers instead.
      const sectionTitle = INSPECTION_TYPES[activeType].sectionTitle;
      const sections = sectionTitle
        ? [{ title: sectionTitle, items }]
        : Array.from(new Set(items.map(i => i.section))).map(section => ({
            title: section,
            items: items.filter(i => i.section === section)
          }));

      contentEl.innerHTML = `
        <div class="detail-header">
          <button class="btn btn--ghost" id="back-to-history-btn">← Back</button>
          <h2>${esc(selectedStudent.Name) || "—"}</h2>
        </div>

        <div class="scorecard-meta">
          <div class="scorecard-meta__item"><span>Student CAP ID</span>${esc(selectedStudent.CapId) || "—"}</div>
          <div class="scorecard-meta__item"><span>Flight</span>${esc(selectedFlight)}</div>
          <div class="scorecard-meta__item"><span>Inspecting Position</span>${esc(session.Position)}</div>
          <div class="scorecard-meta__item"><span>Date</span>${esc(dateStr)}${isEditingPast ? " (editing existing entry)" : ""}</div>
        </div>

        ${sections.map(sec => `
          <div class="scorecard-section">
            <h3>${esc(sec.title)}</h3>
            ${sec.items.map(item => `
              <div class="scorecard-item">
                <span class="scorecard-item__label">${item.label}</span>
                <div class="scorecard-toggle" data-key="${item.key}">
                  <button type="button" class="score-btn value-0" data-value="0">0</button>
                  <button type="button" class="score-btn value-1" data-value="1">1</button>
                </div>
              </div>
            `).join("")}
          </div>
        `).join("")}

        <div class="scorecard-total">
          <span>Total points</span>
          <span id="total-points-display">${computeTotal()} / ${items.length}</span>
        </div>

        <div class="scorecard-section scorecard-notes">
          <h3>Notes</h3>
          <textarea id="notes-input" placeholder="Optional notes…">${esc(existing.Notes || "")}</textarea>
        </div>

        <button class="btn btn--primary" id="submit-scorecard-btn">Save Inspection</button>
      `;

      document.getElementById("back-to-history-btn").addEventListener("click", () => {
        selectedInspectionDate = null;
        renderHistory();
      });

      items.forEach(item => updateToggleUI(item.key));

      contentEl.querySelectorAll(".scorecard-toggle").forEach(toggle => {
        const key = toggle.dataset.key;
        toggle.querySelectorAll(".score-btn").forEach(btn => {
          btn.addEventListener("click", () => {
            currentScores[key] = Number(btn.dataset.value);
            updateToggleUI(key);
            const totalEl = document.getElementById("total-points-display");
            totalEl.textContent = `${computeTotal()} / ${items.length}`;
            // Retriggerable pulse — same remove/reflow/add dance as
            // Shell.animateIn, so scoring several items in a row pulses
            // every time instead of only the first.
            totalEl.classList.remove("total-pulse");
            void totalEl.offsetWidth;
            totalEl.classList.add("total-pulse");
          });
        });
      });

      document.getElementById("submit-scorecard-btn").addEventListener("click", () => submitScorecard(dateStr, timestampStr));
      Shell.animateIn(contentEl);
    }

    /**
     * PT's scorecard is a different shape from uniform/room: raw values
     * typed in (a number of reps/laps, or "mm:ss" for the mile run)
     * rather than a manual pass/fail tap — pass/fail is DERIVED from the
     * chart, live, as the person types. All 5 items are optional.
     */
    function renderPtScorecard() {
      const items = PT_SCORE_ITEMS;
      const history = activeInspectionsByStudent()[String(selectedStudent.CapId)] || [];
      const existing = selectedInspectionDate
        ? (history.find(h => h.Date === selectedInspectionDate) || {})
        : {};
      // See the matching comment in renderScorecard() above.
      currentPeriodId = (existing.InspectionPeriodId != null && existing.InspectionPeriodId !== "")
        ? existing.InspectionPeriodId
        : (pendingPeriodId || "");

      const age = selectedStudent.Age || existing.Age || "";
      const sex = selectedStudent.Sex || existing.Sex || "";
      const standard = ptStandardFor(age, sex);

      currentScores = {};
      items.forEach(item => { currentScores[item.key] = existing[item.key] || ""; });

      const now = new Date();
      const dateStr = selectedInspectionDate || now.toLocaleDateString("en-CA");
      const timestampStr = now.toISOString();
      const isEditingPast = !!selectedInspectionDate;

      contentEl.innerHTML = `
        <div class="detail-header">
          <button class="btn btn--ghost" id="back-to-history-btn">← Back</button>
          <h2>${esc(selectedStudent.Name) || "—"}</h2>
        </div>

        <div class="scorecard-meta">
          <div class="scorecard-meta__item"><span>Student CAP ID</span>${esc(selectedStudent.CapId) || "—"}</div>
          <div class="scorecard-meta__item"><span>Flight</span>${esc(selectedFlight)}</div>
          <div class="scorecard-meta__item"><span>Age / Sex</span>${esc(age) || "—"} / ${esc(sex) || "—"}</div>
          <div class="scorecard-meta__item"><span>Date</span>${esc(dateStr)}${isEditingPast ? " (editing existing entry)" : ""}</div>
        </div>

        ${!standard ? `<div class="alert alert--warning" style="margin-bottom: var(--space-4);">⚠ This cadet has no Age/Sex on file in the Roster — raw scores can still be recorded, but pass/fail can't be computed until Age and Sex are added.</div>` : ""}

        <div class="scorecard-section">
          <h3>${esc(INSPECTION_TYPES.pt.sectionTitle)}</h3>
          ${items.map(item => {
            const threshold = standard ? standard[item.key] : null;
            const thresholdLabel = threshold === null ? "—" : (item.type === "time" ? formatSecondsToMinSec(threshold) : threshold);
            return `
              <div class="scorecard-item" data-pt-key="${item.key}">
                <span class="scorecard-item__label">${item.label} <span style="color: var(--ink-600); font-weight: 400;">(${item.unit}${threshold !== null ? ` · standard ${esc(thresholdLabel)}` : ""})</span></span>
                <div style="display:flex; align-items:center; gap: var(--space-2);">
                  <input type="text" inputmode="${item.type === "time" ? "numeric" : "decimal"}" class="pt-input" data-key="${item.key}" placeholder="${item.type === "time" ? "mm:ss" : item.unit}" value="${esc(currentScores[item.key])}" style="width: 90px; font-family: var(--font-mono); font-size: var(--fs-sm); padding: var(--space-2) var(--space-3); border: 1px solid var(--line); border-radius: var(--radius-md); background: var(--surface);">
                  <span class="badge pt-pass-badge" data-pt-badge="${item.key}" style="background: var(--surface-sunken); color: var(--ink-600);">—</span>
                </div>
              </div>`;
          }).join("")}
        </div>

        <div class="scorecard-total">
          <span>Events passed</span>
          <span id="total-points-display">${ptTotalLabel()}</span>
        </div>

        <div class="scorecard-section scorecard-notes">
          <h3>Notes</h3>
          <textarea id="notes-input" placeholder="Optional notes…">${esc(existing.Notes || "")}</textarea>
        </div>

        <button class="btn btn--primary" id="submit-scorecard-btn">Save PT Test</button>
      `;

      document.getElementById("back-to-history-btn").addEventListener("click", () => {
        selectedInspectionDate = null;
        renderHistory();
      });

      function refreshPtBadge(item) {
        const badge = contentEl.querySelector(`[data-pt-badge="${item.key}"]`);
        if (!badge) return;
        const raw = currentScores[item.key];
        if (!String(raw || "").trim()) {
          badge.textContent = "—";
          badge.style.background = "var(--surface-sunken)";
          badge.style.color = "var(--ink-600)";
          return;
        }
        const pass = evaluatePtItem(item, raw, standard);
        if (pass === null) {
          badge.textContent = "Unscored";
          badge.style.background = "var(--surface-sunken)";
          badge.style.color = "var(--ink-600)";
        } else if (pass) {
          badge.textContent = "Pass";
          badge.style.background = "var(--green-100)";
          badge.style.color = "var(--green-600)";
        } else {
          badge.textContent = "Fail";
          badge.style.background = "var(--red-100)";
          badge.style.color = "var(--red-600)";
        }
      }

      items.forEach(refreshPtBadge);

      contentEl.querySelectorAll(".pt-input").forEach(input => {
        const item = items.find(i => i.key === input.dataset.key);
        input.addEventListener("input", () => {
          currentScores[item.key] = input.value;
          refreshPtBadge(item);
          const totalEl = document.getElementById("total-points-display");
          totalEl.textContent = ptTotalLabel();
          totalEl.classList.remove("total-pulse");
          void totalEl.offsetWidth;
          totalEl.classList.add("total-pulse");
        });
      });

      document.getElementById("submit-scorecard-btn").addEventListener("click", () => submitPtScorecard(dateStr, timestampStr, age, sex, standard));
      Shell.animateIn(contentEl);
    }

    /** { passed, attempted } for PT's currently-entered raw values, using whatever standard applies to the student on screen. */
    function computePtTotals(standard) {
      let attempted = 0, passed = 0;
      PT_SCORE_ITEMS.forEach(item => {
        const raw = currentScores[item.key];
        if (!String(raw || "").trim()) return;
        attempted++;
        const pass = evaluatePtItem(item, raw, standard);
        if (pass === true) passed++;
      });
      return { passed, attempted };
    }

    function ptTotalLabel() {
      const age = selectedStudent.Age || "";
      const sex = selectedStudent.Sex || "";
      const { passed, attempted } = computePtTotals(ptStandardFor(age, sex));
      return attempted ? `${passed} / ${attempted} passed` : "No events entered";
    }

    function updateToggleUI(key) {
      const toggle = contentEl.querySelector(`.scorecard-toggle[data-key="${key}"]`);
      if (!toggle) return;
      toggle.querySelectorAll(".score-btn").forEach(btn => {
        const selected = Number(btn.dataset.value) === currentScores[key];
        btn.classList.toggle("is-selected", selected);
      });
    }

    function computeTotal() {
      return activeItems().reduce((sum, item) => sum + (currentScores[item.key] === 1 ? 1 : 0), 0);
    }

    function submitScorecard(dateStr, timestampStr) {
      const items = activeItems();
      const unscored = items.filter(item => currentScores[item.key] !== 0 && currentScores[item.key] !== 1);
      if (unscored.length) {
        Shell.showToast(`Score every item before saving (missing: ${unscored.map(i => i.label).join(", ")}).`, { type: "error" });
        return;
      }

      const row = {
        StudentCapId: selectedStudent.CapId,
        StudentName: selectedStudent.Name,
        Flight: selectedFlight,
        InspectingPosition: session.Position,
        Date: dateStr,
        Timestamp: timestampStr,
        InspectionPeriodId: currentPeriodId,
        Notes: document.getElementById("notes-input").value.trim()
      };
      items.forEach(item => { row[item.key] = currentScores[item.key]; });
      row.TotalPoints = computeTotal();

      // Composite match on (StudentCapId, Date): re-inspecting the SAME
      // day updates that entry in place; a NEW day appends a fresh row,
      // preserving history for trends. Fires in the background — the
      // header's sync indicator reflects whether it lands, but the
      // person doesn't wait on the network to see their save reflected.
      Api.writeRow(activeSheet(), row, { matchColumns: ["StudentCapId", "Date"] });

      const capId = String(selectedStudent.CapId);
      const bucket = inspectionsByType[activeType];
      const list = bucket.byStudent[capId] || (bucket.byStudent[capId] = []);
      const idx = list.findIndex(h => h.Date === dateStr);
      if (idx >= 0) list[idx] = row; else list.unshift(row);
      list.sort((a, b) => (a.Date < b.Date ? 1 : -1));

      // Keep the FLAT "all" array (what Api's cache actually stores) in
      // sync with the byStudent index we just patched above, then push
      // it into Api's cache immediately. Api.writeRow() only marks the
      // sheet's cache STALE — it doesn't know what the optimistic result
      // looks like — so without this, the next background revalidation
      // (the periodic Api.warmCache poll, or just re-opening this view)
      // fetches the server's now-actually-updated rows, finds them
      // different from the stale pre-write cache, and fires this page's
      // onFresh subscriber again: a second render()/animateIn() replaying
      // the entrance animation moments after the one from this save.
      // Reconciling the cache here means that revalidation finds nothing
      // changed, so it stays silent.
      const allIdx = bucket.all.findIndex(h => String(h.StudentCapId) === capId && h.Date === dateStr);
      if (allIdx >= 0) bucket.all[allIdx] = row; else bucket.all.push(row);
      Api.setCachedRows(activeSheet(), bucket.all);

      Shell.showToast("Inspection saved.", { type: "success" });
      selectedInspectionDate = null;
      renderHistory();
    }

    /**
     * PT's save path: unlike submitScorecard() above, nothing here is
     * required — all 5 events are optional, so this only computes
     * pass/fail for whichever ones actually have a value.
     */
    function submitPtScorecard(dateStr, timestampStr, age, sex, standard) {
      const { passed, attempted } = computePtTotals(standard);

      const row = {
        StudentCapId: selectedStudent.CapId,
        StudentName: selectedStudent.Name,
        Flight: selectedFlight,
        InspectingPosition: session.Position,
        Date: dateStr,
        Timestamp: timestampStr,
        InspectionPeriodId: currentPeriodId,
        Age: age,
        Sex: sex,
        Notes: document.getElementById("notes-input").value.trim(),
        TotalPoints: passed,
        ItemsAttempted: attempted
      };
      PT_SCORE_ITEMS.forEach(item => {
        const raw = currentScores[item.key];
        row[item.key] = raw || "";
        const pass = evaluatePtItem(item, raw, standard);
        row[`${item.key}Pass`] = pass === null ? "" : (pass ? 1 : 0);
      });

      Api.writeRow("PTInspections", row, { matchColumns: ["StudentCapId", "Date"] });

      const capId = String(selectedStudent.CapId);
      const bucket = inspectionsByType.pt;
      const list = bucket.byStudent[capId] || (bucket.byStudent[capId] = []);
      const idx = list.findIndex(h => h.Date === dateStr);
      if (idx >= 0) list[idx] = row; else list.unshift(row);
      list.sort((a, b) => (a.Date < b.Date ? 1 : -1));

      const allIdx = bucket.all.findIndex(h => String(h.StudentCapId) === capId && h.Date === dateStr);
      if (allIdx >= 0) bucket.all[allIdx] = row; else bucket.all.push(row);
      Api.setCachedRows("PTInspections", bucket.all);

      Shell.showToast("PT test saved.", { type: "success" });
      selectedInspectionDate = null;
      renderHistory();
    }

    /**
     * Flight-vs-flight averages. `basis` is either "all" (every historical
     * entry, all-time) or a specific InspectionPeriods Id — scoping the
     * averages to just that ONE scheduled period's results, the same
     * per-period slice the Periods tab's own detail view shows (see
     * computePeriodFlightScores), just aggregated across every period
     * matching `type` here instead of computed fresh per period.
     */
    let trendsBasis = "all"; // "all" | an InspectionPeriods Id
    let trendsType = "uniform"; // "uniform" | "room" — which inspection's trends are on screen

    /** The rows a basis of "all" or a specific period Id resolves to, out of one cadet's full history. */
    function historyForBasis(history, basis) {
      if (basis === "all") return history;
      return history.filter(r => String(r.InspectionPeriodId) === String(basis));
    }

    function computeFlightTrends(type, basis) {
      const items = INSPECTION_TYPES[type].items;
      const byStudent = inspectionsByType[type].byStudent;
      const grouped = groupByFlight(rosterRows);
      const flightNames = Object.keys(grouped).sort();

      return flightNames.map(flight => {
        const members = grouped[flight];
        const relevantRows = [];
        members.forEach(m => {
          const history = byStudent[String(m.CapId)] || [];
          relevantRows.push(...historyForBasis(history, basis));
        });

        const itemAverages = {};
        items.forEach(item => {
          const scored = relevantRows.filter(r => r[item.key] === 1 || r[item.key] === 0 || r[item.key] === "1" || r[item.key] === "0");
          const passCount = scored.filter(r => Number(r[item.key]) === 1).length;
          itemAverages[item.key] = scored.length ? passCount / scored.length : null;
        });

        const totalAvg = relevantRows.length
          ? relevantRows.reduce((sum, r) => sum + (Number(r.TotalPoints) || 0), 0) / relevantRows.length
          : null;

        return { flight, count: relevantRows.length, studentsInspected: new Set(relevantRows.map(r => r.StudentCapId)).size, totalAvg, itemAverages };
      });
    }

    /**
     * Per-flight average score % on each date that flight has at least
     * one recorded inspection — the input to the "progression over time"
     * line chart. Uses EVERY inspection on record (not just each
     * cadet's latest, unlike the flight-average cards above) since a
     * trend over time is inherently about the historical sequence, not
     * a current snapshot.
     */
    function computeProgressionSeries(type) {
      const items = INSPECTION_TYPES[type].items;
      const grouped = groupByFlight(rosterRows); // already scoped to allowed flights
      const byStudent = inspectionsByType[type].byStudent;

      const flightOfCapId = new Map();
      Object.entries(grouped).forEach(([flight, members]) => {
        members.forEach(m => flightOfCapId.set(String(m.CapId), flight));
      });

      // date -> flight -> { sum, count }
      const buckets = new Map();
      Object.entries(byStudent).forEach(([capId, history]) => {
        const flight = flightOfCapId.get(capId);
        if (!flight || !items.length) return;
        history.forEach(row => {
          const pct = (Number(row.TotalPoints) || 0) / items.length * 100;
          if (!buckets.has(row.Date)) buckets.set(row.Date, {});
          const dayBucket = buckets.get(row.Date);
          dayBucket[flight] = dayBucket[flight] || { sum: 0, count: 0 };
          dayBucket[flight].sum += pct;
          dayBucket[flight].count += 1;
        });
      });

      const dates = Array.from(buckets.keys()).sort();
      const series = Object.keys(grouped).sort().map(flight => ({
        flight,
        points: dates.map(date => {
          const b = buckets.get(date)[flight];
          return b ? Math.round((b.sum / b.count) * 10) / 10 : null;
        })
      })).filter(s => s.points.some(p => p !== null));

      return { dates, series };
    }

    const PROGRESSION_CHART_COLORS = [
      "var(--indigo-700)", "var(--gold-600)", "var(--garnet-600)",
      "var(--green-600)", "var(--amber-600)", "var(--steel-300)"
    ];

    /** Inline-SVG line chart — no charting library in this codebase, and one flight-average-over-time chart doesn't warrant adding one. */
    function renderProgressionChart(type) {
      const { dates, series } = computeProgressionSeries(type);
      if (dates.length < 2 || !series.length) {
        return `<div class="state-message" style="padding: var(--space-5) 0;"><p>Not enough inspection history yet to chart a trend — need at least two different inspection dates.</p></div>`;
      }

      const W = 640, H = 220, padL = 34, padR = 12, padT = 12, padB = 26;
      const plotW = W - padL - padR, plotH = H - padT - padB;
      const xStep = dates.length > 1 ? plotW / (dates.length - 1) : 0;
      const xAt = (i) => padL + i * xStep;
      const yAt = (pct) => padT + plotH - (pct / 100) * plotH;

      const gridLines = [0, 25, 50, 75, 100].map(pct => `
        <line x1="${padL}" y1="${yAt(pct)}" x2="${W - padR}" y2="${yAt(pct)}" stroke="var(--line)" stroke-width="1"/>
        <text x="${padL - 6}" y="${yAt(pct) + 3}" text-anchor="end" font-size="9" fill="var(--ink-600)">${pct}%</text>
      `).join("");

      // Only label every Nth date so a long history doesn't overlap its own labels.
      const labelEvery = Math.max(1, Math.ceil(dates.length / 6));
      const xLabels = dates.map((d, i) => (i % labelEvery === 0 || i === dates.length - 1)
        ? `<text x="${xAt(i)}" y="${H - 6}" text-anchor="middle" font-size="9" fill="var(--ink-600)">${esc(d.slice(5))}</text>`
        : ""
      ).join("");

      const lines = series.map((s, i) => {
        const color = PROGRESSION_CHART_COLORS[i % PROGRESSION_CHART_COLORS.length];
        const pts = s.points.map((p, idx) => p === null ? null : `${xAt(idx)},${yAt(p)}`).filter(Boolean).join(" ");
        const dots = s.points.map((p, idx) => p === null ? "" : `<circle cx="${xAt(idx)}" cy="${yAt(p)}" r="2.5" fill="${color}"/>`).join("");
        return `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>${dots}`;
      }).join("");

      const legend = series.map((s, i) => `
        <span class="progression-legend__item">
          <span class="progression-legend__swatch" style="background:${PROGRESSION_CHART_COLORS[i % PROGRESSION_CHART_COLORS.length]};"></span>
          ${esc(s.flight)}
        </span>
      `).join("");

      return `
        <div class="progression-chart">
          <svg viewBox="0 0 ${W} ${H}" class="progression-chart__svg" role="img" aria-label="Average score percentage by flight over time">
            ${gridLines}
            ${lines}
            ${xLabels}
          </svg>
