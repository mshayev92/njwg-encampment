<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    // Applied synchronously, before first paint, so a collapsed sidebar
    // renders at its collapsed width immediately instead of flashing
    // open at the default width for a frame and visibly animating shut
    // once js/shell.js runs (see .nav-rail-collapsed in css/app.css).
    try {
      if (localStorage.getItem("njwg_nav_collapsed") === "true") {
        document.documentElement.classList.add("nav-rail-collapsed");
      }
    } catch (e) { /* storage unavailable — falls back to expanded */ }
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes — NJWG Encampment</title>
  <meta name="theme-color" content="#0d1250">
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../icons/favicon.ico" sizes="any">
  <link rel="icon" href="../icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/app.css">

  <style>
    .note-form input[type="text"] {
      width: 100%;
      font-family: var(--font-body);
      font-size: var(--fs-sm);
      padding: var(--space-3);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--surface-sunken);
    }

    .subject-autocomplete {
      position: relative;
      margin-bottom: var(--space-3);
    }

    .subject-suggestions {
      position: absolute;
      top: calc(100% + var(--space-1));
      left: 0;
      right: 0;
      z-index: 20;
      max-height: 240px;
      overflow-y: auto;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
    }

    .subject-suggestions button {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: var(--space-3);
      width: 100%;
      text-align: left;
      padding: var(--space-2) var(--space-3);
      background: none;
      border: none;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      font-family: var(--font-body);
      font-size: var(--fs-sm);
      color: var(--ink-900);
    }

    .subject-suggestions button:last-child { border-bottom: none; }

    .subject-suggestions button:hover,
    .subject-suggestions button.is-active {
      background: var(--surface-sunken);
    }

    .subject-suggestions__meta {
      font-size: var(--fs-2xs);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      color: var(--ink-600);
      white-space: nowrap;
    }

    .richtext-toolbar {
      display: flex;
      gap: var(--space-1);
      margin-bottom: var(--space-2);
    }

    .richtext-toolbar button {
      padding: var(--space-2) var(--space-3);
      font-size: var(--fs-sm);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--ink-900);
      cursor: pointer;
    }

    .richtext-toolbar button:hover {
      border-color: var(--gold-500);
    }

    .richtext-editor {
      width: 100%;
      min-height: 120px;
      font-family: var(--font-body);
      font-size: var(--fs-sm);
      padding: var(--space-3);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--surface-sunken);
      margin-bottom: var(--space-3);
      overflow-y: auto;
    }

    .richtext-editor:empty::before {
      content: attr(data-placeholder);
      color: var(--ink-600);
    }

    .richtext-editor ul, .richtext-editor ol {
      padding-left: var(--space-5);
    }

    /* Square-ish tiles in a wrapping grid, instead of full-width rows —
       lets many notes sit side by side rather than each one claiming
       the whole content width. */
    .note-feed {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      grid-auto-rows: 240px;
      gap: var(--space-3);
      margin-top: var(--space-5);
    }

    .note-card {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      overflow: hidden;
    }

    .note-card__subject {
      font-family: var(--font-display);
      font-size: var(--fs-md);
      color: var(--indigo-900);
      margin-bottom: var(--space-1);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .note-card__meta {
      font-size: var(--fs-2xs);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      color: var(--ink-600);
      margin-bottom: var(--space-3);
    }

    .note-card__body {
      font-size: var(--fs-sm);
      color: var(--ink-900);
      flex: 1;
      overflow-y: auto;
    }

    .note-card__body ul, .note-card__body ol {
      padding-left: var(--space-5);
    }
  </style>
</head>
<body>

  <div class="app-shell">
    <nav class="nav-rail" id="nav-rail">
      <button type="button" class="nav-rail__crest" id="nav-rail-crest" aria-label="Toggle navigation width">
        <span class="nav-rail__crest-mark"><img src="../icons/icon-192.png" alt="NJWG"></span>
        <span class="nav-rail__crest-text">NJWG<span>Encampment</span></span>
      </button>
      <div id="nav-rail-links"></div>
    </nav>
    <header class="app-header" id="app-header"></header>

    <main class="app-main">
      <div id="page-content">
        <div class="state-message">
          <div class="spinner"></div>
          <p>Loading…</p>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/richtext.js"></script>
  <script src="../js/shell.js"></script>
  <script>
    Shell.init({ activePage: "notes" });

    const contentEl = document.getElementById("page-content");
    const session = Auth.getSession();
    const esc = Shell.escapeHtml;

    const allowedFlights = (session && Array.isArray(session.Flights)) ? session.Flights : [];

    /** Empty/absent Flights on the session means "all flights" per Code.gs. */
    function isFlightAllowed(flight) {
      if (!allowedFlights.length) return true;
      if (allowedFlights.some(f => f.toLowerCase() === "all")) return true;
      return allowedFlights.some(f => f.toLowerCase() === String(flight || "").toLowerCase());
    }

    let rosterRows = [];
    let notes = [];
    let editingNoteId = null; // Id of the note being edited, or null when adding a new one
    let showForm = false; // Whether the add-note form is open (editing always forces it open)

    // Only cadets in flights this position is scoped to are offered as
    // Subject suggestions — matches the same Flights-column scoping
    // Inspections uses, so a flight-restricted position can't browse
    // names outside its own flights via the Notes autocomplete either.
    function allowedRoster() {
      return rosterRows.filter(r => isFlightAllowed(r.Flight));
    }

    /**
     * A note is visible to a position if it isn't tied to any specific
     * flight (blank Flight — a general note anyone can see, same as an
     * Announcement) OR that position is allowed to see the tied flight.
     * This is the actual visibility gate for the feed below — matched
     * against the FULL roster (not allowedRoster()) when a note is
     * created, so the Flight tag is correct even in the rare case
     * someone types a name manually rather than picking a suggestion.
     */
    function isNoteVisible(note) {
      return !note.Flight || isFlightAllowed(note.Flight);
    }

    /** Exact (case-insensitive) name match against the full roster, so a written Subject gets tagged with that cadet's real Flight. */
    function flightForSubject(subject) {
      if (!subject) return "";
      const match = rosterRows.find(r => String(r.Name || "").trim().toLowerCase() === subject.trim().toLowerCase());
      return match ? (match.Flight || "") : "";
    }

    function renderPostForm() {
      const editing = editingNoteId !== null;
      if (!editing && !showForm) {
        return `<button class="btn btn--primary" id="show-note-form-btn">+ Add a Note</button>`;
      }
      return `
        <div class="card note-form">
          <h2 style="font-size: var(--fs-lg); color: var(--navy-900);">${editing ? "Edit Note" : "Add a Note"}</h2>
          <div class="subject-autocomplete" id="subject-autocomplete">
            <input type="text" id="subject-input" autocomplete="off" placeholder="Subject — a cadet's name from the roster, or any subject…">
          </div>
          ${RichText.TOOLBAR_HTML}
          <div class="richtext-editor" id="body-editor" contenteditable="true" data-placeholder="Write your note…"></div>
          <div style="display:flex; gap: var(--space-3);">
            <button class="btn btn--primary" id="post-note-btn">${editing ? "Save Changes" : "Add Note"}</button>
            <button class="btn btn--ghost" id="cancel-edit-note-btn">Cancel</button>
          </div>
        </div>
      `;
    }

    function renderNoteCard(n) {
      return `
        <div class="note-card">
          <div class="note-card__meta" style="display:flex; align-items:center; justify-content:space-between; gap: var(--space-3);">
            <span>${esc(n.AuthorPosition || "—")} · ${esc(Shell.formatDateTime(n.Timestamp))}${n.Flight ? ` · ${esc(n.Flight)}` : ""}</span>
            <span style="display:flex; gap: var(--space-1);">
              <button class="btn btn--ghost" data-edit-id="${esc(n.Id)}" data-tooltip="Edit note" style="padding: var(--space-1) var(--space-2);" aria-label="Edit note">✎</button>
              <button class="btn btn--ghost" data-delete-id="${esc(n.Id)}" data-tooltip="Delete note" style="padding: var(--space-1) var(--space-2);" aria-label="Delete note">✕</button>
            </span>
          </div>
          <div class="note-card__subject">${esc(n.Subject) || "(no subject)"}</div>
          <div class="note-card__body">${RichText.sanitize(n.Body || "")}</div>
        </div>
      `;
    }

    function renderFeed() {
      const sorted = notes
        .filter(isNoteVisible)
        .sort((a, b) => new Date(b.Timestamp) - new Date(a.Timestamp));
      if (!sorted.length) {
        return `<div class="state-message"><div class="state-message__icon">🗒️</div><p>No notes yet.</p></div>`;
      }
      return `
        <div class="note-feed">
          ${sorted.map(renderNoteCard).join("")}
        </div>
      `;
    }

    function render() {
      contentEl.innerHTML = `
        ${renderPostForm()}
        ${renderFeed()}
      `;

      const toolbar = contentEl.querySelector(".richtext-toolbar");
      const editor = document.getElementById("body-editor");
      if (toolbar && editor) RichText.attach(toolbar, editor);

      const showFormBtn = document.getElementById("show-note-form-btn");
      if (showFormBtn) showFormBtn.addEventListener("click", () => { showForm = true; render(); });

      const postNoteBtn = document.getElementById("post-note-btn");
      if (postNoteBtn) postNoteBtn.addEventListener("click", postNote);
      const cancelEditBtn = document.getElementById("cancel-edit-note-btn");
      if (cancelEditBtn) cancelEditBtn.addEventListener("click", cancelEditNote);
      initSubjectAutocomplete();

      contentEl.querySelectorAll("[data-edit-id]").forEach(btn => {
        btn.addEventListener("click", () => startEditNote(btn.dataset.editId));
      });
      contentEl.querySelectorAll("[data-delete-id]").forEach(btn => {
        btn.addEventListener("click", () => deleteNote(btn.dataset.deleteId));
      });
      Shell.wireTooltips(contentEl);
    }

    /** Prefills the form from an existing note and switches it into edit mode. */
    function startEditNote(id) {
      const note = notes.find(n => String(n.Id) === String(id));
      if (!note) return;
      editingNoteId = note.Id;
      render();
      document.getElementById("subject-input").value = note.Subject || "";
      document.getElementById("body-editor").innerHTML = RichText.sanitize(note.Body || "");
      document.querySelector(".note-form").scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function cancelEditNote() {
      editingNoteId = null;
      showForm = false;
      render();
    }

    async function deleteNote(id) {
      const confirmed = await Shell.confirm({
        title: "Delete note?",
        message: "This can't be undone.",
        confirmLabel: "Delete",
      });
      if (!confirmed) return;

      Api.deleteRow("Notes", { Id: id }, { matchColumns: ["Id"] });
      notes = notes.filter(n => String(n.Id) !== String(id));
      if (editingNoteId === id) editingNoteId = null;
      render();
      Shell.showToast("Note deleted.", { type: "success" });
    }

    /**
     * Small custom autocomplete over the flight-scoped roster — replaces
     * a native <datalist>, which can't be styled and renders as a bare
     * system listbox (inconsistent look, and on some browsers overlaps
     * the page rather than docking under the input). Still a completely
     * free-text field: picking a suggestion just fills the input, typing
     * anything else and ignoring the list works too.
     */
    function initSubjectAutocomplete() {
      const wrap = document.getElementById("subject-autocomplete");
      const input = document.getElementById("subject-input");
      if (!wrap || !input) return; // form is collapsed — nothing to wire up
      let suggestionsEl = null;

      function closeSuggestions() {
        if (suggestionsEl) { suggestionsEl.remove(); suggestionsEl = null; }
      }

      function openSuggestions() {
        const query = input.value.trim().toLowerCase();
        const matches = allowedRoster()
          .filter(r => !query || String(r.Name || "").toLowerCase().includes(query))
          .slice(0, 25);

        closeSuggestions();
        if (!matches.length) return;

        suggestionsEl = document.createElement("div");
        suggestionsEl.className = "subject-suggestions";
        suggestionsEl.innerHTML = matches.map(r => `
          <button type="button" data-name="${esc(r.Name)}">
            <span>${esc(r.Name)}</span>
            <span class="subject-suggestions__meta">${esc(r.Rank || "")} · ${esc(r.Flight || "")}</span>
          </button>
        `).join("");
        wrap.appendChild(suggestionsEl);

        suggestionsEl.querySelectorAll("button").forEach(btn => {
          // mousedown (fires before the input's blur) so picking a
          // suggestion doesn't get preempted by the blur-close below.
          btn.addEventListener("mousedown", (e) => {
            e.preventDefault();
            input.value = btn.dataset.name;
            closeSuggestions();
          });
        });
      }

      input.addEventListener("input", openSuggestions);
      input.addEventListener("focus", openSuggestions);
      input.addEventListener("blur", () => setTimeout(closeSuggestions, 100));
      input.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeSuggestions();
      });
    }

    async function postNote() {
      const subjectInput = document.getElementById("subject-input");
      const editor = document.getElementById("body-editor");
      const subject = subjectInput.value.trim();
      const bodyHtml = RichText.sanitize(editor.innerHTML);

      if (!subject && RichText.isEmpty(bodyHtml)) {
        Shell.showToast("Add a subject or some note text before saving.", { type: "error" });
        return;
      }

      const postBtn = document.getElementById("post-note-btn");
      postBtn.disabled = true;
      postBtn.textContent = "Saving…";

      const editing = editingNoteId !== null;
      const existing = editing ? notes.find(n => String(n.Id) === String(editingNoteId)) : null;

      const noteRow = editing && existing
        ? { ...existing, Subject: subject, Flight: flightForSubject(subject), Body: bodyHtml }
        : {
            Id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
            Timestamp: new Date().toISOString(),
            AuthorPosition: session.Position,
            Subject: subject,
            Flight: flightForSubject(subject),
            Body: bodyHtml
          };

      try {
        await Api.writeRow("Notes", noteRow, editing ? { matchColumns: ["Id"] } : {});
        if (editing) {
          const idx = notes.findIndex(n => String(n.Id) === String(editingNoteId));
          if (idx >= 0) notes[idx] = noteRow; else notes.unshift(noteRow);
          editingNoteId = null;
        } else {
          notes = [noteRow, ...notes];
          showForm = false;
        }
        render();
        Shell.showToast(editing ? "Note updated." : "Note saved.", { type: "success" });
      } catch (err) {
        Shell.showToast(err.message, { type: "error" });
        postBtn.disabled = false;
        postBtn.textContent = editing ? "Save Changes" : "Add Note";
      }
    }

    let rosterLoaded = false;
    let notesLoaded = false;

    function renderIfReady() {
      if (!rosterLoaded || !notesLoaded) {
        contentEl.innerHTML = `<div class="state-message"><div class="spinner"></div><p>Loading…</p></div>`;
        return;
      }
      render();
    }

    async function load() {
      const r = Api.getSheetCached("Roster", (fresh) => {
        rosterRows = fresh.rows || [];
        rosterLoaded = true;
        renderIfReady();
      });
      const n = Api.getSheetCached("Notes", (fresh) => {
        notes = fresh.rows || [];
        notesLoaded = true;
        renderIfReady();
      });

      if (r.data) { rosterRows = r.data.rows || []; rosterLoaded = true; }
      if (n.data) { notes = n.data.rows || []; notesLoaded = true; }
      renderIfReady();

      try {
        await Promise.all([r.ready, n.ready]);
      } catch (err) {
        if (!rosterLoaded || !notesLoaded) {
          contentEl.innerHTML = `
            <div class="state-message">
              <div class="state-message__icon">⚠️</div>
              <p>${err.message}</p>
            </div>`;
        }
        Shell.showToast(err.message, { type: "error" });
      }
    }

    Shell.registerRefresh(load);

    // Export the notes currently visible to this position (same flight
    // scoping as the feed), with the rich-text body flattened to text.
    const noteBodyToText = (html) => {
      const t = document.createElement("template");
      t.innerHTML = html || "";
      return (t.content.textContent || "").replace(/\s+/g, " ").trim();
    };
    Shell.registerExport(() => ({
      filename: `notes-${new Date().toISOString().slice(0, 10)}.csv`,
      columns: ["Timestamp", "AuthorPosition", "Subject", "Flight", "Body"],
      rows: notes.filter(isNoteVisible).map(n => ({
        Timestamp: n.Timestamp ? Shell.formatDateTime(n.Timestamp) : "",
        AuthorPosition: n.AuthorPosition || "",
        Subject: n.Subject || "",
        Flight: n.Flight || "",
        Body: noteBodyToText(n.Body || "")
      }))
    }));

    load();
</script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register(`${window.APP_BASE_PATH}service-worker.js`);
    }
  </script>
</body>
</html>
