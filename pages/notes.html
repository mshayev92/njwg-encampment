<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    // Applied synchronously, before first paint, so a collapsed sidebar
    // renders at its collapsed width immediately instead of flashing
    // open at the default width for a frame and visibly animating shut
    // once js/shell.js runs (see .nav-rail-collapsed in css/app.css).
    // The theme read right after does the same job for dark mode:
    // resolve njwg_theme (light/dark/system) and set data-theme on <html>
    // BEFORE tokens.css is even requested, so a dark-mode device never
    // flashes the light palette for a frame first (see the
    // :root[data-theme="dark"] block in css/tokens.css, and
    // initThemeWatcher_ in js/shell.js for what keeps this in sync for
    // the rest of the page's life, including a live OS theme change).
    try {
      if (localStorage.getItem("njwg_nav_collapsed") === "true") {
        document.documentElement.classList.add("nav-rail-collapsed");
      }
    } catch (e) { /* storage unavailable — falls back to expanded */ }
    try {
      var njwgThemePref = localStorage.getItem("njwg_theme") || "system";
      var njwgThemeResolved = njwgThemePref === "system"
        ? (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
        : njwgThemePref;
      document.documentElement.setAttribute("data-theme", njwgThemeResolved);
    } catch (e) { document.documentElement.setAttribute("data-theme", "light"); }
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes — NJWG Encampment</title>
  <meta name="theme-color" content="#f4f5fa">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="NJWG Encampment">
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../icons/favicon.ico" sizes="any">
  <link rel="icon" href="../icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/app.css">

  <style>
    .note-form input[type="text"] {
      width: 100%;
      font-family: var(--font-body);
      font-size: var(--fs-sm);
      padding: var(--space-3);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--surface-sunken);
    }

    .subject-autocomplete {
      position: relative;
      margin-bottom: var(--space-3);
    }

    .subject-suggestions {
      position: absolute;
      top: calc(100% + var(--space-1));
      left: 0;
      right: 0;
      z-index: 20;
      max-height: 240px;
      overflow-y: auto;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
    }

    .subject-suggestions button {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: var(--space-3);
      width: 100%;
      text-align: left;
      padding: var(--space-2) var(--space-3);
      background: none;
      border: none;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      font-family: var(--font-body);
      font-size: var(--fs-sm);
      color: var(--ink-900);
    }

    .subject-suggestions button:last-child { border-bottom: none; }

    .subject-suggestions button:hover,
    .subject-suggestions button.is-active {
      background: var(--surface-sunken);
    }

    .subject-suggestions__meta {
      font-size: var(--fs-2xs);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      color: var(--ink-600);
      white-space: nowrap;
    }

    .richtext-toolbar {
      display: flex;
      gap: var(--space-1);
      margin-bottom: var(--space-2);
    }

    .richtext-toolbar button {
      padding: var(--space-2) var(--space-3);
      font-size: var(--fs-sm);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--ink-900);
      cursor: pointer;
    }

    .richtext-toolbar button:hover {
      border-color: var(--gold-500);
    }

    .richtext-editor {
      width: 100%;
      min-height: 120px;
      font-family: var(--font-body);
      font-size: var(--fs-sm);
      padding: var(--space-3);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--surface-sunken);
      margin-bottom: var(--space-3);
      overflow-y: auto;
    }

    .richtext-editor:empty::before {
      content: attr(data-placeholder);
      color: var(--ink-600);
    }

    .richtext-editor ul, .richtext-editor ol {
      padding-left: var(--space-5);
    }

    /* Tiles in a wrapping grid, instead of full-width rows — lets many
       notes sit side by side rather than each one claiming the whole
       content width. align-items: start (rather than the grid default
       of "stretch") lets each card size to its OWN content instead of
       stretching to match the tallest card in its row — a short note
       with little/no body used to be forced to the same fixed height as
       a long one, leaving a big block of empty space under its subject
       line. max-height on .note-card below still caps how tall a single
       very long note can grow, scrolling its body instead. */
    .note-feed {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      align-items: start;
      gap: var(--space-4);
      margin-top: var(--space-5);
    }

    .note-card {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      max-height: 320px;
      overflow: hidden;
    }

    .note-card__subject {
      font-family: var(--font-display);
      font-size: var(--fs-md);
      color: var(--heading);
      margin-bottom: var(--space-1);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Author/flight/date + edit/delete actions used to be one plain text
       span forced onto a single line — on a narrow card (see .note-feed's
       240px min column) the text wrapped mid-sentence, and when the
       signed-in author's OWN position matched the note's derived Flight
       (e.g. a flight leader posting about their own flight), the same
       word appeared twice, with the wrap making the repeat look like a
       rendering glitch. Now the meta pieces are separate tagged elements
       that can wrap individually without looking broken, the actions are
       pinned to their own flex-shrink:0 group, and the Flight tag is
       omitted entirely when it wouldn't add information (see
       renderNoteCard's showFlightTag). */
    .note-card__header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-2);
      margin-bottom: var(--space-2);
    }

    .note-card__meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: var(--space-1) var(--space-2);
      min-width: 0;
    }

    .note-card__author {
      font-family: var(--font-display);
      font-size: var(--fs-2xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      color: var(--heading);
    }

    .note-card__flight-tag {
      font-size: var(--fs-2xs);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      color: var(--ink-600);
      background: var(--surface-sunken);
      border-radius: var(--radius-sm);
      padding: 1px var(--space-2);
    }

    .note-card__date {
      font-size: var(--fs-2xs);
      color: var(--ink-600);
      white-space: nowrap;
    }

    .note-card__actions {
      display: flex;
      gap: var(--space-1);
      flex-shrink: 0;
    }

    .note-card__actions .btn {
      padding: var(--space-1) var(--space-2);
    }

    .note-card--to-me {
      border-color: var(--gold-500);
      box-shadow: 0 0 0 1px var(--gold-500);
    }

    .note-card__to-badge {
      align-self: flex-start;
      font-family: var(--font-display);
      font-size: var(--fs-2xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      color: var(--gold-600);
      background: var(--gold-100);
      border-radius: var(--radius-sm);
      padding: 2px var(--space-2);
      margin-bottom: var(--space-2);
    }

    .note-card__to-badge--muted {
      color: var(--ink-600);
      background: var(--surface-sunken);
    }

    .note-card__body {
      font-size: var(--fs-sm);
      color: var(--ink-900);
      overflow-y: auto;
    }

    .note-card__body:empty::before {
      content: "(no additional details)";
      color: var(--ink-400);
      font-style: italic;
    }

    .note-card__body ul, .note-card__body ol {
      padding-left: var(--space-5);
    }
  </style>
</head>
<body>

  <div class="app-shell">
    <nav class="nav-rail" id="nav-rail">
      <button type="button" class="nav-rail__crest" id="nav-rail-crest" aria-label="Toggle navigation width">
        <span class="nav-rail__crest-mark"><img src="../icons/icon-192.png" alt="NJWG"></span>
        <span class="nav-rail__crest-text">NJWG<span>Encampment</span></span>
      </button>
      <div id="nav-rail-links"></div>
    </nav>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/richtext.js"></script>
    <script src="../js/shell.js"></script>
    <script>
      // See overview.html for why this runs here instead of only inside
      // Shell.init() at the bottom — keeps the sidebar links from ever
      // being visibly empty for a moment on navigation between pages.
      Shell.renderNav("notes");
    </script>

    <header class="app-header" id="app-header"></header>

    <main class="app-main">
      <div id="page-content">
        <div class="state-message">
          <div class="spinner"></div>
          <p>Loading…</p>
        </div>
      </div>
    </main>
  </div>

  <script>
    Shell.init({ activePage: "notes" });

    const contentEl = document.getElementById("page-content");
    const session = Auth.getSession();
    const esc = Shell.escapeHtml;

    const allowedFlights = (session && Array.isArray(session.Flights)) ? session.Flights : [];

    /** Empty/absent Flights on the session means "all flights" per Code.gs. Also expands squadron audiences (see Shell.flightMatchesAudience). */
    function isFlightAllowed(flight) {
      return Shell.flightMatchesAudience(allowedFlights, flight);
    }

    let rosterRows = [];
    let notes = [];
    let allPositions = []; // for the "send to a specific position" selector
    let editingNoteId = null; // Id of the note being edited, or null when adding a new one
    let showForm = false; // Whether the add-note form is open (editing always forces it open)

    // Lets another page (Observations' per-cadet detail view) deep-link
    // straight into "add a note about this cadet" via
    // notes.html?subject=<name> instead of making staff retype/search
    // the name again. Consumed once, right after the form's first
    // render below — cleared immediately so it doesn't keep clobbering
    // whatever the user types on later re-renders (e.g. after picking
    // an autocomplete suggestion).
    let prefillSubject = new URLSearchParams(window.location.search).get("subject") || "";
    if (prefillSubject) showForm = true;

    // Only cadets in flights this position is scoped to are offered as
    // Subject suggestions — matches the same Flights-column scoping
    // Inspections uses, so a flight-restricted position can't browse
    // names outside its own flights via the Notes autocomplete either.
    function allowedRoster() {
      return rosterRows.filter(r => isFlightAllowed(r.Flight));
    }

    /**
     * A note is visible to a position if:
     *   - it's addressed directly to THIS position (ToPosition) —
     *     always visible regardless of flight scoping, same as a DM
     *     bypasses a channel's membership rules elsewhere, or
     *   - it isn't tied to any specific flight (blank Flight — a
     *     general note anyone can see, same as an Announcement), or
     *   - this position is allowed to see the tied flight.
     * This is the actual visibility gate for the feed below — matched
     * against the FULL roster (not allowedRoster()) when a note is
     * created, so the Flight tag is correct even in the rare case
     * someone types a name manually rather than picking a suggestion.
     */
    function isNoteToMe(note) {
      const me = String(session?.Position || "").trim().toLowerCase();
      return !!me && String(note.ToPosition || "").trim().toLowerCase() === me;
    }

    function isNoteVisible(note) {
      return isNoteToMe(note) || !note.Flight || isFlightAllowed(note.Flight);
    }

    /** Exact (case-insensitive) name match against the full roster, so a written Subject gets tagged with that cadet's real Flight. */
    function flightForSubject(subject) {
      if (!subject) return "";
      const match = rosterRows.find(r => String(r.Name || "").trim().toLowerCase() === subject.trim().toLowerCase());
      return match ? (match.Flight || "") : "";
    }

    function renderPostForm() {
      const editing = editingNoteId !== null;
      if (!editing && !showForm) {
        return `<button class="btn btn--primary" id="show-note-form-btn">+ Add a Note</button>`;
      }
      const existing = editing ? notes.find(n => String(n.Id) === String(editingNoteId)) : null;
      const currentToPosition = existing ? String(existing.ToPosition || "") : "";
      return `
        <div class="card note-form">
          <h2 class="card-title">${editing ? "Edit Note" : "Add a Note"}</h2>
          <div class="subject-autocomplete" id="subject-autocomplete">
            <input type="text" id="subject-input" autocomplete="off" placeholder="Subject — a cadet's name from the roster, or any subject…">
          </div>
          ${RichText.TOOLBAR_HTML}
          <div class="richtext-editor" id="body-editor" contenteditable="true" data-placeholder="Write your note…"></div>
          <div class="field">
            <label for="to-position-select">Send to a specific position (optional)</label>
            <select id="to-position-select">
              <option value="">— General note, no specific recipient —</option>
              ${allPositions.filter(p => p.toLowerCase() !== String(session?.Position || "").toLowerCase()).map(p => `
                <option value="${esc(p)}" ${currentToPosition.toLowerCase() === p.toLowerCase() ? "selected" : ""}>${esc(p)}</option>
              `).join("")}
            </select>
            <span class="hint" style="display:block; font-size: var(--fs-2xs); color: var(--ink-600);">They'll see it flagged in their Notes tab (and get a push alert if they have one enabled), regardless of flight.</span>
          </div>
          <div style="display:flex; gap: var(--space-3);">
            <button class="btn btn--primary" id="post-note-btn">${editing ? "Save Changes" : "Add Note"}</button>
            <button class="btn btn--ghost" id="cancel-edit-note-btn">Cancel</button>
          </div>
        </div>
      `;
    }

    /** True when THIS session authored `note` — drives the Seen/Sent badge below, distinct from isNoteToMe (the RECIPIENT's own view). */
    function isMyNote(note) {
      const me = String(session?.Position || "").trim().toLowerCase();
      return !!me && String(note.AuthorPosition || "").trim().toLowerCase() === me;
    }

    /**
     * The directed-note badge has three distinct audiences, each seeing
     * something different about the SAME note:
     *   - the recipient (isNoteToMe): "→ Sent to you" — unchanged.
     *   - the author, viewing their OWN sent note (isMyNote): whether the
     *     recipient has actually opened it yet (SeenAt — see
     *     maybeMarkNoteSeen_ below, which is what sets it), closing a gap
     *     push notifications alone don't cover (a push confirms delivery
     *     to the OS, not that a person actually read it).
     *   - anyone else who can merely see this note (e.g. it's tied to a
     *     flight they're allowed to view) but is neither party: the
     *     existing plain "→ ToPosition" muted tag.
     */
    function directedNoteBadge(n, toMe) {
      if (toMe) return `<div class="note-card__to-badge">→ Sent to you</div>`;
      if (!n.ToPosition) return "";
      if (isMyNote(n)) {
        return n.SeenAt
          ? `<div class="note-card__to-badge" data-tooltip="Seen ${esc(Shell.formatDateTime(n.SeenAt))}">✓ Seen by ${esc(n.ToPosition)}</div>`
          : `<div class="note-card__to-badge note-card__to-badge--muted">→ Sent to ${esc(n.ToPosition)} · not seen yet</div>`;
      }
      return `<div class="note-card__to-badge note-card__to-badge--muted">→ ${esc(n.ToPosition)}</div>`;
    }

    function renderNoteCard(n) {
      // The signed-in author's OWN position is very often literally the
      // flight name itself (a flight leader signs in as "Alpha", say),
      // which is the same value flightForSubject() just derived from the
      // roster — showing both made the meta line read "Alpha · date ·
      // Alpha", with the repeat easy to mistake for a wrapping glitch.
      // Only show the flight tag when it adds information the position
      // name doesn't already give.
      const showFlightTag = n.Flight && n.Flight.trim().toLowerCase() !== String(n.AuthorPosition || "").trim().toLowerCase();
      const toMe = isNoteToMe(n);
      return `
        <div class="note-card${toMe ? " note-card--to-me" : ""}">
          ${directedNoteBadge(n, toMe)}
          <div class="note-card__header">
            <div class="note-card__meta">
              <span class="note-card__author">${esc(n.AuthorPosition || "—")}</span>
              ${showFlightTag ? `<span class="note-card__flight-tag">${esc(n.Flight)}</span>` : ""}
              <span class="note-card__date">${esc(Shell.formatDateTime(n.Timestamp))}</span>
            </div>
            <div class="note-card__actions">
              <button class="btn btn--ghost" data-edit-id="${esc(n.Id)}" data-tooltip="Edit note" aria-label="Edit note"><span class="btn__icon">${Shell.icon("edit")}</span></button>
              <button class="btn btn--ghost" data-delete-id="${esc(n.Id)}" data-tooltip="Delete note" aria-label="Delete note"><span class="btn__icon">${Shell.icon("close")}</span></button>
            </div>
          </div>
          <div class="note-card__subject">${esc(n.Subject) || "(no subject)"}</div>
          <div class="note-card__body">${RichText.sanitize(n.Body || "")}</div>
        </div>
      `;
    }

    // Ids already marked seen THIS page load — guards against firing the
    // write-back more than once per note before the optimistic cache
    // update round-trips (render() can run several times in a row, e.g.
    // once from cache then again when the background revalidation lands).
    const markedSeenIds_ = new Set();

    /**
     * Records that I (the signed-in RECIPIENT of a directed note) have
     * now actually seen it — a plain write-back of the note's own row
     * with SeenAt added, same reconstruct-and-rewrite shape every other
     * optimistic write on this page already uses. This is what
     * directedNoteBadge() above reads back on the AUTHOR's device/session
     * to show "Seen" instead of "not seen yet"; it has no effect on MY
     * OWN view of my own inbox; the "→ Sent to you" badge does not read
     * SeenAt at all.
     */
    function maybeMarkNoteSeen_(n) {
      if (n.SeenAt || markedSeenIds_.has(String(n.Id))) return;
      markedSeenIds_.add(String(n.Id));
      const seenRow = { ...n, SeenAt: new Date().toISOString() };
      Api.writeRow("Notes", seenRow, { matchColumns: ["Id"] });
      const idx = notes.findIndex(x => String(x.Id) === String(n.Id));
      if (idx >= 0) notes[idx] = seenRow;
      Api.setCachedRows("Notes", notes);
    }

    function renderFeed() {
      const sorted = notes
        .filter(isNoteVisible)
        // Notes sent directly to me float to the top regardless of
        // date, so they're not easy to miss lower down a busy feed —
        // then newest-first within each group.
        .sort((a, b) => (Number(isNoteToMe(b)) - Number(isNoteToMe(a))) || (new Date(b.Timestamp) - new Date(a.Timestamp)));
      if (!sorted.length) {
        return `<div class="state-message"><div class="state-message__icon">${Shell.icon("edit")}</div><p>No notes yet.</p></div>`;
      }
      // Mark seen AFTER building `sorted` (not during renderNoteCard's own
      // map, which just builds HTML strings) — this note is visibly open
      // on my screen right now, so silently write back that I've seen it.
      sorted.filter(isNoteToMe).forEach(maybeMarkNoteSeen_);
      return `
        <div class="note-feed">
          ${sorted.map(renderNoteCard).join("")}
        </div>
      `;
    }

    function render() {
      contentEl.innerHTML = `
        ${renderPostForm()}
        ${renderFeed()}
      `;

      const toolbar = contentEl.querySelector(".richtext-toolbar");
      const editor = document.getElementById("body-editor");
      if (toolbar && editor) RichText.attach(toolbar, editor);

      const showFormBtn = document.getElementById("show-note-form-btn");
      if (showFormBtn) showFormBtn.addEventListener("click", () => { showForm = true; render(); });

      const toPositionSelect = document.getElementById("to-position-select");
      if (toPositionSelect) Shell.enhanceSelect(toPositionSelect);

      const postNoteBtn = document.getElementById("post-note-btn");
      if (postNoteBtn) postNoteBtn.addEventListener("click", postNote);
      const cancelEditBtn = document.getElementById("cancel-edit-note-btn");
      if (cancelEditBtn) cancelEditBtn.addEventListener("click", cancelEditNote);
      initSubjectAutocomplete();

      if (prefillSubject) {
        const subjectInput = document.getElementById("subject-input");
        if (subjectInput) {
          subjectInput.value = prefillSubject;
          // render() fires again later this load (once Auth.listPositions()
          // resolves and repopulates the "send to" selector, and again on
          // any background Roster/Notes revalidation) — each of those
          // rebuilds the form from a blank template, so clearing
          // prefillSubject right after the FIRST use would leave the field
          // wiped by the SECOND render before the user ever touched it.
          // Keep re-applying it on every render until the user actually
          // edits the field themselves, at which point stop overwriting
          // their input.
          subjectInput.addEventListener("input", () => { prefillSubject = ""; }, { once: true });
        }
      }

      contentEl.querySelectorAll("[data-edit-id]").forEach(btn => {
        btn.addEventListener("click", () => startEditNote(btn.dataset.editId));
      });
      contentEl.querySelectorAll("[data-delete-id]").forEach(btn => {
        btn.addEventListener("click", () => deleteNote(btn.dataset.deleteId));
      });
      Shell.wireTooltips(contentEl);
      Shell.animateIn(contentEl);
    }

    /** Prefills the form from an existing note and switches it into edit mode. */
    function startEditNote(id) {
      const note = notes.find(n => String(n.Id) === String(id));
      if (!note) return;
      editingNoteId = note.Id;
      render();
      document.getElementById("subject-input").value = note.Subject || "";
      document.getElementById("body-editor").innerHTML = RichText.sanitize(note.Body || "");
      document.querySelector(".note-form").scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function cancelEditNote() {
      editingNoteId = null;
      showForm = false;
      render();
    }

    /**
     * Removes locally and re-renders instantly, then gives a few seconds
     * to Undo before the delete actually reaches the server (see
     * Shell.showUndoToast) — replaces the old upfront "are you sure?"
     * confirm.
     */
    function deleteNote(id) {
      const removedIndex = notes.findIndex(n => String(n.Id) === String(id));
      const removed = notes[removedIndex];
      notes = notes.filter(n => String(n.Id) !== String(id));
      if (editingNoteId === id) editingNoteId = null;
      // Reconcile Api's cache with this optimistic result now, not after
      // the next background revalidation — see the note on this same
      // call in postNote() below.
      Api.setCachedRows("Notes", notes);
      render();

      Shell.showUndoToast(
        "Note removed.",
        () => Api.deleteRow("Notes", { Id: id }, { matchColumns: ["Id"] }),
        {
          onUndo: () => {
            if (!removed) return;
            notes.splice(removedIndex, 0, removed);
            Api.setCachedRows("Notes", notes);
            render();
          }
        }
      );
    }

    /**
     * Small custom autocomplete over the flight-scoped roster — replaces
     * a native <datalist>, which can't be styled and renders as a bare
     * system listbox (inconsistent look, and on some browsers overlaps
     * the page rather than docking under the input). Still a completely
     * free-text field: picking a suggestion just fills the input, typing
     * anything else and ignoring the list works too.
     */
    function initSubjectAutocomplete() {
      const wrap = document.getElementById("subject-autocomplete");
      const input = document.getElementById("subject-input");
      if (!wrap || !input) return; // form is collapsed — nothing to wire up
      let suggestionsEl = null;

      function closeSuggestions() {
        if (suggestionsEl) { suggestionsEl.remove(); suggestionsEl = null; }
      }

      function openSuggestions() {
        const query = input.value.trim().toLowerCase();
        const matches = allowedRoster()
          .filter(r => !query || String(r.Name || "").toLowerCase().includes(query))
          .slice(0, 25);

        closeSuggestions();
        if (!matches.length) return;

        suggestionsEl = document.createElement("div");
        suggestionsEl.className = "subject-suggestions";
        suggestionsEl.innerHTML = matches.map(r => `
          <button type="button" data-name="${esc(r.Name)}">
            <span>${esc(r.Name)}</span>
            <span class="subject-suggestions__meta">${esc(r.Rank || "")} · ${esc(r.Flight || "")}</span>
          </button>
        `).join("");
        wrap.appendChild(suggestionsEl);

        suggestionsEl.querySelectorAll("button").forEach(btn => {
          // mousedown (fires before the input's blur) so picking a
          // suggestion doesn't get preempted by the blur-close below.
          btn.addEventListener("mousedown", (e) => {
            e.preventDefault();
            input.value = btn.dataset.name;
            closeSuggestions();
          });
        });
      }

      input.addEventListener("input", openSuggestions);
      input.addEventListener("focus", openSuggestions);
      input.addEventListener("blur", () => setTimeout(closeSuggestions, 100));
      input.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeSuggestions();
      });
    }

    function postNote() {
      const subjectInput = document.getElementById("subject-input");
      const editor = document.getElementById("body-editor");
      const subject = subjectInput.value.trim();
      const bodyHtml = RichText.sanitize(editor.innerHTML);

      if (!subject && RichText.isEmpty(bodyHtml)) {
        Shell.showToast("Add a subject or some note text before saving.", { type: "error" });
        return;
      }

      const editing = editingNoteId !== null;
      const existing = editing ? notes.find(n => String(n.Id) === String(editingNoteId)) : null;
      const toPosition = (document.getElementById("to-position-select")?.value || "").trim();

      const noteRow = editing && existing
        ? { ...existing, Subject: subject, Flight: flightForSubject(subject), Body: bodyHtml, ToPosition: toPosition }
        : {
            Id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
            Timestamp: new Date().toISOString(),
            AuthorPosition: session.Position,
            Subject: subject,
            Flight: flightForSubject(subject),
            Body: bodyHtml,
            ToPosition: toPosition
          };

      // Optimistic, matching roster/schedule/observations: update local
      // state and re-render instantly; the real write fires in the
      // background (Api's queue), and the header's sync indicator reflects
      // whether it lands. Api.writeRow is optimistic-by-default — it
      // resolves BEFORE the network write returns — so there's no error to
      // await/catch here; a background failure surfaces via the sync
      // indicator, not a rejected promise.
      // Always key on the row's stable Id — for an edit this updates in place,
      // and for a NEW note it makes the write idempotent: a retry/replay from
      // the offline outbox (or performWrite_'s own network-error retry) upserts
      // the same Id instead of appending a duplicate note. First landing finds
      // no such Id and appends; any replay matches and no-ops.
      Api.writeRow("Notes", noteRow, { matchColumns: ["Id"] });
      if (editing) {
        const idx = notes.findIndex(n => String(n.Id) === String(editingNoteId));
        if (idx >= 0) notes[idx] = noteRow; else notes.unshift(noteRow);
        editingNoteId = null;
      } else {
        notes = [noteRow, ...notes];
        showForm = false;
      }
      // writeRow() only marks the Notes cache stale — it doesn't know what
      // the optimistic result looks like. Pushing it in here keeps the next
      // background revalidation from finding a "changed" sheet and firing
      // this page's onFresh subscriber again — a second render()/animateIn()
      // replaying the entrance animation moments after this save's own.
      Api.setCachedRows("Notes", notes);
      render();
      Shell.showToast(editing ? "Note updated." : "Note saved.", { type: "success" });
    }

    let rosterLoaded = false;
    let notesLoaded = false;

    function renderIfReady() {
      if (!rosterLoaded || !notesLoaded) {
        contentEl.innerHTML = `<div class="state-message"><div class="spinner"></div><p>Loading…</p></div>`;
        return;
      }
      render();
    }

    async function load() {
      const r = Api.getSheetCached("Roster", (fresh) => {
        rosterRows = Shell.normalizeRosterRows(fresh.rows || []);
        rosterLoaded = true;
        renderIfReady();
      });
      const n = Api.getSheetCached("Notes", (fresh) => {
        notes = fresh.rows || [];
        notesLoaded = true;
        renderIfReady();
      });

      if (r.data) { rosterRows = Shell.normalizeRosterRows(r.data.rows || []); rosterLoaded = true; }
      if (n.data) { notes = n.data.rows || []; notesLoaded = true; }
      renderIfReady();

      // Positions for the "send to" selector — fetched once, doesn't
      // need Api's sheet-cache/re-render machinery like Roster/Notes
      // above (it barely ever changes and isn't shown until the form
      // opens), so a plain re-render-on-arrival is enough. Landing
      // AFTER the form is already open/being filled out (e.g. a
      // prefilled Subject from Observations' "Start a note" link, which
      // opens the form immediately) used to call render() — a full
      // contentEl.innerHTML replace + Shell.animateIn — a second time,
      // moments after the page's own first paint: a jarring second
      // entrance animation for a value that's only shown in one <select>
      // inside a form that's already fully rendered. Update just that
      // select's options in place instead.
      Auth.listPositions().then(({ positions }) => {
        allPositions = positions.slice().sort((a, b) => a.localeCompare(b));
        const toPositionSelect = document.getElementById("to-position-select");
        if (toPositionSelect) {
          const existing = editingNoteId !== null ? notes.find(n => String(n.Id) === String(editingNoteId)) : null;
          const currentToPosition = existing ? String(existing.ToPosition || "") : toPositionSelect.value;
          toPositionSelect.innerHTML = `
            <option value="">— General note, no specific recipient —</option>
            ${allPositions.filter(p => p.toLowerCase() !== String(session?.Position || "").toLowerCase()).map(p => `
              <option value="${esc(p)}" ${currentToPosition.toLowerCase() === p.toLowerCase() ? "selected" : ""}>${esc(p)}</option>
            `).join("")}
          `;
          Shell.enhanceSelect(toPositionSelect);
        }
        // Neither adding nor editing is open — nothing on screen
        // references allPositions yet; whichever renders the form next
        // (show-note-form-btn's click handler, or startEditNote) reads
        // the now-updated array fresh.
      }).catch(() => { /* the "send to" selector just stays empty; not worth toasting over */ });

      try {
        await Promise.all([r.ready, n.ready]);
      } catch (err) {
        if (!rosterLoaded || !notesLoaded) {
          contentEl.innerHTML = `
            <div class="state-message">
              <div class="state-message__icon">⚠️</div>
              <p>${err.message}</p>
            </div>`;
        }
        Shell.showToast(err.message, { type: "error" });
      }

      // Now that this page has actually been viewed, clear the nav
      // badge for notes sent to me — see Shell.markNotesSeen and the
      // updateNotesBadge_ pattern this mirrors for Announcements.
      Shell.markNotesSeen();
    }

    Shell.registerRefresh(load);

    // Export the notes currently visible to this position (same flight
    // scoping as the feed), with the rich-text body flattened to text.
    const noteBodyToText = (html) => {
      const t = document.createElement("template");
      t.innerHTML = html || "";
      return (t.content.textContent || "").replace(/\s+/g, " ").trim();
    };
    Shell.registerExport(() => ({
      filename: `notes-${new Date().toISOString().slice(0, 10)}.csv`,
      columns: ["Timestamp", "AuthorPosition", "Subject", "Flight", "Body"],
      rows: notes.filter(isNoteVisible).map(n => ({
        Timestamp: n.Timestamp ? Shell.formatDateTime(n.Timestamp) : "",
        AuthorPosition: n.AuthorPosition || "",
        Subject: n.Subject || "",
        Flight: n.Flight || "",
        Body: noteBodyToText(n.Body || "")
      }))
    }));

    load();
</script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register(`${window.APP_BASE_PATH}service-worker.js`);
    }
  </script>
</body>
</html>
