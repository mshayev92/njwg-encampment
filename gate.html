<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    // Applied synchronously, before first paint — resolves njwg_theme
    // (light/dark/system) and sets data-theme on <html> BEFORE
    // tokens.css is even requested, so a dark-mode device never flashes
    // the light palette for a frame first. See the same script in every
    // pages/*.html and the :root[data-theme="dark"] block in
    // css/tokens.css.
    try {
      var njwgThemePref = localStorage.getItem("njwg_theme") || "system";
      var njwgThemeResolved = njwgThemePref === "system"
        ? (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
        : njwgThemePref;
      document.documentElement.setAttribute("data-theme", njwgThemeResolved);
    } catch (e) { document.documentElement.setAttribute("data-theme", "light"); }
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Device Access — NJWG Encampment</title>
  <!-- See the matching comment in index.html — .gate-screen below is
       always dark regardless of theme, and this page never loads
       shell.js at all, so this static value is never corrected by JS. -->
  <meta name="theme-color" content="#080a38">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <!-- black-translucent (not black) — see index.html's matching comment. -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NJWG Encampment">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/favicon.ico" sizes="any">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/app.css">

  <style>
    /* See index.html's matching comment — this screen is always dark,
       but css/app.css's html/body rule paints the theme-following
       var(--bg), which peeked through as a light strip above
       .gate-screen on a light-mode device. Pin body to the same dark
       navy, and use 100dvh so the screen tracks the real viewport. */
    html, body { background: var(--indigo-950); }

    /* Vertically-centered auth card that stays centered on every engine
       and degrades safely when it's too tall to fit.

       - The screen is a flex COLUMN and the card gets `margin: auto`.
         Auto margins on a flex item absorb only POSITIVE free space, so
         when the card is shorter than the screen it's centered, and when
         it's taller the margins collapse to 0 and the whole card stays
         reachable by scrolling (nothing clipped). This is the canonical
         overflow-safe centering — it needs no `align-items: safe center`
         (which iOS Safari has historically not supported, silently
         dropping the declaration), which is why earlier attempts looked
         centered in Chromium but stayed pinned high on real iPhones.
       - `svh` (small viewport height) is the stable choice for an
         installed standalone PWA and for Safari's collapsing toolbar:
         it's the guaranteed-visible height, so the card is always
         centered within what's actually on screen rather than within a
         taller area that runs under the browser/OS chrome. `vh` is the
         universal fallback for engines without the new viewport units. */
    .gate-screen {
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      /* Symmetric safe-area padding on BOTH top and bottom so the card
         clears the notch/status bar and the home indicator — the mobile
         media query below only narrows the sides, never re-clobbering
         these (an earlier `padding: x y` shorthand there silently reset
         the top inset). */
      padding:
        max(var(--space-5), env(safe-area-inset-top, 0px))
        var(--space-5)
        max(var(--space-5), env(safe-area-inset-bottom, 0px));
      position: relative;
      background:
        radial-gradient(ellipse 800px 500px at 50% -10%, rgba(240, 180, 41, 0.14) 0%, transparent 60%),
        var(--indigo-950);
    }

    .gate-card {
      width: 100%;
      max-width: 420px;
      margin: auto;
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: var(--space-7) var(--space-6);
      box-shadow: var(--shadow-lg);
      text-align: center;
      position: relative;
      z-index: 1;
      border-top: 3px solid var(--gold-500);
    }

    .gate-card__mark {
      width: 84px; height: 84px;
      margin: 0 auto var(--space-4);
      display: flex; align-items: center; justify-content: center;
    }

    .gate-card__mark img {
      width: 100%; height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 4px 10px rgba(13, 18, 80, 0.25));
    }

    .gate-card__eyebrow {
      font-family: var(--font-display);
      font-size: var(--fs-2xs);
      letter-spacing: var(--tracking-wider);
      text-transform: uppercase;
      color: var(--ink-600);
    }

    .gate-card h1 {
      font-size: var(--fs-xl);
      color: var(--heading);
      margin-bottom: var(--space-2);
    }

    .gate-card__hint {
      font-size: var(--fs-sm);
      color: var(--ink-600);
      margin-bottom: var(--space-5);
    }

    .gate-card .field { text-align: left; }

    .gate-error {
      display: none;
      background: var(--red-100);
      color: var(--red-600);
      border-radius: var(--radius-md);
      padding: var(--space-3);
      font-size: var(--fs-sm);
      margin-bottom: var(--space-4);
      text-align: left;
    }
    .gate-error.is-visible { display: block; }

    .device-type-choice {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
      margin-bottom: var(--space-5);
    }

    .device-type-option {
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: var(--space-3);
      cursor: pointer;
      text-align: left;
      background: var(--surface-sunken);
      transition: border-color var(--duration-fast) var(--ease-standard),
                  background var(--duration-fast) var(--ease-standard);
    }

    .device-type-option input { display: none; }

    .device-type-option strong {
      display: block;
      font-family: var(--font-display);
      font-size: var(--fs-sm);
      color: var(--heading);
      margin-bottom: var(--space-1);
    }

    .device-type-option span {
      font-size: var(--fs-xs);
      color: var(--ink-600);
    }

    .device-type-option:has(input:checked) {
      border-color: var(--gold-500);
      background: var(--gold-100);
    }

    .gate-card .btn { width: 100%; }

    /* Below the app's standard 720px mobile breakpoint, only narrow the
       horizontal padding — the centering, scroll, and top/bottom
       safe-area insets all come from the base .gate-screen rule and must
       stay intact (see the long comment there). */
    @media (max-width: 720px) {
      .gate-screen {
        padding-left: var(--space-4);
        padding-right: var(--space-4);
      }
    }
  </style>
</head>
<body>

  <div class="gate-screen">
    <div class="gate-card">
      <div class="gate-card__mark"><img src="icons/icon-192.png" alt="NJ Wing"></div>
      <span class="gate-card__eyebrow">NJWG Encampment</span>
      <h1>Device Access</h1>
      <p class="gate-card__hint">Enter the encampment passphrase given out at check-in. You'll only need to do this once per device.</p>

      <div class="gate-error" id="gate-error"></div>

      <form id="gate-form" novalidate>
        <div class="device-type-choice" role="radiogroup" aria-label="Device type">
          <label class="device-type-option">
            <input type="radio" name="deviceType" value="personal" checked>
            <strong>My own device</strong>
            <span>Stay unlocked for the whole encampment</span>
          </label>
          <label class="device-type-option">
            <input type="radio" name="deviceType" value="shared">
            <strong>Shared / desk device</strong>
            <span>Re-lock after a few hours</span>
          </label>
        </div>

        <div class="field">
          <label for="passphrase-input">Encampment Passphrase</label>
          <input type="password" id="passphrase-input" name="passphrase" autocomplete="off" required>
        </div>

        <button type="submit" class="btn btn--primary" id="gate-submit">Unlock This Device</button>
      </form>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const form = document.getElementById("gate-form");
    const errorBox = document.getElementById("gate-error");
    const submitBtn = document.getElementById("gate-submit");
    const passphraseInput = document.getElementById("passphrase-input");

    /**
     * Validates a ?returnTo= value before using it as a redirect target.
     * The app only ever sets returnTo to its own same-origin path, but the
     * URL is attacker-controllable (anyone can craft a link), so an absolute
     * or protocol-relative value like "https://evil.com" or "//evil.com"
     * must never be followed — that's an open-redirect / phishing vector.
     * Returns a safe same-origin path, or null to fall back to the default.
     */
    function safeReturnTo(raw) {
      if (!raw) return null;
      try {
        const u = new URL(raw, window.location.origin);
        if (u.origin !== window.location.origin) return null;
        return u.pathname + u.search + u.hash;
      } catch (e) {
        return null;
      }
    }

    // Already unlocked on this device? Skip straight past.
    if (Auth.getDeviceAuth()) {
      const params = new URLSearchParams(window.location.search);
      window.location.href = safeReturnTo(params.get("returnTo")) || `${window.APP_BASE_PATH}index.html`;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBox.classList.remove("is-visible");
      submitBtn.disabled = true;
      submitBtn.textContent = "Checking…";

      const deviceType = form.querySelector('input[name="deviceType"]:checked').value;

      try {
        await Auth.unlockDevice(passphraseInput.value, deviceType);
        const params = new URLSearchParams(window.location.search);
        window.location.href = safeReturnTo(params.get("returnTo")) || `${window.APP_BASE_PATH}index.html`;
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.add("is-visible");
        submitBtn.disabled = false;
        submitBtn.textContent = "Unlock This Device";
        passphraseInput.value = "";
        passphraseInput.focus();
      }
    });
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register(`${window.APP_BASE_PATH}service-worker.js`);
    }
  </script>
</body>
</html>
